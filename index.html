function ProjectCarousel({ projects, contacts, onOpenProject, onShowBalanceModal }) {
  const [activeIndex, setActiveIndex] = useState(0);
  const trackRef = useRef(null);
  const cardRefs = useRef([]);
  const scrollRaf = useRef(null);

  useEffect(() => {
    setActiveIndex((i) => Math.min(i, Math.max(0, projects.length - 1)));
  }, [projects.length]);

  function pickActiveFromScroll() {
    const track = trackRef.current;
    if (!track) return;
    const trackRect = track.getBoundingClientRect();
    const centerX = trackRect.left + trackRect.width / 2;
    let bestIdx = 0;
    let bestDist = Infinity;
    cardRefs.current.forEach((card, idx) => {
      if (!card) return;
      const r = card.getBoundingClientRect();
      const dist = Math.abs(r.left + r.width / 2 - centerX);
      if (dist < bestDist) { bestDist = dist; bestIdx = idx; }
    });
    setActiveIndex(bestIdx);
  }

  function onTrackScroll() {
    if (scrollRaf.current) cancelAnimationFrame(scrollRaf.current);
    scrollRaf.current = requestAnimationFrame(pickActiveFromScroll);
  }

  function goTo(index) {
    const next = Math.max(0, Math.min(projects.length - 1, index));
    setActiveIndex(next);
    const card = cardRefs.current[next];
    const track = trackRef.current;
    if (!card || !track) return;
    const cardLeft = card.offsetLeft;
    const cardWidth = card.offsetWidth;
    const target = cardLeft - (track.clientWidth - cardWidth) / 2;
    track.scrollTo({ left: target, behavior: "smooth" });
  }

  useEffect(() => {
    if (!trackRef.current || !projects.length) return;
    const t = window.setTimeout(() => goTo(0), 80);
    return () => window.clearTimeout(t);
    // eslint-disable-next-line
  }, [projects.length]);

  useEffect(() => () => { if (scrollRaf.current) cancelAnimationFrame(scrollRaf.current); }, []);

  if (!projects.length) return null;

  return (
    <div className="relative -mx-4">
      {projects.length > 1 && (
        <>
          <button
            type="button"
            aria-label="پروژه قبلی"
            onClick={() => goTo(activeIndex - 1)}
            disabled={activeIndex === 0}
            className="absolute right-2 top-1/2 -translate-y-1/2 z-10 w-9 h-9 rounded-full bg-white/95 shadow-lg border border-black/5 flex items-center justify-center disabled:opacity-30 disabled:pointer-events-none"
          >
            <ChevronLeft size={18} className="rotate-180 text-[#14213D]" />
          </button>
          <button
            type="button"
            aria-label="پروژه بعدی"
            onClick={() => goTo(activeIndex + 1)}
            disabled={activeIndex === projects.length - 1}
            className="absolute left-2 top-1/2 -translate-y-1/2 z-10 w-9 h-9 rounded-full bg-white/95 shadow-lg border border-black/5 flex items-center justify-center disabled:opacity-30 disabled:pointer-events-none"
          >
            <ChevronLeft size={18} className="text-[#14213D]" />
          </button>
        </>
      )}

      <div
        ref={trackRef}
        dir="ltr"
        onScroll={onTrackScroll}
        className="project-carousel-track flex gap-3 overflow-x-auto no-scrollbar px-[7.5%] py-2"
        style={{ scrollSnapType: "x mandatory", WebkitOverflowScrolling: "touch", touchAction: "pan-x" }}
      >
        {projects.map((p, idx) => {
          const theme = projectCardTheme(p.id);
          const isActive = idx === activeIndex;
          const isNeighbor = Math.abs(idx - activeIndex) === 1;
          return (
            <div
              key={p.id}
              ref={(el) => { cardRefs.current[idx] = el; }}
              className="project-carousel-card flex-shrink-0 w-[85%] max-w-[340px]"
            >
              <div
                className="transition-all duration-300 ease-out origin-center"
                style={{
                  transform: isActive ? "scale(1)" : isNeighbor ? "scale(0.94)" : "scale(0.9)",
                  opacity: isActive ? 1 : isNeighbor ? 0.72 : 0.5,
                  filter: isActive ? "none" : "saturate(0.85)",
                }}
              >
                <DashboardProjectCard
                  project={p}
                  contacts={contacts}
                  theme={theme}
                  onOpenProject={onOpenProject}
                  onShowBalanceModal={onShowBalanceModal}
                />
              </div>
            </div>
          );
        })}
      </div>

      {projects.length > 1 && (
        <div className="flex justify-center items-center gap-1.5 mt-3 px-4" dir="ltr">
          {projects.map((p, idx) => {
            const theme = projectCardTheme(p.id);
            const active = idx === activeIndex;
            return (
              <button
                key={p.id}
                type="button"
                aria-label={`پروژه ${idx + 1}`}
                onClick={() => goTo(idx)}
                className="rounded-full transition-all duration-300"
                style={{
                  width: active ? 18 : 7,
                  height: 7,
                  background: active ? theme.accent : "#CBD5E1",
                  opacity: active ? 1 : 0.65,
                }}
              />
            );
          })}
        </div>
      )}
    </div>
  );
}

function DashboardScreen({ projects, contacts, backHandlerRef, onOpenProject, onNewProject, onQuickExpense, onQuickTransfer }) {
  const [balanceModal, setBalanceModal] = useState(null);

  useEffect(() => {
    if (!backHandlerRef) return;
    backHandlerRef.current = () => {
      if (balanceModal) { setBalanceModal(null); return true; }
      return false;
    };
    return () => { if (backHandlerRef) backHandlerRef.current = null; };
  }, [balanceModal, backHandlerRef]);

  const totals = useMemo(() => {
    let units = 0, sold = 0, vacant = 0, reserved = 0, revenue = 0, expenses = 0;
    projects.forEach((p) => {
      units += p.units.length;
      sold += p.units.filter((u) => u.status === "sold").length;
      vacant += p.units.filter((u) => u.status === "vacant").length;
      reserved += p.units.filter((u) => u.status === "reserved").length;
      revenue += revenueOf(p);
      expenses += expensesTotalOf(p);
    });
    return { units, sold, vacant, reserved, revenue, expenses, profit: revenue - expenses };
  }, [projects]);

  return (
    <div className="px-4 pt-4 pb-6">
      <div className="mb-4">
        <div className="font-extrabold text-lg">داشبورد</div>
        <div className="text-xs text-[#6B7280] mt-0.5">{projects.length} پروژه فعال</div>
      </div>

      {projects.length > 0 && (
        <div className="bg-[#14213D] rounded-2xl p-4 text-white flex items-center gap-4 mb-5">
          <PolarProfitChart revenue={totals.revenue} expenses={totals.expenses} profit={totals.profit} size={118} dark />
          <div className="flex-1">
            <div className="flex justify-between text-xs mb-1"><span className="text-white/60">درآمد کل</span><span className="font-semibold">{fmt(totals.revenue)}</span></div>
            <div className="flex justify-between text-xs mb-1"><span className="text-white/60">هزینه کل</span><span className="font-semibold text-[#FCA5A5]">{fmt(totals.expenses)}</span></div>
            <div className="flex justify-between text-xs"><span className="text-white/60">{totals.profit >= 0 ? "سود کل" : "زیان کل"}</span><span className={`font-bold ${totals.profit >= 0 ? "text-[#86EFAC]" : "text-[#FCA5A5]"}`}>{fmt(Math.abs(totals.profit))}</span></div>
            <div className="flex gap-2 mt-2 text-[9px]">
              <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-[#22C55E]" /> درآمد</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-[#EF4444]" /> هزینه</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-[#38BDF8]" /> {totals.profit >= 0 ? "سود" : "زیان"}</span>
            </div>
          </div>
        </div>
      )}

      {projects.length === 0 ? (
        <div className="text-center text-[#6B7280] mt-16 text-sm px-8">
          هنوز پروژه‌ای اضافه نشده.
          <button onClick={onNewProject} className="block mx-auto mt-4 bg-[#14213D] text-white rounded-xl px-5 py-2.5 text-sm font-semibold">
            ساخت اولین پروژه
          </button>
        </div>
      ) : (
        <ProjectCarousel
          projects={projects}
          contacts={contacts}
          onOpenProject={onOpenProject}
          onShowBalanceModal={setBalanceModal}
        />
      )}

      {balanceModal && (
        <ProjectBalanceModal
          title={balanceModal.title}
          subtitle={balanceModal.subtitle}
          items={balanceModal.items}
          onClose={() => setBalanceModal(null)}
        />
      )}
    </div>
  );
}

function DocSection({ title, icon, docs, onAdd, onRemove, onError }) {
  const [previewId, setPreviewId] = useState(null);
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);

  function triggerPick() {
    try { sessionStorage.setItem("metrico_pending_upload", String(Date.now())); } catch (e) {}
    fileRef.current.click();
  }

  async function handleFile(e) {
    try { sessionStorage.removeItem("metrico_pending_upload"); } catch (e) {}
    const file = e.target.files?.[0];
    if (!file) return;
    setBusy(true);
    if (file.type && !file.type.startsWith("image/")) {
      try {
        const dataUrl = await readRawFile(file);
        onAdd(file.name, dataUrl);
      } catch (err) {
        if (onError) onError("بارگذاری فایل ناموفق بود: " + uploadErrorMessage(err));
      }
      setBusy(false);
      e.target.value = "";
      return;
    }
    try {
      const dataUrl = await resizeImage(file, 1200, 0.7);
      onAdd(file.name, dataUrl);
    } catch (err) {
      try {
        const dataUrl = await readRawFile(file);
        onAdd(file.name, dataUrl);
      } catch (err2) {
        if (onError) onError("بارگذاری عکس ناموفق بود: " + uploadErrorMessage(err2));
      }
    }
    setBusy(false);
    e.target.value = "";
  }
  const preview = docs.find((d) => d.id === previewId);

  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <div className="text-xs font-semibold text-[#6B7280] flex items-center gap-1">{icon}{title}</div>
        <button onClick={triggerPick} disabled={busy} className="text-xs text-[#14213D] font-semibold flex items-center gap-1 disabled:opacity-50">
          <Upload size={13} /> {busy ? "در حال پردازش..." : "بارگذاری"}
        </button>
        <input ref={fileRef} type="file" accept="image/*,application/pdf" className="hidden" onChange={handleFile} />
      </div>
      {docs.length === 0 ? (
        <div className="text-xs text-[#9CA3AF] text-center py-2">فایلی بارگذاری نشده</div>
      ) : (
        <div className="flex gap-2 flex-wrap">
          {docs.map((d) => {
            const isPdf = (d.dataUrl || "").startsWith("data:application/pdf");
            return (
              <div key={d.id} className="relative w-16 h-16 rounded-lg overflow-hidden border border-black/10">
                {isPdf ? (
                  <button onClick={() => window.open(d.dataUrl, "_blank")} className="w-full h-full bg-[#F4F6F5] flex flex-col items-center justify-center gap-1">
                    <FileText size={20} className="text-[#B91C1C]" />
                    <span className="text-[8px] text-[#6B7280] px-1 truncate w-full text-center">{d.name}</span>
                  </button>
                ) : (
                  <img src={d.dataUrl} className="w-full h-full object-cover cursor-pointer" onClick={() => setPreviewId(d.id)} alt={d.name} />
                )}
                <button onClick={() => onRemove(d.id)} className="absolute top-0.5 left-0.5 bg-black/60 rounded-full p-0.5">
                  <X size={10} className="text-white" />
                </button>
              </div>
            );
          })}
        </div>
      )}
      {preview && (
        <div className="fixed inset-0 bg-black/80 z-[80] flex items-center justify-center p-6" onClick={() => setPreviewId(null)}>
          <img src={preview.dataUrl} className="max-w-full max-h-full rounded-lg" alt={preview.name} />
        </div>
      )}
    </div>
  );
}

function UnitModal({ unit, project, onClose, onChange, onRecordIncome, onReport, onError, contacts, onAddContact, isReadOnly }) {
  const s = STATUS[unit.status];
  const total = totalPriceOf(unit);
  const paid = paidOf(unit);
  const remaining = remainingOf(unit);
  const bankAccounts = normalizeBankAccounts(project);
  const [showNewBuyerContact, setShowNewBuyerContact] = useState(false);
  const [newBuyerName, setNewBuyerName] = useState("");
  const [newBuyerPhone, setNewBuyerPhone] = useState("");
  const [incomeNote, setIncomeNote] = useState("");
  const [incomeDocs, setIncomeDocs] = useState([]);

  function set(field, value) { onChange((u) => ({ ...u, [field]: value })); }

  function selectBuyerContact(contactId) {
    if (!contactId) { set("buyerContactId", null); return; }
    const c = (contacts || []).find((x) => x.id === contactId);
    onChange((u) => ({ ...u, buyerContactId: contactId, buyerName: c ? c.name : u.buyerName, buyerPhone: c ? (c.phone || "") : u.buyerPhone }));
  }

  function confirmNewBuyerContact() {
    if (!newBuyerName.trim()) return;
    const c = onAddContact({ name: newBuyerName.trim(), phone: newBuyerPhone.trim(), role: "buyer" });
    selectBuyerContact(c.id);
    setNewBuyerName(""); setNewBuyerPhone(""); setShowNewBuyerContact(false);
  }

  function toggleInstallmentPaid(inst) {
    if (isReadOnly) return;
    if (inst.paid) {
      updateInstallment(inst.id, "paid", false);
      return;
    }
    if (inst.accountId && Number(inst.amount) > 0 && onRecordIncome && !inst.financeTxId) {
      if (!incomeNote.trim()) return;
      onRecordIncome({
        amount: inst.amount,
        accountId: inst.accountId,
        installmentId: inst.id,
        note: incomeNote.trim(),
        docs: incomeDocs,
      });
      setIncomeDocs([]);
    } else {
      updateInstallment(inst.id, "paid", true);
    }
  }

  function recordDownPayment() {
    if (isReadOnly || !unit.depositAccountId || !(Number(unit.downPayment) > 0) || !incomeNote.trim()) return;
    if (onRecordIncome) {
      onRecordIncome({
        amount: unit.downPayment,
        accountId: unit.depositAccountId,
        note: incomeNote.trim(),
        docs: incomeDocs,
      });
      setIncomeDocs([]);
    }
  }
  function addInstallment() {
    onChange((u) => ({
      ...u,
      installments: [...(u.installments || []), { id: uid(), date: "", amount: "", paid: false, accountId: unit.depositAccountId || "" }],
    }));
  }
  function updateInstallment(id, field, value) {
    onChange((u) => ({ ...u, installments: u.installments.map((i) => (i.id === id ? { ...i, [field]: value } : i)) }));
  }
  function removeInstallment(id) {
    onChange((u) => ({ ...u, installments: u.installments.filter((i) => i.id !== id) }));
  }
  function addDoc(kind, name, dataUrl) {
    onChange((u) => ({ ...u, [kind]: [...(u[kind] || []), { id: uid(), name, dataUrl }] }));
  }
  function removeDoc(kind, id) {
    onChange((u) => ({ ...u, [kind]: u[kind].filter((d) => d.id !== id) }));
  }

  return (
    <div className="fixed inset-0 bg-black/50 z-[65] flex items-end sm:items-center sm:justify-center" onClick={onClose}>
      <div className="bg-[#F4F6F5] w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[92vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="sticky top-0 bg-white border-b border-black/5 px-5 py-4 flex items-center gap-3 z-10">
          <button onClick={onClose} className="p-1"><ChevronLeft size={20} /></button>
          <div className="flex-1">
            <div className="font-bold">واحد {unit.unitNumber}</div>
            <div className="text-[11px] text-[#6B7280]">طبقه {unit.floor}</div>
          </div>
          <span className="text-xs px-2.5 py-1 rounded-full font-semibold" style={{ background: s.bg, color: s.text }}>{s.label}</span>
          <button onClick={onReport} className="p-1 text-[#14213D]" title="گزارش PDF این واحد"><Printer size={18} /></button>
          <button onClick={onClose} className="p-1 text-[#9CA3AF]"><X size={18} /></button>
        </div>

        <div className="p-5 flex flex-col gap-5">
          <div className="flex gap-2">
            {Object.entries(STATUS).map(([key, val]) => (
              <button
                key={key}
                onClick={() => set("status", key)}
                className="flex-1 rounded-xl py-2 text-xs font-semibold border"
                style={{ background: unit.status === key ? val.color : "#fff", color: unit.status === key ? "#fff" : val.text, borderColor: val.color + "50" }}
              >{val.label}</button>
            ))}
          </div>

          <div className="grid grid-cols-2 gap-3">
            <Field label="متراژ (متر مربع)" value={unit.area} onChange={(v) => set("area", v)} type="number" />
            <Field label="قیمت هر متر مربع (تومان)" value={unit.pricePerMeter} onChange={(v) => set("pricePerMeter", v)} type="number" />
          </div>

          <div>
            <label className="text-xs text-[#6B7280] font-medium">جهت واحد</label>
            <div className="grid grid-cols-3 gap-2 mt-1">
              {Object.entries(DIRECTIONS).map(([key, label]) => (
                <button
                  key={key}
                  onClick={() => set("direction", key)}
                  className="rounded-xl py-2 text-xs font-semibold border"
                  style={{
                    background: unit.direction === key ? "#14213D" : "#fff",
                    color: unit.direction === key ? "#fff" : "#4B5563",
                    borderColor: unit.direction === key ? "#14213D" : "#00000020",
                  }}
                >{label}</button>
              ))}
            </div>
          </div>

          <div className="bg-white rounded-xl p-3 flex items-center justify-between border border-black/5">
            <span className="text-xs text-[#6B7280]">مبلغ کل قرارداد (محاسبه خودکار)</span>
            <span className="font-bold">{fmt(total)} تومان</span>
          </div>

          <div>
            <label className="text-xs text-[#6B7280] font-medium">خریدار واحد</label>
            {!showNewBuyerContact ? (
              <div className="flex gap-2 mt-1">
                <select
                  value={unit.buyerContactId || ""}
                  onChange={(e) => selectBuyerContact(e.target.value || null)}
                  className="flex-1 bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none"
                >
                  <option value="">بدون خریدار / انتخاب کن</option>
                  {(contacts || []).map((c) => (
                    <option key={c.id} value={c.id}>{c.name}{c.phone ? ` — ${c.phone}` : ""}</option>
                  ))}
                </select>
                <button onClick={() => setShowNewBuyerContact(true)} className="text-xs text-[#14213D] font-semibold border border-[#14213D]/20 rounded-xl px-3 flex-shrink-0">+ جدید</button>
              </div>
            ) : (
              <div className="flex flex-col gap-2 mt-1 bg-white border border-black/10 rounded-xl p-3">
                <input value={newBuyerName} onChange={(e) => setNewBuyerName(e.target.value)} placeholder="نام خریدار جدید"
                  className="w-full bg-[#F4F6F5] border border-black/10 rounded-lg px-3 py-2 text-sm outline-none" />
                <input value={newBuyerPhone} onChange={(e) => setNewBuyerPhone(e.target.value)} placeholder="تلفن (اختیاری)" dir="ltr"
                  className="w-full bg-[#F4F6F5] border border-black/10 rounded-lg px-3 py-2 text-sm outline-none" />
                <div className="flex gap-2">
                  <button onClick={confirmNewBuyerContact} disabled={!newBuyerName.trim()} className="flex-1 bg-[#14213D] text-white rounded-lg py-2 text-xs font-semibold disabled:opacity-40">ثبت و انتخاب</button>
                  <button onClick={() => { setShowNewBuyerContact(false); setNewBuyerName(""); setNewBuyerPhone(""); }} className="flex-1 border border-black/10 rounded-lg py-2 text-xs font-medium">لغو</button>
                </div>
              </div>
            )}
            {unit.buyerContactId && unit.buyerPhone && (
              <a href={`tel:${unit.buyerPhone}`} className="mt-2 flex items-center justify-center gap-2 bg-green-50 text-[#166534] rounded-xl py-2 text-xs font-semibold">
                <PhoneCall size={13} /> تماس با {unit.buyerName} — {unit.buyerPhone}
              </a>
            )}
          </div>
          <Field label="کد پستی واحد" value={unit.postalCode} onChange={(v) => set("postalCode", v)} icon={<MapPin size={13} />} />
          <Field label="پیش‌پرداخت (تومان)" value={unit.downPayment} onChange={(v) => set("downPayment", v)} type="number" icon={<Wallet size={13} />} />
          {!isReadOnly && (
            <div className="bg-white rounded-xl p-3 border border-black/5 flex flex-col gap-2">
              <div className="text-xs font-semibold text-[#6B7280]">ثبت دریافت / قسط</div>
              <textarea value={incomeNote} onChange={(e) => setIncomeNote(e.target.value)} placeholder="توضیحات دریافت *" rows={2}
                className="w-full bg-[#F4F6F5] border border-black/10 rounded-lg px-3 py-2 text-sm outline-none resize-none" />
              <CompactDocUploader docs={incomeDocs} onChange={setIncomeDocs} label="پیوست مدارک دریافت" hint="رسید واریز، چک و..." />
            </div>
          )}
          {bankAccounts.length > 0 && (
            <div>
              <label className="text-xs text-[#6B7280] font-medium">حساب واریز درآمد فروش</label>
              <select value={unit.depositAccountId || ""} onChange={(e) => set("depositAccountId", e.target.value || null)} disabled={isReadOnly}
                className="w-full mt-1 bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none disabled:opacity-60">
                <option value="">انتخاب حساب...</option>
                {bankAccounts.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
              </select>
              {!isReadOnly && unit.depositAccountId && Number(unit.downPayment) > 0 && (
                <button type="button" onClick={recordDownPayment} disabled={!incomeNote.trim()}
                  className="mt-2 w-full text-xs bg-[#128C7E] text-white rounded-lg py-2 font-semibold disabled:opacity-40">
                  ثبت دریافت پیش‌پرداخت در حساب
                </button>
              )}
            </div>
          )}

          <div className="grid grid-cols-2 gap-3">
            <div className="bg-white rounded-xl p-3 border border-black/5">
              <div className="text-[11px] text-[#6B7280]">پرداخت‌شده</div>
              <div className="font-bold text-[#166534] mt-0.5">{fmt(paid)}</div>
            </div>
            <div className="bg-white rounded-xl p-3 border border-black/5">
              <div className="text-[11px] text-[#6B7280]">مانده</div>
              <div className="font-bold text-[#B91C1C] mt-0.5">{fmt(remaining)}</div>
            </div>

              {(unit.installments || []).map((i) => (
                <div key={i.id} className="bg-white border border-black/10 rounded-xl p-2.5 flex flex-col gap-2">
                  <div className="flex items-center gap-2">
                    <button onClick={() => toggleInstallmentPaid(i)} disabled={isReadOnly}>
                      {i.paid ? <CheckCircle2 size={20} className="text-[#166534]" /> : <Circle size={20} />}
                    </button>
                    <input type="date" value={i.date} onChange={(e) => updateInstallment(i.id, "date", e.target.value)} disabled={isReadOnly}
                      className="text-xs outline-none flex-1 min-w-0 bg-transparent disabled:opacity-60" />
                    <input type="number" placeholder="مبلغ" value={i.amount} onChange={(e) => updateInstallment(i.id, "amount", e.target.value)} disabled={isReadOnly}
                      className="text-xs outline-none w-24 text-left bg-transparent disabled:opacity-60" />

                      <button onClick={() => removeInstallment(i.id)} className="text-[#B91C1C] p-1"><Trash2 size={14} /></button>

                    <select value={i.accountId || ""} onChange={(e) => updateInstallment(i.id, "accountId", e.target.value)} disabled={isReadOnly || i.paid}
                      className="w-full bg-[#F4F6F5] border border-black/10 rounded-lg px-2 py-1.5 text-[10px] outline-none disabled:opacity-60">
                      <option value="">حساب واریز این قسط</option>
                      {bankAccounts.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
                    </select>
                  )}
                </div>
              ))}
            </div>
          </div>

          <DocSection title="مبایعه‌نامه" icon={<FileText size={14} />} docs={unit.contractDocs || []}
            onAdd={(name, dataUrl) => addDoc("contractDocs", name, dataUrl)} onRemove={(id) => removeDoc("contractDocs", id)} onError={onError} />
          <DocSection title="چک‌های فروش" icon={<Receipt size={14} />} docs={unit.checkDocs || []}
            onAdd={(name, dataUrl) => addDoc("checkDocs", name, dataUrl)} onRemove={(id) => removeDoc("checkDocs", id)} onError={onError} />

          <div>
            <label className="text-xs text-[#6B7280] font-medium">یادداشت</label>
            <textarea value={unit.notes} onChange={(e) => set("notes", e.target.value)} rows={3}
              className="w-full mt-1 bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
          </div>
        </div>
      </div>
    </div>
  );
}

function PrintView({ company, projects }) {
  const grandRevenue = projects.reduce((s, p) => s + p.units.filter((u) => u.status === "sold").reduce((s2, u) => s2 + totalPriceOf(u), 0), 0);
  const td = { border: "1px solid #E5E7EB", padding: "5px 6px" };
  return (
    <div className="print-area" style={{ direction: "rtl", padding: "24px", color: "#14213D" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, borderBottom: "2px solid #14213D", paddingBottom: 12, marginBottom: 16 }}>
        {company?.logo && <img src={company.logo} style={{ width: 44, height: 44, borderRadius: 10, objectFit: "cover" }} alt="" />}
        <div>
          <div style={{ fontWeight: 800, fontSize: 18 }}>{company?.name}</div>
          <div style={{ fontSize: 11, color: "#6B7280" }}>گزارش پروژه‌های ساختمانی — {new Date().toLocaleDateString("en-GB")}</div>
        </div>
      </div>
      {projects.length > 1 && (
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 16 }}>مجموع درآمد کل پروژه‌ها: {fmt(grandRevenue)} تومان</div>
      )}
      {projects.map((project) => {
        const revenue = project.units.filter((u) => u.status === "sold").reduce((s, u) => s + totalPriceOf(u), 0);
        const rows = project.units.slice().sort((a, b) => a.floor - b.floor || a.unitNumber.localeCompare(b.unitNumber));
        return (
          <div key={project.id} style={{ marginBottom: 26, pageBreakInside: "avoid" }}>
            <div style={{ fontWeight: 800, fontSize: 15, margin: "10px 0" }}>{project.name}</div>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
              <thead>
                <tr style={{ background: "#F4F6F5" }}>
                  {["طبقه", "واحد", "وضعیت", "متراژ", "جهت", "خریدار", "تلفن", "کد پستی", "مبلغ کل", "پرداخت‌شده", "مانده"].map((h) => (
                    <th key={h} style={{ ...td, textAlign: "right" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((u) => (
                  <tr key={u.id}>
                    <td style={td}>{u.floor}</td>
                    <td style={td}>{u.unitNumber}</td>
                    <td style={td}>{STATUS[u.status].label}</td>
                    <td style={td}>{u.area || "-"}</td>
                    <td style={td}>{u.direction && u.direction !== "none" ? DIRECTIONS[u.direction] : "-"}</td>
                    <td style={td}>{u.buyerName || "-"}</td>
                    <td style={td}>{u.buyerPhone || "-"}</td>
                    <td style={td}>{u.postalCode || "-"}</td>
                    <td style={td}>{fmt(totalPriceOf(u))}</td>
                    <td style={td}>{fmt(paidOf(u))}</td>
                    <td style={td}>{fmt(remainingOf(u))}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{ fontSize: 12, fontWeight: 700, marginTop: 8 }}>مجموع درآمد حاصل از فروش این پروژه: {fmt(revenue)} تومان</div>
          </div>
        );
      })}
    </div>
  );
}

function Field({ label, value, onChange, type = "text", icon }) {
  return (
    <div>
      <label className="text-xs text-[#6B7280] font-medium flex items-center gap-1">{icon}{label}</label>
      <input type={type} value={value} onChange={(e) => onChange(e.target.value)}
        className="w-full mt-1 bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js", { updateViaCache: "none" }).then((reg) => {
      // Check for a newer service worker every time the app is opened
      reg.update().catch(() => {});
      let refreshed = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshed) return;
        refreshed = true;
        window.location.reload();
      });
    }).catch(() => {});
  });
}
</script>
</body>
</html>
