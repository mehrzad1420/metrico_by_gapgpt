}

function InventoryScreen({ onBack, inventory, isReadOnly, onAddItem, onRemoveItem, onSetQuantity, onPatchItem, onAllocate, onRemoveAllocation }) {
  const [filterCat, setFilterCat] = useState("all");
  const [search, setSearch] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState("");
  const [newUnit, setNewUnit] = useState("");
  const [newCategory, setNewCategory] = useState("ШіШ§ЫҢШұ");
  const [newType, setNewType] = useState("");
  const [newVariant, setNewVariant] = useState("");
  const [editQty, setEditQty] = useState({});
  const [editSpec, setEditSpec] = useState({});
  const [allocateItem, setAllocateItem] = useState(null);
  const [allocActivity, setAllocActivity] = useState("");
  const [allocQty, setAllocQty] = useState("");
  const [expandedId, setExpandedId] = useState(null);

  const categories = useMemo(() => {
    const set = new Set(inventory.map((i) => i.category || "ШіШ§ЫҢШұ"));
    return ["all", ...Array.from(set).sort()];
  }, [inventory]);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return inventory.filter((item) => {
      if (filterCat !== "all" && (item.category || "ШіШ§ЫҢШұ") !== filterCat) return false;
      if (q && !item.name.toLowerCase().includes(q)) return false;
      return true;
    });
  }, [inventory, filterCat, search]);

  function submitAdd() {
    if (!newName.trim()) return;
    onAddItem({
      name: newName.trim(),
      unit: newUnit.trim() || "Ш№ШҜШҜ",
      category: newCategory.trim() || "ШіШ§ЫҢШұ",
      itemType: newType.trim(),
      itemVariant: newVariant.trim(),
    });
    setNewName(""); setNewUnit(""); setNewCategory("ШіШ§ЫҢШұ"); setNewType(""); setNewVariant(""); setShowAdd(false);
  }

  function commitQty(item) {
    const val = editQty[item.id];
    if (val === undefined || val === "") return;
    onSetQuantity(item.id, val);
    setEditQty((prev) => { const n = { ...prev }; delete n[item.id]; return n; });
  }

  function commitSpec(item) {
    const spec = editSpec[item.id];
    const itemType = (spec?.itemType ?? item.itemType ?? "").trim();
    const itemVariant = (spec?.itemVariant ?? item.itemVariant ?? "").trim();
    if (itemType === (item.itemType || "") && itemVariant === (item.itemVariant || "")) return;
    onPatchItem(item.id, { itemType, itemVariant });
    setEditSpec((prev) => { const n = { ...prev }; delete n[item.id]; return n; });
  }

  function submitAllocate() {
    if (!allocateItem) return;
    onAllocate(allocateItem.id, { activity: allocActivity, quantity: allocQty });
    setAllocateItem(null); setAllocActivity(""); setAllocQty("");
  }

  return (
    <div className="px-5 pt-5 pb-10">
      <div className="flex items-center gap-3 mb-4">
        <button onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>
        <div className="font-bold text-lg flex-1">Ш§ЩҶШЁШ§ШұЪҜШұШҜШ§ЩҶЫҢ ЩҲ Щ…ЩҲШ¬ЩҲШҜЫҢ Щ…ШөШ§Щ„Шӯ</div>
        {!isReadOnly && (
          <button onClick={() => setShowAdd(true)} className="text-xs bg-[#14213D] text-white rounded-lg px-3 py-2 font-semibold flex items-center gap-1">
            <Plus size={13} /> Щ…ШөШ§Щ„Шӯ Ш¬ШҜЫҢШҜ
          </button>
        )}
      </div>

      {isReadOnly && (
        <div className="bg-[#128C7E]/10 border border-[#128C7E]/25 text-[#0F6B5F] text-xs rounded-xl p-3 mb-4">
          ШӯШіШ§ШЁ ШҜЩ…ЩҲ вҖ” ЩҒЩӮШ· Щ…ШҙШ§ЩҮШҜЩҮ Щ…ЩҲШ¬ЩҲШҜЫҢ ЩҲ ШӘШ®ШөЫҢШөвҖҢЩҮШ§.
        </div>
      )}

      <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Ш¬ШіШӘШ¬ЩҲЫҢ Щ…ШөШ§Щ„Шӯ..."
        className="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none mb-3" />

      <div className="flex gap-1.5 mb-4 flex-wrap">
        {categories.map((cat) => (
          <button key={cat} onClick={() => setFilterCat(cat)}
            className="text-[11px] font-semibold px-2.5 py-1 rounded-full"
            style={{ background: filterCat === cat ? "#14213D" : "#F4F6F5", color: filterCat === cat ? "#fff" : "#4B5563" }}>
            {cat === "all" ? "ЩҮЩ…ЩҮ" : cat}
          </button>
        ))}
      </div>

      {filtered.length === 0 && (
        <div className="text-center text-[#9CA3AF] text-sm mt-16">Щ…ШөШ§Щ„ШӯЫҢ Ш«ШЁШӘ ЩҶШҙШҜЩҮ</div>
      )}

      <div className="flex flex-col gap-3">
        {filtered.map((item) => {
          const allocated = inventoryAllocated(item);
          const available = inventoryAvailable(item);
          const expanded = expandedId === item.id;
          return (
            <div key={item.id} className="bg-white rounded-2xl border border-black/5 p-4">
              <div className="flex items-start justify-between gap-2 mb-2">
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm text-[#14213D]">{item.name}</div>
                  <div className="text-[10px] text-[#9CA3AF] mt-0.5">{item.category || "ШіШ§ЫҢШұ"} В· {item.unit}</div>
                  {(item.itemType || item.itemVariant) && (
                    <div className="text-[10px] text-[#6B7280] mt-0.5 flex gap-2 flex-wrap">
                      {item.itemType && <span>ЩҶЩҲШ№: <span className="font-medium text-[#14213D]">{item.itemType}</span></span>}
                      {item.itemVariant && <span>ШӘЫҢЩҫ: <span className="font-medium text-[#14213D]">{item.itemVariant}</span></span>}
                    </div>
                  )}
                </div>
                {!isReadOnly && !item.takeoffKey && (
                  <button onClick={() => onRemoveItem(item.id)} className="text-[#B91C1C] p-1"><Trash2 size={14} /></button>
                )}
              </div>

              <div className="grid grid-cols-3 gap-2 text-center mb-3">
                <div className="bg-[#F4F6F5] rounded-lg p-2">
                  <div className="text-[9px] text-[#6B7280]">Ъ©Щ„ Щ…ЩҲШ¬ЩҲШҜЫҢ</div>
                  <div className="text-sm font-bold text-[#14213D]">{fmt(item.quantity || 0)}</div>
                </div>
                <div className="bg-amber-50 rounded-lg p-2">
                  <div className="text-[9px] text-[#92400E]">ШӘШ®ШөЫҢШөвҖҢШҙШҜЩҮ</div>
                  <div className="text-sm font-bold text-[#92400E]">{fmt(allocated)}</div>
                </div>
                <div className="bg-green-50 rounded-lg p-2">
                  <div className="text-[9px] text-[#166534]">ШўШІШ§ШҜ</div>
                  <div className="text-sm font-bold text-[#166534]">{fmt(available)}</div>
                </div>
              </div>

              {!isReadOnly && (
                <div className="grid grid-cols-2 gap-2 mb-2">
                  <input placeholder="ЩҶЩҲШ№ (Щ…Ш«Щ„Ш§ЩӢ Щ…ЫҢЩ„ЪҜШұШҜ)"
                    value={editSpec[item.id]?.itemType ?? item.itemType ?? ""}
                    onChange={(e) => setEditSpec((prev) => ({
                      ...prev,
                      [item.id]: { itemType: e.target.value, itemVariant: prev[item.id]?.itemVariant ?? item.itemVariant ?? "" },
                    }))}
                    onBlur={() => commitSpec(item)}
                    className="bg-[#F4F6F5] border border-black/10 rounded-lg px-2 py-1.5 text-[11px] outline-none" />
                  <input placeholder="ШӘЫҢЩҫ (Щ…Ш«Щ„Ш§ЩӢ ШіШ§ЫҢШІ ЫұЫІ)"
                    value={editSpec[item.id]?.itemVariant ?? item.itemVariant ?? ""}
                    onChange={(e) => setEditSpec((prev) => ({
                      ...prev,
                      [item.id]: { itemType: prev[item.id]?.itemType ?? item.itemType ?? "", itemVariant: e.target.value },
                    }))}
                    onBlur={() => commitSpec(item)}
                    className="bg-[#F4F6F5] border border-black/10 rounded-lg px-2 py-1.5 text-[11px] outline-none" />
                </div>
              )}

              {!isReadOnly && (
                <div className="flex gap-2 mb-2">
                  <input type="number" placeholder="ШӘШ№ШҜШ§ШҜ ШҜШіШӘЫҢ"
                    value={editQty[item.id] ?? ""}
                    onChange={(e) => setEditQty((prev) => ({ ...prev, [item.id]: e.target.value }))}
                    className="flex-1 bg-[#F4F6F5] border border-black/10 rounded-lg px-3 py-2 text-xs outline-none" />
                  <button onClick={() => commitQty(item)} className="text-xs bg-[#14213D] text-white rounded-lg px-3 font-semibold">Ш«ШЁШӘ</button>
                  <button onClick={() => setAllocateItem(item)} className="text-xs border border-[#128C7E]/30 text-[#128C7E] rounded-lg px-3 font-semibold">ШӘШ®ШөЫҢШө</button>
                </div>
              )}

              {(item.allocations || []).length > 0 && (
                <button onClick={() => setExpandedId(expanded ? null : item.id)}
                  className="text-[11px] text-[#6B7280] font-medium mb-1">
                  {expanded ? "в–ҫ" : "в–ё"} {item.allocations.length} ШӘШ®ШөЫҢШө
                </button>
              )}

              {expanded && (item.allocations || []).map((a) => (
                <div key={a.id} className="flex items-center justify-between bg-[#F4F6F5] rounded-lg px-3 py-2 mb-1 text-xs">
                  <div>
                    <div className="font-medium text-[#14213D]">{a.activity}</div>
                    <div className="text-[10px] text-[#9CA3AF]">{fmt(a.quantity)} {item.unit}</div>
                  </div>
                  {!isReadOnly && (
                    <button onClick={() => onRemoveAllocation(item.id, a.id)} className="text-[#B91C1C] p-1"><X size={14} /></button>
                  )}
                </div>
              ))}
            </div>
          );
        })}
      </div>

      {showAdd && (
        <div className="fixed inset-0 bg-black/40 flex items-end z-[60]">
          <div className="bg-white w-full rounded-t-2xl p-5">
            <div className="flex items-center justify-between mb-4">
              <div className="font-bold text-lg">Щ…ШөШ§Щ„Шӯ Ш¬ШҜЫҢШҜ</div>
              <button onClick={() => setShowAdd(false)}><X size={20} /></button>
            </div>
            <input value={newName} onChange={(e) => setNewName(e.target.value)} placeholder="ЩҶШ§Щ… Щ…ШөШ§Щ„Шӯ"
              className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none mb-3" />
            <div className="flex gap-2 mb-3">
              <input value={newUnit} onChange={(e) => setNewUnit(e.target.value)} placeholder="ЩҲШ§ШӯШҜ (Щ…Ш«Щ„Ш§ЩӢ Ъ©ЫҢШіЩҮ)"
                className="flex-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
              <input value={newCategory} onChange={(e) => setNewCategory(e.target.value)} placeholder="ШҜШіШӘЩҮ"
                className="flex-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
            </div>
            <div className="flex gap-2 mb-3">
              <input value={newType} onChange={(e) => setNewType(e.target.value)} placeholder="ЩҶЩҲШ№ (Щ…Ш«Щ„Ш§ЩӢ Щ…ЫҢЩ„ЪҜШұШҜ)"
                className="flex-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
              <input value={newVariant} onChange={(e) => setNewVariant(e.target.value)} placeholder="ШӘЫҢЩҫ (Щ…Ш«Щ„Ш§ЩӢ ШіШ§ЫҢШІ ЫұЫІ)"
                className="flex-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
            </div>
            <button onClick={submitAdd} disabled={!newName.trim()} className="w-full bg-[#14213D] text-white rounded-xl py-3 text-sm font-semibold disabled:opacity-40">
              Ш§ЩҒШІЩҲШҜЩҶ ШЁЩҮ Ш§ЩҶШЁШ§Шұ
            </button>
          </div>
        </div>
      )}

      {allocateItem && (
        <div className="fixed inset-0 bg-black/40 flex items-end z-[60]">
          <div className="bg-white w-full rounded-t-2xl p-5">
            <div className="flex items-center justify-between mb-4">
              <div className="font-bold text-lg">ШӘШ®ШөЫҢШө вҖ” {allocateItem.name}</div>
              <button onClick={() => setAllocateItem(null)}><X size={20} /></button>
            </div>
            <div className="text-xs text-[#6B7280] mb-3">Щ…ЩҲШ¬ЩҲШҜЫҢ ШўШІШ§ШҜ: {fmt(inventoryAvailable(allocateItem))} {allocateItem.unit}</div>
            <input value={allocActivity} onChange={(e) => setAllocActivity(e.target.value)} placeholder="ЩҒШ№Ш§Щ„ЫҢШӘ (Щ…Ш«Щ„Ш§ЩӢ ЪҜЪҶвҖҢЪ©Ш§ШұЫҢ Ш·ШЁЩӮЩҮ Ыі)"
              className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none mb-3" />
            <input type="number" value={allocQty} onChange={(e) => setAllocQty(e.target.value)} placeholder="Щ…ЩӮШҜШ§Шұ"
              className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none mb-4" />
            <button onClick={submitAllocate} disabled={!allocActivity.trim() || !allocQty}
              className="w-full bg-[#128C7E] text-white rounded-xl py-3 text-sm font-semibold disabled:opacity-40">
              Ш«ШЁШӘ ШӘШ®ШөЫҢШө
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function LocationScreen({ onBack, projects, onOpenProject }) {
  const located = projects.filter((p) => p.lat && p.lng);
  const markers = located.map((p) => ({
    lat: Number(p.lat), lng: Number(p.lng), label: p.name,
    onClick: () => onOpenProject(p.id),
  }));

  return (
    <div className="px-5 pt-5 pb-10">

function LoginScreen({ onSuccess }) {

  const [shake, setShake] = useState(false);

  function fail(msg) {
    setError(msg);
    setShake(true);
    setTimeout(() => setShake(false), 400);
  }

  function friendlyError(e) {
    const msg = e.message || "";
    if (msg.includes("Invalid login credentials")) return "Ш§ЫҢЩ…ЫҢЩ„ ЫҢШ§ ШұЩ…ШІ Ш№ШЁЩҲШұ Ш§ШҙШӘШЁШ§ЩҮ Ш§ШіШӘ.";
    if (msg.includes("User already registered")) return "Ш§ЫҢЩҶ Ш§ЫҢЩ…ЫҢЩ„ ЩӮШЁЩ„Ш§ЩӢ Ш«ШЁШӘ ШҙШҜЩҮ Ш§ШіШӘ.";
    if (msg.toLowerCase().includes("password should be at least")) return "ШұЩ…ШІ Ш№ШЁЩҲШұ ШЁШ§ЫҢШҜ ШӯШҜШ§ЩӮЩ„ Ы¶ Ъ©Ш§ШұШ§Ъ©ШӘШұ ШЁШ§ШҙШҜ.";
    if (msg.includes("Unable to validate email") || msg.includes("invalid")) return "Ш§ЫҢЩ…ЫҢЩ„ Щ…Ш№ШӘШЁШұ ЩҶЫҢШіШӘ.";
    if (msg.includes("Email not confirmed")) return "Ш§ЫҢЩ…ЫҢЩ„ ЩҮЩҶЩҲШІ ШӘШЈЫҢЫҢШҜ ЩҶШҙШҜЩҮ. Щ„ЫҢЩҶЪ© ШӘШЈЫҢЫҢШҜ Ш§ШұШіШ§Щ„вҖҢШҙШҜЩҮ ШЁЩҮ Ш§ЫҢЩ…ЫҢЩ„ШӘ ШұШ§ ШЁШ§ШІ Ъ©ЩҶ.";
    if (msg.includes("rate limit") || msg.includes("Too many")) return "ШӘЩ„Ш§ШҙвҖҢЩҮШ§ЫҢ ШІЫҢШ§ШҜ ЩҶШ§Щ…ЩҲЩҒЩӮ. Ъ©Щ…ЫҢ ШөШЁШұ Ъ©ЩҶ ЩҲ ШҜЩҲШЁШ§ШұЩҮ Ш§Щ…ШӘШӯШ§ЩҶ Ъ©ЩҶ.";

    return msg || "Ш®Ш·Ш§ЫҢЫҢ ШұШ® ШҜШ§ШҜ.";

    if (mode === "signup" && pw !== pw2) { fail("ШұЩ…ШІ Ш№ШЁЩҲШұ ЩҲ ШӘЪ©ШұШ§Шұ ШўЩҶ ЫҢЪ©ШіШ§ЩҶ ЩҶЫҢШіШӘЩҶШҜ."); return; }

    setBusy(true);

      const { data, error: err } = await window.sb.auth.signUp({ email: email.trim(), password: pw });
      if (err) { fail(friendlyError(err)); setBusy(false); return; }

        setMode("login");

    } else {
      const { error: err } = await window.sb.auth.signInWithPassword({ email: email.trim(), password: pw });
      if (err) { fail(friendlyError(err)); setBusy(false); return; }
      onSuccess();
    }

  return (

      <div className="absolute inset-0 opacity-[0.06]" style={{
        backgroundImage: "linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)",
        backgroundSize: "26px 26px",
      }} />
      <style>{`
        @keyframes shakeX { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-8px)} 40%,60%{transform:translateX(8px)} }
        .shake-anim { animation: shakeX 0.4s; }
      `}</style>

      <div className={`relative w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8 ${shake ? "shake-anim" : ""}`}>
        <div className="flex flex-col items-center mb-7">
          <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-3" style={{ background: "#14213D" }}>
            <Building2 size={28} className="text-[#C9A227]" />
          </div>
          <div className="font-extrabold text-lg text-[#14213D]">{APP_NAME}</div>
          <div className="text-[11px] text-[#9CA3AF] font-medium -mt-0.5">Щ…ШҜЫҢШұЫҢШӘ ЩҫШұЩҲЪҳЩҮвҖҢЩҮШ§ЫҢ ШіШ§Ш®ШӘЩ…Ш§ЩҶЫҢ</div>
          <div className="text-xs text-[#9CA3AF] mt-1">
            {mode === "login" && "ШЁШұШ§ЫҢ ЩҲШұЩҲШҜШҢ Ш§ЫҢЩ…ЫҢЩ„ ЩҲ ШұЩ…ШІ Ш№ШЁЩҲШұ ШұШ§ ЩҲШ§ШұШҜ Ъ©ЩҶ"}
            {mode === "signup" && "ШіШ§Ш®ШӘ ШӯШіШ§ШЁ Ш¬ШҜЫҢШҜ"}
            {mode === "reset" && "ШЁШ§ШІЫҢШ§ШЁЫҢ ШұЩ…ШІ Ш№ШЁЩҲШұ"}
          </div>
        </div>

        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
          <div>
            <label className="text-xs text-[#6B7280] font-medium">Ш§ЫҢЩ…ЫҢЩ„</label>
            <input
              type="email"
              value={email}
              onChange={(e) => { setEmail(e.target.value); setError(""); }}
              className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#14213D]"
              placeholder="you@example.com"

          {mode !== "reset" && (

              <input

                placeholder="ШұЩ…ШІ Ш№ШЁЩҲШұ"

            </div>
          )}

          {mode === "signup" && (
            <div>
              <label className="text-xs text-[#6B7280] font-medium">ШӘЪ©ШұШ§Шұ ШұЩ…ШІ Ш№ШЁЩҲШұ</label>
              <input

function CompanySetup({ initial, onSave, onClose, user, onError }) {
  const [name, setName] = useState(initial?.name || "");
  const [logo, setLogo] = useState(initial?.logo || null);
  const fileRef = useRef(null);
  const [showPwForm, setShowPwForm] = useState(false);
  const [curPw, setCurPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [pwMsg, setPwMsg] = useState("");
  const [pwBusy, setPwBusy] = useState(false);

  async function handlePasswordChange() {
    if (newPw.length < 6) { setPwMsg("ШұЩ…ШІ Ш¬ШҜЫҢШҜ ШЁШ§ЫҢШҜ ШӯШҜШ§ЩӮЩ„ Ы¶ Ъ©Ш§ШұШ§Ъ©ШӘШұ ШЁШ§ШҙШҜ."); return; }
    if (newPw !== confirmPw) { setPwMsg("ШұЩ…ШІ Ш¬ШҜЫҢШҜ ЩҲ ШӘЪ©ШұШ§Шұ ШўЩҶ ЫҢЪ©ШіШ§ЩҶ ЩҶЫҢШіШӘЩҶШҜ."); return; }
    setPwBusy(true);
    setPwMsg("");
    try {
      const { error: verifyErr } = await window.sb.auth.signInWithPassword({ email: user.email, password: curPw });
      if (verifyErr) { setPwMsg("ШұЩ…ШІ ЩҒШ№Щ„ЫҢ Ш§ШҙШӘШЁШ§ЩҮ Ш§ШіШӘ."); setPwBusy(false); return; }
      const { error: err } = await window.sb.auth.updateUser({ password: newPw });
      if (err) throw err;
      setPwMsg("ШұЩ…ШІ Ш№ШЁЩҲШұ ШЁШ§ Щ…ЩҲЩҒЩӮЫҢШӘ ШӘШәЫҢЫҢШұ Ъ©ШұШҜ.");
      setCurPw(""); setNewPw(""); setConfirmPw("");
    } catch (e) {
      setPwMsg("Ш®Ш·Ш§: " + (e.message || "ШӘШәЫҢЫҢШұ ШұЩ…ШІ ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ."));
    }
    setPwBusy(false);
  }

  async function handleLogo(e) {
    try { sessionStorage.removeItem("metrico_pending_upload"); } catch (e2) {}
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const dataUrl = await resizeImage(file, 300, 0.8);
      setLogo(dataUrl);
    } catch (err) {
      try {
        const dataUrl = await readRawFile(file);
        setLogo(dataUrl);
      } catch (err2) {
        if (onError) onError("ШЁШ§ШұЪҜШ°Ш§ШұЫҢ Щ„ЩҲЪҜЩҲ ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ: " + uploadErrorMessage(err2));
      }
    }
    e.target.value = "";
  }
  function triggerLogoPick() {
    try { sessionStorage.setItem("metrico_pending_upload", String(Date.now())); } catch (e) {}
    fileRef.current.click();
  }

function NewProjectSheet({ onCancel, onCreate }) {

  function updateFloor(idx, field, value) {
    setFloors((prev) => prev.map((f, i) => (i === idx ? { ...f, [field]: value } : f)));
  }
  function addFloorRow() {
    const nextNum = floors.length ? Math.max(...floors.map((f) => f.number)) + 1 : 1;

        <input

        <div className="grid grid-cols-2 gap-3 mb-4">
          <div>
            <label className="text-xs text-[#6B7280] font-medium">Щ…ШӘШұШ§Ъҳ Ш№ШұШөЩҮ (Щ…ШӘШұ Щ…ШұШЁШ№)</label>

          <div>
            <label className="text-xs text-[#6B7280] font-medium">Щ…ШӘШұШ§Ъҳ ШІЫҢШұШЁЩҶШ§ЫҢ Ъ©Щ„</label>
            <input type="number" value={totalBuiltArea} onChange={(e) => setTotalBuiltArea(e.target.value)}
              className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
          </div>

        <div className="flex items-center justify-between mb-2">

            <div key={idx} className="flex items-center gap-2 bg-[#F4F6F5] border border-black/10 rounded-xl p-2.5">
              <div className="flex-1">

              </div>
              <div className="flex-1">

function ProjectSettingsSheet({ project, contacts, isReadOnly, onClose, onRename, onUpdateMeta, onUpdateActivities, onUpdateBankAccounts, onUpdateInvestors, onAddFloor, onDeleteFloor, onDelete, onAddDoc, onRemoveDoc, onError }) {

  const [accType, setAccType] = useState("current");
  const [accOwnerType, setAccOwnerType] = useState("project");
  const [accInvestorContactId, setAccInvestorContactId] = useState("");
  const [finMsg, setFinMsg] = useState("");
  const sortedFloors = [...project.floors].sort((a, b) => b.number - a.number);

  const SETTINGS_TABS = [
    { id: "general", label: "Ш№Щ…ЩҲЩ…ЫҢ" },
    { id: "financial", label: "Щ…Ш§Щ„ЫҢ" },
    { id: "location", label: "Щ…ЩҲЩӮШ№ЫҢШӘ" },
    { id: "activities", label: "ЩҒШ№Ш§Щ„ЫҢШӘвҖҢЩҮШ§" },
    { id: "floors", label: "Ш·ШЁЩӮШ§ШӘ" },
    { id: "docs", label: "Щ…ШҜШ§ШұЪ©" },
  ];

  useEffect(() => {
    setActivities(normalizeProjectActivities(project));
    setBankAccounts(normalizeBankAccounts(project));
    setInvestors(normalizeInvestors(project));
  }, [project.id, project.activities, project.bankAccounts, project.investors]);

  const investorContactOptions = (contacts || []).filter((c) => c.role === "investor");

  function persistInvestors(next) {
    setInvestors(next);
    onUpdateInvestors(next);
    setFinMsg("ШіШұЩ…Ш§ЫҢЩҮвҖҢЪҜШ°Ш§ШұШ§ЩҶ Ш°Ш®ЫҢШұЩҮ ШҙШҜ.");
    setTimeout(() => setFinMsg(""), 1500);
  }

  function addInvestor() {
    if (!invContactId || investors.some((i) => i.contactId === invContactId)) return;
    persistInvestors([...investors, { id: uid(), contactId: invContactId, sharePercent: Number(invShare) || 0 }]);
    setInvContactId(""); setInvShare("");
  }

  function removeInvestor(id) {
    persistInvestors(investors.filter((i) => i.id !== id));
  }

  function updateInvestorShare(id, sharePercent) {
    persistInvestors(investors.map((i) => (i.id === id ? { ...i, sharePercent: Number(sharePercent) || 0 } : i)));
  }

  function persistActivities(next) {
    const normalized = next.map((a, i) => ({ ...a, order: i }));
    setActivities(normalized);
    onUpdateActivities(normalized);
    setActMsg("ЩҒЩҮШұШіШӘ ЩҒШ№Ш§Щ„ЫҢШӘвҖҢЩҮШ§ Ш°Ш®ЫҢШұЩҮ ШҙШҜ.");
    setTimeout(() => setActMsg(""), 1500);
  }

  function updateActivityNameLocal(id, nameVal) {
    setActivities((prev) => prev.map((a) => (a.id === id ? { ...a, name: nameVal } : a)));
  }

  function saveActivitiesFromState() {
    setActivities((prev) => {
      const normalized = prev.map((a, i) => ({ ...a, order: i }));
      onUpdateActivities(normalized);
      return normalized;
    });
    setActMsg("ЩҒЩҮШұШіШӘ ЩҒШ№Ш§Щ„ЫҢШӘвҖҢЩҮШ§ Ш°Ш®ЫҢШұЩҮ ШҙШҜ.");
    setTimeout(() => setActMsg(""), 1500);
  }

  function removeActivity(id) {
    persistActivities(activities.filter((a) => a.id !== id).map((a, i) => ({ ...a, order: i })));
  }

  function moveActivity(id, dir) {
    const idx = activities.findIndex((a) => a.id === id);
    if (idx < 0) return;
    const swap = dir === "up" ? idx - 1 : idx + 1;
    if (swap < 0 || swap >= activities.length) return;
    const next = [...activities];
    [next[idx], next[swap]] = [next[swap], next[idx]];
    persistActivities(next.map((a, i) => ({ ...a, order: i })));
  }

  function addActivity() {
    const trimmed = newActivity.trim();
    if (!trimmed) return;
    persistActivities([...activities, { id: uid(), name: trimmed, order: activities.length }]);
    setNewActivity("");
  }

  function resetActivitiesToDefault() {
    persistActivities(defaultProjectActivities());
  }

  function persistBankAccounts(next) {
    setBankAccounts(next);
    onUpdateBankAccounts(next);
    setFinMsg("ШӯШіШ§ШЁвҖҢЩҮШ§ЫҢ ШЁШ§ЩҶЪ©ЫҢ Ш°Ш®ЫҢШұЩҮ ШҙШҜ.");
    setTimeout(() => setFinMsg(""), 1500);
  }

  function resetAccountForm() {
    setEditAccountId(null);
    setAccName("");
    setAccNumber("");
    setAccBalance("");
    setAccType("current");
    setAccOwnerType("project");
    setAccInvestorContactId("");
  }

  function startEditAccount(acc) {
    setEditAccountId(acc.id);
    setAccName(acc.name || "");
    setAccNumber(acc.accountNumber || "");
    setAccBalance(acc.initialBalance ?? "");
    setAccType(acc.accountType || "current");
    setAccOwnerType(acc.ownerType || "project");
    setAccInvestorContactId(acc.investorContactId || "");
  }

  function submitBankAccount() {
    if (!accName.trim() || !accNumber.trim()) return;
    const payload = {
      name: accName.trim(),
      accountNumber: accNumber.trim(),
      initialBalance: accBalance,
      accountType: accType,
      ownerType: accOwnerType || "project",
      investorContactId: accOwnerType === "investor" ? (accInvestorContactId || null) : null,
    };
    if (editAccountId) {
      persistBankAccounts(bankAccounts.map((a) => (a.id === editAccountId ? { ...a, ...payload } : a)));
    } else {
      persistBankAccounts([...bankAccounts, { id: uid(), ...payload }]);
    }
    resetAccountForm();
  }

  function removeBankAccount(id) {
    persistBankAccounts(bankAccounts.filter((a) => a.id !== id));
    if (editAccountId === id) resetAccountForm();
  }

  const totalBankBalance = bankAccounts.reduce((s, a) => s + (Number(a.initialBalance) || 0), 0);

  function saveMeta() {
    onUpdateMeta({ address: address.trim(), landArea, totalBuiltArea, phase });
    setMetaMsg("Ш°Ш®ЫҢШұЩҮ ШҙШҜ.");
    setTimeout(() => setMetaMsg(""), 1500);
  }

  function useCurrentLocation() {
    if (!navigator.geolocation) { setLocMsg("Щ…ШұЩҲШұЪҜШұ ШҙЩ…Ш§ Щ…ЩҲЩӮШ№ЫҢШӘ Щ…Ъ©Ш§ЩҶЫҢ ШұШ§ ЩҫШҙШӘЫҢШЁШ§ЩҶЫҢ ЩҶЩ…ЫҢвҖҢЪ©ЩҶШҜ."); return; }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setLat(String(pos.coords.latitude.toFixed(6)));
        setLng(String(pos.coords.longitude.toFixed(6)));
      },
      () => setLocMsg("ШҜШіШӘШұШіЫҢ ШЁЩҮ Щ…ЩҲЩӮШ№ЫҢШӘ Щ…Ъ©Ш§ЩҶЫҢ ШұШҜ ШҙШҜ."),
      { enableHighAccuracy: true, timeout: 10000 }
    );

  function saveLocation() {
    onUpdateMeta({ lat, lng });
    setLocMsg("Щ…ЩҲЩӮШ№ЫҢШӘ Ш°Ш®ЫҢШұЩҮ ШҙШҜ.");
    setTimeout(() => setLocMsg(""), 1500);
  }

  return (
    <div className="fixed inset-0 bg-black/40 flex items-end z-[60]">
      <div className="bg-white w-full rounded-t-2xl max-h-[88vh] flex flex-col">
        <div className="px-5 pt-5 pb-3 shrink-0 border-b border-black/5">
          <div className="flex items-center justify-between mb-3">
            <div>
              <div className="font-bold text-lg">ШӘЩҶШёЫҢЩ…Ш§ШӘ ЩҫШұЩҲЪҳЩҮ</div>
              <div className="text-[11px] text-[#9CA3AF] mt-0.5">{project.name}</div>
            </div>

          </div>

              <button
                key={tab.id}

                )}
              </div>

              <label className="text-xs text-[#6B7280] font-medium">ШўШҜШұШі ЩҫШұЩҲЪҳЩҮ</label>
              <input value={address} onChange={(e) => setAddress(e.target.value)} disabled={isReadOnly}

                    Ш§ЩҒШІЩҲШҜЩҶ Ш·ШЁЩӮЩҮ ШЁШ§ {floorCount} ЩҲШ§ШӯШҜ
                  </button>

              <label className="text-xs text-[#6B7280] font-medium">Ш·ШЁЩӮШ§ШӘ ЩҒШ№Щ„ЫҢ</label>
              <div className="flex flex-col gap-2 mt-2">
                {sortedFloors.map((f) => (
                  <div key={f.number} className="flex items-center justify-between bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5">
                    <span className="text-sm">Ш·ШЁЩӮЩҮ {f.number} вҖ” {f.count} ЩҲШ§ШӯШҜ</span>
                    {!isReadOnly && (
                      confirmFloor === f.number ? (
                        <div className="flex gap-1.5">
                          <button onClick={() => setConfirmFloor(null)} className="text-xs bg-white border border-black/10 rounded-lg px-2 py-1">Щ„ШәЩҲ</button>
                          <button onClick={() => { onDeleteFloor(f.number); setConfirmFloor(null); }} className="text-xs bg-[#B91C1C] text-white rounded-lg px-2 py-1">ШӯШ°ЩҒ ЩӮШ·Ш№ЫҢ</button>
                        </div>
                      ) : (
                        <button onClick={() => setConfirmFloor(f.number)} className="text-[#B91C1C] p-1"><Trash2 size={15} /></button>
                      )
                    )}
                  </div>
                ))}
              </div>
            </>
          )}

          {settingsTab === "docs" && (
            <DocSection
              title="Щ…ШҜШ§ШұЪ© ЩҫШұЩҲЪҳЩҮ (ЩҫШұЩҲШ§ЩҶЩҮ ШіШ§Ш®ШӘЩ…Ш§ЩҶЫҢ ЩҲ...)"
              icon={<FileText size={14} />}
              docs={project.documents || []}
              onAdd={onAddDoc}
              onRemove={onRemoveDoc}
              onError={onError}
            />
          )}
        </div>

        {!isReadOnly && (
          <div className="shrink-0 px-5 py-4 border-t border-black/10 bg-[#FAFAFA]">
            {!confirmDelete ? (
              <button onClick={() => setConfirmDelete(true)} className="w-full flex items-center justify-center gap-2 text-[#B91C1C] border border-[#B91C1C]/30 rounded-xl py-2.5 text-sm font-semibold bg-white">
                <Trash2 size={15} /> ШӯШ°ЩҒ Ш§ЫҢЩҶ ЩҫШұЩҲЪҳЩҮ
              </button>
            ) : (
              <div className="bg-red-50 rounded-xl p-3">
                <div className="text-xs text-[#B91C1C] mb-2">Щ…Ш·Щ…ШҰЩҶЫҢШҹ Ш§ЫҢЩҶ ЩҫШұЩҲЪҳЩҮ ЩҲ ЩҮЩ…ЩҮ ЩҲШ§ШӯШҜЩҮШ§ЫҢШҙ ШЁШұШ§ЫҢ ЩҮЩ…ЫҢШҙЩҮ ШӯШ°ЩҒ Щ…ЫҢвҖҢШҙЩҲШҜ.</div>
                <div className="flex gap-2">
                  <button onClick={() => setConfirmDelete(false)} className="flex-1 bg-white border border-black/10 rounded-lg py-2 text-xs font-medium">Щ„ШәЩҲ</button>
                  <button onClick={onDelete} className="flex-1 bg-[#B91C1C] text-white rounded-lg py-2 text-xs font-medium">ШӯШ°ЩҒ ЩӮШ·Ш№ЫҢ</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function ProjectPanel({ project, onOpenUnit, onOpenSettings, onOpenExpenses, onOpenFinance, onPrint, onFinancialReport, onBackToDashboard, onRemoveNote }) {
  const [showNotes, setShowNotes] = useState(false);
  const byFloor = useMemo(() => {
    const map = {};
    project.units.forEach((u) => { map[u.floor] = map[u.floor] || []; map[u.floor].push(u); });
    return Object.entries(map)
      .map(([floor, units]) => ({ floor: Number(floor), units: units.sort((a, b) => Number(a.unitNumber) - Number(b.unitNumber)) }))
      .sort((a, b) => b.floor - a.floor);
  }, [project]);

  const revenue = revenueOf(project);
  const expenses = expensesTotalOf(project);
  const profit = revenue - expenses;
  const soldCount = project.units.filter((u) => u.status === "sold").length;
  const notes = project.quickNotes || [];

  return (
    <div className="px-4 pt-4">
      <button onClick={onBackToDashboard} className="flex items-center gap-1 text-xs text-[#6B7280] mb-3">
        <ChevronLeft size={14} className="rotate-180" /> ШҜШ§ШҙШЁЩҲШұШҜ
      </button>

      <div className="text-xl font-extrabold text-[#14213D] mb-1">{project.name}</div>
      {project.phase && (
        <div className="inline-block text-[11px] font-semibold text-[#14213D] bg-[#F4F6F5] border border-black/10 px-2.5 py-1 rounded-full mb-2">
          Щ…ШұШӯЩ„ЩҮ ЩҒШ№Щ„ЫҢ: {project.phase}
        </div>
      )}
      <div className="text-sm text-[#6B7280] mb-2">{project.units.length} ЩҲШ§ШӯШҜ В· {project.floors.length} Ш·ШЁЩӮЩҮ</div>

      {notes.length > 0 && (
        <button onClick={() => setShowNotes((v) => !v)} className="w-full flex items-center gap-2 bg-amber-50 border border-amber-200 text-amber-900 text-xs rounded-xl px-3 py-2 mb-3">
          <Bell size={14} />
          <span className="flex-1 text-right">{notes.length} ЫҢШ§ШҜШҜШ§ШҙШӘ ШЁШұШ§ЫҢ Ш§ЫҢЩҶ ЩҫШұЩҲЪҳЩҮ</span>
          <ChevronLeft size={13} className={showNotes ? "rotate-90" : "rotate-180"} />
        </button>
      )}
      {showNotes && notes.length > 0 && (
        <div className="flex flex-col gap-2 mb-3">
          {notes.slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || "")).map((n) => (
            <div key={n.id} className="bg-white border border-black/10 rounded-xl p-3 flex items-start justify-between gap-2">
              <div className="text-xs text-[#374151]">{n.text}</div>
              <button onClick={() => onRemoveNote(n.id)} className="text-[#B91C1C] flex-shrink-0"><Trash2 size={13} /></button>
            </div>
          ))}
        </div>
      )}

      <div className="flex gap-2 flex-wrap mb-3">
        <button onClick={onOpenFinance} className="flex items-center gap-1 text-xs text-white bg-[#14213D] rounded-lg px-2.5 py-1.5 font-semibold">
          <Wallet size={13} /> ШӯШіШ§ШЁШҜШ§ШұЫҢ
        </button>
        <button onClick={onPrint} className="flex items-center gap-1 text-xs text-[#6B7280] bg-white border border-black/10 rounded-lg px-2.5 py-1.5">
          <Printer size={13} /> PDF
        </button>
        <button onClick={onFinancialReport} className="flex items-center gap-1 text-xs text-[#6B7280] bg-white border border-black/10 rounded-lg px-2.5 py-1.5">
          <Wallet size={13} /> ЪҜШІШ§ШұШҙ Щ…Ш§Щ„ЫҢ
        </button>
        <button onClick={onOpenSettings} className="flex items-center gap-1 text-xs text-[#6B7280] bg-white border border-black/10 rounded-lg px-2.5 py-1.5">
          <Settings size={13} /> ШӘЩҶШёЫҢЩ…Ш§ШӘ ЩҫШұЩҲЪҳЩҮ
        </button>
      </div>

      <div className="bg-white rounded-2xl border border-black/10 p-3 flex flex-col gap-1.5 shadow-sm">
        {byFloor.map(({ floor, units }) => (
          <div key={floor} className="flex items-stretch gap-1.5">
            <div className="w-7 flex-shrink-0 flex items-center justify-center text-[10px] font-bold text-[#9CA3AF]">{floor}</div>
            <div className="flex-1 grid gap-1.5" style={{ gridTemplateColumns: `repeat(${units.length}, minmax(0,1fr))` }}>
              {units.map((u) => {
                const s = STATUS[u.status];
                return (
                  <button
                    key={u.id}
                    onClick={() => onOpenUnit(u.id)}
                    className="rounded-lg py-2 px-1 flex flex-col items-center justify-center border min-h-[46px]"
                    style={{ background: s.bg, borderColor: s.color + "55" }}
                  >
                    <span className="text-[11px] font-bold leading-tight" style={{ color: s.text }}>{u.unitNumber}</span>
                    <span className="text-[9px] leading-tight mt-0.5 text-center" style={{ color: s.text }}>
                      {u.status === "sold" ? (u.buyerName || "ШЁШҜЩҲЩҶ ЩҶШ§Щ…") : s.label}
                    </span>
                    <span className="text-[8px] leading-tight mt-0.5 text-center opacity-80" style={{ color: s.text }}>
                      {u.area ? `${u.area} mВІ` : ""}{u.area && u.direction && u.direction !== "none" ? " В· " : ""}{u.direction && u.direction !== "none" ? DIRECTIONS[u.direction] : ""}
                    </span>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      <div className="flex gap-1.5 mt-2 text-[9px]">
        <span className="px-1.5 py-0.5 rounded-full" style={{ background: STATUS.sold.bg, color: STATUS.sold.text }}>ЩҒШұЩҲШ®ШӘЩҮвҖҢШҙШҜЩҮ</span>
        <span className="px-1.5 py-0.5 rounded-full" style={{ background: STATUS.reserved.bg, color: STATUS.reserved.text }}>ШұШІШұЩҲ</span>
        <span className="px-1.5 py-0.5 rounded-full" style={{ background: STATUS.vacant.bg, color: STATUS.vacant.text }}>Ш®Ш§Щ„ЫҢ</span>
      </div>

      <div className="mt-4 bg-[#14213D] text-white rounded-2xl p-4 flex items-center justify-between">
        <div>
          <div className="text-[11px] text-white/60">Щ…Ш¬Щ…ЩҲШ№ ШҜШұШўЩ…ШҜ ШӯШ§ШөЩ„ Ш§ШІ ЩҒШұЩҲШҙ ({soldCount} ЩҲШ§ШӯШҜ)</div>
          <div className="text-lg font-extrabold mt-0.5">{fmt(revenue)} ШӘЩҲЩ…Ш§ЩҶ</div>
        </div>
        <Wallet size={22} className="text-[#C9A227]" />
      </div>

      <button onClick={onOpenExpenses} className="w-full mt-3 flex items-center justify-between bg-white rounded-2xl border border-black/10 p-4">
        <div>
          <div className="text-[11px] text-[#6B7280]">ЩҮШІЫҢЩҶЩҮвҖҢЩҮШ§ЫҢ ЩҫШұЩҲЪҳЩҮ ({(project.expenses || []).length} Щ…ЩҲШұШҜ)</div>
          <div className="text-base font-bold mt-0.5 text-[#B91C1C]">{fmt(expenses)} ШӘЩҲЩ…Ш§ЩҶ</div>
        </div>
        <span className="text-xs text-[#14213D] font-semibold flex items-center gap-1">Щ…ШҜЫҢШұЫҢШӘ <ChevronLeft size={13} className="rotate-180" /></span>
      </button>

      <div className={`mt-3 rounded-2xl p-4 flex items-center justify-between ${profit >= 0 ? "bg-green-50" : "bg-red-50"}`}>
        <div>
          <div className="text-[11px] text-[#6B7280]">{profit >= 0 ? "ШіЩҲШҜ ЩҫШұЩҲЪҳЩҮ (ШӘШ§ Ш§ЫҢЩҶ Щ„ШӯШёЩҮ)" : "ШІЫҢШ§ЩҶ ЩҫШұЩҲЪҳЩҮ (ШӘШ§ Ш§ЫҢЩҶ Щ„ШӯШёЩҮ)"}</div>
          <div className={`text-lg font-extrabold mt-0.5 ${profit >= 0 ? "text-[#166534]" : "text-[#B91C1C]"}`}>{fmt(Math.abs(profit))} ШӘЩҲЩ…Ш§ЩҶ</div>
        </div>
        <DonutChart
          data={[{ value: expenses, color: "#EF4444", label: "ЩҮШІЫҢЩҶЩҮ" }, { value: Math.max(profit, 0), color: "#22C55E", label: "ШіЩҲШҜ" }]}
          size={72} centerLabel="ШіЩҲШҜ Ш®Ш§Щ„Шө" centerValue={fmt(Math.abs(profit))} dark={false}
        />
      </div>
    </div>
  );
}

const CONTACT_ROLES = { investor: "ШіШұЩ…Ш§ЫҢЩҮвҖҢЪҜШ°Ш§Шұ", buyer: "Ш®ШұЫҢШҜШ§Шұ", contractor: "ЩҫЫҢЩ…Ш§ЩҶЪ©Ш§Шұ", supplier: "ШӘШЈЩ…ЫҢЩҶвҖҢЪ©ЩҶЩҶШҜЩҮ", other: "ШіШ§ЫҢШұ" };
const PAYMENT_METHODS = { cash: "ЩҶЩӮШҜЫҢ", check: "ЪҶЪ©", credit: "ЩҶШіЫҢЩҮ" };

function ReportsScreen({ project, projects, contacts, initialView, onBack, onSelectProject }) {
  const [view, setView] = useState(initialView || "accounts");
  const [selectedAccountId, setSelectedAccountId] = useState(null);
  const [checkTab, setCheckTab] = useState("collected");

  useEffect(() => {
    setView(initialView || "accounts");
    setSelectedAccountId(null);
  }, [initialView, project?.id]);

  const accounts = normalizeBankAccounts(project);
  const views = [
    { id: "accounts", label: "Щ…ЩҲШ¬ЩҲШҜЫҢ ШӯШіШ§ШЁвҖҢЩҮШ§" },
    { id: "checks", label: "ЪҜШІШ§ШұШҙ ЪҶЪ©вҖҢЩҮШ§" },
    { id: "flow", label: "ЪҜШұШҜШҙ Щ…Ш§Щ„ЫҢ" },
  ];
  const ledgerRows = useMemo(
    () => (selectedAccountId ? buildAccountLedgerRows(project, selectedAccountId) : []),
    [project, selectedAccountId]
  );
  const paidChecks = useMemo(() => paidCheckRows(project, contacts), [project, contacts]);
  const collectedChecks = useMemo(() => collectedCheckRows(project, contacts), [project, contacts]);
  const flowRows = useMemo(() => sortedFinanceTxs(project), [project.financeTransactions]);

  return (
    <div className="px-4 pt-4 pb-10">
      <div className="flex items-center gap-3 mb-4">
        <button type="button" onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>
        <div className="flex-1 min-w-0">
          <div className="font-bold text-lg truncate">ЪҜШІШ§ШұШҙвҖҢЩҮШ§ЫҢ Щ…Ш§Щ„ЫҢ</div>
          <div className="text-xs text-[#6B7280] truncate">{project.name}</div>
        </div>
      </div>

      {projects.length > 1 && (
        <select
          value={project.id}
          onChange={(e) => { onSelectProject(e.target.value); setSelectedAccountId(null); }}
          className="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm mb-3 outline-none"
        >
          {projects.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      )}

      <div className="flex gap-1.5 mb-4 overflow-x-auto pb-1">
        {views.map((v) => (
          <button
            key={v.id}
            type="button"
            onClick={() => { setView(v.id); setSelectedAccountId(null); }}
            className="flex-shrink-0 rounded-full px-3 py-1.5 text-[11px] font-semibold border transition-colors"
            style={{
              background: view === v.id ? "#14213D" : "#fff",
              color: view === v.id ? "#fff" : "#4B5563",
              borderColor: view === v.id ? "#14213D" : "#E5E7EB",
            }}
          >
            {v.label}
          </button>
        ))}
      </div>

      {view === "accounts" && (
        <>
          <div className="bg-white border border-black/5 rounded-2xl overflow-hidden mb-3">
            <div className="grid grid-cols-[1fr_auto] gap-2 px-3 py-2 bg-[#F4F6F5] text-[10px] font-bold text-[#6B7280]">
              <span>ШӯШіШ§ШЁ</span>
              <span>Щ…ЩҲШ¬ЩҲШҜЫҢ</span>
            </div>
            {accounts.length === 0 ? (
              <div className="text-center text-xs text-[#9CA3AF] py-8">ШӯШіШ§ШЁ ШЁШ§ЩҶЪ©ЫҢ Ш«ШЁШӘ ЩҶШҙШҜЩҮ Ш§ШіШӘ.</div>
            ) : accounts.map((a) => {
              const bal = computeAccountBalance(project, a.id);
              const active = selectedAccountId === a.id;
              return (
                <button
                  key={a.id}
                  type="button"
                  onClick={() => setSelectedAccountId(active ? null : a.id)}
                  className="w-full grid grid-cols-[1fr_auto] gap-2 px-3 py-3 text-right border-t border-black/[0.04] transition-colors"
                  style={{ background: active ? "#EFF6FF" : "#fff" }}
                >
                  <div className="min-w-0">
                    <div className="text-sm font-semibold text-[#14213D] truncate">{accountLabel(project, a.id, contacts)}</div>
                    {a.accountNumber && <div className="text-[10px] text-[#9CA3AF] truncate">{a.accountNumber}</div>}
                  </div>
                  <div className={`text-sm font-bold tabular-nums ${bal >= 0 ? "text-[#166534]" : "text-[#B91C1C]"}`}>{fmt(bal)}</div>
                </button>
              );
            })}
          </div>

          {selectedAccountId && (
            <div className="bg-[#F4F6F5] rounded-2xl p-3">
              <div className="text-xs font-bold text-[#14213D] mb-2">
                ЪҜШұШҜШҙ ШӯШіШ§ШЁ вҖ” {accountLabel(project, selectedAccountId, contacts)}
              </div>
              {ledgerRows.length === 0 ? (
                <div className="text-center text-xs text-[#9CA3AF] py-4">ШӘШұШ§Ъ©ЩҶШҙЫҢ Ш«ШЁШӘ ЩҶШҙШҜЩҮ.</div>
              ) : (
                <div className="flex flex-col gap-2 max-h-[50vh] overflow-y-auto">
                  {ledgerRows.map((r) => (
                    <div key={r.id} className="bg-white rounded-xl p-3 text-right text-xs">
                      <div className="flex items-center justify-between gap-2 mb-1">
                        <span className="font-semibold text-[#14213D]">{FINANCE_TX_LABELS[r.type] || r.type}</span>
                        <span className="text-[#9CA3AF]">{r.date || "вҖ”"}</span>
                      </div>
                      <div className="flex gap-3 text-[10px]">
                        {r.debit > 0 && <span className="text-[#B91C1C]">ШЁШұШҜШ§ШҙШӘ: {fmt(r.debit)}</span>}
                        {r.credit > 0 && <span className="text-[#166534]">ЩҲШ§ШұЫҢШІ: {fmt(r.credit)}</span>}
                      </div>
                      {r.note && <div className="text-[10px] text-[#6B7280] mt-1">{r.note}</div>}
                      <div className="text-[10px] font-bold text-[#14213D] mt-1">Щ…Ш§ЩҶШҜЩҮ: {fmt(r.balance)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </>
      )}

      {view === "checks" && (
        <>
          <div className="flex gap-2 mb-3">
            {[
              { id: "collected", label: "ЪҶЪ©вҖҢЩҮШ§ЫҢ ЩҲШөЩҲЩ„ЫҢ" },
              { id: "paid", label: "ЪҶЪ©вҖҢЩҮШ§ЫҢ ЩҫШұШҜШ§Ш®ШӘЫҢ" },
            ].map((t) => (
              <button
                key={t.id}
                type="button"
                onClick={() => setCheckTab(t.id)}
                className="flex-1 rounded-xl py-2 text-xs font-semibold border"
                style={{ background: checkTab === t.id ? "#14213D" : "#fff", color: checkTab === t.id ? "#fff" : "#4B5563" }}
              >
                {t.label}
              </button>
            ))}
          </div>
          <div className="flex flex-col gap-2">
            {(checkTab === "collected" ? collectedChecks : paidChecks).length === 0 ? (
              <div className="text-center text-xs text-[#9CA3AF] py-10 bg-white rounded-2xl">Щ…ЩҲШұШҜЫҢ ЫҢШ§ЩҒШӘ ЩҶШҙШҜ.</div>
            ) : (checkTab === "collected" ? collectedChecks : paidChecks).map((r) => (
              <div key={r.id} className="bg-white border border-black/5 rounded-xl p-3 text-right">
                <div className="flex items-center justify-between gap-2">
                  <span className="text-sm font-semibold text-[#14213D]">{r.title}</span>
                  <span className="text-sm font-bold text-[#166534] tabular-nums">{fmt(r.amount)}</span>
                </div>
                <div className="text-[10px] text-[#9CA3AF] mt-1">{r.date || "вҖ”"}</div>
                <div className="text-[10px] text-[#6B7280] mt-1 flex flex-wrap gap-x-2">
                  {r.accountId && <span>ШӯШіШ§ШЁ: {accountLabel(project, r.accountId, contacts)}</span>}
                  {r.contactName && <span>Щ…Ш®Ш§Ш·ШЁ: {r.contactName}</span>}
                  {r.buyerName && <span>Ш®ШұЫҢШҜШ§Шұ: {r.buyerName}</span>}
                  {r.unitLabel && <span>{r.unitLabel}</span>}
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {view === "flow" && (
        <div className="flex flex-col gap-2">
          {flowRows.length === 0 ? (
            <div className="text-center text-xs text-[#9CA3AF] py-10 bg-white rounded-2xl">ШӘШұШ§Ъ©ЩҶШҙ Щ…Ш§Щ„ЫҢ Ш«ШЁШӘ ЩҶШҙШҜЩҮ.</div>
          ) : flowRows.map((t) => {
            const isIn = !!t.toAccountId && t.type !== "transfer";
            const isOut = !!t.fromAccountId && t.type !== "transfer";
            const isTransfer = t.type === "transfer";
            return (
              <div key={t.id} className="bg-white border border-black/5 rounded-xl p-3 text-right text-xs">

  const total = expensesTotalOf(project);

    if (isReadOnly) return;

      title: title.trim(), amount: Number(amount), date, paymentMethod,

      bankAccountId: paymentMethod !== "credit" && bankAccountId ? bankAccountId : null,

function ProjectCarousel({ projects, contacts, onOpenProject, onShowBalanceModal }) {
  const [activeIndex, setActiveIndex] = useState(0);
  const trackRef = useRef(null);
  const cardRefs = useRef([]);
  const scrollRaf = useRef(null);

  useEffect(() => {
    setActiveIndex((i) => Math.min(i, Math.max(0, projects.length - 1)));
  }, [projects.length]);

  function pickActiveFromScroll() {
    const track = trackRef.current;
    if (!track) return;
    const trackRect = track.getBoundingClientRect();
    const centerX = trackRect.left + trackRect.width / 2;
    let bestIdx = 0;
    let bestDist = Infinity;
    cardRefs.current.forEach((card, idx) => {
      if (!card) return;
      const r = card.getBoundingClientRect();
      const dist = Math.abs(r.left + r.width / 2 - centerX);
      if (dist < bestDist) { bestDist = dist; bestIdx = idx; }
    });
    setActiveIndex(bestIdx);
  }

  function onTrackScroll() {
    if (scrollRaf.current) cancelAnimationFrame(scrollRaf.current);
    scrollRaf.current = requestAnimationFrame(pickActiveFromScroll);
  }

  function goTo(index) {
    const next = Math.max(0, Math.min(projects.length - 1, index));
    setActiveIndex(next);
    const card = cardRefs.current[next];
    const track = trackRef.current;
    if (!card || !track) return;
    const cardLeft = card.offsetLeft;
    const cardWidth = card.offsetWidth;
    const target = cardLeft - (track.clientWidth - cardWidth) / 2;
    track.scrollTo({ left: target, behavior: "smooth" });
  }

  useEffect(() => {
    if (!trackRef.current || !projects.length) return;
    const t = window.setTimeout(() => goTo(0), 80);
    return () => window.clearTimeout(t);
    // eslint-disable-next-line
  }, [projects.length]);

  useEffect(() => () => { if (scrollRaf.current) cancelAnimationFrame(scrollRaf.current); }, []);

  if (!projects.length) return null;

  return (
    <div className="relative -mx-4">
      {projects.length > 1 && (
        <>
          <button
            type="button"
            aria-label="ЩҫШұЩҲЪҳЩҮ ЩӮШЁЩ„ЫҢ"
            onClick={() => goTo(activeIndex - 1)}
            disabled={activeIndex === 0}
            className="absolute right-2 top-1/2 -translate-y-1/2 z-10 w-9 h-9 rounded-full bg-white/95 shadow-lg border border-black/5 flex items-center justify-center disabled:opacity-30 disabled:pointer-events-none"
          >
            <ChevronLeft size={18} className="rotate-180 text-[#14213D]" />
          </button>
          <button
            type="button"
            aria-label="ЩҫШұЩҲЪҳЩҮ ШЁШ№ШҜЫҢ"
            onClick={() => goTo(activeIndex + 1)}
            disabled={activeIndex === projects.length - 1}
            className="absolute left-2 top-1/2 -translate-y-1/2 z-10 w-9 h-9 rounded-full bg-white/95 shadow-lg border border-black/5 flex items-center justify-center disabled:opacity-30 disabled:pointer-events-none"
          >
            <ChevronLeft size={18} className="text-[#14213D]" />
          </button>
        </>
      )}

      <div
        ref={trackRef}
        dir="ltr"
        onScroll={onTrackScroll}
        className="project-carousel-track flex gap-3 overflow-x-auto no-scrollbar px-[7.5%] py-2"
        style={{ scrollSnapType: "x mandatory", WebkitOverflowScrolling: "touch", touchAction: "pan-x" }}
      >
        {projects.map((p, idx) => {
          const theme = projectCardTheme(p.id);
          const isActive = idx === activeIndex;
          const isNeighbor = Math.abs(idx - activeIndex) === 1;
          return (
            <div
              key={p.id}
              ref={(el) => { cardRefs.current[idx] = el; }}
              className="project-carousel-card flex-shrink-0 w-[85%] max-w-[340px]"
            >
              <div
                className="transition-all duration-300 ease-out origin-center"
                style={{
                  transform: isActive ? "scale(1)" : isNeighbor ? "scale(0.94)" : "scale(0.9)",
                  opacity: isActive ? 1 : isNeighbor ? 0.72 : 0.5,
                  filter: isActive ? "none" : "saturate(0.85)",
                }}
              >
                <DashboardProjectCard
                  project={p}
                  contacts={contacts}
                  theme={theme}
                  onOpenProject={onOpenProject}
                  onShowBalanceModal={onShowBalanceModal}
                />
              </div>
            </div>
          );
        })}
      </div>

      {projects.length > 1 && (
        <div className="flex justify-center items-center gap-1.5 mt-3 px-4" dir="ltr">
          {projects.map((p, idx) => {
            const theme = projectCardTheme(p.id);
            const active = idx === activeIndex;
            return (
              <button
                key={p.id}
                type="button"
                aria-label={`ЩҫШұЩҲЪҳЩҮ ${idx + 1}`}
                onClick={() => goTo(idx)}
                className="rounded-full transition-all duration-300"
                style={{
                  width: active ? 18 : 7,
                  height: 7,
                  background: active ? theme.accent : "#CBD5E1",
                  opacity: active ? 1 : 0.65,
                }}
              />
            );
          })}
        </div>
      )}
    </div>
  );
}

          style={{ transform: showFab ? "rotate(45deg)" : "rotate(0deg)", transition: "transform 0.2s" }}>
          <Plus size={26} />
        </button>
      </div>
    </div>
  );
}

function DocSection({ title, icon, docs, onAdd, onRemove, onError }) {
  const [previewId, setPreviewId] = useState(null);
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);

  function triggerPick() {
    try { sessionStorage.setItem("metrico_pending_upload", String(Date.now())); } catch (e) {}
    fileRef.current.click();
  }

  async function handleFile(e) {
    try { sessionStorage.removeItem("metrico_pending_upload"); } catch (e) {}
    const file = e.target.files?.[0];
    if (!file) return;
    setBusy(true);
    if (file.type && !file.type.startsWith("image/")) {
      try {
        const dataUrl = await readRawFile(file);
        onAdd(file.name, dataUrl);
      } catch (err) {
        if (onError) onError("ШЁШ§ШұЪҜШ°Ш§ШұЫҢ ЩҒШ§ЫҢЩ„ ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ: " + uploadErrorMessage(err));
      }
      setBusy(false);
      e.target.value = "";
      return;
    }
    try {
      const dataUrl = await resizeImage(file, 1200, 0.7);
      onAdd(file.name, dataUrl);
    } catch (err) {
      try {
        const dataUrl = await readRawFile(file);
        onAdd(file.name, dataUrl);
      } catch (err2) {
        if (onError) onError("ШЁШ§ШұЪҜШ°Ш§ШұЫҢ Ш№Ъ©Ші ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ: " + uploadErrorMessage(err2));
      }
    }
    setBusy(false);
    e.target.value = "";
  }
  const preview = docs.find((d) => d.id === previewId);

  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <div className="text-xs font-semibold text-[#6B7280] flex items-center gap-1">{icon}{title}</div>
        <button onClick={triggerPick} disabled={busy} className="text-xs text-[#14213D] font-semibold flex items-center gap-1 disabled:opacity-50">
          <Upload size={13} /> {busy ? "ШҜШұ ШӯШ§Щ„ ЩҫШұШҜШ§ШІШҙ..." : "ШЁШ§ШұЪҜШ°Ш§ШұЫҢ"}
        </button>
        <input ref={fileRef} type="file" accept="image/*,application/pdf" className="hidden" onChange={handleFile} />
      </div>
      {docs.length === 0 ? (
        <div className="text-xs text-[#9CA3AF] text-center py-2">ЩҒШ§ЫҢЩ„ЫҢ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ ЩҶШҙШҜЩҮ</div>
      ) : (
        <div className="flex gap-2 flex-wrap">
          {docs.map((d) => {
            const isPdf = (d.dataUrl || "").startsWith("data:application/pdf");
            return (
              <div key={d.id} className="relative w-16 h-16 rounded-lg overflow-hidden border border-black/10">
                {isPdf ? (
                  <button onClick={() => window.open(d.dataUrl, "_blank")} className="w-full h-full bg-[#F4F6F5] flex flex-col items-center justify-center gap-1">
                    <FileText size={20} className="text-[#B91C1C]" />
                    <span className="text-[8px] text-[#6B7280] px-1 truncate w-full text-center">{d.name}</span>
                  </button>
                ) : (
                  <img src={d.dataUrl} className="w-full h-full object-cover cursor-pointer" onClick={() => setPreviewId(d.id)} alt={d.name} />
                )}
                <button onClick={() => onRemove(d.id)} className="absolute top-0.5 left-0.5 bg-black/60 rounded-full p-0.5">
                  <X size={10} className="text-white" />
                </button>
              </div>
            );
          })}
        </div>
      )}
      {preview && (
        <div className="fixed inset-0 bg-black/80 z-[80] flex items-center justify-center p-6" onClick={() => setPreviewId(null)}>
          <img src={preview.dataUrl} className="max-w-full max-h-full rounded-lg" alt={preview.name} />
        </div>
      )}
    </div>
  );
}

function UnitModal({ unit, project, onClose, onChange, onRecordIncome, onReport, onError, contacts, onAddContact, isReadOnly }) {
  const s = STATUS[unit.status];
  const total = totalPriceOf(unit);
  const paid = paidOf(unit);
  const remaining = remainingOf(unit);
  const bankAccounts = normalizeBankAccounts(project);
  const [showNewBuyerContact, setShowNewBuyerContact] = useState(false);
  const [newBuyerName, setNewBuyerName] = useState("");
  const [newBuyerPhone, setNewBuyerPhone] = useState("");

  function set(field, value) { onChange((u) => ({ ...u, [field]: value })); }

  function selectBuyerContact(contactId) {
    if (!contactId) { set("buyerContactId", null); return; }
    const c = (contacts || []).find((x) => x.id === contactId);
    onChange((u) => ({ ...u, buyerContactId: contactId, buyerName: c ? c.name : u.buyerName, buyerPhone: c ? (c.phone || "") : u.buyerPhone }));
  }

  function confirmNewBuyerContact() {
    if (!newBuyerName.trim()) return;
    const c = onAddContact({ name: newBuyerName.trim(), phone: newBuyerPhone.trim(), role: "buyer" });
    selectBuyerContact(c.id);
    setNewBuyerName(""); setNewBuyerPhone(""); setShowNewBuyerContact(false);
  }

  function toggleInstallmentPaid(inst) {
    if (isReadOnly) return;
    if (inst.paid) {
      updateInstallment(inst.id, "paid", false);
      return;
    }
    if (inst.accountId && Number(inst.amount) > 0 && onRecordIncome && !inst.financeTxId) {
      onRecordIncome({
        amount: inst.amount,
        accountId: inst.accountId,
        installmentId: inst.id,
        note: `ЩӮШіШ· ЩҲШ§ШӯШҜ ${unit.unitNumber}`,
      });
    } else {
      updateInstallment(inst.id, "paid", true);
    }
  }

  function recordDownPayment() {
    if (isReadOnly || !unit.depositAccountId || !(Number(unit.downPayment) > 0)) return;
    if (onRecordIncome) {
      onRecordIncome({
        amount: unit.downPayment,
        accountId: unit.depositAccountId,
        note: `ЩҫЫҢШҙвҖҢЩҫШұШҜШ§Ш®ШӘ ЩҲШ§ШӯШҜ ${unit.unitNumber}`,
      });
    }
  }
  function addInstallment() {
    onChange((u) => ({
      ...u,
      installments: [...(u.installments || []), { id: uid(), date: "", amount: "", paid: false, accountId: unit.depositAccountId || "" }],
    }));
  }
  function updateInstallment(id, field, value) {
    onChange((u) => ({ ...u, installments: u.installments.map((i) => (i.id === id ? { ...i, [field]: value } : i)) }));
  }
  function removeInstallment(id) {
    onChange((u) => ({ ...u, installments: u.installments.filter((i) => i.id !== id) }));
  }
  function addDoc(kind, name, dataUrl) {
    onChange((u) => ({ ...u, [kind]: [...(u[kind] || []), { id: uid(), name, dataUrl }] }));

    onChange((u) => ({ ...u, [kind]: u[kind].filter((d) => d.id !== id) }));

    <div className="fixed inset-0 bg-black/50 z-[65] flex items-end sm:items-center sm:justify-center" onClick={onClose}>
      <div className="bg-[#F4F6F5] w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[92vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="sticky top-0 bg-white border-b border-black/5 px-5 py-4 flex items-center gap-3 z-10">
          <button onClick={onClose} className="p-1"><ChevronLeft size={20} /></button>
          <div className="flex-1">
            <div className="font-bold">ЩҲШ§ШӯШҜ {unit.unitNumber}</div>
            <div className="text-[11px] text-[#6B7280]">Ш·ШЁЩӮЩҮ {unit.floor}</div>
          </div>
          <span className="text-xs px-2.5 py-1 rounded-full font-semibold" style={{ background: s.bg, color: s.text }}>{s.label}</span>
          <button onClick={onReport} className="p-1 text-[#14213D]" title="ЪҜШІШ§ШұШҙ PDF Ш§ЫҢЩҶ ЩҲШ§ШӯШҜ"><Printer size={18} /></button>

        <div className="p-5 flex flex-col gap-5">
          <div className="flex gap-2">
            {Object.entries(STATUS).map(([key, val]) => (
              <button
                key={key}

              </thead>
              <tbody>
                {rows.map((u) => (
                  <tr key={u.id}>
                    <td style={td}>{u.floor}</td>
                    <td style={td}>{u.unitNumber}</td>
                    <td style={td}>{STATUS[u.status].label}</td>
                    <td style={td}>{u.area || "-"}</td>
                    <td style={td}>{u.direction && u.direction !== "none" ? DIRECTIONS[u.direction] : "-"}</td>
                    <td style={td}>{u.buyerName || "-"}</td>
                    <td style={td}>{u.buyerPhone || "-"}</td>
                    <td style={td}>{u.postalCode || "-"}</td>
                    <td style={td}>{fmt(totalPriceOf(u))}</td>
                    <td style={td}>{fmt(paidOf(u))}</td>
                    <td style={td}>{fmt(remainingOf(u))}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{ fontSize: 12, fontWeight: 700, marginTop: 8 }}>Щ…Ш¬Щ…ЩҲШ№ ШҜШұШўЩ…ШҜ ШӯШ§ШөЩ„ Ш§ШІ ЩҒШұЩҲШҙ Ш§ЫҢЩҶ ЩҫШұЩҲЪҳЩҮ: {fmt(revenue)} ШӘЩҲЩ…Ш§ЩҶ</div>
          </div>
        );
      })}
    </div>
  );
}

function Field({ label, value, onChange, type = "text", icon }) {
  return (
    <div>
      <label className="text-xs text-[#6B7280] font-medium flex items-center gap-1">{icon}{label}</label>
      <input type={type} value={value} onChange={(e) => onChange(e.target.value)}
        className="w-full mt-1 bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js", { updateViaCache: "none" }).then((reg) => {
      // Check for a newer service worker every time the app is opened
      reg.update().catch(() => {});
      let refreshed = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshed) return;
        refreshed = true;
        window.location.reload();
      });
    }).catch(() => {});
  });
}
</script>
</body>
</html>
