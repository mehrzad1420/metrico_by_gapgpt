    const v = localStorage.getItem(key);

  } catch (e) { return fallback; }

const uid = () => Math.random().toString(36).slice(2, 10);
const fmt = (n) => (Number(n) || 0).toLocaleString("en-US");

function emptyUnit(floor, unitNumber) {
  return {
    id: uid(), floor, unitNumber, area: "", status: "vacant", direction: "none",
    buyerName: "", buyerPhone: "", postalCode: "",
    pricePerMeter: "", downPayment: "",
    installments: [], contractDocs: [], checkDocs: [], notes: "",
  };
}
function totalPriceOf(u) { return (Number(u.area) || 0) * (Number(u.pricePerMeter) || 0); }
function paidOf(u) {
  const inst = (u.installments || []).reduce((s, i) => s + (i.paid ? Number(i.amount) || 0 : 0), 0);
  return inst + (Number(u.downPayment) || 0);
}
function remainingOf(u) { return totalPriceOf(u) - paidOf(u); }

function revenueOf(project) {
  return project.units.filter((u) => u.status === "sold").reduce((s, u) => s + totalPriceOf(u), 0);
}
function expensesTotalOf(project) {
  return (project.expenses || []).reduce((s, e) => s + (Number(e.amount) || 0), 0);
}
function profitOf(project) {
  return revenueOf(project) - expensesTotalOf(project);
}

function DonutChart({ data, size = 84, centerLabel, centerValue, dark = false }) {
  const containerRef = useRef(null);
  const chartRef = useRef(null);
  const [uid] = useState(() => "apx-" + Math.random().toString(36).slice(2, 8));

  const values = data.map((d) => Math.max(0, d.value));
  const colors = data.map((d) => d.color);
  const total = values.reduce((a, b) => a + b, 0);

  useEffect(() => {
    if (!containerRef.current || !window.ApexCharts) return;
    const textColor = dark ? "#F4F6F5" : "#14213D";
    const subColor = dark ? "#B7C0D8" : "#6B7280";
    const options = {
      chart: {
        type: "donut",
        width: size,
        height: size,
        animations: { enabled: true, easing: "easeinout", speed: 500, animateGradually: { enabled: false } },
        sparkline: { enabled: size < 90 },
        foreColor: textColor,
        background: "transparent",
      },
      series: total > 0 ? values : [1],
      labels: data.map((d) => d.label || ""),
      colors: total > 0 ? colors : ["#E5E7EB"],
      stroke: { show: false },
      dataLabels: { enabled: false },
      legend: { show: false },
      tooltip: { enabled: total > 0 },
      fill: {
        type: total > 0 ? "gradient" : "solid",
        gradient: { shade: "dark", type: "diagonal1", shadeIntensity: 0.55, gradientToColors: colors, inverseColors: false, opacityFrom: 1, opacityTo: 0.78, stops: [0, 100] },
      },
      plotOptions: {
        pie: {
          donut: {
            size: "68%",
            labels: {
              show: size >= 90,
              name: { show: true, color: subColor, fontSize: "10px", offsetY: 18 },
              value: { show: true, color: textColor, fontSize: "13px", fontWeight: 800, offsetY: -4, formatter: () => centerValue || "" },
              total: {
                show: true, showAlways: true, label: centerLabel || "",
                color: subColor, fontSize: "10px",
                formatter: () => centerValue || fmt(total),
              },
            },
          },
        },
      },
    };
    const chart = new window.ApexCharts(containerRef.current, options);
    chart.render();
    chartRef.current = chart;
    return () => { chart.destroy(); chartRef.current = null; };
    // eslint-disable-next-line
  }, [JSON.stringify(values), JSON.stringify(colors), centerValue, size, dark]);

  return <div ref={containerRef} id={uid} style={{ width: size, height: size }} />;
}

function withTimeout(promise, ms) {
  return new Promise((resolve, reject) => {
    const t = setTimeout(() => reject(new Error("timeout")), ms);
    promise.then((v) => { clearTimeout(t); resolve(v); }, (e) => { clearTimeout(t); reject(e); });
  });
}

function uploadErrorMessage(err) {

  }
  return (err && err.message) || "خطای نامشخص";
}

function resizeImageLegacy(file, maxW, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function LeafletMap({ markers, onMapClick, center, zoom, fitAll, height = 220 }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef([]);
  const clickHandlerRef = useRef(onMapClick);
  clickHandlerRef.current = onMapClick;

  useEffect(() => {
    if (!containerRef.current || mapRef.current || !window.L) return;
    const map = window.L.map(containerRef.current, { zoomControl: true }).setView(center || [35.7, 51.4], zoom || 5);
    window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors",
      maxZoom: 19,
    }).addTo(map);
    map.on("click", (e) => { if (clickHandlerRef.current) clickHandlerRef.current(e.latlng.lat, e.latlng.lng); });
    mapRef.current = map;
    setTimeout(() => map.invalidateSize(), 200);
    return () => { map.remove(); mapRef.current = null; };
    // eslint-disable-next-line
  }, []);

  useEffect(() => {
    const map = mapRef.current;
    if (!map || !window.L) return;
    markersRef.current.forEach((m) => map.removeLayer(m));
    markersRef.current = [];
    const icon = window.L.divIcon({
      html: '<div style="font-size:26px;line-height:1;transform:translateY(-4px);">📍</div>',
      className: "", iconSize: [26, 26], iconAnchor: [13, 26],
    });
    (markers || []).forEach((mk) => {
      const marker = window.L.marker([mk.lat, mk.lng], { icon }).addTo(map);
      if (mk.label) marker.bindPopup(mk.label);
      if (mk.onClick) marker.on("click", mk.onClick);
      markersRef.current.push(marker);
    });
    if (fitAll && markers && markers.length > 1) {
      const bounds = window.L.latLngBounds(markers.map((m) => [m.lat, m.lng]));
      map.fitBounds(bounds, { padding: [30, 30], maxZoom: 15 });
    } else if (markers && markers.length === 1) {
      map.setView([markers[0].lat, markers[0].lng], Math.max(map.getZoom(), 14));
    }
    // eslint-disable-next-line
  }, [markers, fitAll]);

  useEffect(() => {
    const map = mapRef.current;
    if (map && center && !fitAll) map.setView(center, map.getZoom());
    // eslint-disable-next-line
  }, [center && center[0], center && center[1]]);

  return <div ref={containerRef} style={{ height, width: "100%", borderRadius: 12 }} />;
}

async function resizeImage(file, maxW = 1000, quality = 0.7) {
  // Modern, memory-efficient path: decodes directly at reduced size instead of
  // loading the full-resolution photo into memory first (important on phones,
  // where a camera photo can be 10-20MB before it's ever resized).
  if (window.createImageBitmap) {
    try {
      const bitmap = await withTimeout(createImageBitmap(file, { resizeWidth: maxW, resizeQuality: "medium" }), 8000);
      const canvas = document.createElement("canvas");
      canvas.width = bitmap.width;
      canvas.height = bitmap.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(bitmap, 0, 0);
      if (bitmap.close) bitmap.close();
      return canvas.toDataURL("image/jpeg", quality);
    } catch (e) {
      // fall through to the legacy method below
    }
  }
  return withTimeout(resizeImageLegacy(file, maxW, quality), 8000);
}

function readRawFile(file, maxBytes = 8 * 1024 * 1024) {
  const inner = new Promise((resolve, reject) => {
    if (file.size > maxBytes) { reject(new Error("فایل خیلی بزرگ است (بیشتر از ۸ مگابایت).")); return; }
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("خواندن فایل با خطا مواجه شد."));
    try {
      reader.readAsDataURL(file);
    } catch (e) {
      reject(e);
    }
  });
  return withTimeout(inner, 10000);
}

function AppContent() {
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [activated, setActivated] = useState(null); // null = checking, true/false = known
  const [company, setCompany] = useState(null);
  const [contacts, setContacts] = useState([]);
  const [reminders, setReminders] = useState([]);
  const [dueReminder, setDueReminder] = useState(null);
  const [projects, setProjects] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [activeTab, setActiveTab] = useState(null);
  const [showNewProject, setShowNewProject] = useState(false);
  const [showCompanySettings, setShowCompanySettings] = useState(false);
  const [showProjectSettings, setShowProjectSettings] = useState(false);
  const [openUnitId, setOpenUnitId] = useState(null);
  const [error, setError] = useState("");
  const [showMenu, setShowMenu] = useState(false);
  const [showSearch, setShowSearch] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");
  const [screen, setScreen] = useState("dashboard"); // dashboard | app | backup | about
  const [showExpenses, setShowExpenses] = useState(false);
  const [uploadCrashWarning, setUploadCrashWarning] = useState(false);
  const updateTimers = useRef({});

  // Detect if the app was killed by the OS mid-file-pick (common on some Android phones
  // with aggressive battery optimization) and surface a clear, actionable message.
  useEffect(() => {
    let stale = null;
    try { stale = sessionStorage.getItem("metrico_pending_upload"); } catch (e) {}
    if (stale) {
      setUploadCrashWarning(true);
      try { sessionStorage.removeItem("metrico_pending_upload"); } catch (e) {}
    }
    function clearFlag() {
      try { sessionStorage.removeItem("metrico_pending_upload"); } catch (e) {}
    }
    document.addEventListener("visibilitychange", () => { if (!document.hidden) clearFlag(); });
    window.addEventListener("focus", clearFlag);
    return () => {
      window.removeEventListener("focus", clearFlag);
    };
  }, []);

  // Watch Supabase auth session
  useEffect(() => {
    window.sb.auth.getSession().then(({ data }) => {
      setUser(data.session?.user || null);
      setAuthLoading(false);
    });
    const { data: listener } = window.sb.auth.onAuthStateChange((_event, session) => {
      const u = session?.user || null;
      setUser(u);
      setAuthLoading(false);
      if (!u) {
        setActivated(null);
        setCompany(null);
        setProjects([]);
        setActiveTab(null);
        setLoaded(false);
        setScreen("dashboard");
      }
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  // Check activation status once authenticated
  useEffect(() => {
    if (!user) return;
    setActivated(null);
    window.sb.from("profiles").select("activated").eq("user_id", user.id).maybeSingle()
      .then(({ data, error: err }) => {
        if (err) { setError("خطا در بررسی وضعیت فعال‌سازی: " + err.message); setActivated(false); return; }
        setActivated(!!(data && data.activated));
      });
  }, [user]);

  // Load this user's projects + company from Supabase once authenticated and activated
  useEffect(() => {
    if (!user || !activated) return;
    setLoaded(false);
    setCompany(user.user_metadata?.company || null);
    setContacts(user.user_metadata?.contacts || []);
    setReminders(user.user_metadata?.reminders || []);
    setReminders(user.user_metadata?.reminders || []);
    window.sb.from("projects").select("*").eq("user_id", user.id).order("created_at", { ascending: true })
      .then(({ data, error: err }) => {
        if (err) {
          setError("خطا در دریافت اطلاعات از سرور: " + err.message);
          setLoaded(true);
          return;
        }
        const list = (data || []).map((row) => ({ id: row.id, name: row.name, ...(row.data || {}) }));
        setProjects(list);
        if (list.length) setActiveTab(list[0].id);
        setLoaded(true);
      });
  }, [user, activated]);

  const activeProject = useMemo(() => projects.find((p) => p.id === activeTab) || null, [projects, activeTab]);

  const searchResults = useMemo(() => {
    const q = searchQuery.trim().toLowerCase();
    if (!q) return [];
    const results = [];
    projects.forEach((p) => {
      if (p.name.toLowerCase().includes(q) || (p.address || "").toLowerCase().includes(q)) {
        results.push({ type: "project", id: p.id, title: p.name, subtitle: p.address || "پروژه", projectId: p.id });
      }
      (p.units || []).forEach((u) => {
        if ((u.buyerName || "").toLowerCase().includes(q) || String(u.unitNumber).includes(q)) {
          results.push({ type: "unit", id: u.id, title: `واحد ${u.unitNumber} — ${p.name}`, subtitle: u.buyerName || "بدون نام خریدار", projectId: p.id, unitId: u.id });
        }
      });
    });
    contacts.forEach((c) => {
      if (c.name.toLowerCase().includes(q) || (c.phone || "").includes(q)) {
        results.push({ type: "contact", id: c.id, title: c.name, subtitle: CONTACT_ROLES[c.role || "other"] });

    });
    return results.slice(0, 12);
  }, [searchQuery, projects, contacts]);

    else if (r.type === "unit") { setActiveTab(r.projectId); setScreen("app"); setOpenUnitId(r.unitId); }

    setSearchQuery("");

  function updateProject(id, updater) {
    setProjects((prev) => {
      const next = prev.map((p) => (p.id === id ? updater(p) : p));
      const updated = next.find((p) => p.id === id);
      if (updated && user) {
        clearTimeout(updateTimers.current[id]);
        updateTimers.current[id] = setTimeout(() => {
          const { id: _id, name, ...rest } = updated;
          window.sb.from("projects").update({ name, data: rest }).eq("id", id)
            .then(({ error: err }) => { if (err) setError("ذخیره‌سازی ناموفق بود: " + err.message); });
        }, 500);
      }
      return next;
    });

  function updateUnit(projectId, unitId, updater) {

  async function createProject(name, floors, meta = {}) {
    const sorted = [...floors].sort((a, b) => a.number - b.number);
    const units = [];
    let seq = 1;
    sorted.forEach((f) => {
      for (let i = 1; i <= f.count; i++) {
        units.push(emptyUnit(f.number, String(seq)));
        seq++;
      }
    });
    const dataPayload = {
      floors, units, expenses: [], documents: [],
      address: meta.address || "", landArea: meta.landArea || "", totalBuiltArea: meta.totalBuiltArea || "",
    };
    const { data, error: err } = await window.sb.from("projects")
      .insert({ user_id: user.id, name, data: dataPayload }).select().single();
    if (err) { setError("ساخت پروژه ناموفق بود: " + err.message); return; }
    const project = { id: data.id, name: data.name, ...(data.data || {}) };
    setProjects((prev) => [...prev, project]);
    setActiveTab(project.id);
    setScreen("app");
    setShowNewProject(false);
  }

  function addFloor(projectId, count) {
    updateProject(projectId, (p) => {
      const nextNum = p.floors.length ? Math.max(...p.floors.map((f) => f.number)) + 1 : 1;
      const maxSeq = p.units.length ? Math.max(...p.units.map((u) => Number(u.unitNumber) || 0)) : 0;
      const newUnits = [];
      for (let i = 1; i <= count; i++) newUnits.push(emptyUnit(nextNum, String(maxSeq + i)));
      return { ...p, floors: [...p.floors, { number: nextNum, count }], units: [...p.units, ...newUnits] };
    });
  }
  function renameProject(projectId, name) { updateProject(projectId, (p) => ({ ...p, name })); }
  function updateProjectMeta(projectId, meta) { updateProject(projectId, (p) => ({ ...p, ...meta })); }

        <div class="card"><div style="font-size:11px;color:#6B7280;">مبلغ کل قرارداد</div>
          <div style="font-size:15px;font-weight:800;margin-top:4px;">${fmt(total)} تومان</div></div>
        <div class="card"><div style="font-size:11px;color:#6B7280;">پرداخت‌شده</div>
          <div style="font-size:14px;font-weight:700;margin-top:4px;color:#166534;">${fmt(paid)} تومان</div></div>
        <div class="card" style="grid-column:span 2;"><div style="font-size:11px;color:#6B7280;">مانده</div>
          <div style="font-size:16px;font-weight:800;margin-top:4px;color:#B91C1C;">${fmt(remaining)} تومان</div></div>
      </div>

      <div style="font-weight:700;font-size:13px;margin-bottom:8px;">جدول اقساط</div>
      ${instRows ? `<table><thead><tr style="background:#F4F6F5;"><th style="text-align:right;">تاریخ</th><th style="text-align:right;">مبلغ (تومان)</th><th style="text-align:right;">وضعیت</th></tr></thead><tbody>${instRows}</tbody></table>` : `<div style="font-size:12px;color:#9CA3AF;">قسطی ثبت نشده است.</div>`}

      ${unit.notes ? `<div style="margin-top:16px;"><div style="font-weight:700;font-size:13px;margin-bottom:6px;">یادداشت</div><div style="font-size:12px;color:#374151;">${esc(unit.notes)}</div></div>` : ""}
      </div>
      <div class="report-footer">تهیه شده توسط نرم‌افزار متریکو — با ما در تماس باشید: ۰۹۱۹۲۲۶۴۳۳۲ — ایمیل: mehrzad.saeedi@gmail.com</div>
    </body></html>`;
  }

  function openReport(scope) {
    try {
      const list = scope === "all" ? projects : projects.filter((p) => p.id === activeTab);
      const html = buildReportHTML(company, list);
      const blob = new Blob([html], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank");
    } catch (e) {
      setError("ساخت گزارش ناموفق بود.");
    }
  }

  function openFinancialReport(project) {
    try {
      const html = buildFinancialReportHTML(company, project);
      const blob = new Blob([html], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank");
    } catch (e) {
      setError("ساخت گزارش مالی ناموفق بود.");
    }
  }

  function openUnitReport(project, unit) {
    try {
      const html = buildUnitReportHTML(company, project, unit);
      const blob = new Blob([html], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      window.open(url, "_blank");
    } catch (e) {
      setError("ساخت گزارش واحد ناموفق بود.");
    }
  }

  function deleteFloor(projectId, floorNumber) {
    updateProject(projectId, (p) => {
      const remainingFloors = p.floors.filter((f) => f.number !== floorNumber);
      const sorted = [...remainingFloors].sort((a, b) => a.number - b.number);
      const remainingUnitsByFloor = {};
      p.units.filter((u) => u.floor !== floorNumber).forEach((u) => {
        remainingUnitsByFloor[u.floor] = remainingUnitsByFloor[u.floor] || [];
        remainingUnitsByFloor[u.floor].push(u);
      });
      let seq = 1;
      const renumbered = [];
      sorted.forEach((f) => {
        const list = (remainingUnitsByFloor[f.number] || []).sort((a, b) => Number(a.unitNumber) - Number(b.unitNumber));
        list.forEach((u) => { renumbered.push({ ...u, unitNumber: String(seq) }); seq++; });
      });
      return { ...p, floors: sorted, units: renumbered };
    });
  }

  async function saveCompany(c) {
    setCompany(c);
    setShowCompanySettings(false);
    const { data, error: err } = await window.sb.auth.updateUser({ data: { company: c } });
    if (err) setError("ذخیره اطلاعات شرکت ناموفق بود: " + err.message);
    else if (data?.user) setUser(data.user);
  }

  async function saveContacts(list) {
    setContacts(list);
    const { data, error: err } = await window.sb.auth.updateUser({ data: { contacts: list } });
    if (err) setError("ذخیره مخاطبین ناموفق بود: " + err.message);
    else if (data?.user) setUser(data.user);
  }
  function addContact(contact) {
    const next = [...contacts, { id: uid(), ...contact }];
    saveContacts(next);
    return next[next.length - 1];
  }
  function updateContact(contactId, patch) {
    saveContacts(contacts.map((c) => (c.id === contactId ? { ...c, ...patch } : c)));
  }
  function removeContact(contactId) {
    saveContacts(contacts.filter((c) => c.id !== contactId));
  }
  function contactBalance(contactId) {
    let owe = 0; // چیزی که ما به این شخص بدهکاریم (نسیه‌های تسویه‌نشده)
    projects.forEach((p) => {
      (p.expenses || []).forEach((e) => {
        if (e.contactId !== contactId) return;
        if (e.paymentMethod === "credit") owe += Number(e.amount) || 0;
        else owe -= Number(e.amount) || 0;
      });
    });
    return owe;
  }

  async function saveReminders(list) {
    setReminders(list);
    const { data, error: err } = await window.sb.auth.updateUser({ data: { reminders: list } });
    if (err) setError("ذخیره یادآوری‌ها ناموفق بود: " + err.message);
    else if (data?.user) setUser(data.user);
  }
  function addReminder(reminder) {
    saveReminders([...reminders, { id: uid(), notified: false, ...reminder }]);
  }
  function removeReminder(reminderId) {
    saveReminders(reminders.filter((r) => r.id !== reminderId));
  }

  // Check every 20s (while the app is open) for reminders whose time has arrived
  useEffect(() => {
    const t = setInterval(() => {
      const now = Date.now();
      const due = reminders.find((r) => !r.notified && r.datetime && new Date(r.datetime).getTime() <= now);
      if (due) {
        setDueReminder(due);
        saveReminders(reminders.map((r) => (r.id === due.id ? { ...r, notified: true } : r)));
        if (window.Notification && Notification.permission === "granted") {
          try { new Notification(APP_NAME, { body: due.text }); } catch (e) {}
        }
      }
    }, 20000);
    return () => clearInterval(t);
  }, [reminders]);

  function logout() {
    window.sb.auth.signOut().catch(() => {});
    setShowMenu(false);
  }

  function exportBackup() {
    try {
      const payload = { version: 2, exportedAt: new Date().toISOString(), company, projects };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `backup-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    } catch (e) {
      setError("ساخت فایل پشتیبان ناموفق بود.");
    }
  }

  function restoreBackup(file, onDone) {
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.projects)) throw new Error("invalid");

        await window.sb.from("projects").delete().eq("user_id", user.id);

        let list = [];
        if (data.projects.length) {
          const rows = data.projects.map((p) => {
            const { id: _id, name, ...rest } = p;
            return { user_id: user.id, name, data: rest };
          });
          const { data: inserted, error: err } = await window.sb.from("projects").insert(rows).select();
          if (err) throw err;
          list = inserted.map((row) => ({ id: row.id, name: row.name, ...(row.data || {}) }));
        }

        if (data.company) {
          const { data: udata, error: uerr } = await window.sb.auth.updateUser({ data: { company: data.company } });
          if (!uerr && udata?.user) { setUser(udata.user); setCompany(data.company); }
        } else {
          setCompany(null);
        }

        setProjects(list);
        setActiveTab(list.length ? list[0].id : null);
        onDone(true, null);
      } catch (e) {
        onDone(false, "فایل پشتیبان معتبر نیست یا بازیابی ناموفق بود.");
      }
    };
    reader.onerror = () => onDone(false, "خواندن فایل ناموفق بود.");
    reader.readAsText(file);
  }

  if (authLoading) return <SplashScreen />;
  if (!user) {
    return <LoginScreen onSuccess={() => setScreen("dashboard")} />;
  }
  if (activated === null) return <SplashScreen />;
  if (!activated) {
    return (
      <ActivationGate
        onActivated={() => setActivated(true)}
        onLogout={() => window.sb.auth.signOut()}
      />
    );
  }
  if (!loaded) return <SplashScreen />;
  if (!company) return <CompanySetup onSave={saveCompany} />;

  return (
    <div dir="rtl" className="min-h-screen bg-[#F4F6F5] text-[#14213D] flex flex-col relative">
      <Watermark />
      {error && (
        <div className="fixed top-3 left-1/2 -translate-x-1/2 z-[70] bg-red-600 text-white text-sm px-4 py-2 rounded-lg shadow-lg">
          {error}<button className="mr-3 underline" onClick={() => setError("")}>بستن</button>
        </div>
      )}
      {uploadCrashWarning && (
        <div className="fixed inset-x-3 top-3 z-[70] bg-amber-50 border border-amber-300 text-amber-900 text-xs px-4 py-3 rounded-xl shadow-lg leading-6">
          <b>دفعه قبل، وسط انتخاب عکس، اپ بسته/ری‌استارت شد.</b><br />
          این معمولاً به‌خاطر تنظیمات مدیریت باتری گوشیه، نه خود اپ. برای رفع: تنظیمات گوشی ← Apps ← Chrome ← Battery ← گزینه «No restrictions» رو انتخاب کن، و اگه گزینه «Autostart» هم بود، فعالش کن.
          <button className="block mt-1 underline font-semibold" onClick={() => setUploadCrashWarning(false)}>متوجه شدم</button>
        </div>
      )}
      {dueReminder && (
        <div className="fixed inset-x-3 top-3 z-[80] bg-[#14213D] text-white text-sm px-4 py-3 rounded-xl shadow-lg flex items-start gap-2">
          <Bell size={16} className="mt-0.5 flex-shrink-0 text-[#C9A227]" />
          <div className="flex-1">
            <div className="font-semibold mb-0.5">یادآوری</div>
            <div className="text-xs text-white/80">{dueReminder.text}</div>
          </div>
          <button onClick={() => setDueReminder(null)} className="text-white/70"><X size={16} /></button>
        </div>
      )}

      <div className="bg-[#14213D] text-white px-4 pt-6 pb-4 flex items-center gap-3 relative overflow-hidden">
        <div className="absolute inset-0 opacity-[0.07]" style={{
          backgroundImage: "linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)",
          backgroundSize: "20px 20px",
        }} />
        <button onClick={() => setShowMenu(true)} className="relative p-2 -ml-1 text-white/90"><Menu size={22} /></button>

        {showSearch ? (
          <div className="relative flex-1 flex items-center gap-2">
            <input
              autoFocus
              value={searchQuery}
              onChange={(e) => setSearchQuery(e.target.value)}
              placeholder="جستجوی پروژه، واحد، مخاطب..."
              className="flex-1 bg-white/10 text-white placeholder-white/50 rounded-xl px-3 py-2 text-sm outline-none"
            />
            <button onClick={() => { setShowSearch(false); setSearchQuery(""); }} className="p-1 text-white/80"><X size={18} /></button>
          </div>
        ) : (
          <>
            <button onClick={() => setShowCompanySettings(true)} className="relative flex items-center gap-2 flex-1 text-right">
              {company.logo ? (
                <img src={company.logo} alt="" className="w-10 h-10 rounded-xl object-cover border border-white/20" />
              ) : (
                <div className="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center"><Building2 size={20} /></div>
              )}
              <div>
                <div className="font-extrabold text-base leading-tight">{company.name}</div>
                <div className="text-[10px] text-[#C9A227] font-medium">Metrico — مدیریت پروژه‌های ساختمانی</div>
              </div>
            </button>
            <button onClick={() => setShowSearch(true)} className="relative p-2 text-white/90"><Search size={19} /></button>
          </>
        )}

        {showSearch && searchQuery.trim() && (
          <div className="absolute top-full inset-x-0 bg-white shadow-xl rounded-b-2xl overflow-hidden z-30 max-h-80 overflow-y-auto">
            {searchResults.length === 0 ? (
              <div className="text-center text-xs text-[#9CA3AF] py-4">نتیجه‌ای پیدا نشد</div>
            ) : (
              searchResults.map((r) => (
                <button key={r.type + r.id} onClick={() => openSearchResult(r)} className="w-full text-right px-4 py-3 border-b border-black/5 flex items-center gap-2 hover:bg-[#F4F6F5]">
                  {r.type === "project" && <Layers size={15} className="text-[#14213D] flex-shrink-0" />}
                  {r.type === "unit" && <Building2 size={15} className="text-[#14213D] flex-shrink-0" />}
                  {r.type === "contact" && <Users size={15} className="text-[#14213D] flex-shrink-0" />}
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium text-[#14213D] truncate">{r.title}</div>
                    <div className="text-[11px] text-[#9CA3AF] truncate">{r.subtitle}</div>
                  </div>
                </button>
              ))
            )}
          </div>
        )}
      </div>

      <div className="flex-1 overflow-y-auto pb-6">
        {screen === "about" && <AboutScreen onBack={() => setScreen("dashboard")} />}
        {screen === "privacy" && <PrivacyScreen onBack={() => setScreen("dashboard")} />}
        {screen === "contacts" && (
          <ContactsScreen
            onBack={() => setScreen("dashboard")}
            contacts={contacts}
            contactBalance={contactBalance}
            onAdd={addContact}
            onUpdate={updateContact}
            onRemove={removeContact}
          />
        )}
        {screen === "material-estimate" && <MaterialEstimateScreen onBack={() => setScreen("dashboard")} />}
        {screen === "inventory" && <InventoryScreen onBack={() => setScreen("dashboard")} />}
        {screen === "notes" && (
          <NotesScreen
            onBack={() => setScreen("dashboard")}
            projects={projects}
            onAddNote={addProjectNote}
            onRemoveNote={removeProjectNote}
          />
        )}
        {screen === "reminders" && (
          <RemindersScreen
            onBack={() => setScreen("dashboard")}
            projects={projects}
            reminders={reminders}
            onAdd={addReminder}
            onRemove={removeReminder}
          />
        )}
        {screen === "map" && (
          <LocationScreen
            onBack={() => setScreen("dashboard")}
            projects={projects}
            onOpenProject={(id) => { setActiveTab(id); setScreen("app"); }}
          />
        )}
        {screen === "backup" && (
          <BackupScreen
            onBack={() => setScreen("dashboard")}
            onExport={exportBackup}
            onRestore={restoreBackup}
            projectCount={projects.length}
          />
        )}
        {screen === "dashboard" && (
          <DashboardScreen
            projects={projects}
            onOpenProject={(id) => { setActiveTab(id); setScreen("app"); }}
            onNewProject={() => setShowNewProject(true)}
          />
        )}
        {screen === "app" && (
          activeProject ? (
            <ProjectPanel
              project={activeProject}
              onOpenUnit={(id) => setOpenUnitId(id)}
              onOpenSettings={() => setShowProjectSettings(true)}
              onOpenExpenses={() => setShowExpenses(true)}
              onPrint={() => openReport("project")}
              onFinancialReport={() => openFinancialReport(activeProject)}
              onBackToDashboard={() => setScreen("dashboard")}
              onRemoveNote={(noteId) => removeProjectNote(activeProject.id, noteId)}
            />
          ) : (
            <div className="text-center text-[#6B7280] mt-20 text-sm px-8">
              هنوز پروژه‌ای اضافه نشده. از منوی ☰ بالای صفحه، «پروژه جدید» را بساز.
            </div>
          )
        )}
      </div>

      {showMenu && (
        <SideMenu
          company={company}
          projects={projects}
          activeTab={activeTab}
          currentScreen={screen}
          onOpenDashboard={() => { setScreen("dashboard"); setShowMenu(false); }}
          onSelectProject={(id) => { setActiveTab(id); setScreen("app"); setShowMenu(false); }}
          onNewProject={() => { setShowNewProject(true); setShowMenu(false); }}
          onClose={() => setShowMenu(false)}
          onOpenBackup={() => { setScreen("backup"); setShowMenu(false); }}
          onOpenAbout={() => { setScreen("about"); setShowMenu(false); }}
          onOpenPrivacy={() => { setScreen("privacy"); setShowMenu(false); }}
          onOpenContacts={() => { setScreen("contacts"); setShowMenu(false); }}
              onOpenMaterialEstimate={() => { setScreen("material-estimate"); setShowMenu(false); }}
              onOpenInventory={() => { setScreen("inventory"); setShowMenu(false); }}
          onOpenNotes={() => { setScreen("notes"); setShowMenu(false); }}
          onOpenReminders={() => { setScreen("reminders"); setShowMenu(false); }}
          onOpenMap={() => { setScreen("map"); setShowMenu(false); }}
          onExportAll={() => { openReport("all"); setShowMenu(false); }}
          onLogout={logout}
        />
      )}

      {showExpenses && activeProject && (
        <ExpensesSheet
          project={activeProject}
          onClose={() => setShowExpenses(false)}
          onAdd={(expense) => addExpense(activeProject.id, expense)}
          onRemove={(id) => removeExpense(activeProject.id, id)}
          contacts={contacts}
          onAddContact={addContact}
          contactBalance={contactBalance}
        />
      )}

      {showCompanySettings && (
        <CompanySetup
          initial={company}
          onSave={saveCompany}
          onClose={() => setShowCompanySettings(false)}
          user={user}
          onError={(msg) => setError(msg)}
        />
      )}

      {showNewProject && <NewProjectSheet onCancel={() => setShowNewProject(false)} onCreate={createProject} />}

      {showProjectSettings && activeProject && (
        <ProjectSettingsSheet
          project={activeProject}
          onClose={() => setShowProjectSettings(false)}
          onRename={(name) => renameProject(activeProject.id, name)}
          onUpdateMeta={(meta) => updateProjectMeta(activeProject.id, meta)}
          onAddFloor={(count) => addFloor(activeProject.id, count)}
          onDeleteFloor={(floorNumber) => deleteFloor(activeProject.id, floorNumber)}
          onDelete={() => deleteProject(activeProject.id)}
          onAddDoc={(name, dataUrl) => addProjectDoc(activeProject.id, name, dataUrl)}
          onRemoveDoc={(docId) => removeProjectDoc(activeProject.id, docId)}
          onError={(msg) => setError(msg)}
        />
      )}

      {openUnit && activeProject && (
        <UnitModal
          unit={openUnit}
          onClose={() => setOpenUnitId(null)}
          onChange={(updater) => updateUnit(activeProject.id, openUnit.id, updater)}
          onReport={() => openUnitReport(activeProject, openUnit)}
          onError={(msg) => setError(msg)}
          contacts={contacts}
          onAddContact={addContact}
        />
      )}
    </div>
  );
}

function SideMenu({ company, projects, activeTab, currentScreen, onOpenDashboard, onSelectProject, onNewProject, onClose, onOpenBackup, onOpenAbout, onOpenPrivacy, onOpenContacts, onOpenMaterialEstimate, onOpenInventory, onOpenNotes, onOpenReminders, onOpenMap, onExportAll, onLogout }) {
  const [confirmLogout, setConfirmLogout] = useState(false);
  return (
    <div className="fixed inset-0 z-[75] flex">
      <div className="flex-1 bg-black/40" onClick={onClose}></div>
      <div className="w-[82%] max-w-xs bg-white h-full flex flex-col shadow-2xl">
        <div className="bg-[#14213D] text-white px-5 pt-6 pb-4 flex items-center gap-3">
          {company?.logo ? (
            <img src={company.logo} alt="" className="w-10 h-10 rounded-xl object-cover border border-white/20" />
          ) : (
            <div className="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center"><Building2 size={20} /></div>
          )}
          <div className="flex-1">
            <div className="font-bold text-sm leading-tight">{company?.name}</div>
          </div>
          <button onClick={onClose} className="p-1 text-white/70"><X size={20} /></button>
        </div>

        <div className="flex-1 overflow-y-auto px-4 py-4">
          <button
            onClick={onOpenDashboard}
            className={`w-full text-right px-3 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 mb-3 ${
              currentScreen === "dashboard" ? "bg-[#14213D] text-white" : "text-[#14213D] bg-[#F4F6F5]"
            }`}
          ><Wallet size={15} /> داشبورد</button>

          <div className="text-[11px] font-semibold text-[#9CA3AF] px-2 mb-2">پروژه‌ها</div>
          <div className="flex flex-col gap-1 mb-4">
            {projects.map((p) => (
              <button
                key={p.id}
                onClick={() => onSelectProject(p.id)}
                className={`text-right px-3 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2 ${
                  currentScreen === "app" && activeTab === p.id ? "bg-[#14213D] text-white" : "text-[#374151] hover:bg-[#F4F6F5]"
                }`}
              ><Layers size={15} />{p.name}</button>
            ))}
            <button onClick={onNewProject} className="text-right px-3 py-2.5 rounded-xl text-sm font-medium text-[#14213D] flex items-center gap-2 border border-dashed border-black/15 mt-1">
              <Plus size={15} /> پروژه جدید
            </button>
          </div>

          <div className="border-t border-black/10 pt-3 flex flex-col gap-1">
            <button
                  onClick={onOpenMaterialEstimate}
                  className={`w-full text-right px-3 py-2.5 rounded-xl text-sm font-medium transition-all flex items-center gap-2 ${
                    currentScreen === 'material-estimate' ? 'bg-[#14213D] text-white shadow-md' : 'text-[#374151] hover:bg-[#F4F6F5]'
                  }`}
                >
                  <Layers size={15} /> متره و برآورد مصالح
                </button>

                <button
                  onClick={onOpenInventory}
                  className={`w-full text-right px-3 py-2.5 rounded-xl text-sm font-medium transition-all flex items-center gap-2 ${
                    currentScreen === 'inventory' ? 'bg-[#14213D] text-white shadow-md' : 'text-[#374151] hover:bg-[#F4F6F5]'
                  }`}
                >
                  <div size={15} /> انبارداری
                </button>
                <button onClick={onOpenContacts} className="text-right px-3 py-2.5 rounded-xl text-sm font-medium text-[#374151] flex items-center gap-2 hover:bg-[#F4F6F5]">
              <Users size={15} /> دفترچه مخاطبین
            </button>
            <button onClick={onOpenNotes} className="text-right px-3 py-2.5 rounded-xl text-sm font-medium text-[#374151] flex items-center gap-2 hover:bg-[#F4F6F5]">

function BackupScreen({ onBack, onExport, onRestore, projectCount }) {
  const fileRef = useRef(null);
  const [msg, setMsg] = useState(null);
  const [confirmRestore, setConfirmRestore] = useState(null);

  function pickFile() { fileRef.current.click(); }
  function handleFile(e) {
    const file = e.target.files?.[0];
    e.target.value = "";
    if (!file) return;
    setConfirmRestore(file);
  }
  function doRestore() {
    onRestore(confirmRestore, (ok, err) => {
      setConfirmRestore(null);
      setMsg(ok ? { type: "ok", text: "اطلاعات با موفقیت بازیابی شد." } : { type: "err", text: err });
    });
  }

  return (
    <div className="px-5 pt-5 pb-10">
      <div className="flex items-center gap-3 mb-6">
        <button onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>

      </div>

      <div className="bg-white rounded-2xl p-4 border border-black/5 mb-4">
        <div className="font-semibold text-sm mb-1">دریافت فایل پشتیبان</div>
        <div className="text-xs text-[#6B7280] mb-3">

        </button>
      </div>

      <div className="bg-white rounded-2xl p-4 border border-black/5">

        <div className="text-xs text-[#B91C1C] mb-3">
          ⚠️ توجه: بازیابی، تمام اطلاعات فعلی این گوشی را با اطلاعات فایل پشتیبان جایگزین می‌کند.
        </div>
        <button onClick={pickFile} className="w-full flex items-center justify-center gap-2 border border-[#14213D]/20 text-[#14213D] rounded-xl py-2.5 text-sm font-semibold">

          {msg.text}
        </div>
      )}

      {confirmRestore && (
        <div className="fixed inset-0 bg-black/40 flex items-end z-[80]">
          <div className="bg-white w-full rounded-t-2xl p-5">
            <div className="font-bold mb-1">بازیابی اطلاعات؟</div>
            <div className="text-sm text-[#6B7280] mb-4">تمام اطلاعات فعلی با محتوای فایل «{confirmRestore.name}» جایگزین می‌شود. این کار قابل بازگشت نیست.</div>
            <div className="flex gap-2">
              <button onClick={() => setConfirmRestore(null)} className="flex-1 border border-black/10 rounded-xl py-2.5 text-sm font-medium">لغو</button>
              <button onClick={doRestore} className="flex-1 bg-[#B91C1C] text-white rounded-xl py-2.5 text-sm font-medium">بازیابی</button>

function ContactsScreen({ onBack, contacts, contactBalance, onAdd, onUpdate, onRemove }) {
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [note, setNote] = useState("");
  const [role, setRole] = useState("other");
  const [filterRole, setFilterRole] = useState("all");

  function openNew() {
    setEditId(null); setName(""); setPhone(""); setNote(""); setRole("other"); setShowForm(true);
  }
  function openEdit(c) {
    setEditId(c.id); setName(c.name); setPhone(c.phone || ""); setNote(c.note || ""); setRole(c.role || "other"); setShowForm(true);
  }
  function submit() {
    if (!name.trim()) return;
    if (editId) onUpdate(editId, { name: name.trim(), phone, note, role });
    else onAdd({ name: name.trim(), phone, note, role });
    setShowForm(false);
  }

  const filtered = filterRole === "all" ? contacts : contacts.filter((c) => (c.role || "other") === filterRole);

  return (
    <div className="px-5 pt-5 pb-10">
      <div className="flex items-center gap-3 mb-4">
        <button onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>
        <div className="font-bold text-lg flex-1">دفترچه مخاطبین</div>
        <button onClick={openNew} className="text-xs bg-[#14213D] text-white rounded-lg px-3 py-2 font-semibold flex items-center gap-1">
          <Plus size={13} /> مخاطب جدید
        </button>
      </div>

      <div className="flex gap-1.5 mb-4 flex-wrap">
        <button onClick={() => setFilterRole("all")} className="text-[11px] font-semibold px-2.5 py-1 rounded-full"
          style={{ background: filterRole === "all" ? "#14213D" : "#F4F6F5", color: filterRole === "all" ? "#fff" : "#4B5563" }}>همه</button>
        {Object.entries(CONTACT_ROLES).map(([key, label]) => (
          <button key={key} onClick={() => setFilterRole(key)} className="text-[11px] font-semibold px-2.5 py-1 rounded-full"
            style={{ background: filterRole === key ? "#14213D" : "#F4F6F5", color: filterRole === key ? "#fff" : "#4B5563" }}>{label}</button>
        ))}
      </div>

      {filtered.length === 0 && <div className="text-center text-[#9CA3AF] text-sm mt-16">مخاطبی ثبت نشده</div>}

      <div className="flex flex-col gap-2">
        {filtered.map((c) => {
          const bal = contactBalance(c.id);
          return (
            <div key={c.id} className="bg-white rounded-2xl border border-black/5 p-4">
              <div className="flex items-center justify-between mb-1">
                <button onClick={() => openEdit(c)} className="font-bold text-[#14213D] text-right flex items-center gap-2">
                  {c.name}
                  <span className="text-[10px] font-medium text-[#6B7280] bg-[#F4F6F5] px-2 py-0.5 rounded-full">{CONTACT_ROLES[c.role || "other"]}</span>
                </button>
                <button onClick={() => onRemove(c.id)} className="text-[#B91C1C] p-1"><Trash2 size={14} /></button>
              </div>
              <div className="flex items-center justify-between mb-1">
                {c.phone ? (
                  <div dir="ltr" className="text-xs text-[#9CA3AF] flex items-center gap-1.5">
                    {c.phone}
                    <a href={`tel:${c.phone}`} className="p-1 bg-green-50 text-[#166534] rounded-full"><PhoneCall size={12} /></a>
                  </div>
                ) : <span />}
              </div>
              <div className={`text-xs font-semibold ${bal > 0 ? "text-[#B91C1C]" : bal < 0 ? "text-[#166534]" : "text-[#9CA3AF]"}`}>
                {bal > 0 && `ما ${fmt(bal)} تومان بدهکاریم`}
                {bal < 0 && `${fmt(Math.abs(bal))} تومان از او طلب داریم`}
                {bal === 0 && "حساب تسویه است"}
              </div>
            </div>
          );
        })}
      </div>

      {showForm && (
        <div className="fixed inset-0 bg-black/40 flex items-end z-[60]">
          <div className="bg-white w-full rounded-t-2xl p-5">
            <div className="flex items-center justify-between mb-4">
              <div className="font-bold text-lg">{editId ? "ویرایش مخاطب" : "مخاطب جدید"}</div>
              <button onClick={() => setShowForm(false)}><X size={20} /></button>
            </div>
            <input value={name} onChange={(e) => setName(e.target.value)} placeholder="نام"
              className="w-full mb-3 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
            <input value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="تلفن" dir="ltr"
              className="w-full mb-3 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
            <label className="text-xs text-[#6B7280] font-medium">نقش</label>
            <div className="grid grid-cols-4 gap-1.5 mt-1 mb-3">
              {Object.entries(CONTACT_ROLES).map(([key, label]) => (
                <button key={key} onClick={() => setRole(key)} className="rounded-lg py-2 text-[11px] font-semibold border"
                  style={{ background: role === key ? "#14213D" : "#fff", color: role === key ? "#fff" : "#4B5563", borderColor: role === key ? "#14213D" : "#00000020" }}>
                  {label}
                </button>
              ))}
            </div>
            <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="یادداشت (اختیاری)" rows={2}
              className="w-full mb-4 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
            <button onClick={submit} disabled={!name.trim()} className="w-full bg-[#14213D] text-white rounded-xl py-3 text-sm font-semibold disabled:opacity-40">ذخیره</button>
          </div>
        </div>
      )}
    </div>
  );
}

      <div className="flex flex-col gap-2">
        {past.map((r) => (

              <div className="text-[11px] text-[#9CA3AF] mt-0.5" dir="ltr">{new Date(r.datetime).toLocaleString("fa-IR")}</div>
            </div>
            <button onClick={() => onRemove(r.id)} className="text-[#B91C1C] p-1 flex-shrink-0"><Trash2 size={14} /></button>
          </div>
        ))}
      </div>
    </div>
  );
}

function buildKML(projectList) {
  const esc = (v) => (v == null ? "" : String(v)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const placemarks = projectList.filter((p) => p.lat && p.lng).map((p) => `
    <Placemark>
      <name>${esc(p.name)}</name>
      <description>${esc(p.address || "")}</description>
      <Point><coordinates>${p.lng},${p.lat},0</coordinates></Point>
    </Placemark>`).join("");
  return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>${esc(APP_NAME)} - موقعیت پروژه‌ها</name>
    ${placemarks}
  </Document>
</kml>`;
}

function downloadKML(projectList, filename) {
  const kml = buildKML(projectList);
  const blob = new Blob([kml], { type: "application/vnd.google-earth.kml+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function LoginScreen({ onSuccess }) {
  const [mode, setMode] = useState("login"); // login | signup | reset
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [pw2, setPw2] = useState("");
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");
  const [busy, setBusy] = useState(false);
  const [shake, setShake] = useState(false);

  function fail(msg) {
    setError(msg);
    setShake(true);
    setTimeout(() => setShake(false), 400);
  }

  function friendlyError(e) {
    const msg = e.message || "";
    if (msg.includes("Invalid login credentials")) return "ایمیل یا رمز عبور اشتباه است.";
    if (msg.includes("User already registered")) return "این ایمیل قبلاً ثبت شده است.";
    if (msg.toLowerCase().includes("password should be at least")) return "رمز عبور باید حداقل ۶ کاراکتر باشد.";
    if (msg.includes("Unable to validate email") || msg.includes("invalid")) return "ایمیل معتبر نیست.";
    if (msg.includes("Email not confirmed")) return "ایمیل هنوز تأیید نشده. لینک تأیید ارسال‌شده به ایمیلت را باز کن.";
    if (msg.includes("rate limit") || msg.includes("Too many")) return "تلاش‌های زیاد ناموفق. کمی صبر کن و دوباره امتحان کن.";
    if (msg.includes("Failed to fetch") || msg.includes("network")) return "خطای اتصال به اینترنت.";
    return msg || "خطایی رخ داد.";
  }

  async function handleSubmit(e) {
    e.preventDefault();
    setError(""); setInfo("");
    if (!email.trim()) { fail("ایمیل را وارد کن."); return; }

    if (mode === "reset") {
      setBusy(true);
      const { error: err } = await window.sb.auth.resetPasswordForEmail(email.trim());
      if (err) fail(friendlyError(err));
      else setInfo("لینک بازیابی رمز به ایمیلت ارسال شد.");
      setBusy(false);
      return;
    }

    if (!pw) { fail("رمز عبور را وارد کن."); return; }
    if (mode === "signup" && pw !== pw2) { fail("رمز عبور و تکرار آن یکسان نیستند."); return; }

    setBusy(true);
    if (mode === "signup") {
      const { data, error: err } = await window.sb.auth.signUp({ email: email.trim(), password: pw });
      if (err) { fail(friendlyError(err)); setBusy(false); return; }
      if (data.session) {
        onSuccess();
      } else {
        setInfo("حساب ساخته شد. لینک تأیید به ایمیلت ارسال شد؛ بعد از تأیید، وارد شو.");
        setMode("login");
      }
    } else {
      const { error: err } = await window.sb.auth.signInWithPassword({ email: email.trim(), password: pw });
      if (err) { fail(friendlyError(err)); setBusy(false); return; }
      onSuccess();
    }
    setBusy(false);
  }

  return (
    <div dir="rtl" className="min-h-screen flex items-center justify-center px-6 relative overflow-hidden" style={{ background: "#14213D" }}>
      <Watermark />
      <div className="absolute inset-0 opacity-[0.06]" style={{
        backgroundImage: "linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)",
        backgroundSize: "26px 26px",
      }} />
      <style>{`
        @keyframes shakeX { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-8px)} 40%,60%{transform:translateX(8px)} }
        .shake-anim { animation: shakeX 0.4s; }
      `}</style>

      <div className={`relative w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8 ${shake ? "shake-anim" : ""}`}>
        <div className="flex flex-col items-center mb-7">
          <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-3" style={{ background: "#14213D" }}>
            <Building2 size={28} className="text-[#C9A227]" />
          </div>
          <div className="font-extrabold text-lg text-[#14213D]">{APP_NAME}</div>
          <div className="text-[11px] text-[#9CA3AF] font-medium -mt-0.5">مدیریت پروژه‌های ساختمانی</div>
          <div className="text-xs text-[#9CA3AF] mt-1">
            {mode === "login" && "برای ورود، ایمیل و رمز عبور را وارد کن"}
            {mode === "signup" && "ساخت حساب جدید"}
            {mode === "reset" && "بازیابی رمز عبور"}
          </div>
        </div>

        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
          <div>
            <label className="text-xs text-[#6B7280] font-medium">ایمیل</label>
            <input
              type="email"
              value={email}
              onChange={(e) => { setEmail(e.target.value); setError(""); }}
              className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#14213D]"
              placeholder="you@example.com"
              autoCapitalize="none"
              dir="ltr"
            />
          </div>

          {mode !== "reset" && (
            <div>
              <label className="text-xs text-[#6B7280] font-medium">رمز عبور</label>
              <input
                type="password"
                value={pw}
                onChange={(e) => { setPw(e.target.value); setError(""); }}
                className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#14213D]"
                placeholder="رمز عبور"
                dir="ltr"
              />
            </div>
          )}

          {mode === "signup" && (
            <div>
              <label className="text-xs text-[#6B7280] font-medium">تکرار رمز عبور</label>
              <input
                type="password"
                value={pw2}
                onChange={(e) => { setPw2(e.target.value); setError(""); }}
                className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#14213D]"
                placeholder="تکرار رمز عبور"
                dir="ltr"
              />
            </div>
          )}

          {error && <div className="text-xs text-[#B91C1C] text-center -mt-1">{error}</div>}
          {info && <div className="text-xs text-[#166534] text-center -mt-1">{info}</div>}

          <button type="submit" disabled={busy} className="w-full bg-[#14213D] text-white font-semibold rounded-xl py-3 text-sm mt-1 disabled:opacity-60" style={{ boxShadow: "0 8px 20px -8px #14213D" }}>
            {busy ? "لطفاً صبر کن..." : mode === "login" ? "ورود" : mode === "signup" ? "ساخت حساب" : "ارسال لینک بازیابی"}
          </button>
        </form>

        <div className="flex items-center justify-between mt-4 text-xs">
          {mode === "login" ? (
            <>
              <button onClick={() => { setMode("reset"); setError(""); setInfo(""); }} className="text-[#6B7280]">رمز را فراموش کرده‌ام</button>
              <button onClick={() => { setMode("signup"); setError(""); setInfo(""); }} className="text-[#14213D] font-semibold">ساخت حساب جدید</button>
            </>
          ) : (
            <button onClick={() => { setMode("login"); setError(""); setInfo(""); }} className="text-[#14213D] font-semibold mx-auto">بازگشت به ورود</button>
          )}
        </div>
      </div>
    </div>
  );
}

function CompanySetup({ initial, onSave, onClose, user, onError }) {

  const [logo, setLogo] = useState(initial?.logo || null);

  const [pwMsg, setPwMsg] = useState("");
  const [pwBusy, setPwBusy] = useState(false);

  async function handlePasswordChange() {
    if (newPw.length < 6) { setPwMsg("رمز جدید باید حداقل ۶ کاراکتر باشد."); return; }
    if (newPw !== confirmPw) { setPwMsg("رمز جدید و تکرار آن یکسان نیستند."); return; }
    setPwBusy(true);
    setPwMsg("");
    try {
      const { error: verifyErr } = await window.sb.auth.signInWithPassword({ email: user.email, password: curPw });
      if (verifyErr) { setPwMsg("رمز فعلی اشتباه است."); setPwBusy(false); return; }
      const { error: err } = await window.sb.auth.updateUser({ password: newPw });
      if (err) throw err;
      setPwMsg("رمز عبور با موفقیت تغییر کرد.");
      setCurPw(""); setNewPw(""); setConfirmPw("");

      setPwMsg("خطا: " + (e.message || "تغییر رمز ناموفق بود."));

              <input type="password" value={newPw} onChange={(e) => setNewPw(e.target.value)} placeholder="رمز جدید (حداقل ۶ کاراکتر)"
