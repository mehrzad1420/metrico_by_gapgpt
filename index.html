            setActiveTab(target.id);
            setScreen("app");
            setShowExpenses(true);
          },
        },
        {
          id: "transfer", label: "جابجایی", emoji: "↔️", color: "#0891B2", colorLight: "#67E8F9",
          onClick: () => {
            requirePlan("finance_transfer", () => {
              if (!projects.length) { setShowNewProject(true); return; }
              setActiveTab((activeProject || projects[0]).id);
              setShowTransfer(true);
            });
          },
        },
      ],
    },
    {
      id: "reports", label: "گزارش‌ها", emoji: "📋", color: "#9333EA", colorLight: "#C084FC", midAngle: -30,
      children: [
        {
          id: "accounts", label: "موجودی حساب‌ها", emoji: "🏦", color: "#DB2777", colorLight: "#F9A8D4",
          onClick: () => {
            requirePlan("fab_accounts", () => {
              if (!projects.length) { setShowNewProject(true); return; }
              setActiveTab((activeProject || projects[0]).id);
              setReportsView("accounts");
              setReportPopup("accounts");
            });
          },
        },
        {
          id: "flow", label: "گردش مالی", emoji: "📊", color: "#CA8A04", colorLight: "#FDE047",
          onClick: () => {
            requirePlan("fab_flow", () => {
              if (!projects.length) { setShowNewProject(true); return; }
              setActiveTab((activeProject || projects[0]).id);
              setReportsView("flow");
              setReportPopup("flow");
            });
          },
        },
        {
          id: "checks", label: "گزارش چک‌ها", emoji: "🧾", color: "#0891B2", colorLight: "#67E8F9",
          onClick: () => {
            requirePlan("fab_checks", () => {
              if (!projects.length) { setShowNewProject(true); return; }
              setActiveTab((activeProject || projects[0]).id);
              setReportsView("checks");
              setReportPopup("checks");
            });
          },
        },
      ],
    },
  ];

  return (
    <div dir="rtl" className="min-h-screen bg-[#F4F6F5] text-[#14213D] flex flex-col relative">
      <Watermark />
      {error && (
        <div className="fixed top-3 left-1/2 -translate-x-1/2 z-[70] bg-red-600 text-white text-sm px-4 py-2 rounded-lg shadow-lg">
          {error}<button className="mr-3 underline" onClick={() => setError("")}>بستن</button>
        </div>
      )}
      {uploadCrashWarning && (
        <div className="fixed inset-x-3 top-3 z-[70] bg-amber-50 border border-amber-300 text-amber-900 text-xs px-4 py-3 rounded-xl shadow-lg leading-6">
          <b>دفعه قبل، وسط انتخاب عکس، اپ بسته/ری‌استارت شد.</b><br />
          این معمولاً به‌خاطر تنظیمات مدیریت باتری گوشیه، نه خود اپ. برای رفع: تنظیمات گوشی ← Apps ← Chrome ← Battery ← گزینه «No restrictions» رو انتخاب کن، و اگه گزینه «Autostart» هم بود، فعالش کن.
          <button className="block mt-1 underline font-semibold" onClick={() => setUploadCrashWarning(false)}>متوجه شدم</button>
        </div>
      )}
      {dueReminder && (
        <div className="fixed inset-x-3 top-3 z-[80] bg-[#14213D] text-white text-sm px-4 py-3 rounded-xl shadow-lg flex items-start gap-2">
          <Bell size={16} className="mt-0.5 flex-shrink-0 text-[#C9A227]" />
          <div className="flex-1">
            <div className="font-semibold mb-0.5">یادآوری</div>
            <div className="text-xs text-white/80">{dueReminder.text}</div>
          </div>
          <button onClick={() => setDueReminder(null)} className="text-white/70"><X size={16} /></button>
        </div>
      )}

      {isReadOnly && (
        <div className="bg-[#128C7E]/10 border-b border-[#128C7E]/25 text-[#0F6B5F] text-xs text-center py-2 px-4 font-medium">
          حساب دمو — فقط مشاهده. برای ویرایش، حساب خود را بسازید یا از راهنما خارج شوید.
        </div>
      )}

      {!showChat && (
        <button onClick={() => requirePlan("chat", () => setShowChat(true))}
          className="fixed bottom-6 left-4 z-[57] w-14 h-14 rounded-full bg-white shadow-xl flex items-center justify-center border border-[#3B4BD4]/20">
          <ChatIcon size={44} />
        </button>
      )}

      {showChat && (
        <div className="fixed inset-0 z-[90] flex items-end sm:items-center sm:justify-center bg-black/30" onClick={() => setShowChat(false)}>
          <div className="bg-white w-full sm:max-w-sm sm:rounded-2xl rounded-t-2xl h-[75vh] sm:h-[560px] flex flex-col" onClick={(e) => e.stopPropagation()}>
            <div className="bg-[#3B4BD4] text-white px-4 py-3 flex items-center gap-2 sm:rounded-t-2xl rounded-t-2xl">
              <ChatIcon size={32} />
              <div className="flex-1">
                <div className="font-bold text-sm">پیام‌ها</div>
                <div className="text-[10px] text-white/70">دستیار هوشمند — آفلاین، با پشتیبانی صوتی</div>
              </div>
              <button onClick={() => setShowChat(false)} className="text-white/70"><X size={18} /></button>
            </div>
            <div className="flex-1 overflow-y-auto px-3 py-3 flex flex-col gap-2">
              {chatLog.map((m, i) => (
                <div key={i} className={`max-w-[85%] text-xs rounded-2xl px-3 py-2 whitespace-pre-wrap ${m.role === "bot" ? "bg-[#F4F6F5] text-[#14213D] self-start" : "bg-[#14213D] text-white self-end"}`}>
                  {m.text}
                </div>
              ))}
              <div ref={chatEndRef} />
            </div>
            <div className="p-3 border-t border-black/10 flex items-center gap-2">
              <button
                type="button"
                onClick={toggleChatVoice}
                title={chatListening ? "توقف ضبط" : "سؤال صوتی"}
                className={`w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${chatListening ? "bg-red-500 text-white animate-pulse" : "bg-[#F4F6F5] text-[#14213D]"}`}
              >
                <LucideMic size={18} />
              </button>
              <input
                value={chatInput}
                onChange={(e) => setChatInput(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter" && chatInput.trim()) sendChatMessage(); }}
                placeholder={chatListening ? "در حال گوش دادن..." : "سؤالت را بنویس یا با میکروفون بپرس..."}
                className="flex-1 bg-[#F4F6F5] rounded-xl px-3 py-2.5 text-sm outline-none"
              />
              <button onClick={() => sendChatMessage()} disabled={!chatInput.trim()} className="w-10 h-10 rounded-xl bg-[#14213D] text-white flex items-center justify-center disabled:opacity-40">
                <SendIcon size={15} />
              </button>
            </div>
          </div>
        </div>
      )}

      <div className="relative">
        <div className="bg-[#14213D] text-white px-4 pt-6 pb-4 flex items-center gap-3 relative overflow-hidden">
          <div className="absolute inset-0 opacity-[0.07]" style={{
            backgroundImage: "linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)",
            backgroundSize: "20px 20px",
          }} />
          <button onClick={() => setShowMenu(true)} className="relative p-2 -ml-1 text-white/90"><Menu size={22} /></button>

          {showSearch ? (
            <div className="relative flex-1 flex items-center gap-2">
              <input
                autoFocus
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                placeholder="جستجوی پروژه، واحد، مخاطب..."
                className="flex-1 bg-white/10 text-white placeholder-white/50 rounded-xl px-3 py-2 text-sm outline-none"
              />
              <button onClick={() => { setShowSearch(false); setSearchQuery(""); }} className="p-1 text-white/80"><X size={18} /></button>
            </div>
          ) : (
            <>
              <button onClick={() => setShowCompanySettings(true)} className="relative flex items-center gap-2 flex-1 text-right">
                {company.logo ? (
                  <img src={company.logo} alt="" className="w-10 h-10 rounded-xl object-cover border border-white/20" />
                ) : (
                  <div className="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center"><Building2 size={20} /></div>
                )}
                <div>
                  <div className="font-extrabold text-base leading-tight">{company.name}</div>
                  <div className="text-[10px] text-[#C9A227] font-medium">Metrico — مدیریت پروژه‌های ساختمانی</div>
                </div>
              </button>
              <button onClick={() => setShowSearch(true)} className="relative p-2 text-white/90"><Search size={19} /></button>
            </>
          )}
        </div>

        {showSearch && searchQuery.trim() && ReactDOM.createPortal(
          <div className="fixed left-0 right-0 top-[84px] mx-3 bg-white shadow-2xl rounded-2xl overflow-y-auto z-[95] max-h-80 border border-black/10">
            {searchResults.length === 0 ? (
              <div className="text-center text-xs text-[#9CA3AF] py-4">نتیجه‌ای پیدا نشد</div>
            ) : (
              searchResults.map((r) => (
                <button key={r.type + r.id} onClick={() => openSearchResult(r)} className="w-full text-right px-4 py-3 border-b border-black/5 flex items-center gap-2 hover:bg-[#F4F6F5]">
                  {r.type === "project" && <Layers size={15} className="text-[#14213D] flex-shrink-0" />}
                  {r.type === "unit" && <Building2 size={15} className="text-[#14213D] flex-shrink-0" />}
                  {r.type === "contact" && <Users size={15} className="text-[#14213D] flex-shrink-0" />}
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium text-[#14213D] truncate">{r.title}</div>
                    <div className="text-[11px] text-[#9CA3AF] truncate">{r.subtitle}</div>
                  </div>
                </button>
              ))
            )}
          </div>,
          document.body
        )}
      </div>

      <div className="flex-1 overflow-y-auto pb-6">
        {screen === "about" && <AboutScreen onBack={() => setScreen("dashboard")} />}
        {screen === "privacy" && <PrivacyScreen onBack={() => setScreen("dashboard")} />}
        {screen === "tax" && <TaxSystemsScreen onBack={() => setScreen("dashboard")} />}
        {screen === "guide" && (
          <GuideScreen
            onBack={() => setScreen("dashboard")}
            onDemoLogin={loginAsDemo}
          />
        )}
        {screen === "contacts" && (
          <ContactsScreen
            company={company}
            onBack={() => setScreen("dashboard")}
            contacts={contacts}
            contactBalance={contactBalance}
            onAdd={addContact}
            onUpdate={updateContact}
            onRemove={removeContact}
          />
        )}
        {screen === "notes" && (
          <NotesScreen
            company={company}
            onBack={() => setScreen("dashboard")}
            projects={projects}
            onAddNote={addProjectNote}
            onRemoveNote={removeProjectNote}
          />
        )}
        {screen === "reminders" && (
          <RemindersScreen
            company={company}
            onBack={() => setScreen("dashboard")}
            projects={projects}
            reminders={reminders}
            onAdd={addReminder}
            onRemove={removeReminder}
          />
        )}
        {screen === "map" && (
          <LocationScreen
            onBack={() => setScreen("dashboard")}
            projects={projects}
            onOpenProject={(id) => { setActiveTab(id); setScreen("app"); }}
            onExportKml={(list, filename) => requirePlan("kml_export", () => downloadKML(list, filename))}
          />
        )}
        {screen === "energy" && (
          <EnergyScreen
            company={company}
            onBack={() => setScreen("dashboard")}
            projects={projects}
          />
        )}
        {screen === "takeoff" && (
          <TakeoffScreen
            onBack={() => setScreen("dashboard")}
            projects={projects}
            onSave={(projectId, takeoff) => updateProjectMeta(projectId, { takeoff })}
            onError={(msg) => setError(msg)}
            inventory={inventory}
            isReadOnly={isReadOnly}
          />
        )}
        {screen === "inventory" && (
          <InventoryScreen
            company={company}
            onBack={() => setScreen("dashboard")}
            inventory={inventory}
            isReadOnly={isReadOnly}
            onAddItem={addInventoryItem}
            onRemoveItem={removeInventoryItem}
            onSetQuantity={setInventoryQuantity}
            onPatchItem={patchInventoryItem}
            onAllocate={allocateInventory}
            onRemoveAllocation={removeAllocation}
          />
        )}
        {screen === "backup" && (
          <BackupScreen
            onBack={() => setScreen("dashboard")}
            onExport={exportBackup}
            onRestore={restoreBackup}
            projectCount={projects.length}
            canRestore={hasPlanFeature(effectivePlan, "backup_restore", planExpiresAt)}
            restorePlanLabel={planRequiredLabel("backup_restore")}
          />
        )}
        {screen === "plan" && (
          <PlanScreen
            onBack={() => setScreen("dashboard")}
            userPlan={userPlan}
            planExpiresAt={planExpiresAt}
            onRedeemed={refreshUserPlan}
          />
        )}
        {screen === "dashboard" && (
          <DashboardScreen
            projects={projects}
            contacts={contacts}
            backHandlerRef={childBackHandler}
            onOpenProject={(id) => { setActiveTab(id); setScreen("app"); }}
            onNewProject={() => setShowNewProject(true)}
            onQuickExpense={() => {
              const target = activeProject || projects[0];
              if (!target) { setShowNewProject(true); return; }
              setActiveTab(target.id);
              setScreen("app");
              setShowExpenses(true);
            }}
            onQuickTransfer={() => {
              requirePlan("finance_transfer", () => {
                if (!projects.length) { setShowNewProject(true); return; }
                const target = activeProject || projects[0];
                setActiveTab(target.id);
                setShowTransfer(true);
              });
            }}
          />
        )}
        {screen === "reports" && (activeProject || projects[0]) && (
          <ReportsScreen
            company={company}
            project={activeProject || projects[0]}
            projects={projects}
            contacts={contacts}
            initialView={reportsView}
            onBack={() => setScreen("dashboard")}
            onSelectProject={(id) => setActiveTab(id)}
          />
        )}
        {screen === "finance" && activeProject && (
          <FinanceScreen
            company={company}
            project={activeProject}
            contacts={contacts}
            isReadOnly={isReadOnly}
            onBack={() => setScreen("app")}
            onAddTransaction={(tx) => addFinanceTransaction(activeProject.id, tx)}
          />
        )}
        {screen === "app" && (
          activeProject ? (
            <ProjectPanel
              project={activeProject}
              onOpenUnit={(id) => setOpenUnitId(id)}
              onOpenSettings={() => setShowProjectSettings(true)}
              onOpenExpenses={() => setShowExpenses(true)}
              onOpenFinance={() => requirePlan("accounting", () => setScreen("finance"))}
              onPrint={() => openReport("project")}
              onFinancialReport={() => openFinancialReport(activeProject)}
              onBackToDashboard={() => setScreen("dashboard")}
              onRemoveNote={(noteId) => removeProjectNote(activeProject.id, noteId)}
            />
          ) : (
            <div className="text-center text-[#6B7280] mt-20 text-sm px-8">
              هنوز پروژه‌ای اضافه نشده. از منوی ☰ بالای صفحه، «پروژه جدید» را بساز.
            </div>
          )
        )}
      </div>

      {showMenu && (
        <SideMenu
          company={company}
          projects={projects}
          activeTab={activeTab}
          currentScreen={screen}
          isReadOnly={isReadOnly}
          effectivePlan={effectivePlan}
          planExpiresAt={planExpiresAt}
          onOpenDashboard={() => { setScreen("dashboard"); setShowMenu(false); }}
          onSelectProject={(id) => { setActiveTab(id); setScreen("app"); setShowMenu(false); }}
          onNewProject={() => { setShowNewProject(true); setShowMenu(false); }}
          onClose={() => setShowMenu(false)}
          onOpenPlan={() => { setScreen("plan"); setShowMenu(false); }}
          onOpenBackup={() => { setScreen("backup"); setShowMenu(false); }}
          onOpenAbout={() => { setScreen("about"); setShowMenu(false); }}
          onOpenGuide={() => { setScreen("guide"); setShowMenu(false); }}
          onOpenPrivacy={() => { setScreen("privacy"); setShowMenu(false); }}
          onOpenContacts={() => { setScreen("contacts"); setShowMenu(false); }}
          onOpenNotes={() => { setScreen("notes"); setShowMenu(false); }}
          onOpenReminders={() => { setScreen("reminders"); setShowMenu(false); }}
          onOpenMap={() => requirePlan("map", () => { setScreen("map"); setShowMenu(false); })}
          onOpenEnergy={() => requirePlan("energy", () => { setScreen("energy"); setShowMenu(false); })}
          onOpenTakeoff={() => requirePlan("takeoff", () => { setScreen("takeoff"); setShowMenu(false); })}
          onOpenInventory={() => requirePlan("inventory", () => { setScreen("inventory"); setShowMenu(false); })}
          onOpenTax={() => requirePlan("tax", () => { setScreen("tax"); setShowMenu(false); })}
          onExportAll={() => requirePlan("export_all_projects", () => { openReport("all"); setShowMenu(false); })}
          onLogout={logout}
        />
      )}

      {reportPopup && (activeProject || projects[0]) && (
        <ReportPopupModal
          title={
            reportPopup === "accounts" ? "موجودی حساب‌ها"
              : reportPopup === "checks" ? "گزارش چک‌ها"
                : reportPopup === "flow" ? "گردش مالی"
                  : "گزارش"
          }
          onClose={() => setReportPopup(null)}
        >
          <ReportsScreen
            embedded
            company={company}
            project={activeProject || projects[0]}
            projects={projects}
            contacts={contacts}
            initialView={reportPopup}
            onBack={() => setReportPopup(null)}
            onSelectProject={(id) => setActiveTab(id)}
          />
        </ReportPopupModal>
      )}

      <RadialFabMenu
        open={showFab}
        onToggle={() => setShowFab((v) => !v)}
        onClose={() => setShowFab(false)}
        branches={fabBranches}
      />

      {showExpenses && activeProject && (
        <ExpensesSheet
          project={activeProject}
          company={company}
          onClose={() => setShowExpenses(false)}
          onAdd={(expense) => addExpense(activeProject.id, expense)}
          onRemove={(id) => removeExpense(activeProject.id, id)}
          contacts={contacts}
          onAddContact={addContact}
          contactBalance={contactBalance}
          inventory={inventory}
          isReadOnly={isReadOnly}
        />
      )}

      {showTransfer && (activeProject || projects[0]) && (
        <TransferModal
          project={activeProject || projects[0]}
          projects={projects}
          contacts={contacts}
          isReadOnly={isReadOnly}
          onClose={() => setShowTransfer(false)}
          onSelectProject={(id) => setActiveTab(id)}
          onSubmit={(tx) => {
            addFinanceTransaction((activeProject || projects[0]).id, tx);
            setShowTransfer(false);
          }}
        />
      )}

      {showCompanySettings && (
        <CompanySetup
          initial={company}
          onSave={saveCompany}
          onClose={() => setShowCompanySettings(false)}
          user={user}
          onError={(msg) => setError(msg)}
        />
      )}

      {showNewProject && <NewProjectSheet onCancel={() => setShowNewProject(false)} onCreate={createProject} />}

      {showProjectSettings && activeProject && (
        <ProjectSettingsSheet
          project={activeProject}
          contacts={contacts}
          isReadOnly={isReadOnly}
          onClose={() => setShowProjectSettings(false)}
          onRename={(name) => renameProject(activeProject.id, name)}
          onUpdateMeta={(meta) => updateProjectMeta(activeProject.id, meta)}
          onUpdateActivities={(activities) => updateProjectMeta(activeProject.id, { activities })}
          onUpdateBankAccounts={(bankAccounts) => updateProjectMeta(activeProject.id, { bankAccounts })}
          onUpdateInvestors={(investors) => updateProjectMeta(activeProject.id, { investors })}
          onAddFloor={(count) => addFloor(activeProject.id, count)}
          onDeleteFloor={(floorNumber) => deleteFloor(activeProject.id, floorNumber)}
          onDelete={() => deleteProject(activeProject.id)}
          onAddDoc={(name, dataUrl) => addProjectDoc(activeProject.id, name, dataUrl)}
          onRemoveDoc={(docId) => removeProjectDoc(activeProject.id, docId)}
          onError={(msg) => setError(msg)}
          onExportKml={(list, filename) => requirePlan("kml_export", () => downloadKML(list, filename))}
        />
      )}

      {openUnit && activeProject && (
        <UnitModal
          unit={openUnit}
          project={activeProject}
          onClose={() => setOpenUnitId(null)}
          onChange={(updater) => updateUnit(activeProject.id, openUnit.id, updater)}
          onRecordIncome={(payload) => recordUnitIncome(activeProject.id, openUnit.id, payload)}
          onReport={() => openUnitReport(activeProject, openUnit)}
          onError={(msg) => setError(msg)}
          contacts={contacts}
          onAddContact={addContact}
          isReadOnly={isReadOnly}
        />
      )}
    </div>
  );
}

function SideMenu({ company, projects, activeTab, currentScreen, isReadOnly, effectivePlan, planExpiresAt, onOpenDashboard, onSelectProject, onNewProject, onClose, onOpenPlan, onOpenBackup, onOpenAbout, onOpenGuide, onOpenPrivacy, onOpenTax, onOpenContacts, onOpenNotes, onOpenReminders, onOpenMap, onOpenEnergy, onOpenTakeoff, onOpenInventory, onExportAll, onLogout }) {
  const [confirmLogout, setConfirmLogout] = useState(false);
  const [projectsOpen, setProjectsOpen] = useState(false);
  const projectsBtnRef = useRef(null);
  const [flyoutPos, setFlyoutPos] = useState({ top: 0, right: 0 });

  function locked(featureKey) {
    return !hasPlanFeature(effectivePlan, featureKey, planExpiresAt);
  }

  function MenuItem({ onClick, icon, label, featureKey, active }) {
    const isLocked = featureKey ? locked(featureKey) : false;
    return (
      <button
        type="button"
        onClick={onClick}
        className={`text-right px-3 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2 hover:bg-[#F4F6F5] w-full ${
          active ? "bg-[#14213D] text-white hover:bg-[#14213D]" : "text-[#374151]"
        }`}
      >
        {icon}
        <span className="flex-1">{label}</span>
        {isLocked && <span className={`text-[10px] ${active ? "text-white/60" : "text-[#9CA3AF]"}`}>🔒</span>}
      </button>
    );
  }

  useEffect(() => {
    if (!projectsOpen || !projectsBtnRef.current) return;
    const update = () => {
      const r = projectsBtnRef.current.getBoundingClientRect();
      setFlyoutPos({ top: r.top, right: window.innerWidth - r.left + 8 });
    };
    update();
    window.addEventListener("resize", update);
    window.addEventListener("scroll", update, true);
    return () => {
      window.removeEventListener("resize", update);
      window.removeEventListener("scroll", update, true);
    };
  }, [projectsOpen]);

  function toggleProjects() {
    setProjectsOpen((v) => !v);
  }

  function pickProject(id) {
    onSelectProject(id);
    setProjectsOpen(false);
  }

  return (
    <div className="fixed inset-0 z-[75] flex" dir="rtl">
      <div className="w-[82%] max-w-xs bg-white h-full flex flex-col shadow-2xl relative">
        <div className="bg-[#14213D] text-white px-5 pt-6 pb-4 flex items-center gap-3">
          {company?.logo ? (
            <img src={company.logo} alt="" className="w-10 h-10 rounded-xl object-cover border border-white/20" />
          ) : (
            <div className="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center"><Building2 size={20} /></div>
          )}
          <div className="flex-1">
            <div className="font-bold text-sm leading-tight">{company?.name}</div>

function BackupScreen({ onBack, onExport, onRestore, projectCount, canRestore, restorePlanLabel }) {
  const fileRef = useRef(null);
  const [msg, setMsg] = useState(null);
  const [confirmRestore, setConfirmRestore] = useState(null);

  function pickFile() { fileRef.current.click(); }
  function handleFile(e) {
    const file = e.target.files?.[0];
    e.target.value = "";
    if (!file) return;
    setConfirmRestore(file);
  }
  function doRestore() {
    onRestore(confirmRestore, (ok, err) => {
      setConfirmRestore(null);
      setMsg(ok ? { type: "ok", text: "اطلاعات با موفقیت بازیابی شد." } : { type: "err", text: err });
    });
  }

  return (
    <div className="px-5 pt-5 pb-10">
      <div className="flex items-center gap-3 mb-6">
        <button onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>
        <div className="font-bold text-lg">پشتیبان‌گیری و بازیابی</div>
      </div>

      <div className="bg-white rounded-2xl p-4 border border-black/5 mb-4">
        <div className="font-semibold text-sm mb-1">دریافت فایل پشتیبان</div>
        <div className="text-xs text-[#6B7280] mb-3">
          یک فایل شامل تمام اطلاعات شرکت و {projectCount} پروژه (واحدها، خریداران، اقساط) ساخته می‌شود. این فایل را جای امنی (گوگل‌درایو، ایمیل و...) نگه دار.
        </div>
        <button onClick={onExport} className="w-full flex items-center justify-center gap-2 bg-[#14213D] text-white rounded-xl py-2.5 text-sm font-semibold">
          <Download size={15} /> دانلود فایل پشتیبان
        </button>
      </div>

      <div className="bg-white rounded-2xl p-4 border border-black/5">
        <div className="font-semibold text-sm mb-1">بازیابی از فایل پشتیبان</div>
        {!canRestore && (
          <div className="text-[11px] text-[#6B7280] mb-2 leading-5">
            بازیابی در پلن {restorePlanLabel} فعال می‌شود. دانلود پشتیبان در همه پلن‌ها رایگان است.
          </div>
        )}
        <div className="text-xs text-[#B91C1C] mb-3">
          ⚠️ توجه: بازیابی، تمام اطلاعات فعلی این گوشی را با اطلاعات فایل پشتیبان جایگزین می‌کند.
        </div>
        <button
          onClick={pickFile}
          disabled={!canRestore}
          className={`w-full flex items-center justify-center gap-2 border border-[#14213D]/20 text-[#14213D] rounded-xl py-2.5 text-sm font-semibold ${!canRestore ? "opacity-40 cursor-not-allowed" : ""}`}
        >
          <Upload size={15} /> انتخاب فایل پشتیبان
        </button>
        <input ref={fileRef} type="file" accept="application/json,.json" className="hidden" onChange={handleFile} />
      </div>

      {msg && (
        <div className={`mt-4 text-sm rounded-xl p-3 ${msg.type === "ok" ? "bg-green-50 text-[#166534]" : "bg-red-50 text-[#B91C1C]"}`}>
          {msg.text}
        </div>
      )}

      {confirmRestore && (
        <div className="fixed inset-0 bg-black/40 flex items-end z-[80]">
          <div className="bg-white w-full rounded-t-2xl p-5">
            <div className="font-bold mb-1">بازیابی اطلاعات؟</div>
            <div className="text-sm text-[#6B7280] mb-4">تمام اطلاعات فعلی با محتوای فایل «{confirmRestore.name}» جایگزین می‌شود. این کار قابل بازگشت نیست.</div>
            <div className="flex gap-2">
              <button onClick={() => setConfirmRestore(null)} className="flex-1 border border-black/10 rounded-xl py-2.5 text-sm font-medium">لغو</button>
              <button onClick={doRestore} className="flex-1 bg-[#B91C1C] text-white rounded-xl py-2.5 text-sm font-medium">بازیابی</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ContactsScreen({ company, onBack, contacts, contactBalance, onAdd, onUpdate, onRemove, embedded }) {
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [note, setNote] = useState("");
  const [role, setRole] = useState("other");
  const [filterRole, setFilterRole] = useState("all");

  function openNew() {
    setEditId(null); setName(""); setPhone(""); setNote(""); setRole("other"); setShowForm(true);
  }
  function openEdit(c) {
    setEditId(c.id); setName(c.name); setPhone(c.phone || ""); setNote(c.note || ""); setRole(c.role || "other"); setShowForm(true);
  }
  function submit() {
    if (!name.trim()) return;
    if (editId) onUpdate(editId, { name: name.trim(), phone, note, role });
    else onAdd({ name: name.trim(), phone, note, role });
    setShowForm(false);
  }

  const filtered = filterRole === "all" ? contacts : contacts.filter((c) => (c.role || "other") === filterRole);
  const contactPrintRows = useMemo(() => filtered.map((c) => {
    const bal = contactBalance(c.id);
    return {
      name: c.name,
      role: CONTACT_ROLES[c.role || "other"],
      phone: c.phone || "—",
      balance: bal === 0 ? "تسویه" : `${fmt(Math.abs(bal))} (${bal > 0 ? "بدهکار ما" : "طلب ما"})`,
    };
  }), [filtered, contactBalance]);

  return (
    <div className={embedded ? "" : "px-5 pt-5 pb-10"}>
      {!embedded ? (
      <div className="flex items-center gap-3 mb-4">
        <button onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>
        <div className="font-bold text-lg flex-1">دفترچه مخاطبین</div>
        <PrintExportButton
          company={company}
          title="لیست مخاطبین"
          subtitle=""
          columns={[
            { key: "name", label: "نام" },
            { key: "role", label: "نقش" },
            { key: "phone", label: "تلفن" },
            { key: "balance", label: "مانده حساب" },
          ]}
          rows={contactPrintRows}
        />
        <button onClick={openNew} className="text-xs bg-[#14213D] text-white rounded-lg px-3 py-2 font-semibold flex items-center gap-1">
          <Plus size={13} /> مخاطب جدید
        </button>
      </div>
      ) : (
        <div className="flex justify-end mb-3">
          <PrintExportButton
            company={company}
            title="حساب اشخاص"
            subtitle=""
            columns={[
              { key: "name", label: "نام" },
              { key: "role", label: "نقش" },
              { key: "phone", label: "تلفن" },
              { key: "balance", label: "مانده حساب" },
            ]}
            rows={contactPrintRows}
          />
        </div>
      )}

      {!embedded && (
      <div className="flex gap-1.5 mb-4 flex-wrap">
        <button onClick={() => setFilterRole("all")} className="text-[11px] font-semibold px-2.5 py-1 rounded-full"
          style={{ background: filterRole === "all" ? "#14213D" : "#F4F6F5", color: filterRole === "all" ? "#fff" : "#4B5563" }}>همه</button>
        {Object.entries(CONTACT_ROLES).map(([key, label]) => (
          <button key={key} onClick={() => setFilterRole(key)} className="text-[11px] font-semibold px-2.5 py-1 rounded-full"
            style={{ background: filterRole === key ? "#14213D" : "#F4F6F5", color: filterRole === key ? "#fff" : "#4B5563" }}>{label}</button>
        ))}
      </div>
      )}

      {filtered.length === 0 && <div className="text-center text-[#9CA3AF] text-sm mt-16">مخاطبی ثبت نشده</div>}

      {filtered.length > 0 && (
        <div className="bg-white rounded-2xl border border-black/5 overflow-hidden overflow-x-auto">
          <table className="w-full text-xs min-w-[420px]">
            <thead>
              <tr className="bg-[#F4F6F5] text-[#6B7280]">
                <th className="text-right px-3 py-2.5 font-medium">نام / نقش</th>
                <th className="text-center px-2 py-2.5 font-medium">تماس</th>
                <th className="text-left px-3 py-2.5 font-medium">مانده حساب</th>
                {!embedded && <th className="px-2 py-2.5"></th>}
              </tr>
            </thead>
            <tbody>
              {filtered.map((c) => {
                const bal = contactBalance(c.id);
                return (
                  <tr key={c.id} className="border-t border-black/5">
                    <td className="px-3 py-2.5">
                      {embedded ? (
                        <div className="text-right">
                          <div className="font-semibold text-[#14213D]">{c.name}</div>
                          <div className="text-[10px] text-[#9CA3AF] mt-0.5">{CONTACT_ROLES[c.role || "other"]}</div>
                        </div>
                      ) : (
                      <button onClick={() => openEdit(c)} className="text-right">
                        <div className="font-semibold text-[#14213D]">{c.name}</div>
                        <div className="text-[10px] text-[#9CA3AF] mt-0.5">{CONTACT_ROLES[c.role || "other"]}</div>
                      </button>
                      )}
                    </td>
                    <td className="text-center px-2 py-2.5">
                      {c.phone ? (
                        <a href={`tel:${c.phone}`} className="inline-flex p-1.5 bg-green-50 text-[#166534] rounded-full"><PhoneCall size={13} /></a>
                      ) : <span className="text-[#D1D5DB]">—</span>}
                    </td>
                    <td className={`text-left px-3 py-2.5 font-semibold whitespace-nowrap ${bal > 0 ? "text-[#B91C1C]" : bal < 0 ? "text-[#166534]" : "text-[#9CA3AF]"}`}>
                      {bal === 0 ? "تسویه" : fmt(Math.abs(bal))}
                      {bal !== 0 && <div className="text-[9px] font-normal">{bal > 0 ? "بدهکار ما" : "طلب ما"}</div>}
                    </td>
                    {!embedded && (
                    <td className="px-2 py-2.5">
                      <button onClick={() => onRemove(c.id)} className="text-[#B91C1C] p-1"><Trash2 size={13} /></button>
                    </td>
                    )}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {showForm && !embedded && (
        <div className="fixed inset-0 bg-black/40 flex items-end z-[60]">
          <div className="bg-white w-full rounded-t-2xl p-5">
            <div className="flex items-center justify-between mb-4">
              <div className="font-bold text-lg">{editId ? "ویرایش مخاطب" : "مخاطب جدید"}</div>
              <button onClick={() => setShowForm(false)}><X size={20} /></button>
            </div>
            <input value={name} onChange={(e) => setName(e.target.value)} placeholder="نام"
              className="w-full mb-3 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
            <input value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="تلفن" dir="ltr"
              className="w-full mb-3 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
            <label className="text-xs text-[#6B7280] font-medium">نقش</label>
            <div className="grid grid-cols-4 gap-1.5 mt-1 mb-3">
              {Object.entries(CONTACT_ROLES).map(([key, label]) => (
                <button key={key} onClick={() => setRole(key)} className="rounded-lg py-2 text-[11px] font-semibold border"
                  style={{ background: role === key ? "#14213D" : "#fff", color: role === key ? "#fff" : "#4B5563", borderColor: role === key ? "#14213D" : "#00000020" }}>
                  {label}
                </button>
              ))}
            </div>
            <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="یادداشت (اختیاری)" rows={2}
              className="w-full mb-4 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
            <button onClick={submit} disabled={!name.trim()} className="w-full bg-[#14213D] text-white rounded-xl py-3 text-sm font-semibold disabled:opacity-40">ذخیره</button>
          </div>
        </div>
      )}
    </div>
  );
}

function NotesScreen({ company, onBack, projects, onAddNote, onRemoveNote }) {

  const notePrintRows = useMemo(() => allNotes.map((n) => ({

  const sorted = reminders.slice().sort((a, b) => (a.datetime || "").localeCompare(b.datetime || ""));

    text: r.text,
    datetime: r.datetime ? new Date(r.datetime).toLocaleString("fa-IR") : "—",
    project: r.projectId ? (projects.find((p) => p.id === r.projectId)?.name || "—") : "—",
    status: r.notified ? "انجام‌شده" : "در انتظار",

  return (
    <div className="px-5 pt-5 pb-10">
      <div className="flex items-center gap-3 mb-6">
        <button onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>

        <PrintExportButton
          company={company}
          title="لیست یادآوری‌ها"
          subtitle=""
          columns={[
            { key: "text", label: "متن" },
            { key: "datetime", label: "زمان" },
            { key: "project", label: "پروژه" },
            { key: "status", label: "وضعیت" },
          ]}
          rows={reminderPrintRows}

function buildKML(projectList) {
  const esc = (v) => (v == null ? "" : String(v)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const placemarks = projectList.filter((p) => p.lat && p.lng).map((p) => {
    const avg = avgSalePricePerSqm(p);
    const avgRounded = avg > 0 ? Math.round(avg) : 0;
    const nameSuffix = avgRounded > 0 ? ` (${fmt(avgRounded)} تومان/م²)` : "";
    const descLines = [];
    if (p.address) descLines.push(p.address);
    if (avgRounded > 0) descLines.push(`متوسط قیمت فروش: ${fmt(avgRounded)} تومان به ازای هر متر مربع`);
    return `
    <Placemark>
      <name>${esc(p.name + nameSuffix)}</name>
      <description>${esc(descLines.join("\n"))}</description>
      <Point><coordinates>${p.lng},${p.lat},0</coordinates></Point>
    </Placemark>`;
  }).join("");
  return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>${esc(APP_NAME)} - موقعیت پروژه‌ها</name>
    ${placemarks}
  </Document>
</kml>`;
}

function downloadKML(projectList, filename) {
  const kml = buildKML(projectList);
  const blob = new Blob([kml], { type: "application/vnd.google-earth.kml+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function defaultCoefficients() {
  const c = { wallRatio: 0.6 };
  MATERIAL_CONFIG.forEach((cat) => cat.items.forEach((it) => { c[it.key] = it.def; }));
  return c;
}

function computeTakeoff(inputs) {
  const area = Number(inputs.area) || 0;
  const units = Number(inputs.units) || 0;
  const fixtures = ((Number(inputs.bathroomsPerUnit) || 0) + (Number(inputs.kitchensPerUnit) || 0)) * units;
  const c = inputs.coefficients;
  const wallArea = area * (Number(c.wallRatio) || 0);
  const results = {};
  MATERIAL_CONFIG.forEach((cat) => {
    cat.items.forEach((it) => {
      const coef = Number(c[it.key]) || 0;
      let basisValue = 0;
      if (it.basis === "area") basisValue = area;
      else if (it.basis === "wall") basisValue = wallArea;
      else if (it.basis === "units") basisValue = units;
      else if (it.basis === "fixtures") basisValue = fixtures;
      else if (it.basis === "plaster") basisValue = results.plaster || 0;
      results[it.key] = Math.round(basisValue * coef * 100) / 100;
    });
  });
  return results;
}

function buildDefaultInventory() {
  const items = [];
  MATERIAL_CONFIG.forEach((cat) => {
    cat.items.forEach((it) => {
      items.push({
        id: uid(), name: it.label, unit: it.unit, category: cat.category.replace(/^\d+\.\s*/, ""),
        takeoffKey: it.key, quantity: 0, allocations: [],
      });
    });
  });
  INVENTORY_EXTRA.forEach((ex) => {
    items.push({ id: uid(), name: ex.name, unit: ex.unit, category: ex.category, takeoffKey: null, quantity: 0, allocations: [] });
  });
  return items;
}

function inventoryAllocated(item) {
  return (item.allocations || []).reduce((s, a) => s + (Number(a.quantity) || 0), 0);
}
function inventoryAvailable(item) {
  return Math.max(0, (Number(item.quantity) || 0) - inventoryAllocated(item));
}

function compareTakeoffToInventory(takeoffResults, inventory) {
  if (!takeoffResults) return [];
  const rows = [];
  MATERIAL_CONFIG.forEach((cat) => {
    cat.items.forEach((it) => {
      const required = Number(takeoffResults[it.key]) || 0;
      const stockItem = inventory.find((i) => i.takeoffKey === it.key);
      const onHand = stockItem ? inventoryAvailable(stockItem) : 0;
      rows.push({
        key: it.key, label: it.label, unit: it.unit, category: cat.category,
        required, onHand, delta: onHand - required, materialId: stockItem?.id || null,
      });
    });
  });
  return rows;
}

  const project = projects.find((p) => p.id === projectId);
  const saved = project?.takeoff || {};

  const [area, setArea] = useState(saved.area || project?.totalBuiltArea || "");
  const [bathroomsPerUnit, setBathroomsPerUnit] = useState(saved.bathroomsPerUnit ?? 1);
  const [kitchensPerUnit, setKitchensPerUnit] = useState(saved.kitchensPerUnit ?? 1);
  const [structureType, setStructureType] = useState(saved.structureType || "concrete");
  const [wallType, setWallType] = useState(saved.wallType || "brick");
  const [coefficients, setCoefficients] = useState(saved.coefficients || defaultCoefficients());
  const [results, setResults] = useState(saved.results || null);
  const [saveMsg, setSaveMsg] = useState("");
  const [showCoefs, setShowCoefs] = useState(false);

  useEffect(() => {
    const s = project?.takeoff || {};

    setBathroomsPerUnit(s.bathroomsPerUnit ?? 1);
    setKitchensPerUnit(s.kitchensPerUnit ?? 1);
    setStructureType(s.structureType || "concrete");
    setWallType(s.wallType || "brick");
    setCoefficients(s.coefficients || defaultCoefficients());
    setResults(s.results || null);
    // eslint-disable-next-line
  }, [projectId]);

  function calculate() {
    const inputs = { area, units: project?.units.length || 0, bathroomsPerUnit, kitchensPerUnit, coefficients };
    setResults(computeTakeoff(inputs));
  }

  function saveEstimate() {
    if (isReadOnly) return;
    if (!project) return;
    onSave(project.id, {
      area, bathroomsPerUnit, kitchensPerUnit, structureType, wallType, coefficients, results,
      savedAt: new Date().toISOString(),
    });

    setTimeout(() => setSaveMsg(""), 1500);

  const inventoryCompare = useMemo(
    () => (results ? compareTakeoffToInventory(results, inventory || []) : []),

function TakeoffDigitizer({ project, onError, onUseArea }) {
  const [image, setImage] = useState(null);
  const [mode, setMode] = useState(null); // null | 'calibrate' | 'measure'
  const [calibPoints, setCalibPoints] = useState([]);
  const [pixelsPerMeter, setPixelsPerMeter] = useState(null);
  const [askDistance, setAskDistance] = useState(false);
  const [distanceInput, setDistanceInput] = useState("");
  const [polygon, setPolygon] = useState([]);
  const [measurements, setMeasurements] = useState([]);
  const [askName, setAskName] = useState(false);
  const [pendingAreaPx, setPendingAreaPx] = useState(0);
  const [nameInput, setNameInput] = useState("");
  const canvasRef = useRef(null);
  const imgRef = useRef(null);
  const fileRef = useRef(null);

  async function handleUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const dataUrl = await resizeImage(file, 1400, 0.8);
      setImage(dataUrl);
      setCalibPoints([]); setPolygon([]); setPixelsPerMeter(null); setMeasurements([]);
    } catch (err) {
      if (onError) onError("بارگذاری نقشه ناموفق بود: " + uploadErrorMessage(err));
    }
    e.target.value = "";
  }

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || !image) return;
    const ctx = canvas.getContext("2d");
    const img = new Image();
    img.onload = () => {
      imgRef.current = img;
      canvas.width = img.width;
      canvas.height = img.height;
      redraw();
    };
    img.src = image;
    // eslint-disable-next-line
  }, [image]);

  function redraw() {
    const canvas = canvasRef.current;
    const img = imgRef.current;
    if (!canvas || !img) return;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);

    if (calibPoints.length) {
      ctx.strokeStyle = "#C9A227"; ctx.lineWidth = 3; ctx.fillStyle = "#C9A227";
      calibPoints.forEach((p) => { ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 7); ctx.fill(); });
      if (calibPoints.length === 2) {
        ctx.beginPath(); ctx.moveTo(calibPoints[0].x, calibPoints[0].y); ctx.lineTo(calibPoints[1].x, calibPoints[1].y); ctx.stroke();
      }
    }
    if (polygon.length) {
      ctx.strokeStyle = "#15803D"; ctx.fillStyle = "rgba(21,128,61,0.25)"; ctx.lineWidth = 3;
      ctx.beginPath();
      polygon.forEach((p, i) => (i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)));
      if (polygon.length > 2) ctx.closePath();
      ctx.fill(); ctx.stroke();
      polygon.forEach((p) => { ctx.beginPath(); ctx.fillStyle = "#15803D"; ctx.arc(p.x, p.y, 5, 0, 7); ctx.fill(); });
    }
  }

  useEffect(redraw, [calibPoints, polygon]);

  function handleCanvasClick(e) {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    if (mode === "calibrate") {
      if (calibPoints.length >= 2) return;
      const next = [...calibPoints, { x, y }];
      setCalibPoints(next);
      if (next.length === 2) setAskDistance(true);
    } else if (mode === "measure") {
      setPolygon((prev) => [...prev, { x, y }]);
    }
  }

  function confirmDistance() {
    const d = Number(distanceInput);
    if (!d || calibPoints.length < 2) return;
    const dx = calibPoints[1].x - calibPoints[0].x;
    const dy = calibPoints[1].y - calibPoints[0].y;
    const pixelDist = Math.sqrt(dx * dx + dy * dy);
    setPixelsPerMeter(pixelDist / d);
    setAskDistance(false);
    setDistanceInput("");
    setMode(null);
  }

  function polygonAreaPx(pts) {
    let area = 0;
    for (let i = 0; i < pts.length; i++) {
      const j = (i + 1) % pts.length;
      area += pts[i].x * pts[j].y - pts[j].x * pts[i].y;
    }
    return Math.abs(area / 2);
  }

  function finishPolygon() {
    if (polygon.length < 3 || !pixelsPerMeter) return;
    const areaPx = polygonAreaPx(polygon);
    const areaSqm = areaPx / (pixelsPerMeter * pixelsPerMeter);
    setPendingAreaPx(areaSqm);
    setAskName(true);
    setMode(null);
  }

  function confirmName() {
    const areaSqm = Math.round(pendingAreaPx * 100) / 100;
    setMeasurements((prev) => [...prev, { id: uid(), name: nameInput.trim() || `فضا ${prev.length + 1}`, areaSqm }]);
    setPolygon([]);
    setAskName(false);
    setNameInput("");
  }

  const totalMeasured = measurements.reduce((s, m) => s + m.areaSqm, 0);

  return (
    <div className="bg-white rounded-2xl border border-black/5 p-4">
      <div className="font-bold text-sm text-[#14213D] mb-1">اندازه‌گیری از روی نقشه (اختیاری)</div>
      <div className="text-[10px] text-[#9CA3AF] mb-3">
        فعلاً خوندن خودکار ابعاد از نقشه CAD/PDF ممکن نیست؛ در عوض نقشه رو آپلود کن، مقیاسش رو با یه خط مرجع کالیبره کن، بعد روی گوشه‌های هر فضا کلیک کن تا متراژش دقیق محاسبه بشه. این قدم اول ابزار هوشمنده و بعداً کامل‌تر می‌شه.
      </div>

      {!image ? (
        <button onClick={() => fileRef.current.click()} className="w-full border border-dashed border-black/20 rounded-xl py-6 text-xs text-[#6B7280] flex flex-col items-center gap-1">
          <Upload size={18} /> بارگذاری نقشه (عکس یا PDF)
        </button>
      ) : (
        <>
          <div className="flex gap-2 mb-2 flex-wrap">
            <button onClick={() => { setMode("calibrate"); setCalibPoints([]); }}
              className={`text-xs rounded-lg px-3 py-2 font-semibold ${mode === "calibrate" ? "bg-[#C9A227] text-white" : "bg-[#F4F6F5] text-[#14213D]"}`}>
              ۱. کالیبراسیون مقیاس
            </button>
            <button onClick={() => { if (pixelsPerMeter) { setMode("measure"); setPolygon([]); } }} disabled={!pixelsPerMeter}
              className={`text-xs rounded-lg px-3 py-2 font-semibold disabled:opacity-40 ${mode === "measure" ? "bg-[#15803D] text-white" : "bg-[#F4F6F5] text-[#14213D]"}`}>
              ۲. اندازه‌گیری فضا
            </button>
            {mode === "measure" && polygon.length >= 3 && (
              <button onClick={finishPolygon} className="text-xs rounded-lg px-3 py-2 font-semibold bg-[#14213D] text-white">پایان و ثبت متراژ</button>
            )}
            <button onClick={() => fileRef.current.click()} className="text-xs rounded-lg px-3 py-2 font-semibold border border-black/10 text-[#6B7280]">نقشه دیگر</button>
          </div>
          {!pixelsPerMeter && <div className="text-[10px] text-amber-700 bg-amber-50 rounded-lg p-2 mb-2">اول باید مقیاس رو کالیبره کنی: یه خط با طول مشخص روی نقشه پیدا کن (مثلاً دیوار ۵ متری)، دکمه «کالیبراسیون مقیاس» رو بزن و دو سر همون خط رو لمس کن.</div>}
          {pixelsPerMeter && <div className="text-[10px] text-[#166534] bg-green-50 rounded-lg p-2 mb-2">مقیاس تنظیم شد. حالا «اندازه‌گیری فضا» رو بزن و گوشه‌های فضای مدنظرت رو به ترتیب لمس کن، بعد «پایان و ثبت متراژ».</div>}

          <div className="overflow-auto rounded-xl border border-black/10 mb-2" style={{ maxHeight: 320 }}>
            <canvas ref={canvasRef} onClick={handleCanvasClick} style={{ width: "100%", height: "auto", display: "block", touchAction: "manipulation" }} />
          </div>
          <input ref={fileRef} type="file" accept="image/*,application/pdf" className="hidden" onChange={handleUpload} />

          {measurements.length > 0 && (
            <div className="flex flex-col gap-1.5 mt-2">
              {measurements.map((m) => (
                <div key={m.id} className="flex items-center justify-between bg-[#F4F6F5] rounded-lg px-3 py-2 text-xs">
                  <span>{m.name}</span>
                  <span className="font-bold">{m.areaSqm} m²</span>
                </div>
              ))}
              <div className="flex items-center justify-between px-3 py-2 text-xs font-bold text-[#14213D] border-t border-black/10 mt-1 pt-2">
                <span>جمع کل</span>
                <span>{Math.round(totalMeasured * 100) / 100} m²</span>
              </div>
              <button onClick={() => onUseArea(Math.round(totalMeasured * 100) / 100)} className="w-full bg-[#14213D] text-white rounded-xl py-2.5 text-xs font-semibold mt-1">
                افزودن این متراژ به فرم برآورد
              </button>
            </div>
          )}
        </>
      )}

      {askDistance && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[80] px-6">
          <div className="bg-white rounded-2xl p-5 w-full max-w-xs">
            <div className="font-bold text-sm mb-2">فاصله واقعی این خط چند متره؟</div>
            <input type="number" autoFocus value={distanceInput} onChange={(e) => setDistanceInput(e.target.value)} placeholder="مثلاً 5"
              className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none mb-3" />
            <div className="flex gap-2">
              <button onClick={() => { setAskDistance(false); setCalibPoints([]); }} className="flex-1 border border-black/10 rounded-xl py-2 text-sm">لغو</button>
              <button onClick={confirmDistance} disabled={!distanceInput} className="flex-1 bg-[#14213D] text-white rounded-xl py-2 text-sm disabled:opacity-40">تأیید</button>
            </div>
          </div>
        </div>
      )}
      {askName && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[80] px-6">
          <div className="bg-white rounded-2xl p-5 w-full max-w-xs">
            <div className="font-bold text-sm mb-1">این فضا چه اسمیه؟</div>
            <div className="text-xs text-[#6B7280] mb-2">متراژ محاسبه‌شده: {Math.round(pendingAreaPx * 100) / 100} متر مربع</div>
            <input autoFocus value={nameInput} onChange={(e) => setNameInput(e.target.value)} placeholder="مثلاً اتاق خواب ۱"
              className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none mb-3" />
            <div className="flex gap-2">
              <button onClick={() => { setAskName(false); setPolygon([]); }} className="flex-1 border border-black/10 rounded-xl py-2 text-sm">لغو</button>
              <button onClick={confirmName} className="flex-1 bg-[#14213D] text-white rounded-xl py-2 text-sm">ثبت</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function InventoryScreen({ company, onBack, inventory, isReadOnly, onAddItem, onRemoveItem, onSetQuantity, onPatchItem, onAllocate, onRemoveAllocation }) {
  const [filterCat, setFilterCat] = useState("all");
  const [search, setSearch] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState("");
  const [newUnit, setNewUnit] = useState("");
  const [newCategory, setNewCategory] = useState("سایر");
  const [newType, setNewType] = useState("");
  const [newVariant, setNewVariant] = useState("");
  const [editQty, setEditQty] = useState({});
  const [editSpec, setEditSpec] = useState({});
  const [allocateItem, setAllocateItem] = useState(null);
  const [allocActivity, setAllocActivity] = useState("");
  const [allocQty, setAllocQty] = useState("");
  const [expandedId, setExpandedId] = useState(null);

  const categories = useMemo(() => {
    const set = new Set(inventory.map((i) => i.category || "سایر"));
    return ["all", ...Array.from(set).sort()];
  }, [inventory]);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    return inventory.filter((item) => {
      if (filterCat !== "all" && (item.category || "سایر") !== filterCat) return false;
      if (q && !item.name.toLowerCase().includes(q)) return false;
      return true;
    });
  }, [inventory, filterCat, search]);

  const inventoryPrintRows = useMemo(() => filtered.map((item) => ({
    name: item.name,
    category: item.category || "سایر",
    unit: item.unit,
    quantity: fmt(item.quantity || 0),
    allocated: fmt(inventoryAllocated(item)),
    available: fmt(inventoryAvailable(item)),
  })), [filtered]);

  function submitAdd() {
    if (!newName.trim()) return;
    onAddItem({
      name: newName.trim(),
      unit: newUnit.trim() || "عدد",
      category: newCategory.trim() || "سایر",
      itemType: newType.trim(),
      itemVariant: newVariant.trim(),
    });
    setNewName(""); setNewUnit(""); setNewCategory("سایر"); setNewType(""); setNewVariant(""); setShowAdd(false);
  }

  function commitQty(item) {
    const val = editQty[item.id];
    if (val === undefined || val === "") return;
    onSetQuantity(item.id, val);
    setEditQty((prev) => { const n = { ...prev }; delete n[item.id]; return n; });
  }

  function commitSpec(item) {
    const spec = editSpec[item.id];
    const itemType = (spec?.itemType ?? item.itemType ?? "").trim();
    const itemVariant = (spec?.itemVariant ?? item.itemVariant ?? "").trim();
    if (itemType === (item.itemType || "") && itemVariant === (item.itemVariant || "")) return;
    onPatchItem(item.id, { itemType, itemVariant });
    setEditSpec((prev) => { const n = { ...prev }; delete n[item.id]; return n; });
  }

  function submitAllocate() {
    if (!allocateItem) return;
    onAllocate(allocateItem.id, { activity: allocActivity, quantity: allocQty });
    setAllocateItem(null); setAllocActivity(""); setAllocQty("");
  }

  return (
    <div className="px-5 pt-5 pb-10">
      <div className="flex items-center gap-3 mb-4">
        <button onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>
        <div className="font-bold text-lg flex-1">انبارگردانی و موجودی مصالح</div>
        <PrintExportButton
          company={company}
          title="لیست موجودی انبار"
          subtitle=""
          columns={[
            { key: "name", label: "مصالح" },
            { key: "category", label: "دسته" },
            { key: "unit", label: "واحد" },
            { key: "quantity", label: "موجودی کل" },

function EnergyScreen({ company, onBack, projects }) {
  const [projectId, setProjectId] = useState(() => projects[0]?.id || "");

  useEffect(() => {
    if (!projects.length) {
      setProjectId("");
      return;
    }
    setProjectId((prev) => {
      const prevStr = String(prev || "");
      if (prevStr && projects.some((p) => String(p.id) === prevStr)) return prev;
      return projects[0].id;

  const project = useMemo(
    () => projects.find((p) => String(p.id) === String(projectId)) ?? null,

function PlanScreen({ onBack, userPlan, planExpiresAt, onRedeemed }) {
  const effective = getEffectivePlan(userPlan, planExpiresAt);
  const [code, setCode] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);

  const rows = METRICO_PLAN_ORDER.map((id) => METRICO_PLANS[id]);

  async function redeem() {
    if (!code.trim()) return;
    setBusy(true);
    setMsg(null);
    try {
      const { data, error: err } = await window.sb.rpc("redeem_plan_code", { code_input: code.trim() });
      if (err) setMsg({ type: "err", text: "خطا: " + err.message });
      else if (data === true) {

function ActivationGate({ onActivated, onLogout }) {

  const [busy, setBusy] = useState(false);

    e.preventDefault();

      const { data, error: err } = await window.sb.rpc("activate_with_code", { code_input: code.trim() });
      if (err) {
        setError("خطا: " + err.message);

        onActivated();
      } else {
        setError("کد نامعتبر است یا قبلاً استفاده شده.");

    } catch (e2) {
      setError("خطایی رخ داد. دوباره امتحان کن.");

        backgroundImage: "linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)",

      }} />

function LoginScreen({ onSuccess }) {
  const [mode, setMode] = useState("login"); // login | signup | reset
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [pw2, setPw2] = useState("");
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");
  const [busy, setBusy] = useState(false);
  const [shake, setShake] = useState(false);

  function fail(msg) {
    setError(msg);
    setShake(true);
    setTimeout(() => setShake(false), 400);
  }

  function friendlyError(e) {
    const msg = e.message || "";
    if (msg.includes("Invalid login credentials")) return "ایمیل یا رمز عبور اشتباه است.";
    if (msg.includes("User already registered")) return "این ایمیل قبلاً ثبت شده است.";
    if (msg.toLowerCase().includes("password should be at least")) return "رمز عبور باید حداقل ۶ کاراکتر باشد.";
    if (msg.includes("Unable to validate email") || msg.includes("invalid")) return "ایمیل معتبر نیست.";
    if (msg.includes("Email not confirmed")) return "ایمیل هنوز تأیید نشده. لینک تأیید ارسال‌شده به ایمیلت را باز کن.";
    if (msg.includes("rate limit") || msg.includes("Too many")) return "تلاش‌های زیاد ناموفق. کمی صبر کن و دوباره امتحان کن.";
    if (msg.includes("Failed to fetch") || msg.includes("network")) return "خطای اتصال به اینترنت.";
    return msg || "خطایی رخ داد.";
  }

  async function handleSubmit(e) {
    e.preventDefault();
    setError(""); setInfo("");
    if (!email.trim()) { fail("ایمیل را وارد کن."); return; }

    if (mode === "reset") {
      setBusy(true);
      const { error: err } = await window.sb.auth.resetPasswordForEmail(email.trim());
      if (err) fail(friendlyError(err));
      else setInfo("لینک بازیابی رمز به ایمیلت ارسال شد.");
      setBusy(false);
      return;
    }

    if (!pw) { fail("رمز عبور را وارد کن."); return; }
    if (mode === "signup" && pw !== pw2) { fail("رمز عبور و تکرار آن یکسان نیستند."); return; }

    setBusy(true);
    if (mode === "signup") {
      const { data, error: err } = await window.sb.auth.signUp({ email: email.trim(), password: pw });
      if (err) { fail(friendlyError(err)); setBusy(false); return; }
      if (data.session) {
        onSuccess();
      } else {
        setInfo("حساب ساخته شد. لینک تأیید به ایمیلت ارسال شد؛ بعد از تأیید، وارد شو.");
        setMode("login");
      }
    } else {
      const { error: err } = await window.sb.auth.signInWithPassword({ email: email.trim(), password: pw });
      if (err) { fail(friendlyError(err)); setBusy(false); return; }
      onSuccess();
    }
    setBusy(false);
  }

  return (
    <div dir="rtl" className="min-h-screen flex items-center justify-center px-6 relative overflow-hidden" style={{ background: "#14213D" }}>
      <Watermark />
      <div className="absolute inset-0 opacity-[0.06]" style={{
        backgroundImage: "linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)",
        backgroundSize: "26px 26px",
      }} />
      <style>{`
        @keyframes shakeX { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-8px)} 40%,60%{transform:translateX(8px)} }
        .shake-anim { animation: shakeX 0.4s; }
      `}</style>

      <div className={`relative w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8 ${shake ? "shake-anim" : ""}`}>
        <div className="flex flex-col items-center mb-7">
          <div className="w-16 h-16 rounded-2xl flex items-center justify-center mb-3" style={{ background: "#14213D" }}>
            <Building2 size={28} className="text-[#C9A227]" />
          </div>
          <div className="font-extrabold text-lg text-[#14213D]">{APP_NAME}</div>
          <div className="text-[11px] text-[#9CA3AF] font-medium -mt-0.5">مدیریت پروژه‌های ساختمانی</div>
          <div className="text-xs text-[#9CA3AF] mt-1">
            {mode === "login" && "برای ورود، ایمیل و رمز عبور را وارد کن"}
            {mode === "signup" && "ساخت حساب جدید"}
            {mode === "reset" && "بازیابی رمز عبور"}
          </div>
        </div>

        <form onSubmit={handleSubmit} className="flex flex-col gap-4">
          <div>
            <label className="text-xs text-[#6B7280] font-medium">ایمیل</label>
            <input
              type="email"
              value={email}
              onChange={(e) => { setEmail(e.target.value); setError(""); }}
              className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#14213D]"
              placeholder="you@example.com"
              autoCapitalize="none"
              dir="ltr"
            />
          </div>

          {mode !== "reset" && (
            <div>
              <label className="text-xs text-[#6B7280] font-medium">رمز عبور</label>
              <input
                type="password"
                value={pw}
                onChange={(e) => { setPw(e.target.value); setError(""); }}
                className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#14213D]"
                placeholder="رمز عبور"
                dir="ltr"
              />
            </div>
          )}

          {mode === "signup" && (
            <div>
              <label className="text-xs text-[#6B7280] font-medium">تکرار رمز عبور</label>
              <input
                type="password"
                value={pw2}
                onChange={(e) => { setPw2(e.target.value); setError(""); }}
                className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-4 py-3 text-sm outline-none focus:border-[#14213D]"
                placeholder="تکرار رمز عبور"
                dir="ltr"
              />
            </div>
          )}

          {error && <div className="text-xs text-[#B91C1C] text-center -mt-1">{error}</div>}
          {info && <div className="text-xs text-[#166534] text-center -mt-1">{info}</div>}

          <button type="submit" disabled={busy} className="w-full bg-[#14213D] text-white font-semibold rounded-xl py-3 text-sm mt-1 disabled:opacity-60" style={{ boxShadow: "0 8px 20px -8px #14213D" }}>
            {busy ? "لطفاً صبر کن..." : mode === "login" ? "ورود" : mode === "signup" ? "ساخت حساب" : "ارسال لینک بازیابی"}
          </button>
        </form>

        <div className="flex items-center justify-between mt-4 text-xs">
          {mode === "login" ? (
            <>
              <button onClick={() => { setMode("reset"); setError(""); setInfo(""); }} className="text-[#6B7280]">رمز را فراموش کرده‌ام</button>
              <button onClick={() => { setMode("signup"); setError(""); setInfo(""); }} className="text-[#14213D] font-semibold">ساخت حساب جدید</button>
            </>
          ) : (
            <button onClick={() => { setMode("login"); setError(""); setInfo(""); }} className="text-[#14213D] font-semibold mx-auto">بازگشت به ورود</button>
          )}
        </div>
      </div>
    </div>
  );
}

function CompanySetup({ initial, onSave, onClose, user, onError }) {
  const [name, setName] = useState(initial?.name || "");
  const [logo, setLogo] = useState(initial?.logo || null);
  const fileRef = useRef(null);
  const [showPwForm, setShowPwForm] = useState(false);
  const [curPw, setCurPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [pwMsg, setPwMsg] = useState("");
  const [pwBusy, setPwBusy] = useState(false);

  async function handlePasswordChange() {
    if (newPw.length < 6) { setPwMsg("رمز جدید باید حداقل ۶ کاراکتر باشد."); return; }
    if (newPw !== confirmPw) { setPwMsg("رمز جدید و تکرار آن یکسان نیستند."); return; }
    setPwBusy(true);
    setPwMsg("");
    try {
      const { error: verifyErr } = await window.sb.auth.signInWithPassword({ email: user.email, password: curPw });
      if (verifyErr) { setPwMsg("رمز فعلی اشتباه است."); setPwBusy(false); return; }
      const { error: err } = await window.sb.auth.updateUser({ password: newPw });
      if (err) throw err;
      setPwMsg("رمز عبور با موفقیت تغییر کرد.");
      setCurPw(""); setNewPw(""); setConfirmPw("");
    } catch (e) {
      setPwMsg("خطا: " + (e.message || "تغییر رمز ناموفق بود."));
    }
    setPwBusy(false);
  }

  async function handleLogo(e) {
    try { sessionStorage.removeItem("metrico_pending_upload"); } catch (e2) {}
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const dataUrl = await resizeImage(file, 300, 0.8);
      setLogo(dataUrl);
    } catch (err) {
      try {
        const dataUrl = await readRawFile(file);
        setLogo(dataUrl);
      } catch (err2) {
        if (onError) onError("بارگذاری لوگو ناموفق بود: " + uploadErrorMessage(err2));
      }
    }
    e.target.value = "";
  }
  function triggerLogoPick() {
    try { sessionStorage.setItem("metrico_pending_upload", String(Date.now())); } catch (e) {}

  }

  const body = (
    <div className="w-full max-w-sm bg-white rounded-2xl p-6 shadow-xl">
      <div className="flex items-center gap-2 text-[#14213D] font-extrabold text-lg mb-1">

      <div className="flex flex-col items-center gap-2 mb-5">
        <button onClick={triggerLogoPick} className="w-20 h-20 rounded-2xl bg-[#F4F6F5] border border-dashed border-black/20 flex items-center justify-center overflow-hidden">
          {logo ? <img src={logo} className="w-full h-full object-cover" alt="لوگو" /> : <Upload size={20} className="text-[#9CA3AF]" />}
        </button>
        <input ref={fileRef} type="file" accept="image/*,application/pdf" className="hidden" onChange={handleLogo} />
        <span className="text-[11px] text-[#9CA3AF]">افزودن لوگو</span>
      </div>

      <label className="text-xs text-[#6B7280] font-medium">نام شرکت</label>
      <input
        value={name}
        onChange={(e) => setName(e.target.value)}
        placeholder="مثلاً گروه ساختمانی سپهر"
        className="w-full mt-1 mb-5 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]"
      />

      {onClose && user && (
        <div className="mb-5 border-t border-black/10 pt-4">
          <div className="text-[11px] text-[#9CA3AF] mb-2">وارد شده با: {user.email}</div>
          <button onClick={() => { setShowPwForm((v) => !v); setPwMsg(""); }} className="text-xs font-semibold text-[#14213D] flex items-center gap-1">
            تغییر رمز عبور {showPwForm ? "▲" : "▼"}
          </button>
          {showPwForm && (
            <div className="flex flex-col gap-2 mt-3">
              <input type="password" value={curPw} onChange={(e) => setCurPw(e.target.value)} placeholder="رمز فعلی"
                className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
              <input type="password" value={newPw} onChange={(e) => setNewPw(e.target.value)} placeholder="رمز جدید (حداقل ۶ کاراکتر)"
                className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
              <input type="password" value={confirmPw} onChange={(e) => setConfirmPw(e.target.value)} placeholder="تکرار رمز جدید"
                className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
              {pwMsg && <div className={`text-xs ${pwMsg.includes("موفقیت") ? "text-[#166534]" : "text-[#B91C1C]"}`}>{pwMsg}</div>}
              <button onClick={handlePasswordChange} disabled={pwBusy} className="bg-[#14213D] text-white rounded-xl py-2.5 text-sm font-semibold disabled:opacity-50">

  if (!onClose) {

      <div dir="rtl" className="min-h-screen bg-[#F4F6F5] flex items-center justify-center px-5">{body}</div>
    );

  return <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] px-5 py-8 overflow-y-auto">{body}</div>;
