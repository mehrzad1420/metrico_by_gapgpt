      <div className="flex gap-2">
        {onClose && <button onClick={onClose} className="flex-1 border border-black/10 rounded-xl py-2.5 text-sm font-medium">لغو</button>}
        <button
          disabled={!name.trim()}
          onClick={() => onSave({ name: name.trim(), logo })}
          className="flex-1 bg-[#14213D] text-white rounded-xl py-2.5 text-sm font-semibold disabled:opacity-40"
        >ذخیره</button>
      </div>
    </div>
  );

  if (!onClose) {
    return (
      <div dir="rtl" className="min-h-screen bg-[#F4F6F5] flex items-center justify-center px-5">{body}</div>
    );
  }
  return <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[60] px-5 py-8 overflow-y-auto">{body}</div>;
}

function NewProjectSheet({ onCancel, onCreate }) {
  const [name, setName] = useState("");
  const [address, setAddress] = useState("");
  const [landArea, setLandArea] = useState("");
  const [totalBuiltArea, setTotalBuiltArea] = useState("");
  const [floors, setFloors] = useState([{ number: 1, count: 3 }]);

  function updateFloor(idx, field, value) {
    setFloors((prev) => prev.map((f, i) => (i === idx ? { ...f, [field]: value } : f)));
  }
  function addFloorRow() {
    const nextNum = floors.length ? Math.max(...floors.map((f) => f.number)) + 1 : 1;
    setFloors((prev) => [...prev, { number: nextNum, count: 3 }]);
  }
  function removeFloorRow(idx) { setFloors((prev) => prev.filter((_, i) => i !== idx)); }
  const canSave = name.trim() && floors.length > 0 && floors.every((f) => f.number && f.count > 0);
  const totalUnits = floors.reduce((s, f) => s + (Number(f.count) || 0), 0);

  return (
    <div className="fixed inset-0 bg-black/40 flex items-end z-[60]">
      <div className="bg-white w-full rounded-t-2xl p-5 max-h-[85vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-4">
          <div className="font-bold text-lg">پروژه جدید</div>
          <button onClick={onCancel}><X size={20} /></button>
        </div>

        <label className="text-xs text-[#6B7280] font-medium">نام پروژه</label>
        <input
          value={name}
          onChange={(e) => setName(e.target.value)}
          placeholder="مثلاً سپهر ۴"
          className="w-full mt-1 mb-4 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]"
        />

        <label className="text-xs text-[#6B7280] font-medium">آدرس پروژه</label>
        <input
          value={address}
          onChange={(e) => setAddress(e.target.value)}
          placeholder="مثلاً خیابان..."
          className="w-full mt-1 mb-4 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]"
        />

        <div className="grid grid-cols-2 gap-3 mb-4">
          <div>
            <label className="text-xs text-[#6B7280] font-medium">متراژ عرصه (متر مربع)</label>
            <input type="number" value={landArea} onChange={(e) => setLandArea(e.target.value)}
              className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
          </div>
          <div>
            <label className="text-xs text-[#6B7280] font-medium">متراژ زیربنای کل</label>
            <input type="number" value={totalBuiltArea} onChange={(e) => setTotalBuiltArea(e.target.value)}
              className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
          </div>
        </div>

        <div className="flex items-center justify-between mb-2">
          <label className="text-xs text-[#6B7280] font-medium">طبقات و تعداد واحد هر طبقه</label>
          <span className="text-xs text-[#9CA3AF]">مجموع: {totalUnits} واحد</span>
        </div>
        <div className="flex flex-col gap-2 mb-2">
          {floors.map((f, idx) => (
            <div key={idx} className="flex items-center gap-2 bg-[#F4F6F5] border border-black/10 rounded-xl p-2.5">
              <div className="flex-1">
                <div className="text-[10px] text-[#9CA3AF] mb-0.5">شماره طبقه</div>
                <input type="number" value={f.number} onChange={(e) => updateFloor(idx, "number", Number(e.target.value))} className="w-full outline-none text-sm font-medium bg-transparent" />
              </div>
              <div className="flex-1">
                <div className="text-[10px] text-[#9CA3AF] mb-0.5">تعداد واحد</div>
                <input type="number" value={f.count} onChange={(e) => updateFloor(idx, "count", Number(e.target.value))} className="w-full outline-none text-sm font-medium bg-transparent" />
              </div>
              <button onClick={() => removeFloorRow(idx)} className="p-2 text-[#B91C1C]"><Trash2 size={16} /></button>
            </div>
          ))}
        </div>
        <button onClick={addFloorRow} className="w-full flex items-center justify-center gap-1 border border-dashed border-black/20 rounded-xl py-2.5 text-sm text-[#6B7280] mb-5">
          <Plus size={15} /> افزودن طبقه
        </button>

        <button
          disabled={!canSave}
          onClick={() => onCreate(name.trim(), floors, { address: address.trim(), landArea, totalBuiltArea })}
          className="w-full bg-[#14213D] text-white font-semibold rounded-xl py-3 text-sm disabled:opacity-40"
        >
          ساخت پروژه
        </button>
      </div>
    </div>
  );
}

function ProjectSettingsSheet({ project, onClose, onRename, onUpdateMeta, onAddFloor, onDeleteFloor, onDelete, onAddDoc, onRemoveDoc, onError }) {
  const [name, setName] = useState(project.name);
  const [address, setAddress] = useState(project.address || "");
  const [landArea, setLandArea] = useState(project.landArea || "");
  const [totalBuiltArea, setTotalBuiltArea] = useState(project.totalBuiltArea || "");
  const [phase, setPhase] = useState(project.phase || "");
  const [lat, setLat] = useState(project.lat || "");
  const [lng, setLng] = useState(project.lng || "");
  const [locMsg, setLocMsg] = useState("");
  const [metaMsg, setMetaMsg] = useState("");
  const [floorCount, setFloorCount] = useState(3);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [confirmFloor, setConfirmFloor] = useState(null);
  const sortedFloors = [...project.floors].sort((a, b) => b.number - a.number);

  function saveMeta() {
    onUpdateMeta({ address: address.trim(), landArea, totalBuiltArea, phase });
    setMetaMsg("ذخیره شد.");
    setTimeout(() => setMetaMsg(""), 1500);
  }

  function useCurrentLocation() {
    if (!navigator.geolocation) { setLocMsg("مرورگر شما موقعیت مکانی را پشتیبانی نمی‌کند."); return; }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setLat(String(pos.coords.latitude.toFixed(6)));
        setLng(String(pos.coords.longitude.toFixed(6)));
      },
      () => setLocMsg("دسترسی به موقعیت مکانی رد شد."),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }
  function saveLocation() {
    onUpdateMeta({ lat, lng });
    setLocMsg("موقعیت ذخیره شد.");
    setTimeout(() => setLocMsg(""), 1500);
  }

  return (
    <div className="fixed inset-0 bg-black/40 flex items-end z-[60]">
      <div className="bg-white w-full rounded-t-2xl p-5 max-h-[85vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-4">
          <div className="font-bold text-lg">تنظیمات پروژه</div>
          <button onClick={onClose}><X size={20} /></button>
        </div>

        <label className="text-xs text-[#6B7280] font-medium">نام پروژه</label>
        <div className="flex gap-2 mt-1 mb-4">
          <input value={name} onChange={(e) => setName(e.target.value)} className="flex-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
          <button onClick={() => onRename(name.trim())} className="bg-[#14213D] text-white px-4 rounded-xl text-sm font-semibold">ذخیره</button>
        </div>

        <label className="text-xs text-[#6B7280] font-medium">آدرس پروژه</label>
        <input value={address} onChange={(e) => setAddress(e.target.value)} className="w-full mt-1 mb-3 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />

        <div className="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label className="text-xs text-[#6B7280] font-medium">متراژ عرصه</label>
            <input type="number" value={landArea} onChange={(e) => setLandArea(e.target.value)} className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
          </div>
          <div>
            <label className="text-xs text-[#6B7280] font-medium">متراژ زیربنای کل</label>
            <input type="number" value={totalBuiltArea} onChange={(e) => setTotalBuiltArea(e.target.value)} className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
          </div>
        </div>

        <label className="text-xs text-[#6B7280] font-medium">مرحله فعلی پروژه</label>
        <select value={phase} onChange={(e) => setPhase(e.target.value)} className="w-full mt-1 mb-3 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none">
          <option value="">مشخص نشده</option>
          {PROJECT_PHASES.map((p, i) => <option key={p} value={p}>{i + 1}. {p}</option>)}
        </select>

        <div className="flex items-center gap-2 mb-5">
          <button onClick={saveMeta} className="bg-[#14213D] text-white px-4 py-2 rounded-xl text-sm font-semibold">ذخیره آدرس، متراژ و مرحله</button>
          {metaMsg && <span className="text-xs text-[#166534]">{metaMsg}</span>}
        </div>

        <div className="mb-5 border-t border-black/10 pt-4">
          <label className="text-xs text-[#6B7280] font-medium">موقعیت جغرافیایی پروژه</label>
          <div className="text-[10px] text-[#9CA3AF] mt-0.5 mb-2">روی نقشه لمس کن تا پین جابه‌جا بشه، یا از دکمه زیر موقعیت فعلی خودت رو بگیر.</div>

          <div className="rounded-xl overflow-hidden border border-black/10 mb-2">
            <LeafletMap
              height={220}
              center={lat && lng ? [Number(lat), Number(lng)] : [35.7, 51.4]}
              zoom={lat && lng ? 14 : 5}
              markers={lat && lng ? [{ lat: Number(lat), lng: Number(lng) }] : []}
              onMapClick={(newLat, newLng) => { setLat(String(newLat.toFixed(6))); setLng(String(newLng.toFixed(6))); }}
            />
          </div>

          <div className="grid grid-cols-2 gap-2 mt-1 mb-2">
            <input value={lat} onChange={(e) => setLat(e.target.value)} placeholder="عرض جغرافیایی (lat)" dir="ltr"
              className="bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-xs outline-none" />
            <input value={lng} onChange={(e) => setLng(e.target.value)} placeholder="طول جغرافیایی (lng)" dir="ltr"
              className="bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-xs outline-none" />
          </div>
          <div className="flex gap-2 mb-2">
            <button onClick={useCurrentLocation} className="flex-1 border border-[#14213D]/20 text-[#14213D] rounded-xl py-2 text-xs font-semibold">دریافت موقعیت فعلی من</button>
            <button onClick={saveLocation} className="flex-1 bg-[#14213D] text-white rounded-xl py-2 text-xs font-semibold">ذخیره موقعیت</button>
          </div>
          {locMsg && <div className="text-xs text-[#166534] mb-2">{locMsg}</div>}
          {lat && lng && (
            <button onClick={() => downloadKML([{ ...project, lat, lng }], `${project.name}.kml`)}
              className="w-full text-center text-xs text-[#14213D] font-semibold bg-[#F4F6F5] rounded-xl py-2">
              دریافت خروجی KML این پروژه
            </button>
          )}
        </div>

        <div className="mb-5 border-t border-black/10 pt-4">
          <DocSection
            title="مدارک پروژه (پروانه ساختمانی و...)"
            icon={<FileText size={14} />}
            docs={project.documents || []}
            onAdd={onAddDoc}
            onRemove={onRemoveDoc}
            onError={onError}
          />
        </div>

        <label className="text-xs text-[#6B7280] font-medium">افزودن طبقه جدید</label>
        <div className="flex gap-2 mt-1 mb-5">
          <input type="number" value={floorCount} onChange={(e) => setFloorCount(Number(e.target.value))} className="w-24 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
          <button onClick={() => onAddFloor(floorCount)} className="flex-1 border border-[#14213D]/20 text-[#14213D] rounded-xl text-sm font-semibold">افزودن طبقه با {floorCount} واحد</button>
        </div>

        <label className="text-xs text-[#6B7280] font-medium">حذف تک طبقه</label>
        <div className="flex flex-col gap-2 mt-1 mb-5">
          {sortedFloors.map((f) => (
            <div key={f.number} className="flex items-center justify-between bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5">
              <span className="text-sm">طبقه {f.number} — {f.count} واحد</span>
              {confirmFloor === f.number ? (
                <div className="flex gap-1.5">
                  <button onClick={() => setConfirmFloor(null)} className="text-xs bg-white border border-black/10 rounded-lg px-2 py-1">لغو</button>
                  <button onClick={() => { onDeleteFloor(f.number); setConfirmFloor(null); }} className="text-xs bg-[#B91C1C] text-white rounded-lg px-2 py-1">حذف قطعی</button>
                </div>
              ) : (
                <button onClick={() => setConfirmFloor(f.number)} className="text-[#B91C1C] p-1"><Trash2 size={15} /></button>
              )}
            </div>
          ))}
        </div>

        {!confirmDelete ? (
          <button onClick={() => setConfirmDelete(true)} className="w-full flex items-center justify-center gap-2 text-[#B91C1C] border border-[#B91C1C]/30 rounded-xl py-2.5 text-sm font-semibold">
            <Trash2 size={15} /> حذف این پروژه
          </button>
        ) : (
          <div className="bg-red-50 rounded-xl p-3">
            <div className="text-xs text-[#B91C1C] mb-2">مطمئنی؟ این پروژه و همه واحدهایش برای همیشه حذف می‌شود.</div>
            <div className="flex gap-2">
              <button onClick={() => setConfirmDelete(false)} className="flex-1 bg-white border border-black/10 rounded-lg py-2 text-xs font-medium">لغو</button>
              <button onClick={onDelete} className="flex-1 bg-[#B91C1C] text-white rounded-lg py-2 text-xs font-medium">حذف قطعی</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function ProjectPanel({ project, onOpenUnit, onOpenSettings, onOpenExpenses, onPrint, onFinancialReport, onBackToDashboard, onRemoveNote }) {
  const [showNotes, setShowNotes] = useState(false);
  const byFloor = useMemo(() => {
    const map = {};
    project.units.forEach((u) => { map[u.floor] = map[u.floor] || []; map[u.floor].push(u); });
    return Object.entries(map)
      .map(([floor, units]) => ({ floor: Number(floor), units: units.sort((a, b) => Number(a.unitNumber) - Number(b.unitNumber)) }))
      .sort((a, b) => b.floor - a.floor);
  }, [project]);

  const revenue = revenueOf(project);
  const expenses = expensesTotalOf(project);
  const profit = revenue - expenses;
  const soldCount = project.units.filter((u) => u.status === "sold").length;
  const notes = project.quickNotes || [];

  return (
    <div className="px-4 pt-4">
      <button onClick={onBackToDashboard} className="flex items-center gap-1 text-xs text-[#6B7280] mb-3">
        <ChevronLeft size={14} className="rotate-180" /> داشبورد
      </button>

      <div className="text-xl font-extrabold text-[#14213D] mb-1">{project.name}</div>
      {project.phase && (
        <div className="inline-block text-[11px] font-semibold text-[#14213D] bg-[#F4F6F5] border border-black/10 px-2.5 py-1 rounded-full mb-2">
          مرحله فعلی: {project.phase}
        </div>
      )}
      <div className="text-sm text-[#6B7280] mb-2">{project.units.length} واحد · {project.floors.length} طبقه</div>

      {notes.length > 0 && (
        <button onClick={() => setShowNotes((v) => !v)} className="w-full flex items-center gap-2 bg-amber-50 border border-amber-200 text-amber-900 text-xs rounded-xl px-3 py-2 mb-3">
          <Bell size={14} />
          <span className="flex-1 text-right">{notes.length} یادداشت برای این پروژه</span>
          <ChevronLeft size={13} className={showNotes ? "rotate-90" : "rotate-180"} />
        </button>
      )}
      {showNotes && notes.length > 0 && (
        <div className="flex flex-col gap-2 mb-3">
          {notes.slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || "")).map((n) => (
            <div key={n.id} className="bg-white border border-black/10 rounded-xl p-3 flex items-start justify-between gap-2">
              <div className="text-xs text-[#374151]">{n.text}</div>
              <button onClick={() => onRemoveNote(n.id)} className="text-[#B91C1C] flex-shrink-0"><Trash2 size={13} /></button>
            </div>
          ))}
        </div>
      )}

      <div className="flex gap-2 flex-wrap mb-3">
        <button onClick={onPrint} className="flex items-center gap-1 text-xs text-[#6B7280] bg-white border border-black/10 rounded-lg px-2.5 py-1.5">
          <Printer size={13} /> PDF
        </button>
        <button onClick={onFinancialReport} className="flex items-center gap-1 text-xs text-[#6B7280] bg-white border border-black/10 rounded-lg px-2.5 py-1.5">
          <Wallet size={13} /> گزارش مالی
        </button>
        <button onClick={onOpenSettings} className="flex items-center gap-1 text-xs text-[#6B7280] bg-white border border-black/10 rounded-lg px-2.5 py-1.5">
          <Settings size={13} /> تنظیمات پروژه
        </button>
      </div>

      <div className="bg-white rounded-2xl border border-black/10 p-3 flex flex-col gap-1.5 shadow-sm">
        {byFloor.map(({ floor, units }) => (
          <div key={floor} className="flex items-stretch gap-1.5">
            <div className="w-7 flex-shrink-0 flex items-center justify-center text-[10px] font-bold text-[#9CA3AF]">{floor}</div>
            <div className="flex-1 grid gap-1.5" style={{ gridTemplateColumns: `repeat(${units.length}, minmax(0,1fr))` }}>
              {units.map((u) => {
                const s = STATUS[u.status];
                return (
                  <button
                    key={u.id}
                    onClick={() => onOpenUnit(u.id)}
                    className="rounded-lg py-2 px-1 flex flex-col items-center justify-center border min-h-[46px]"
                    style={{ background: s.bg, borderColor: s.color + "55" }}
                  >
                    <span className="text-[11px] font-bold leading-tight" style={{ color: s.text }}>{u.unitNumber}</span>
                    <span className="text-[9px] leading-tight mt-0.5 text-center" style={{ color: s.text }}>
                      {u.status === "sold" ? (u.buyerName || "بدون نام") : s.label}
                    </span>
                    <span className="text-[8px] leading-tight mt-0.5 text-center opacity-80" style={{ color: s.text }}>
                      {u.area ? `${u.area} m²` : ""}{u.area && u.direction && u.direction !== "none" ? " · " : ""}{u.direction && u.direction !== "none" ? DIRECTIONS[u.direction] : ""}
                    </span>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      <div className="flex gap-2 mt-3 text-[11px]">
        <span className="px-2.5 py-1 rounded-full" style={{ background: STATUS.sold.bg, color: STATUS.sold.text }}>فروخته‌شده</span>
        <span className="px-2.5 py-1 rounded-full" style={{ background: STATUS.reserved.bg, color: STATUS.reserved.text }}>رزرو</span>
        <span className="px-2.5 py-1 rounded-full" style={{ background: STATUS.vacant.bg, color: STATUS.vacant.text }}>خالی</span>
      </div>

      <div className="mt-4 bg-[#14213D] text-white rounded-2xl p-4 flex items-center justify-between">
        <div>
          <div className="text-[11px] text-white/60">مجموع درآمد حاصل از فروش ({soldCount} واحد)</div>
          <div className="text-lg font-extrabold mt-0.5">{fmt(revenue)} تومان</div>
        </div>
        <Wallet size={22} className="text-[#C9A227]" />
      </div>

      <button onClick={onOpenExpenses} className="w-full mt-3 flex items-center justify-between bg-white rounded-2xl border border-black/10 p-4">
        <div>
          <div className="text-[11px] text-[#6B7280]">هزینه‌های پروژه ({(project.expenses || []).length} مورد)</div>
          <div className="text-base font-bold mt-0.5 text-[#B91C1C]">{fmt(expenses)} تومان</div>
        </div>
        <span className="text-xs text-[#14213D] font-semibold flex items-center gap-1">مدیریت <ChevronLeft size={13} className="rotate-180" /></span>
      </button>

      <div className={`mt-3 rounded-2xl p-4 flex items-center justify-between ${profit >= 0 ? "bg-green-50" : "bg-red-50"}`}>
        <div>
          <div className="text-[11px] text-[#6B7280]">{profit >= 0 ? "سود پروژه (تا این لحظه)" : "زیان پروژه (تا این لحظه)"}</div>
          <div className={`text-lg font-extrabold mt-0.5 ${profit >= 0 ? "text-[#166534]" : "text-[#B91C1C]"}`}>{fmt(Math.abs(profit))} تومان</div>
        </div>
        <DonutChart
          data={[{ value: expenses, color: "#EF4444", label: "هزینه" }, { value: Math.max(profit, 0), color: "#22C55E", label: "سود" }]}
          size={72} centerLabel="سود خالص" centerValue={fmt(Math.abs(profit))} dark={false}
        />
      </div>
    </div>
  );
}

const CONTACT_ROLES = { buyer: "خریدار", contractor: "پیمانکار", supplier: "تأمین‌کننده", other: "سایر" };
const PAYMENT_METHODS = { cash: "نقدی", check: "چک", credit: "نسیه" };

function ExpensesSheet({ project, onClose, onAdd, onRemove, contacts, onAddContact, contactBalance }) {
  const [title, setTitle] = useState("");
  const [amount, setAmount] = useState("");
  const [date, setDate] = useState("");
  const [paymentMethod, setPaymentMethod] = useState("cash");
  const [contactId, setContactId] = useState("");
  const [newContactName, setNewContactName] = useState("");
  const [showNewContact, setShowNewContact] = useState(false);
  const expenses = (project.expenses || []).slice().sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  const total = expensesTotalOf(project);
  const selectedContact = contacts.find((c) => c.id === contactId);
  const balance = selectedContact ? contactBalance(selectedContact.id) : 0;

  function submit() {
    if (!title.trim() || !amount) return;
    onAdd({ title: title.trim(), amount: Number(amount), date, paymentMethod, contactId: contactId || null });
    setTitle(""); setAmount(""); setDate("");
  }

  function confirmNewContact() {
    if (!newContactName.trim()) return;
    const c = onAddContact({ name: newContactName.trim(), phone: "" });
    setContactId(c.id);
    setNewContactName("");
    setShowNewContact(false);
  }

  return (
    <div className="fixed inset-0 bg-black/40 flex items-end z-[60]">
      <div className="bg-white w-full rounded-t-2xl p-5 max-h-[88vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-1">
          <div className="font-bold text-lg">هزینه‌های پروژه</div>
          <button onClick={onClose}><X size={20} /></button>
        </div>
        <div className="text-xs text-[#6B7280] mb-4">{project.name}</div>

        <div className="bg-[#F4F6F5] rounded-xl p-3 flex flex-col gap-2 mb-4">
          <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="عنوان هزینه (مثلاً خرید سیمان)"
            className="w-full bg-white border border-black/10 rounded-lg px-3 py-2.5 text-sm outline-none" />
          <div className="flex gap-2">
            <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="مبلغ (تومان)"
              className="flex-1 bg-white border border-black/10 rounded-lg px-3 py-2.5 text-sm outline-none" />
            <input type="date" value={date} onChange={(e) => setDate(e.target.value)}
              className="flex-1 bg-white border border-black/10 rounded-lg px-3 py-2.5 text-sm outline-none" />
          </div>

          <div className="flex gap-2">
            {Object.entries(PAYMENT_METHODS).map(([key, label]) => (
              <button key={key} onClick={() => setPaymentMethod(key)}
                className="flex-1 rounded-lg py-2 text-xs font-semibold border"
                style={{ background: paymentMethod === key ? "#14213D" : "#fff", color: paymentMethod === key ? "#fff" : "#4B5563", borderColor: paymentMethod === key ? "#14213D" : "#00000020" }}>
                {label}
              </button>
            ))}
          </div>

          {!showNewContact ? (
            <div className="flex gap-2">
              <select value={contactId} onChange={(e) => setContactId(e.target.value)}
                className="flex-1 bg-white border border-black/10 rounded-lg px-3 py-2.5 text-sm outline-none">
                <option value="">بدون مخاطب</option>
                {contacts.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
              <button onClick={() => setShowNewContact(true)} className="text-xs text-[#14213D] font-semibold border border-[#14213D]/20 rounded-lg px-3">+ جدید</button>
            </div>
          ) : (
            <div className="flex gap-2">
              <input value={newContactName} onChange={(e) => setNewContactName(e.target.value)} placeholder="نام مخاطب جدید"
                className="flex-1 bg-white border border-black/10 rounded-lg px-3 py-2.5 text-sm outline-none" />
              <button onClick={confirmNewContact} className="text-xs bg-[#14213D] text-white rounded-lg px-3">ثبت</button>
              <button onClick={() => setShowNewContact(false)} className="text-xs border border-black/10 rounded-lg px-3">لغو</button>
            </div>
          )}

          {selectedContact && (
            <div className={`text-xs rounded-lg p-2 ${balance > 0 ? "bg-red-50 text-[#B91C1C]" : balance < 0 ? "bg-green-50 text-[#166534]" : "bg-[#F4F6F5] text-[#6B7280]"}`}>
              {balance > 0 && `ما ${fmt(balance)} تومان به ${selectedContact.name} بدهکاریم`}
              {balance < 0 && `${selectedContact.name} ${fmt(Math.abs(balance))} تومان به ما بدهکار است`}
              {balance === 0 && "حساب تسویه است"}
            </div>
          )}

          <button onClick={submit} disabled={!title.trim() || !amount} className="bg-[#14213D] text-white rounded-lg py-2.5 text-sm font-semibold disabled:opacity-40">
            افزودن هزینه
          </button>
        </div>

        <div className="flex flex-col gap-2 mb-3">
          {expenses.length === 0 && <div className="text-xs text-[#9CA3AF] text-center py-3">هزینه‌ای ثبت نشده</div>}
          {expenses.map((e) => (
            <div key={e.id} className="flex items-center justify-between bg-white border border-black/10 rounded-xl p-3">
              <div>
                <div className="text-sm font-medium">{e.title}</div>
                <div className="text-[11px] text-[#9CA3AF] mt-0.5">
                  {e.date || "بدون تاریخ"} · {PAYMENT_METHODS[e.paymentMethod] || "نقدی"}
                  {e.contactId && contacts.find((c) => c.id === e.contactId) ? ` · ${contacts.find((c) => c.id === e.contactId).name}` : ""}
                </div>
              </div>
              <div className="flex items-center gap-2">
                <span className="text-sm font-bold text-[#B91C1C]">{fmt(e.amount)}</span>
                <button onClick={() => onRemove(e.id)} className="text-[#B91C1C] p-1"><Trash2 size={14} /></button>
              </div>
            </div>
          ))}
        </div>

        <div className="bg-[#14213D] text-white rounded-xl p-3 flex items-center justify-between">
          <span className="text-sm">مجموع هزینه‌ها</span>
          <span className="font-bold">{fmt(total)} تومان</span>
        </div>
      </div>
    </div>
  );
}

function DashboardScreen({ projects, onOpenProject, onNewProject }) {
  const totals = useMemo(() => {
    let units = 0, sold = 0, vacant = 0, reserved = 0, revenue = 0, expenses = 0;
    projects.forEach((p) => {
      units += p.units.length;
      sold += p.units.filter((u) => u.status === "sold").length;
      vacant += p.units.filter((u) => u.status === "vacant").length;
      reserved += p.units.filter((u) => u.status === "reserved").length;
      revenue += revenueOf(p);
      expenses += expensesTotalOf(p);
    });
    return { units, sold, vacant, reserved, revenue, expenses, profit: revenue - expenses };
  }, [projects]);

  return (
    <div className="px-4 pt-4 pb-6">
      <div className="mb-4">
        <div className="font-extrabold text-lg">داشبورد</div>
        <div className="text-xs text-[#6B7280] mt-0.5">{projects.length} پروژه فعال</div>
      </div>

      {projects.length > 0 && (
        <div className="bg-[#14213D] rounded-2xl p-4 text-white flex items-center gap-4 mb-5">
          <DonutChart
            data={[{ value: totals.expenses, color: "#EF4444", label: "هزینه" }, { value: Math.max(totals.profit, 0), color: "#22C55E", label: "سود" }]}
            size={92} centerLabel="سود خالص" centerValue={fmt(Math.abs(totals.profit))} dark={true}
          />
          <div className="flex-1">
            <div className="flex justify-between text-xs mb-1"><span className="text-white/60">درآمد کل</span><span className="font-semibold">{fmt(totals.revenue)}</span></div>
            <div className="flex justify-between text-xs mb-1"><span className="text-white/60">هزینه کل</span><span className="font-semibold text-[#FCA5A5]">{fmt(totals.expenses)}</span></div>
            <div className="flex justify-between text-xs"><span className="text-white/60">{totals.profit >= 0 ? "سود کل" : "زیان کل"}</span><span className={`font-bold ${totals.profit >= 0 ? "text-[#86EFAC]" : "text-[#FCA5A5]"}`}>{fmt(Math.abs(totals.profit))}</span></div>
          </div>
        </div>
      )}

      {projects.length === 0 ? (
        <div className="text-center text-[#6B7280] mt-16 text-sm px-8">
          هنوز پروژه‌ای اضافه نشده.
          <button onClick={onNewProject} className="block mx-auto mt-4 bg-[#14213D] text-white rounded-xl px-5 py-2.5 text-sm font-semibold">
            ساخت اولین پروژه
          </button>
        </div>
      ) : (
        <div className="flex flex-col gap-3">
          {projects.map((p) => {
            const sold = p.units.filter((u) => u.status === "sold").length;
            const vacant = p.units.filter((u) => u.status === "vacant").length;
            const reserved = p.units.filter((u) => u.status === "reserved").length;
            const revenue = revenueOf(p);
            const expenses = expensesTotalOf(p);
            const profit = revenue - expenses;
            return (
              <button key={p.id} onClick={() => onOpenProject(p.id)} className="bg-white rounded-2xl border border-black/10 p-4 text-right shadow-sm">
                <div className="flex items-center justify-between mb-3">
                  <div className="font-bold text-[#14213D]">{p.name}</div>
                  <ChevronLeft size={16} className="rotate-180 text-[#9CA3AF]" />
                </div>
                <div className="flex items-center gap-4">
                  <DonutChart
                    data={[{ value: expenses, color: "#EF4444", label: "هزینه" }, { value: Math.max(profit, 0), color: "#22C55E", label: "سود" }]}
                    size={72} centerLabel="سود" centerValue={fmt(Math.abs(profit))} dark={false}
                  />
                  <div className="flex-1">
                    <div className="flex gap-1.5 mb-2 text-[10px] flex-wrap">
                      <span className="px-2 py-0.5 rounded-full" style={{ background: STATUS.sold.bg, color: STATUS.sold.text }}>{sold} فروخته</span>
                      <span className="px-2 py-0.5 rounded-full" style={{ background: STATUS.reserved.bg, color: STATUS.reserved.text }}>{reserved} رزرو</span>
                      <span className="px-2 py-0.5 rounded-full" style={{ background: STATUS.vacant.bg, color: STATUS.vacant.text }}>{vacant} خالی</span>
                    </div>
                    <div className="text-[11px] text-[#6B7280]">درآمد: <span className="font-semibold text-[#14213D]">{fmt(revenue)}</span></div>
                    <div className="text-[11px] text-[#6B7280]">هزینه: <span className="font-semibold text-[#B91C1C]">{fmt(expenses)}</span></div>
                    <div className="text-[11px] text-[#6B7280]">{profit >= 0 ? "سود" : "زیان"}: <span className={`font-bold ${profit >= 0 ? "text-[#166534]" : "text-[#B91C1C]"}`}>{fmt(Math.abs(profit))}</span></div>
                  </div>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

function DocSection({ title, icon, docs, onAdd, onRemove, onError }) {
  const [previewId, setPreviewId] = useState(null);
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);

  function triggerPick() {
    try { sessionStorage.setItem("metrico_pending_upload", String(Date.now())); } catch (e) {}
    fileRef.current.click();
  }

  async function handleFile(e) {
    try { sessionStorage.removeItem("metrico_pending_upload"); } catch (e) {}
    const file = e.target.files?.[0];
    if (!file) return;
    setBusy(true);
    if (file.type && !file.type.startsWith("image/")) {
      try {
        const dataUrl = await readRawFile(file);
        onAdd(file.name, dataUrl);
      } catch (err) {
        if (onError) onError("بارگذاری فایل ناموفق بود: " + uploadErrorMessage(err));
      }
      setBusy(false);
      e.target.value = "";
      return;
    }
    try {
      const dataUrl = await resizeImage(file, 1200, 0.7);
      onAdd(file.name, dataUrl);
    } catch (err) {
      try {
        const dataUrl = await readRawFile(file);
        onAdd(file.name, dataUrl);
      } catch (err2) {
        if (onError) onError("بارگذاری عکس ناموفق بود: " + uploadErrorMessage(err2));
      }
    }
    setBusy(false);
    e.target.value = "";
  }
  const preview = docs.find((d) => d.id === previewId);

  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <div className="text-xs font-semibold text-[#6B7280] flex items-center gap-1">{icon}{title}</div>
        <button onClick={triggerPick} disabled={busy} className="text-xs text-[#14213D] font-semibold flex items-center gap-1 disabled:opacity-50">
          <Upload size={13} /> {busy ? "در حال پردازش..." : "بارگذاری"}
        </button>
        <input ref={fileRef} type="file" accept="image/*,application/pdf" className="hidden" onChange={handleFile} />
      </div>
      {docs.length === 0 ? (
        <div className="text-xs text-[#9CA3AF] text-center py-2">فایلی بارگذاری نشده</div>
      ) : (
        <div className="flex gap-2 flex-wrap">
          {docs.map((d) => {
            const isPdf = (d.dataUrl || "").startsWith("data:application/pdf");
            return (
              <div key={d.id} className="relative w-16 h-16 rounded-lg overflow-hidden border border-black/10">
                {isPdf ? (
                  <button onClick={() => window.open(d.dataUrl, "_blank")} className="w-full h-full bg-[#F4F6F5] flex flex-col items-center justify-center gap-1">
                    <FileText size={20} className="text-[#B91C1C]" />
                    <span className="text-[8px] text-[#6B7280] px-1 truncate w-full text-center">{d.name}</span>
                  </button>
                ) : (
                  <img src={d.dataUrl} className="w-full h-full object-cover cursor-pointer" onClick={() => setPreviewId(d.id)} alt={d.name} />
                )}
                <button onClick={() => onRemove(d.id)} className="absolute top-0.5 left-0.5 bg-black/60 rounded-full p-0.5">
                  <X size={10} className="text-white" />
                </button>
              </div>
            );
          })}
        </div>
      )}
      {preview && (
        <div className="fixed inset-0 bg-black/80 z-[80] flex items-center justify-center p-6" onClick={() => setPreviewId(null)}>
          <img src={preview.dataUrl} className="max-w-full max-h-full rounded-lg" alt={preview.name} />
        </div>
      )}
    </div>
  );
}

function UnitModal({ unit, onClose, onChange, onReport, onError, contacts, onAddContact }) {
  const s = STATUS[unit.status];
  const total = totalPriceOf(unit);
  const paid = paidOf(unit);
  const remaining = remainingOf(unit);
  const [showNewBuyerContact, setShowNewBuyerContact] = useState(false);
  const [newBuyerName, setNewBuyerName] = useState("");
  const [newBuyerPhone, setNewBuyerPhone] = useState("");

  function set(field, value) { onChange((u) => ({ ...u, [field]: value })); }

  function selectBuyerContact(contactId) {
    if (!contactId) { set("buyerContactId", null); return; }
    const c = (contacts || []).find((x) => x.id === contactId);
    onChange((u) => ({ ...u, buyerContactId: contactId, buyerName: c ? c.name : u.buyerName, buyerPhone: c ? (c.phone || "") : u.buyerPhone }));
  }

  function confirmNewBuyerContact() {
    if (!newBuyerName.trim()) return;
    const c = onAddContact({ name: newBuyerName.trim(), phone: newBuyerPhone.trim(), role: "buyer" });
    selectBuyerContact(c.id);
    setNewBuyerName(""); setNewBuyerPhone(""); setShowNewBuyerContact(false);
  }

  function addInstallment() {
    onChange((u) => ({ ...u, installments: [...(u.installments || []), { id: uid(), date: "", amount: "", paid: false }] }));
  }
  function updateInstallment(id, field, value) {
    onChange((u) => ({ ...u, installments: u.installments.map((i) => (i.id === id ? { ...i, [field]: value } : i)) }));
  }
  function removeInstallment(id) {
    onChange((u) => ({ ...u, installments: u.installments.filter((i) => i.id !== id) }));
  }
  function addDoc(kind, name, dataUrl) {
    onChange((u) => ({ ...u, [kind]: [...(u[kind] || []), { id: uid(), name, dataUrl }] }));
  }
  function removeDoc(kind, id) {
    onChange((u) => ({ ...u, [kind]: u[kind].filter((d) => d.id !== id) }));
  }

  return (
    <div className="fixed inset-0 bg-black/50 z-[65] flex items-end sm:items-center sm:justify-center" onClick={onClose}>
      <div className="bg-[#F4F6F5] w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[92vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="sticky top-0 bg-white border-b border-black/5 px-5 py-4 flex items-center gap-3 z-10">
          <button onClick={onClose} className="p-1"><ChevronLeft size={20} /></button>
          <div className="flex-1">
            <div className="font-bold">واحد {unit.unitNumber}</div>
            <div className="text-[11px] text-[#6B7280]">طبقه {unit.floor}</div>
          </div>
          <span className="text-xs px-2.5 py-1 rounded-full font-semibold" style={{ background: s.bg, color: s.text }}>{s.label}</span>
          <button onClick={onReport} className="p-1 text-[#14213D]" title="گزارش PDF این واحد"><Printer size={18} /></button>
          <button onClick={onClose} className="p-1 text-[#9CA3AF]"><X size={18} /></button>
        </div>

        <div className="p-5 flex flex-col gap-5">
          <div className="flex gap-2">
            {Object.entries(STATUS).map(([key, val]) => (
              <button
                key={key}
                onClick={() => set("status", key)}
                className="flex-1 rounded-xl py-2 text-xs font-semibold border"
                style={{ background: unit.status === key ? val.color : "#fff", color: unit.status === key ? "#fff" : val.text, borderColor: val.color + "50" }}
              >{val.label}</button>
            ))}
          </div>

          <div className="grid grid-cols-2 gap-3">
            <Field label="متراژ (متر مربع)" value={unit.area} onChange={(v) => set("area", v)} type="number" />
            <Field label="قیمت هر متر مربع (تومان)" value={unit.pricePerMeter} onChange={(v) => set("pricePerMeter", v)} type="number" />
          </div>

          <div>
            <label className="text-xs text-[#6B7280] font-medium">جهت واحد</label>
            <div className="grid grid-cols-3 gap-2 mt-1">
              {Object.entries(DIRECTIONS).map(([key, label]) => (
                <button
                  key={key}
                  onClick={() => set("direction", key)}
                  className="rounded-xl py-2 text-xs font-semibold border"
                  style={{
                    background: unit.direction === key ? "#14213D" : "#fff",
                    color: unit.direction === key ? "#fff" : "#4B5563",
                    borderColor: unit.direction === key ? "#14213D" : "#00000020",
                  }}
                >{label}</button>
              ))}
            </div>
          </div>

          <div className="bg-white rounded-xl p-3 flex items-center justify-between border border-black/5">
            <span className="text-xs text-[#6B7280]">مبلغ کل قرارداد (محاسبه خودکار)</span>
            <span className="font-bold">{fmt(total)} تومان</span>
          </div>

          <div className="grid grid-cols-2 gap-3">
            <Field label="نام خریدار" value={unit.buyerName} onChange={(v) => set("buyerName", v)} icon={<Pencil size={13} />} />
            <Field label="تلفن خریدار" value={unit.buyerPhone} onChange={(v) => set("buyerPhone", v)} icon={<Phone size={13} />} />
          </div>
          <Field label="کد پستی واحد" value={unit.postalCode} onChange={(v) => set("postalCode", v)} icon={<MapPin size={13} />} />
          <Field label="پیش‌پرداخت (تومان)" value={unit.downPayment} onChange={(v) => set("downPayment", v)} type="number" icon={<Wallet size={13} />} />

          <div className="grid grid-cols-2 gap-3">
            <div className="bg-white rounded-xl p-3 border border-black/5">
              <div className="text-[11px] text-[#6B7280]">پرداخت‌شده</div>
              <div className="font-bold text-[#166534] mt-0.5">{fmt(paid)}</div>
            </div>
            <div className="bg-white rounded-xl p-3 border border-black/5">
              <div className="text-[11px] text-[#6B7280]">مانده</div>
              <div className="font-bold text-[#B91C1C] mt-0.5">{fmt(remaining)}</div>
            </div>
          </div>

          <div>
            <div className="flex items-center justify-between mb-2">
              <div className="text-xs font-semibold text-[#6B7280] flex items-center gap-1"><CalendarDays size={14} /> جدول اقساط</div>
              <button onClick={addInstallment} className="text-xs text-[#14213D] font-semibold flex items-center gap-1"><Plus size={13} /> قسط جدید</button>
            </div>
            <div className="flex flex-col gap-2">
              {(unit.installments || []).length === 0 && <div className="text-xs text-[#9CA3AF] text-center py-2">قسطی ثبت نشده</div>}
              {(unit.installments || []).map((i) => (
                <div key={i.id} className="bg-white border border-black/10 rounded-xl p-2.5 flex items-center gap-2">
                  <button onClick={() => updateInstallment(i.id, "paid", !i.paid)}>
                    {i.paid ? <CheckCircle2 size={20} /> : <Circle size={20} />}
                  </button>
                  <input type="date" value={i.date} onChange={(e) => updateInstallment(i.id, "date", e.target.value)} className="text-xs outline-none flex-1 min-w-0 bg-transparent" />
                  <input type="number" placeholder="مبلغ" value={i.amount} onChange={(e) => updateInstallment(i.id, "amount", e.target.value)} className="text-xs outline-none w-24 text-left bg-transparent" />
                  <button onClick={() => removeInstallment(i.id)} className="text-[#B91C1C] p-1"><Trash2 size={14} /></button>
                </div>
              ))}
            </div>
          </div>

          <DocSection title="مبایعه‌نامه" icon={<FileText size={14} />} docs={unit.contractDocs || []}
            onAdd={(name, dataUrl) => addDoc("contractDocs", name, dataUrl)} onRemove={(id) => removeDoc("contractDocs", id)} onError={onError} />
          <DocSection title="چک‌های فروش" icon={<Receipt size={14} />} docs={unit.checkDocs || []}
            onAdd={(name, dataUrl) => addDoc("checkDocs", name, dataUrl)} onRemove={(id) => removeDoc("checkDocs", id)} onError={onError} />

          <div>
            <label className="text-xs text-[#6B7280] font-medium">یادداشت</label>
            <textarea value={unit.notes} onChange={(e) => set("notes", e.target.value)} rows={3}
              className="w-full mt-1 bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
          </div>
        </div>
      </div>
    </div>
  );
}

function PrintView({ company, projects }) {
  const grandRevenue = projects.reduce((s, p) => s + p.units.filter((u) => u.status === "sold").reduce((s2, u) => s2 + totalPriceOf(u), 0), 0);
  const td = { border: "1px solid #E5E7EB", padding: "5px 6px" };
  return (
    <div className="print-area" style={{ direction: "rtl", padding: "24px", color: "#14213D" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, borderBottom: "2px solid #14213D", paddingBottom: 12, marginBottom: 16 }}>
        {company?.logo && <img src={company.logo} style={{ width: 44, height: 44, borderRadius: 10, objectFit: "cover" }} alt="" />}
        <div>
          <div style={{ fontWeight: 800, fontSize: 18 }}>{company?.name}</div>
          <div style={{ fontSize: 11, color: "#6B7280" }}>گزارش پروژه‌های ساختمانی — {new Date().toLocaleDateString("en-GB")}</div>
        </div>
      </div>
      {projects.length > 1 && (
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 16 }}>مجموع درآمد کل پروژه‌ها: {fmt(grandRevenue)} تومان</div>
      )}
      {projects.map((project) => {
        const revenue = project.units.filter((u) => u.status === "sold").reduce((s, u) => s + totalPriceOf(u), 0);
        const rows = project.units.slice().sort((a, b) => a.floor - b.floor || a.unitNumber.localeCompare(b.unitNumber));
        return (
          <div key={project.id} style={{ marginBottom: 26, pageBreakInside: "avoid" }}>
            <div style={{ fontWeight: 800, fontSize: 15, margin: "10px 0" }}>{project.name}</div>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
              <thead>
                <tr style={{ background: "#F4F6F5" }}>
                  {["طبقه", "واحد", "وضعیت", "متراژ", "جهت", "خریدار", "تلفن", "کد پستی", "مبلغ کل", "پرداخت‌شده", "مانده"].map((h) => (
                    <th key={h} style={{ ...td, textAlign: "right" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((u) => (
                  <tr key={u.id}>
                    <td style={td}>{u.floor}</td>
                    <td style={td}>{u.unitNumber}</td>
                    <td style={td}>{STATUS[u.status].label}</td>
                    <td style={td}>{u.area || "-"}</td>
                    <td style={td}>{u.direction && u.direction !== "none" ? DIRECTIONS[u.direction] : "-"}</td>
                    <td style={td}>{u.buyerName || "-"}</td>
                    <td style={td}>{u.buyerPhone || "-"}</td>
                    <td style={td}>{u.postalCode || "-"}</td>
                    <td style={td}>{fmt(totalPriceOf(u))}</td>
                    <td style={td}>{fmt(paidOf(u))}</td>
                    <td style={td}>{fmt(remainingOf(u))}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{ fontSize: 12, fontWeight: 700, marginTop: 8 }}>مجموع درآمد حاصل از فروش این پروژه: {fmt(revenue)} تومان</div>
          </div>
        );
      })}
    </div>
  );
}

function Field({ label, value, onChange, type = "text", icon }) {
  return (
    <div>
      <label className="text-xs text-[#6B7280] font-medium flex items-center gap-1">{icon}{label}</label>
      <input type={type} value={value} onChange={(e) => onChange(e.target.value)}
        className="w-full mt-1 bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js", { updateViaCache: "none" }).then((reg) => {
      // Check for a newer service worker every time the app is opened
      reg.update().catch(() => {});
      let refreshed = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshed) return;
        refreshed = true;
        window.location.reload();
      });
    }).catch(() => {});
  });
}
</script>
</body>
</html>
