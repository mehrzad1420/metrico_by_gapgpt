  function updateFloor(idx, field, value) {
    setFloors((prev) => prev.map((f, i) => (i === idx ? { ...f, [field]: value } : f)));
  }
  function addFloorRow() {
    const nextNum = floors.length ? Math.max(...floors.map((f) => f.number)) + 1 : 1;
    setFloors((prev) => [...prev, { number: nextNum, count: 3 }]);
  }
  function removeFloorRow(idx) { setFloors((prev) => prev.filter((_, i) => i !== idx)); }
  const canSave = name.trim() && floors.length > 0 && floors.every((f) => f.number && f.count > 0);
  const totalUnits = floors.reduce((s, f) => s + (Number(f.count) || 0), 0);

  return (
    <div className="fixed inset-0 bg-black/40 flex items-end z-[60]">
      <div className="bg-white w-full rounded-t-2xl p-5 max-h-[85vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-4">
          <div className="font-bold text-lg">پروژه جدید</div>
          <button onClick={onCancel}><X size={20} /></button>
        </div>

        <label className="text-xs text-[#6B7280] font-medium">نام پروژه</label>
        <input
          value={name}
          onChange={(e) => setName(e.target.value)}
          placeholder="مثلاً سپهر ۴"
          className="w-full mt-1 mb-4 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]"
        />

        <label className="text-xs text-[#6B7280] font-medium">آدرس پروژه</label>
        <input
          value={address}
          onChange={(e) => setAddress(e.target.value)}
          placeholder="مثلاً خیابان..."
          className="w-full mt-1 mb-4 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]"
        />

        <div className="grid grid-cols-2 gap-3 mb-4">
          <div>
            <label className="text-xs text-[#6B7280] font-medium">متراژ عرصه (متر مربع)</label>
            <input type="number" value={landArea} onChange={(e) => setLandArea(e.target.value)}
              className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
          </div>
          <div>
            <label className="text-xs text-[#6B7280] font-medium">متراژ زیربنای کل</label>
            <input type="number" value={totalBuiltArea} onChange={(e) => setTotalBuiltArea(e.target.value)}
              className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-[#14213D]" />
          </div>
        </div>

        <div className="flex items-center justify-between mb-2">
          <label className="text-xs text-[#6B7280] font-medium">طبقات و تعداد واحد هر طبقه</label>
          <span className="text-xs text-[#9CA3AF]">مجموع: {totalUnits} واحد</span>
        </div>
        <div className="flex flex-col gap-2 mb-2">
          {floors.map((f, idx) => (
            <div key={idx} className="flex items-center gap-2 bg-[#F4F6F5] border border-black/10 rounded-xl p-2.5">
              <div className="flex-1">
                <div className="text-[10px] text-[#9CA3AF] mb-0.5">شماره طبقه</div>
                <input type="number" value={f.number} onChange={(e) => updateFloor(idx, "number", Number(e.target.value))} className="w-full outline-none text-sm font-medium bg-transparent" />
              </div>
              <div className="flex-1">
                <div className="text-[10px] text-[#9CA3AF] mb-0.5">تعداد واحد</div>
                <input type="number" value={f.count} onChange={(e) => updateFloor(idx, "count", Number(e.target.value))} className="w-full outline-none text-sm font-medium bg-transparent" />
              </div>
              <button onClick={() => removeFloorRow(idx)} className="p-2 text-[#B91C1C]"><Trash2 size={16} /></button>
            </div>
          ))}
        </div>
        <button onClick={addFloorRow} className="w-full flex items-center justify-center gap-1 border border-dashed border-black/20 rounded-xl py-2.5 text-sm text-[#6B7280] mb-5">
          <Plus size={15} /> افزودن طبقه
        </button>

        <button
          disabled={!canSave}
          onClick={() => onCreate(name.trim(), floors, { address: address.trim(), landArea, totalBuiltArea })}
          className="w-full bg-[#14213D] text-white font-semibold rounded-xl py-3 text-sm disabled:opacity-40"
        >
          ساخت پروژه
        </button>
      </div>
    </div>
  );
}

function ProjectSettingsSheet({ project, contacts, isReadOnly, onClose, onRename, onUpdateMeta, onUpdateActivities, onUpdateBankAccounts, onUpdateInvestors, onAddFloor, onDeleteFloor, onDelete, onAddDoc, onRemoveDoc, onError, onExportKml }) {
  const [name, setName] = useState(project.name);
  const [address, setAddress] = useState(project.address || "");
  const [landArea, setLandArea] = useState(project.landArea || "");
  const [totalBuiltArea, setTotalBuiltArea] = useState(project.totalBuiltArea || "");
  const [phase, setPhase] = useState(project.phase || "");
  const [lat, setLat] = useState(project.lat || "");
  const [lng, setLng] = useState(project.lng || "");
  const [locMsg, setLocMsg] = useState("");
  const [metaMsg, setMetaMsg] = useState("");
  const [floorCount, setFloorCount] = useState(3);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [confirmFloor, setConfirmFloor] = useState(null);
  const [activities, setActivities] = useState(() => normalizeProjectActivities(project));
  const [newActivity, setNewActivity] = useState("");
  const [actMsg, setActMsg] = useState("");
  const [settingsTab, setSettingsTab] = useState("general");
  const [bankAccounts, setBankAccounts] = useState(() => normalizeBankAccounts(project));
  const [investors, setInvestors] = useState(() => normalizeInvestors(project));
  const [invContactId, setInvContactId] = useState("");
  const [invShare, setInvShare] = useState("");
  const [editAccountId, setEditAccountId] = useState(null);
  const [accName, setAccName] = useState("");
  const [accNumber, setAccNumber] = useState("");
  const [accBalance, setAccBalance] = useState("");
  const [accType, setAccType] = useState("current");
  const [accOwnerType, setAccOwnerType] = useState("project");
  const [accInvestorContactId, setAccInvestorContactId] = useState("");
  const [finMsg, setFinMsg] = useState("");
  const sortedFloors = [...project.floors].sort((a, b) => b.number - a.number);

  const SETTINGS_TABS = [
    { id: "general", label: "عمومی" },
    { id: "financial", label: "مالی" },
    { id: "location", label: "موقعیت" },
    { id: "activities", label: "فعالیت‌ها" },
    { id: "floors", label: "طبقات" },
    { id: "docs", label: "مدارک" },
  ];

  useEffect(() => {
    setActivities(normalizeProjectActivities(project));
    setBankAccounts(normalizeBankAccounts(project));
    setInvestors(normalizeInvestors(project));
  }, [project.id, project.activities, project.bankAccounts, project.investors]);

  const investorContactOptions = (contacts || []).filter((c) => c.role === "investor");

  function persistInvestors(next) {
    setInvestors(next);
    onUpdateInvestors(next);
    setFinMsg("سرمایه‌گذاران ذخیره شد.");
    setTimeout(() => setFinMsg(""), 1500);
  }

  function addInvestor() {
    if (!invContactId || investors.some((i) => i.contactId === invContactId)) return;
    persistInvestors([...investors, { id: uid(), contactId: invContactId, sharePercent: Number(invShare) || 0 }]);
    setInvContactId(""); setInvShare("");
  }

  function removeInvestor(id) {
    persistInvestors(investors.filter((i) => i.id !== id));
  }

  function updateInvestorShare(id, sharePercent) {
    persistInvestors(investors.map((i) => (i.id === id ? { ...i, sharePercent: Number(sharePercent) || 0 } : i)));
  }

  function persistActivities(next) {
    const normalized = next.map((a, i) => ({ ...a, order: i }));
    setActivities(normalized);
    onUpdateActivities(normalized);
    setActMsg("فهرست فعالیت‌ها ذخیره شد.");
    setTimeout(() => setActMsg(""), 1500);
  }

  function updateActivityNameLocal(id, nameVal) {
    setActivities((prev) => prev.map((a) => (a.id === id ? { ...a, name: nameVal } : a)));
  }

  function saveActivitiesFromState() {
    setActivities((prev) => {
      const normalized = prev.map((a, i) => ({ ...a, order: i }));
      onUpdateActivities(normalized);
      return normalized;
    });
    setActMsg("فهرست فعالیت‌ها ذخیره شد.");
    setTimeout(() => setActMsg(""), 1500);
  }

  function removeActivity(id) {
    persistActivities(activities.filter((a) => a.id !== id).map((a, i) => ({ ...a, order: i })));
  }

  function moveActivity(id, dir) {
    const idx = activities.findIndex((a) => a.id === id);
    if (idx < 0) return;
    const swap = dir === "up" ? idx - 1 : idx + 1;
    if (swap < 0 || swap >= activities.length) return;
    const next = [...activities];
    [next[idx], next[swap]] = [next[swap], next[idx]];
    persistActivities(next.map((a, i) => ({ ...a, order: i })));
  }

  function addActivity() {
    const trimmed = newActivity.trim();
    if (!trimmed) return;
    persistActivities([...activities, { id: uid(), name: trimmed, order: activities.length }]);
    setNewActivity("");
  }

  function resetActivitiesToDefault() {
    persistActivities(defaultProjectActivities());
  }

  function persistBankAccounts(next) {
    setBankAccounts(next);
    onUpdateBankAccounts(next);
    setFinMsg("حساب‌های بانکی ذخیره شد.");
    setTimeout(() => setFinMsg(""), 1500);
  }

  function resetAccountForm() {
    setEditAccountId(null);
    setAccName("");
    setAccNumber("");
    setAccBalance("");
    setAccType("current");
    setAccOwnerType("project");
    setAccInvestorContactId("");
  }

  function startEditAccount(acc) {
    setEditAccountId(acc.id);
    setAccName(acc.name || "");
    setAccNumber(acc.accountNumber || "");
    setAccBalance(acc.initialBalance ?? "");
    setAccType(acc.accountType || "current");
    setAccOwnerType(acc.ownerType || "project");
    setAccInvestorContactId(acc.investorContactId || "");
  }

  function submitBankAccount() {
    if (!accName.trim() || !accNumber.trim()) return;
    const payload = {
      name: accName.trim(),
      accountNumber: accNumber.trim(),
      initialBalance: accBalance,
      accountType: accType,
      ownerType: accOwnerType || "project",
      investorContactId: accOwnerType === "investor" ? (accInvestorContactId || null) : null,
    };
    if (editAccountId) {
      persistBankAccounts(bankAccounts.map((a) => (a.id === editAccountId ? { ...a, ...payload } : a)));
    } else {
      persistBankAccounts([...bankAccounts, { id: uid(), ...payload }]);
    }
    resetAccountForm();
  }

  function removeBankAccount(id) {
    persistBankAccounts(bankAccounts.filter((a) => a.id !== id));
    if (editAccountId === id) resetAccountForm();
  }

  const totalBankBalance = bankAccounts.reduce((s, a) => s + (Number(a.initialBalance) || 0), 0);

  function saveMeta() {
    onUpdateMeta({ address: address.trim(), landArea, totalBuiltArea, phase });
    setMetaMsg("ذخیره شد.");
    setTimeout(() => setMetaMsg(""), 1500);
  }

  function useCurrentLocation() {
    if (!navigator.geolocation) { setLocMsg("مرورگر شما موقعیت مکانی را پشتیبانی نمی‌کند."); return; }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setLat(String(pos.coords.latitude.toFixed(6)));
        setLng(String(pos.coords.longitude.toFixed(6)));
      },
      () => setLocMsg("دسترسی به موقعیت مکانی رد شد."),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }
  function saveLocation() {
    onUpdateMeta({ lat, lng });
    setLocMsg("موقعیت ذخیره شد.");
    setTimeout(() => setLocMsg(""), 1500);
  }

  return (
    <div className="fixed inset-0 bg-black/40 flex items-end z-[60]">
      <div className="bg-white w-full rounded-t-2xl max-h-[88vh] flex flex-col">
        <div className="px-5 pt-5 pb-3 shrink-0 border-b border-black/5">
          <div className="flex items-center justify-between mb-3">
            <div>
              <div className="font-bold text-lg">تنظیمات پروژه</div>
              <div className="text-[11px] text-[#9CA3AF] mt-0.5">{project.name}</div>
            </div>
            <button onClick={onClose}><X size={20} /></button>
          </div>
          <div className="flex gap-1.5 overflow-x-auto pb-1 -mx-1 px-1">
            {SETTINGS_TABS.map((tab) => (
              <button
                key={tab.id}
                type="button"
                onClick={() => setSettingsTab(tab.id)}
                className="shrink-0 text-[11px] font-semibold px-3 py-2 rounded-full transition-colors"
                style={{
                  background: settingsTab === tab.id ? "#14213D" : "#F4F6F5",
                  color: settingsTab === tab.id ? "#fff" : "#4B5563",
                }}
              >
                {tab.label}
              </button>
            ))}
          </div>
        </div>

        <div className="flex-1 overflow-y-auto px-5 py-4">
          {settingsTab === "general" && (
            <>
              <label className="text-xs text-[#6B7280] font-medium">نام پروژه</label>
              <div className="flex gap-2 mt-1 mb-4">
                <input value={name} onChange={(e) => setName(e.target.value)} disabled={isReadOnly}
                  className="flex-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none disabled:opacity-60" />
                {!isReadOnly && (
                  <button onClick={() => onRename(name.trim())} className="bg-[#14213D] text-white px-4 rounded-xl text-sm font-semibold">ذخیره</button>
                )}
              </div>

              <label className="text-xs text-[#6B7280] font-medium">آدرس پروژه</label>
              <input value={address} onChange={(e) => setAddress(e.target.value)} disabled={isReadOnly}
                className="w-full mt-1 mb-3 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none disabled:opacity-60" />

              <div className="grid grid-cols-2 gap-3 mb-3">
                <div>
                  <label className="text-xs text-[#6B7280] font-medium">متراژ عرصه</label>
                  <input type="number" value={landArea} onChange={(e) => setLandArea(e.target.value)} disabled={isReadOnly}
                    className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none disabled:opacity-60" />
                </div>
                <div>
                  <label className="text-xs text-[#6B7280] font-medium">متراژ زیربنای کل</label>
                  <input type="number" value={totalBuiltArea} onChange={(e) => setTotalBuiltArea(e.target.value)} disabled={isReadOnly}
                    className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none disabled:opacity-60" />
                </div>
              </div>

              <label className="text-xs text-[#6B7280] font-medium">مرحله فعلی پروژه</label>
              <select value={phase} onChange={(e) => setPhase(e.target.value)} disabled={isReadOnly}
                className="w-full mt-1 mb-3 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none disabled:opacity-60">
                <option value="">مشخص نشده</option>
                {PROJECT_PHASES.map((p, i) => <option key={p} value={p}>{i + 1}. {p}</option>)}
              </select>

              {!isReadOnly && (
                <div className="flex items-center gap-2">
                  <button onClick={saveMeta} className="bg-[#14213D] text-white px-4 py-2 rounded-xl text-sm font-semibold">ذخیره اطلاعات</button>
                  {metaMsg && <span className="text-xs text-[#166534]">{metaMsg}</span>}
                </div>
              )}
            </>
          )}

          {settingsTab === "financial" && (
            <>
              <label className="text-xs text-[#6B7280] font-medium">سرمایه‌گذاران پروژه</label>
              <div className="text-[10px] text-[#9CA3AF] mb-2">از مخاطبین با نقش «سرمایه‌گذار» انتخاب کنید و درصد سهم را مشخص کنید.</div>

              {investors.length === 0 && (
                <div className="text-center text-[#9CA3AF] text-sm py-4 mb-3 bg-[#F4F6F5] rounded-xl">سرمایه‌گذاری ثبت نشده</div>
              )}

              <div className="flex flex-col gap-2 mb-4">
                {investors.map((inv) => {
                  const c = (contacts || []).find((x) => x.id === inv.contactId);
                  return (
                    <div key={inv.id} className="bg-white border border-black/10 rounded-xl p-3 flex items-center gap-2">
                      <div className="flex-1 min-w-0">
                        <div className="font-semibold text-sm text-[#14213D] truncate">{c?.name || "سرمایه‌گذار"}</div>
                      </div>
                      <input type="number" value={inv.sharePercent} disabled={isReadOnly}
                        onChange={(e) => updateInvestorShare(inv.id, e.target.value)}
                        className="w-16 bg-[#F4F6F5] border border-black/10 rounded-lg px-2 py-1.5 text-xs text-center outline-none disabled:opacity-60" />
                      <span className="text-[10px] text-[#9CA3AF]">٪</span>
                      {!isReadOnly && (
                        <button type="button" onClick={() => removeInvestor(inv.id)} className="text-[#B91C1C] p-1"><Trash2 size={14} /></button>
                      )}
                    </div>
                  );
                })}
              </div>

              {!isReadOnly && (
                <div className="bg-[#F4F6F5] rounded-xl p-3 flex flex-col gap-2 mb-5">
                  <select value={invContactId} onChange={(e) => setInvContactId(e.target.value)}
                    className="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none">
                    <option value="">انتخاب سرمایه‌گذار از مخاطبین...</option>
                    {investorContactOptions.filter((c) => !investors.some((i) => i.contactId === c.id)).map((c) => (
                      <option key={c.id} value={c.id}>{c.name}</option>
                    ))}
                  </select>
                  <div className="flex gap-2">
                    <input type="number" value={invShare} onChange={(e) => setInvShare(e.target.value)} placeholder="درصد سهم"
                      className="flex-1 bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
                    <button type="button" onClick={addInvestor} disabled={!invContactId}
                      className="bg-[#14213D] text-white rounded-xl px-4 text-sm font-semibold disabled:opacity-40">افزودن</button>
                  </div>
                  {investorContactOptions.length === 0 && (
                    <div className="text-[10px] text-[#92400E]">ابتدا در دفترچه مخاطبین، نقش سرمایه‌گذار تعریف کنید.</div>
                  )}
                </div>
              )}

              <div className="flex items-center justify-between mb-3">
                <label className="text-xs text-[#6B7280] font-medium">حساب‌های بانکی</label>
                {bankAccounts.length > 0 && (
                  <span className="text-[10px] text-[#14213D] font-bold">جمع موجودی اولیه: {fmt(totalBankBalance)}</span>
                )}
              </div>

              {isReadOnly && (
                <div className="bg-[#128C7E]/10 border border-[#128C7E]/25 text-[#0F6B5F] text-xs rounded-xl p-3 mb-3">
                  حساب دمو — فقط مشاهده حساب‌های بانکی.
                </div>
              )}

              {bankAccounts.length === 0 && (
                <div className="text-center text-[#9CA3AF] text-sm py-6 mb-3 bg-[#F4F6F5] rounded-xl">
                  هنوز حساب بانکی ثبت نشده
                </div>
              )}

              <div className="flex flex-col gap-2 mb-4">
                {bankAccounts.map((acc) => {
                  const bal = computeAccountBalance(project, acc.id);
                  const inv = acc.investorContactId ? (contacts || []).find((c) => c.id === acc.investorContactId) : null;
                  return (
                  <div key={acc.id} className="bg-white border border-black/10 rounded-2xl p-3.5 shadow-sm">
                    <div className="flex items-start justify-between gap-2 mb-2">
                      <div className="flex-1 min-w-0">
                        <div className="font-bold text-sm text-[#14213D]">{acc.name}</div>
                        <div className="text-[10px] text-[#9CA3AF] mt-0.5">
                          {BANK_ACCOUNT_TYPES[acc.accountType] || BANK_ACCOUNT_TYPES.other} · {BANK_ACCOUNT_OWNERS[acc.ownerType] || "حساب پروژه"}
                          {inv ? ` · ${inv.name}` : ""}
                        </div>
                      </div>
                      {!isReadOnly && (
                        <div className="flex gap-1 shrink-0">
                          <button type="button" onClick={() => startEditAccount(acc)} className="text-[10px] text-[#14213D] font-semibold px-2 py-1 bg-[#F4F6F5] rounded-lg">ویرایش</button>
                          <button type="button" onClick={() => removeBankAccount(acc.id)} className="p-1 text-[#B91C1C]"><Trash2 size={14} /></button>
                        </div>
                      )}
                    </div>
                    <div className="grid grid-cols-2 gap-2 text-xs">
                      <div className="bg-[#F4F6F5] rounded-lg px-2.5 py-2">
                        <div className="text-[9px] text-[#9CA3AF]">شماره حساب</div>
                        <div className="font-semibold text-[#14213D] mt-0.5 dir-ltr text-left">{acc.accountNumber}</div>
                      </div>
                      <div className="bg-[#F0FDF4] rounded-lg px-2.5 py-2">
                        <div className="text-[9px] text-[#9CA3AF]">تراز فعلی</div>
                        <div className="font-bold text-[#166534] mt-0.5">{fmt(bal)}</div>
                      </div>
                    </div>
                  </div>
                  );
                })}
              </div>

              {!isReadOnly && (
                <div className="bg-[#F4F6F5] rounded-2xl p-4 border border-black/5">
                  <div className="text-xs font-bold text-[#14213D] mb-3">{editAccountId ? "ویرایش حساب" : "افزودن حساب جدید"}</div>
                  <input value={accName} onChange={(e) => setAccName(e.target.value)} placeholder="نام حساب (مثلاً ملت — پروژه سپهر)"
                    className="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none mb-2" />
                  <input value={accNumber} onChange={(e) => setAccNumber(e.target.value)} placeholder="شماره حساب" dir="ltr"
                    className="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none mb-2 text-left" />
                  <div className="grid grid-cols-2 gap-2 mb-2">
                    <input type="number" value={accBalance} onChange={(e) => setAccBalance(e.target.value)} placeholder="موجودی اولیه (تومان)"
                      className="bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
                    <select value={accType} onChange={(e) => setAccType(e.target.value)}
                      className="bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none">
                      {Object.entries(BANK_ACCOUNT_TYPES).map(([key, label]) => (
                        <option key={key} value={key}>{label}</option>
                      ))}
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-2 mb-2">
                    <select value={accOwnerType} onChange={(e) => setAccOwnerType(e.target.value)}
                      className="bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none">
                      {Object.entries(BANK_ACCOUNT_OWNERS).map(([key, label]) => (
                        <option key={key} value={key}>{label}</option>
                      ))}
                    </select>
                    {accOwnerType === "investor" ? (
                      <select value={accInvestorContactId} onChange={(e) => setAccInvestorContactId(e.target.value)}
                        className="bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none">
                        <option value="">سرمایه‌گذار...</option>
                        {investorContactOptions.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
                      </select>
                    ) : (
                      <div className="bg-white border border-black/10 rounded-xl px-3 py-2.5 text-xs text-[#9CA3AF] flex items-center">حساب متعلق به پروژه</div>
                    )}
                  </div>
                  <div className="flex gap-2">
                    <button type="button" onClick={submitBankAccount} disabled={!accName.trim() || !accNumber.trim()}
                      className="flex-1 bg-[#14213D] text-white rounded-xl py-2.5 text-sm font-semibold disabled:opacity-40">
                      {editAccountId ? "ذخیره تغییرات" : "افزودن حساب"}
                    </button>
                    {editAccountId && (
                      <button type="button" onClick={resetAccountForm} className="px-4 border border-black/10 rounded-xl text-sm">لغو</button>
                    )}
                  </div>
                </div>
              )}
              {finMsg && <div className="text-xs text-[#166534] mt-2">{finMsg}</div>}
            </>
          )}

          {settingsTab === "location" && (
            <>
              <label className="text-xs text-[#6B7280] font-medium">موقعیت جغرافیایی پروژه</label>
              <div className="text-[10px] text-[#9CA3AF] mt-0.5 mb-2">روی نقشه لمس کن تا پین جابه‌جا بشه، یا از دکمه زیر موقعیت فعلی خودت رو بگیر.</div>

              <div className="rounded-xl overflow-hidden border border-black/10 mb-2">
                <LeafletMap
                  height={220}
                  center={lat && lng ? [Number(lat), Number(lng)] : [35.7, 51.4]}
                  zoom={lat && lng ? 14 : 5}
                  markers={lat && lng ? [{ lat: Number(lat), lng: Number(lng) }] : []}
                  onMapClick={(newLat, newLng) => { if (!isReadOnly) { setLat(String(newLat.toFixed(6))); setLng(String(newLng.toFixed(6))); } }}
                />
              </div>

              <div className="grid grid-cols-2 gap-2 mt-1 mb-2">
                <input value={lat} onChange={(e) => setLat(e.target.value)} placeholder="عرض جغرافیایی (lat)" dir="ltr" disabled={isReadOnly}
                  className="bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-xs outline-none disabled:opacity-60" />
                <input value={lng} onChange={(e) => setLng(e.target.value)} placeholder="طول جغرافیایی (lng)" dir="ltr" disabled={isReadOnly}
                  className="bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-xs outline-none disabled:opacity-60" />
              </div>
              {!isReadOnly && (
                <div className="flex gap-2 mb-2">
                  <button onClick={useCurrentLocation} className="flex-1 border border-[#14213D]/20 text-[#14213D] rounded-xl py-2 text-xs font-semibold">دریافت موقعیت فعلی من</button>
                  <button onClick={saveLocation} className="flex-1 bg-[#14213D] text-white rounded-xl py-2 text-xs font-semibold">ذخیره موقعیت</button>
                </div>
              )}
              {locMsg && <div className="text-xs text-[#166534] mb-2">{locMsg}</div>}
              {lat && lng && (
                <button
                  onClick={() => (onExportKml ? onExportKml([{ ...project, lat, lng }], `${project.name}.kml`) : downloadKML([{ ...project, lat, lng }], `${project.name}.kml`))}
                  className="w-full text-center text-xs text-[#14213D] font-semibold bg-[#F4F6F5] rounded-xl py-2">
                  دریافت خروجی KML این پروژه
                </button>
              )}
            </>
          )}

          {settingsTab === "activities" && (
            <>
              <div className="flex items-center justify-between mb-2">
                <label className="text-xs text-[#6B7280] font-medium">فهرست فعالیت‌های ساخت (WBS)</label>
                {!isReadOnly && (
                  <button type="button" onClick={resetActivitiesToDefault} className="text-[10px] text-[#14213D] font-semibold underline">
                    بازنشانی پیش‌فرض
                  </button>
                )}
              </div>
              <div className="text-[10px] text-[#9CA3AF] mb-3">فعالیت‌های استاندارد ساختمان — قابل ویرایش و افزودن فعالیت سفارشی</div>

              {isReadOnly && (
                <div className="bg-[#128C7E]/10 border border-[#128C7E]/25 text-[#0F6B5F] text-xs rounded-xl p-3 mb-3">
                  حساب دمو — فقط مشاهده فهرست فعالیت‌ها.
                </div>
              )}

              <div className="flex flex-col gap-2 mb-3">
                {activities.map((act, idx) => (
                  <div key={act.id} className="flex items-center gap-2 bg-[#F4F6F5] border border-black/5 rounded-xl px-2 py-2">
                    <span className="text-[10px] text-[#9CA3AF] w-5 text-center shrink-0">{idx + 1}</span>
                    <input
                      value={act.name}
                      onChange={(e) => updateActivityNameLocal(act.id, e.target.value)}
                      onBlur={saveActivitiesFromState}
                      disabled={isReadOnly}
                      className="flex-1 bg-white border border-black/10 rounded-lg px-2 py-1.5 text-xs outline-none disabled:opacity-70"
                    />
                    {!isReadOnly && (
                      <div className="flex items-center gap-0.5 shrink-0">
                        <button type="button" onClick={() => moveActivity(act.id, "up")} disabled={idx === 0}
                          className="p-1 text-[#6B7280] disabled:opacity-30"><ChevronLeft size={14} className="rotate-90" /></button>
                        <button type="button" onClick={() => moveActivity(act.id, "down")} disabled={idx === activities.length - 1}
                          className="p-1 text-[#6B7280] disabled:opacity-30"><ChevronLeft size={14} className="-rotate-90" /></button>
                        <button type="button" onClick={() => removeActivity(act.id)} className="p-1 text-[#B91C1C]"><Trash2 size={14} /></button>
                      </div>
                    )}
                  </div>
                ))}
              </div>

              {!isReadOnly && (
                <div className="flex gap-2 mb-2">
                  <input value={newActivity} onChange={(e) => setNewActivity(e.target.value)} placeholder="فعالیت جدید (مثلاً نصب کابینت)"
                    className="flex-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2 text-xs outline-none"
                    onKeyDown={(e) => { if (e.key === "Enter") addActivity(); }} />
                  <button type="button" onClick={addActivity} disabled={!newActivity.trim()}
                    className="bg-[#14213D] text-white rounded-xl px-3 text-xs font-semibold disabled:opacity-40">افزودن</button>
                </div>
              )}
              {actMsg && <div className="text-xs text-[#166534]">{actMsg}</div>}
            </>
          )}

          {settingsTab === "floors" && (
            <>
              <label className="text-xs text-[#6B7280] font-medium">افزودن طبقه جدید</label>
              <div className="flex gap-2 mt-1 mb-5">
                <input type="number" value={floorCount} onChange={(e) => setFloorCount(Number(e.target.value))} disabled={isReadOnly}
                  className="w-24 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none disabled:opacity-60" />
                {!isReadOnly && (
                  <button onClick={() => onAddFloor(floorCount)} className="flex-1 border border-[#14213D]/20 text-[#14213D] rounded-xl text-sm font-semibold">
                    افزودن طبقه با {floorCount} واحد
                  </button>
                )}
              </div>

              <label className="text-xs text-[#6B7280] font-medium">طبقات فعلی</label>
              <div className="flex flex-col gap-2 mt-2">
                {sortedFloors.map((f) => (
                  <div key={f.number} className="flex items-center justify-between bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5">
                    <span className="text-sm">طبقه {f.number} — {f.count} واحد</span>
                    {!isReadOnly && (
                      confirmFloor === f.number ? (
                        <div className="flex gap-1.5">
                          <button onClick={() => setConfirmFloor(null)} className="text-xs bg-white border border-black/10 rounded-lg px-2 py-1">لغو</button>
                          <button onClick={() => { onDeleteFloor(f.number); setConfirmFloor(null); }} className="text-xs bg-[#B91C1C] text-white rounded-lg px-2 py-1">حذف قطعی</button>
                        </div>
                      ) : (
                        <button onClick={() => setConfirmFloor(f.number)} className="text-[#B91C1C] p-1"><Trash2 size={15} /></button>
                      )
                    )}
                  </div>
                ))}
              </div>
            </>
          )}

          {settingsTab === "docs" && (
            <DocSection
              title="مدارک پروژه (پروانه ساختمانی و...)"
              icon={<FileText size={14} />}
              docs={project.documents || []}
              onAdd={onAddDoc}
              onRemove={onRemoveDoc}
              onError={onError}
            />
          )}
        </div>

        {!isReadOnly && (
          <div className="shrink-0 px-5 py-4 border-t border-black/10 bg-[#FAFAFA]">
            {!confirmDelete ? (
              <button onClick={() => setConfirmDelete(true)} className="w-full flex items-center justify-center gap-2 text-[#B91C1C] border border-[#B91C1C]/30 rounded-xl py-2.5 text-sm font-semibold bg-white">
                <Trash2 size={15} /> حذف این پروژه
              </button>
            ) : (
              <div className="bg-red-50 rounded-xl p-3">
                <div className="text-xs text-[#B91C1C] mb-2">مطمئنی؟ این پروژه و همه واحدهایش برای همیشه حذف می‌شود.</div>
                <div className="flex gap-2">
                  <button onClick={() => setConfirmDelete(false)} className="flex-1 bg-white border border-black/10 rounded-lg py-2 text-xs font-medium">لغو</button>
                  <button onClick={onDelete} className="flex-1 bg-[#B91C1C] text-white rounded-lg py-2 text-xs font-medium">حذف قطعی</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function ProjectPanel({ project, onOpenUnit, onOpenSettings, onOpenExpenses, onOpenFinance, onPrint, onFinancialReport, onBackToDashboard, onRemoveNote }) {
  const [showNotes, setShowNotes] = useState(false);
  const byFloor = useMemo(() => {
    const map = {};
    project.units.forEach((u) => { map[u.floor] = map[u.floor] || []; map[u.floor].push(u); });
    return Object.entries(map)
      .map(([floor, units]) => ({ floor: Number(floor), units: units.sort((a, b) => Number(a.unitNumber) - Number(b.unitNumber)) }))
      .sort((a, b) => b.floor - a.floor);
  }, [project]);

  const revenue = revenueOf(project);
  const expenses = expensesTotalOf(project);
  const profit = revenue - expenses;
  const soldCount = project.units.filter((u) => u.status === "sold").length;
  const notes = project.quickNotes || [];

  return (
    <div className="px-4 pt-4">
      <button onClick={onBackToDashboard} className="flex items-center gap-1 text-xs text-[#6B7280] mb-3">
        <ChevronLeft size={14} className="rotate-180" /> داشبورد
      </button>

      <div className="text-xl font-extrabold text-[#14213D] mb-1">{project.name}</div>
      {project.phase && (
        <div className="inline-block text-[11px] font-semibold text-[#14213D] bg-[#F4F6F5] border border-black/10 px-2.5 py-1 rounded-full mb-2">
          مرحله فعلی: {project.phase}
        </div>
      )}
      <div className="text-sm text-[#6B7280] mb-2">{project.units.length} واحد · {project.floors.length} طبقه</div>

      {notes.length > 0 && (
        <button onClick={() => setShowNotes((v) => !v)} className="w-full flex items-center gap-2 bg-amber-50 border border-amber-200 text-amber-900 text-xs rounded-xl px-3 py-2 mb-3">
          <Bell size={14} />
          <span className="flex-1 text-right">{notes.length} یادداشت برای این پروژه</span>
          <ChevronLeft size={13} className={showNotes ? "rotate-90" : "rotate-180"} />
        </button>
      )}
      {showNotes && notes.length > 0 && (
        <div className="flex flex-col gap-2 mb-3">
          {notes.slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || "")).map((n) => (
            <div key={n.id} className="bg-white border border-black/10 rounded-xl p-3 flex items-start justify-between gap-2">
              <div className="text-xs text-[#374151]">{n.text}</div>
              <button onClick={() => onRemoveNote(n.id)} className="text-[#B91C1C] flex-shrink-0"><Trash2 size={13} /></button>
            </div>
          ))}
        </div>
      )}

      <div className="flex gap-2 flex-wrap mb-3">
        <button onClick={onOpenFinance} className="flex items-center gap-1 text-xs text-white bg-[#14213D] rounded-lg px-2.5 py-1.5 font-semibold">
          <Wallet size={13} /> حسابداری
        </button>
        <button onClick={onPrint} className="flex items-center gap-1 text-xs text-[#6B7280] bg-white border border-black/10 rounded-lg px-2.5 py-1.5">
          <Printer size={13} /> PDF
        </button>
        <button onClick={onFinancialReport} className="flex items-center gap-1 text-xs text-[#6B7280] bg-white border border-black/10 rounded-lg px-2.5 py-1.5">
          <Wallet size={13} /> گزارش مالی
        </button>
        <button onClick={onOpenSettings} className="flex items-center gap-1 text-xs text-[#6B7280] bg-white border border-black/10 rounded-lg px-2.5 py-1.5">
          <Settings size={13} /> تنظیمات پروژه
        </button>
      </div>

      <ProjectLandBuiltStats
        landArea={project.landArea}
        totalBuiltArea={project.totalBuiltArea}
        theme={{ accent: "#14213D", surface: "#F4F6F5", border: "#E5E7EB" }}
        variant="panel"
      />

      <div className="bg-white rounded-2xl border border-black/10 p-3 flex flex-col gap-1.5 shadow-sm">
        {byFloor.map(({ floor, units }) => (
          <div key={floor} className="flex items-stretch gap-1.5">
            <div className="w-7 flex-shrink-0 flex items-center justify-center text-[10px] font-bold text-[#9CA3AF]">{floor}</div>
            <div className="flex-1 grid gap-1.5" style={{ gridTemplateColumns: `repeat(${units.length}, minmax(0,1fr))` }}>
              {units.map((u) => {
                const s = STATUS[u.status];
                return (
                  <button
                    key={u.id}
                    onClick={() => onOpenUnit(u.id)}
                    className="rounded-lg py-2 px-1 flex flex-col items-center justify-center border min-h-[46px]"
                    style={{ background: s.bg, borderColor: s.color + "55" }}
                  >
                    <span className="text-[11px] font-bold leading-tight" style={{ color: s.text }}>{u.unitNumber}</span>
                    <span className="text-[9px] leading-tight mt-0.5 text-center" style={{ color: s.text }}>
                      {u.status === "sold" ? (u.buyerName || "بدون نام") : s.label}
                    </span>
                    <span className="text-[8px] leading-tight mt-0.5 text-center opacity-80" style={{ color: s.text }}>
                      {u.area ? `${u.area} m²` : ""}{u.area && u.direction && u.direction !== "none" ? " · " : ""}{u.direction && u.direction !== "none" ? DIRECTIONS[u.direction] : ""}
                    </span>
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      <div className="flex gap-1.5 mt-2 text-[9px]">
        <span className="px-1.5 py-0.5 rounded-full" style={{ background: STATUS.sold.bg, color: STATUS.sold.text }}>فروخته‌شده</span>
        <span className="px-1.5 py-0.5 rounded-full" style={{ background: STATUS.reserved.bg, color: STATUS.reserved.text }}>رزرو</span>
        <span className="px-1.5 py-0.5 rounded-full" style={{ background: STATUS.vacant.bg, color: STATUS.vacant.text }}>خالی</span>
      </div>

      <div className="mt-4 bg-[#14213D] text-white rounded-2xl p-4 flex items-center justify-between">
        <div>
          <div className="text-[11px] text-white/60">مجموع درآمد حاصل از فروش ({soldCount} واحد)</div>
          <div className="text-lg font-extrabold mt-0.5">{fmt(revenue)} تومان</div>
        </div>
        <Wallet size={22} className="text-[#C9A227]" />
      </div>

      <button onClick={onOpenExpenses} className="w-full mt-3 flex items-center justify-between bg-white rounded-2xl border border-black/10 p-4">
        <div>
          <div className="text-[11px] text-[#6B7280]">هزینه‌های پروژه ({(project.expenses || []).length} مورد)</div>
          <div className="text-base font-bold mt-0.5 text-[#B91C1C]">{fmt(expenses)} تومان</div>
        </div>
        <span className="text-xs text-[#14213D] font-semibold flex items-center gap-1">مدیریت <ChevronLeft size={13} className="rotate-180" /></span>
      </button>

      <div className={`mt-3 rounded-2xl p-4 flex items-center justify-between ${profit >= 0 ? "bg-green-50" : "bg-red-50"}`}>
        <div>
          <div className="text-[11px] text-[#6B7280]">{profit >= 0 ? "سود پروژه (تا این لحظه)" : "زیان پروژه (تا این لحظه)"}</div>
          <div className={`text-lg font-extrabold mt-0.5 ${profit >= 0 ? "text-[#166534]" : "text-[#B91C1C]"}`}>{fmt(Math.abs(profit))} تومان</div>
        </div>
        <DonutChart
          data={[{ value: expenses, color: "#EF4444", label: "هزینه" }, { value: Math.max(profit, 0), color: "#22C55E", label: "سود" }]}
          size={72} centerLabel="سود خالص" centerValue={fmt(Math.abs(profit))} dark={false}
        />
      </div>
    </div>
  );
}

const CONTACT_ROLES = { investor: "سرمایه‌گذار", buyer: "خریدار", contractor: "پیمانکار", supplier: "تأمین‌کننده", other: "سایر" };
const PAYMENT_METHODS = { cash: "نقدی", check: "چک", credit: "نسیه" };

function ReportsScreen({ company, project, projects, contacts, initialView, onBack, onSelectProject, embedded }) {
  const [view, setView] = useState(initialView || "accounts");
  const [selectedAccountId, setSelectedAccountId] = useState(null);
  const [checkTab, setCheckTab] = useState("collected");

  useEffect(() => {
    setView(initialView || "accounts");
    setSelectedAccountId(null);
  }, [initialView, project?.id]);

  const accounts = normalizeBankAccounts(project);
  const views = [
    { id: "accounts", label: "موجودی حساب‌ها" },
    { id: "checks", label: "گزارش چک‌ها" },
    { id: "flow", label: "گردش مالی" },
  ];
  const ledgerRows = useMemo(
    () => (selectedAccountId ? buildAccountLedgerRows(project, selectedAccountId) : []),
    [project, selectedAccountId]
  );
  const paidChecks = useMemo(() => paidCheckRows(project, contacts), [project, contacts]);
  const collectedChecks = useMemo(() => collectedCheckRows(project, contacts), [project, contacts]);
  const flowRows = useMemo(() => sortedFinanceTxs(project), [project.financeTransactions]);

  const accountPrintRows = useMemo(() => accounts.map((a) => ({
    name: accountLabel(project, a.id, contacts),
    number: a.accountNumber || "—",
    balance: fmt(computeAccountBalance(project, a.id)),
  })), [accounts, project, contacts]);

  const checkPrintRows = useMemo(() => {
    const list = checkTab === "collected" ? collectedChecks : paidChecks;
    return list.map((r) => ({
      title: r.title,
      date: r.date || "—",
      amount: fmt(r.amount),
      account: r.accountId ? accountLabel(project, r.accountId, contacts) : "—",
      contact: r.contactName || r.buyerName || "—",
    }));
  }, [checkTab, collectedChecks, paidChecks, project, contacts]);

  const flowPrintRows = useMemo(() => flowRows.map((t) => ({
    type: FINANCE_TX_LABELS[t.type] || t.type,
    date: t.date || "—",
    amount: fmt(t.amount),
    from: t.fromAccountId ? accountLabel(project, t.fromAccountId, contacts) : "—",
    to: t.toAccountId ? accountLabel(project, t.toAccountId, contacts) : "—",
    note: t.note || "—",
  })), [flowRows, project, contacts]);

  const ledgerPrintRows = useMemo(() => ledgerRows.map((r) => ({
    type: FINANCE_TX_LABELS[r.type] || r.type,
    date: r.date || "—",
    debit: r.debit > 0 ? fmt(r.debit) : "—",
    credit: r.credit > 0 ? fmt(r.credit) : "—",
    balance: fmt(r.balance),
    note: r.note || "—",
  })), [ledgerRows]);

  const printConfig = view === "accounts"
    ? selectedAccountId
      ? {
          title: `گردش حساب — ${accountLabel(project, selectedAccountId, contacts)}`,
          columns: [
            { key: "type", label: "نوع" },
            { key: "date", label: "تاریخ" },
            { key: "debit", label: "برداشت" },
            { key: "credit", label: "واریز" },
            { key: "balance", label: "مانده" },
            { key: "note", label: "توضیح" },
          ],
          rows: ledgerPrintRows,
        }
      : {
          title: "موجودی حساب‌ها",
          columns: [
            { key: "name", label: "حساب" },
            { key: "number", label: "شماره" },
            { key: "balance", label: "موجودی (تومان)" },
          ],
          rows: accountPrintRows,
        }
    : view === "checks"
      ? {
          title: checkTab === "collected" ? "چک‌های وصولی" : "چک‌های پرداختی",
          columns: [
            { key: "title", label: "عنوان" },
            { key: "date", label: "تاریخ" },
            { key: "amount", label: "مبلغ" },
            { key: "account", label: "حساب" },
            { key: "contact", label: "مخاطب/خریدار" },
          ],
          rows: checkPrintRows,
        }
      : {
          title: "گردش مالی",
          columns: [
            { key: "type", label: "نوع" },
            { key: "date", label: "تاریخ" },
            { key: "amount", label: "مبلغ" },
            { key: "from", label: "از" },
            { key: "to", label: "به" },
            { key: "note", label: "توضیح" },
          ],
          rows: flowPrintRows,
        };

  return (
    <div className={embedded ? "" : "px-4 pt-4 pb-10"}>
      {!embedded && (
      <div className="flex items-center gap-3 mb-4">
        <button type="button" onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>
        <div className="flex-1 min-w-0">
          <div className="font-bold text-lg truncate">گزارش‌های مالی</div>
          <div className="text-xs text-[#6B7280] truncate">{project.name}</div>
        </div>
        <PrintExportButton
          company={company}
          title={printConfig.title}
          subtitle={project.name}
          columns={printConfig.columns}
          rows={printConfig.rows}
        />
      </div>
      )}

      {embedded && (
        <div className="flex items-center justify-between gap-2 mb-3">
          <div className="text-xs text-[#6B7280] truncate">{project.name}</div>
          <PrintExportButton
            company={company}
            title={printConfig.title}
            subtitle={project.name}
            columns={printConfig.columns}
            rows={printConfig.rows}
            className="shrink-0"
          />
        </div>
      )}

      {projects.length > 1 && (
        <select
          value={project.id}
          onChange={(e) => { onSelectProject(e.target.value); setSelectedAccountId(null); }}
          className="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm mb-3 outline-none"
        >
          {projects.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
      )}

      {!embedded && (
      <div className="flex gap-1.5 mb-4 overflow-x-auto pb-1">
        {views.map((v) => (
          <button
            key={v.id}
            type="button"
            onClick={() => { setView(v.id); setSelectedAccountId(null); }}
            className="flex-shrink-0 rounded-full px-3 py-1.5 text-[11px] font-semibold border transition-colors"
            style={{
              background: view === v.id ? "#14213D" : "#fff",
              color: view === v.id ? "#fff" : "#4B5563",
              borderColor: view === v.id ? "#14213D" : "#E5E7EB",
            }}
          >
            {v.label}
          </button>
        ))}
      </div>
      )}

      {view === "accounts" && (
        <>
          <div className="bg-white border border-black/5 rounded-2xl overflow-hidden mb-3">
            <div className="grid grid-cols-[1fr_auto] gap-2 px-3 py-2 bg-[#F4F6F5] text-[10px] font-bold text-[#6B7280]">
              <span>حساب</span>
              <span>موجودی</span>
            </div>
            {accounts.length === 0 ? (
              <div className="text-center text-xs text-[#9CA3AF] py-8">حساب بانکی ثبت نشده است.</div>
            ) : accounts.map((a) => {
              const bal = computeAccountBalance(project, a.id);
              const active = selectedAccountId === a.id;
              return (
                <button
                  key={a.id}
                  type="button"
                  onClick={() => setSelectedAccountId(active ? null : a.id)}
                  className="w-full grid grid-cols-[1fr_auto] gap-2 px-3 py-3 text-right border-t border-black/[0.04] transition-colors"
                  style={{ background: active ? "#EFF6FF" : "#fff" }}
                >
                  <div className="min-w-0">
                    <div className="text-sm font-semibold text-[#14213D] truncate">{accountLabel(project, a.id, contacts)}</div>
                    {a.accountNumber && <div className="text-[10px] text-[#9CA3AF] truncate">{a.accountNumber}</div>}
                  </div>
                  <div className={`text-sm font-bold tabular-nums ${bal >= 0 ? "text-[#166534]" : "text-[#B91C1C]"}`}>{fmt(bal)}</div>
                </button>
              );
            })}
          </div>

          {selectedAccountId && (
            <div className="bg-[#F4F6F5] rounded-2xl p-3">
              <div className="text-xs font-bold text-[#14213D] mb-2">
                گردش حساب — {accountLabel(project, selectedAccountId, contacts)}
              </div>
              {ledgerRows.length === 0 ? (
                <div className="text-center text-xs text-[#9CA3AF] py-4">تراکنشی ثبت نشده.</div>
              ) : (
                <div className="flex flex-col gap-2 max-h-[50vh] overflow-y-auto">
                  {ledgerRows.map((r) => (
                    <div key={r.id} className="bg-white rounded-xl p-3 text-right text-xs">
                      <div className="flex items-center justify-between gap-2 mb-1">
                        <span className="font-semibold text-[#14213D]">{FINANCE_TX_LABELS[r.type] || r.type}</span>
                        <span className="text-[#9CA3AF]">{r.date || "—"}</span>
                      </div>
                      <div className="flex gap-3 text-[10px]">
                        {r.debit > 0 && <span className="text-[#B91C1C]">برداشت: {fmt(r.debit)}</span>}
                        {r.credit > 0 && <span className="text-[#166534]">واریز: {fmt(r.credit)}</span>}
                      </div>
                      {r.note && <div className="text-[10px] text-[#6B7280] mt-1">{r.note}</div>}
                      <div className="text-[10px] font-bold text-[#14213D] mt-1">مانده: {fmt(r.balance)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </>
      )}

      {view === "checks" && (
        <>
          <div className="flex gap-2 mb-3">
            {[
              { id: "collected", label: "چک‌های وصولی" },
              { id: "paid", label: "چک‌های پرداختی" },
            ].map((t) => (
              <button
                key={t.id}
                type="button"
                onClick={() => setCheckTab(t.id)}
                className="flex-1 rounded-xl py-2 text-xs font-semibold border"
                style={{ background: checkTab === t.id ? "#14213D" : "#fff", color: checkTab === t.id ? "#fff" : "#4B5563" }}
              >
                {t.label}
              </button>
            ))}
          </div>
          <div className="flex flex-col gap-2">
            {(checkTab === "collected" ? collectedChecks : paidChecks).length === 0 ? (
              <div className="text-center text-xs text-[#9CA3AF] py-10 bg-white rounded-2xl">موردی یافت نشد.</div>
            ) : (checkTab === "collected" ? collectedChecks : paidChecks).map((r) => (
              <div key={r.id} className="bg-white border border-black/5 rounded-xl p-3 text-right">
                <div className="flex items-center justify-between gap-2">
                  <span className="text-sm font-semibold text-[#14213D]">{r.title}</span>
                  <span className="text-sm font-bold text-[#166534] tabular-nums">{fmt(r.amount)}</span>
                </div>
                <div className="text-[10px] text-[#9CA3AF] mt-1">{r.date || "—"}</div>
                <div className="text-[10px] text-[#6B7280] mt-1 flex flex-wrap gap-x-2">
                  {r.accountId && <span>حساب: {accountLabel(project, r.accountId, contacts)}</span>}
                  {r.contactName && <span>مخاطب: {r.contactName}</span>}
                  {r.buyerName && <span>خریدار: {r.buyerName}</span>}
                  {r.unitLabel && <span>{r.unitLabel}</span>}
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {view === "flow" && (
        <div className="flex flex-col gap-2">
          {flowRows.length === 0 ? (
            <div className="text-center text-xs text-[#9CA3AF] py-10 bg-white rounded-2xl">تراکنش مالی ثبت نشده.</div>
          ) : flowRows.map((t) => {
            const isIn = !!t.toAccountId && t.type !== "transfer";
            const isOut = !!t.fromAccountId && t.type !== "transfer";
            const isTransfer = t.type === "transfer";
            return (
              <div key={t.id} className="bg-white border border-black/5 rounded-xl p-3 text-right text-xs">
                <div className="flex items-center justify-between gap-2 mb-1">
                  <span className="font-semibold text-[#14213D]">{FINANCE_TX_LABELS[t.type] || t.type}</span>
                  <span className="text-[#9CA3AF]">{t.date || "—"}</span>
                </div>
                <div className="font-bold tabular-nums text-[#14213D]">{fmt(t.amount)}</div>
                {(t.fromAccountId || t.toAccountId) && (
                  <div className="text-[10px] text-[#6B7280] mt-1">
                    {t.fromAccountId && <span>از: {accountLabel(project, t.fromAccountId, contacts)} </span>}
                    {t.toAccountId && <span>→ به: {accountLabel(project, t.toAccountId, contacts)}</span>}
                  </div>
                )}
                {t.note && <div className="text-[10px] text-[#9CA3AF] mt-1">{t.note}</div>}
                <DocBadge docs={t.docs} />
                <div className="mt-1">
                  {isTransfer && <span className="text-[10px] px-2 py-0.5 rounded-full bg-[#EFF6FF] text-[#1D4ED8]">انتقال</span>}
                  {isIn && !isTransfer && <span className="text-[10px] px-2 py-0.5 rounded-full bg-[#F0FDF4] text-[#166534]">واریز</span>}
                  {isOut && !isTransfer && <span className="text-[10px] px-2 py-0.5 rounded-full bg-[#FEF2F2] text-[#B91C1C]">پرداخت</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function FinanceScreen({ company, onBack, project, contacts, isReadOnly, onAddTransaction }) {
  const [view, setView] = useState("accounts");
  const [fromId, setFromId] = useState("");
  const [toId, setToId] = useState("");
  const [trAmount, setTrAmount] = useState("");
  const [trNote, setTrNote] = useState("");
  const [trDocs, setTrDocs] = useState([]);
  const [capType, setCapType] = useState("capital_in");
  const [capInvestor, setCapInvestor] = useState("");
  const [capAccount, setCapAccount] = useState("");
  const [capAmount, setCapAmount] = useState("");
  const [capNote, setCapNote] = useState("");
  const [capDocs, setCapDocs] = useState([]);

  const accounts = normalizeBankAccounts(project);
  const investors = normalizeInvestors(project);
  const investorContacts = (contacts || []).filter((c) => c.role === "investor");
  const txs = useMemo(
    () => [...normalizeFinanceTransactions(project)].sort((a, b) => (b.date || "").localeCompare(a.date || "")),
    [project.financeTransactions]
  );
  const profitRows = useMemo(() => investorProfitSummary(project, contacts), [project, contacts]);
  const profit = profitOf(project);

  function submitTransfer() {
    if (!fromId || !toId || fromId === toId || !(Number(trAmount) > 0) || !trNote.trim()) return;
    onAddTransaction({
      date: new Date().toISOString().slice(0, 10),
      type: "transfer",
      amount: Number(trAmount),
      fromAccountId: fromId,
      toAccountId: toId,
      note: trNote.trim(),
      docs: trDocs,
    });
    setTrAmount(""); setTrNote(""); setTrDocs([]);
  }

  function submitCapital() {
    if (!capAccount || !(Number(capAmount) > 0) || !capNote.trim()) return;
    onAddTransaction({
      date: new Date().toISOString().slice(0, 10),
      type: capType,
      amount: Number(capAmount),
      fromAccountId: capType === "capital_out" ? capAccount : null,
      toAccountId: capType === "capital_in" ? capAccount : null,
      investorContactId: capInvestor || null,
      note: capNote.trim(),
      docs: capDocs,
    });
    setCapAmount(""); setCapNote(""); setCapDocs([]);
  }

  const views = [
    { id: "accounts", label: "تراز حساب‌ها" },
    { id: "investors", label: "سرمایه‌گذاران" },
    { id: "ledger", label: "دفتر تراکنش" },
    { id: "transfer", label: "انتقال / سرمایه" },
  ];

  const accountPrintRows = useMemo(() => accounts.map((acc) => ({
    name: acc.name,
    type: `${BANK_ACCOUNT_TYPES[acc.accountType] || "—"} · ${BANK_ACCOUNT_OWNERS[acc.ownerType] || ""}`,
    number: acc.accountNumber || "—",
    initial: fmt(acc.initialBalance || 0),
    balance: fmt(computeAccountBalance(project, acc.id)),
  })), [accounts, project]);

  const investorPrintRows = useMemo(() => profitRows.map((row) => ({
    name: row.name,
    share: `${row.sharePercent}٪`,
    profitShare: fmt(Math.abs(row.profitShare)),
    netCapital: fmt(row.netCapital),
  })), [profitRows]);

  const ledgerPrintRows = useMemo(() => txs.map((t) => ({
    type: FINANCE_TX_LABELS[t.type] || t.type,
    date: t.date || "—",
    amount: fmt(t.amount),
    from: t.fromAccountId ? accountLabel(project, t.fromAccountId, contacts) : "—",
    to: t.toAccountId ? accountLabel(project, t.toAccountId, contacts) : "—",
    note: t.note || "—",
  })), [txs, project, contacts]);

  const financePrintConfig = view === "accounts"
    ? { title: "تراز حساب‌های پروژه", columns: [
        { key: "name", label: "حساب" },
        { key: "type", label: "نوع" },
        { key: "number", label: "شماره" },
        { key: "initial", label: "موجودی اولیه" },
        { key: "balance", label: "تراز فعلی" },
      ], rows: accountPrintRows }
    : view === "investors"
      ? { title: "سرمایه‌گذاران", columns: [
          { key: "name", label: "نام" },
          { key: "share", label: "سهم" },
          { key: "profitShare", label: "سهم سود/زیان" },
          { key: "netCapital", label: "سرمایه خالص" },
        ], rows: investorPrintRows }
      : view === "ledger"
        ? { title: "دفتر تراکنش‌های مالی", columns: [
            { key: "type", label: "نوع" },
            { key: "date", label: "تاریخ" },
            { key: "amount", label: "مبلغ" },
            { key: "from", label: "از" },
            { key: "to", label: "به" },
            { key: "note", label: "توضیح" },
          ], rows: ledgerPrintRows }
        : null;

  return (
    <div className="px-4 pt-4 pb-10">
      <div className="flex items-center gap-3 mb-4">
        <button onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>
        <div className="flex-1 min-w-0">
          <div className="font-bold text-lg truncate">حسابداری پروژه</div>
          <div className="text-xs text-[#6B7280] truncate">{project.name}</div>
        </div>
        {financePrintConfig && (
          <PrintExportButton
            company={company}
            title={financePrintConfig.title}
            subtitle={project.name}
            columns={financePrintConfig.columns}
            rows={financePrintConfig.rows}
          />
        )}
      </div>

      <div className="bg-[#14213D] text-white rounded-2xl p-4 mb-4 grid grid-cols-3 gap-2 text-center">
        <div>
          <div className="text-[10px] text-white/60">درآمد</div>
          <div className="text-xs font-bold mt-0.5">{fmt(revenueOf(project))}</div>
        </div>
        <div>
          <div className="text-[10px] text-white/60">هزینه</div>
          <div className="text-xs font-bold mt-0.5 text-[#FCA5A5]">{fmt(expensesTotalOf(project))}</div>
        </div>
        <div>
          <div className="text-[10px] text-white/60">{profit >= 0 ? "سود" : "زیان"}</div>
          <div className={`text-xs font-bold mt-0.5 ${profit >= 0 ? "text-[#86EFAC]" : "text-[#FCA5A5]"}`}>{fmt(Math.abs(profit))}</div>
        </div>
      </div>

      <div className="flex gap-1.5 overflow-x-auto mb-4 pb-1">
        {views.map((v) => (
          <button key={v.id} type="button" onClick={() => setView(v.id)}
            className="shrink-0 text-[11px] font-semibold px-3 py-2 rounded-full"
            style={{ background: view === v.id ? "#14213D" : "#F4F6F5", color: view === v.id ? "#fff" : "#4B5563" }}>
            {v.label}
          </button>
        ))}
      </div>

      {view === "accounts" && (
        <>
          {accounts.length === 0 ? (
            <div className="text-center text-sm text-[#9CA3AF] py-10 bg-[#F4F6F5] rounded-2xl">
              ابتدا از تنظیمات پروژه → تب مالی، حساب بانکی تعریف کنید.
            </div>
          ) : accounts.map((acc) => {
            const bal = computeAccountBalance(project, acc.id);
            const inv = acc.investorContactId ? (contacts || []).find((c) => c.id === acc.investorContactId) : null;
            return (
              <div key={acc.id} className="bg-white border border-black/10 rounded-2xl p-4 mb-3 shadow-sm">
                <div className="flex justify-between items-start gap-2 mb-2">
                  <div>
                    <div className="font-bold text-[#14213D]">{acc.name}</div>
                    <div className="text-[10px] text-[#9CA3AF] mt-0.5">
                      {BANK_ACCOUNT_TYPES[acc.accountType] || "—"} · {BANK_ACCOUNT_OWNERS[acc.ownerType] || "حساب پروژه"}
                      {inv ? ` · ${inv.name}` : ""}
                    </div>
                  </div>
                  <div className="text-left">
                    <div className="text-[10px] text-[#9CA3AF]">تراز فعلی</div>
                    <div className={`text-lg font-extrabold ${bal >= 0 ? "text-[#166534]" : "text-[#B91C1C]"}`}>{fmt(bal)}</div>
                  </div>
                </div>
                <div className="text-[10px] text-[#6B7280] dir-ltr text-left">شماره: {acc.accountNumber}</div>
                <div className="text-[10px] text-[#9CA3AF] mt-1">موجودی اولیه: {fmt(acc.initialBalance || 0)}</div>
              </div>
            );
          })}
        </>
      )}

      {view === "investors" && (
        <>
          {investors.length === 0 ? (
            <div className="text-center text-sm text-[#9CA3AF] py-8 bg-[#F4F6F5] rounded-2xl mb-3">
              سرمایه‌گذاری ثبت نشده. از تنظیمات پروژه → مالی، سرمایه‌گذار انتخاب کنید.
            </div>
          ) : profitRows.map((row) => (
            <div key={row.id} className="bg-white border border-black/10 rounded-2xl p-4 mb-3">
              <div className="flex justify-between mb-2">
                <div className="font-bold text-[#14213D]">{row.name}</div>
                <span className="text-xs bg-[#F4F6F5] px-2 py-1 rounded-full font-semibold">{row.sharePercent}٪ سهم</span>
              </div>
              <div className="grid grid-cols-2 gap-2 text-xs">
                <div className="bg-[#F0FDF4] rounded-lg p-2">
                  <div className="text-[9px] text-[#6B7280]">سهم از {profit >= 0 ? "سود" : "زیان"}</div>
                  <div className={`font-bold ${profit >= 0 ? "text-[#166534]" : "text-[#B91C1C]"}`}>{fmt(Math.abs(row.profitShare))}</div>
                </div>
                <div className="bg-[#EFF6FF] rounded-lg p-2">
                  <div className="text-[9px] text-[#6B7280]">سرمایه خالص واردشده</div>
                  <div className="font-bold text-[#1D4ED8]">{fmt(row.netCapital)}</div>
                </div>
              </div>
            </div>
          ))}
          {investorContacts.length === 0 && (
            <div className="text-[11px] text-[#92400E] bg-amber-50 border border-amber-100 rounded-xl p-3">
              در دفترچه مخاطبین، نقش «سرمایه‌گذار» برای اشخاص مورد نظر تعریف کنید.
            </div>
          )}
        </>
      )}

      {view === "ledger" && (
        <>
          {txs.length === 0 ? (
            <div className="text-center text-sm text-[#9CA3AF] py-10">تراکنشی ثبت نشده</div>
          ) : txs.map((t) => (
            <div key={t.id} className="bg-white border border-black/5 rounded-xl p-3 mb-2 text-xs">
              <div className="flex justify-between gap-2 mb-1">
                <span className="font-semibold text-[#14213D]">{FINANCE_TX_LABELS[t.type] || t.type}</span>
                <span className="font-bold">{fmt(t.amount)}</span>
              </div>
              <div className="text-[#9CA3AF]">{t.date || "—"} {t.note ? `· ${t.note}` : ""}</div>
              <DocBadge docs={t.docs} />
              {(t.fromAccountId || t.toAccountId) && (
                <div className="text-[10px] text-[#6B7280] mt-1">
                  {t.fromAccountId && <span>از: {accountLabel(project, t.fromAccountId, contacts)} </span>}
                  {t.toAccountId && <span>→ به: {accountLabel(project, t.toAccountId, contacts)}</span>}
                </div>
              )}
            </div>
          ))}
        </>
      )}

      {view === "transfer" && !isReadOnly && (
        <div className="flex flex-col gap-4">
          <div className="bg-[#F4F6F5] rounded-2xl p-4">
            <div className="text-xs font-bold text-[#14213D] mb-3">انتقال بین حساب‌ها</div>
            <select value={fromId} onChange={(e) => setFromId(e.target.value)} className="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm mb-2 outline-none">
              <option value="">از حساب...</option>
              {accounts.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
            <select value={toId} onChange={(e) => setToId(e.target.value)} className="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm mb-2 outline-none">
              <option value="">به حساب...</option>
              {accounts.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
            <input type="number" value={trAmount} onChange={(e) => setTrAmount(e.target.value)} placeholder="مبلغ (تومان)"
              className="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm mb-2 outline-none" />
            <textarea value={trNote} onChange={(e) => setTrNote(e.target.value)} placeholder="توضیحات انتقال *" rows={2}
              className="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm mb-2 outline-none resize-none" />
            <CompactDocUploader docs={trDocs} onChange={setTrDocs} label="پیوست مدارک" />
            <button type="button" onClick={submitTransfer} disabled={!fromId || !toId || fromId === toId || !trAmount || !trNote.trim()}
              className="w-full bg-[#14213D] text-white rounded-xl py-2.5 text-sm font-semibold disabled:opacity-40 mt-2">ثبت انتقال</button>
          </div>

          <div className="bg-[#F4F6F5] rounded-2xl p-4">
            <div className="text-xs font-bold text-[#14213D] mb-3">ورود / خروج سرمایه سرمایه‌گذار</div>
            <div className="flex gap-2 mb-2">
              {["capital_in", "capital_out"].map((k) => (
                <button key={k} type="button" onClick={() => setCapType(k)}
                  className="flex-1 rounded-lg py-2 text-xs font-semibold border"
                  style={{ background: capType === k ? "#14213D" : "#fff", color: capType === k ? "#fff" : "#4B5563" }}>
                  {FINANCE_TX_LABELS[k]}
                </button>
              ))}
            </div>
            <select value={capInvestor} onChange={(e) => setCapInvestor(e.target.value)} className="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm mb-2 outline-none">
              <option value="">سرمایه‌گذار (اختیاری)</option>
              {investorContacts.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <select value={capAccount} onChange={(e) => setCapAccount(e.target.value)} className="w-full bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm mb-2 outline-none">
              <option value="">حساب مرتبط</option>
              {accounts.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
            <input type="number" value={capAmount} onChange={(e) => setCapAmount(e.target.value)} placeholder="مبلغ"

              className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
            <textarea value={note} onChange={(e) => setNote(e.target.value)} placeholder="توضیحات انتقال *" rows={2}

  const [note, setNote] = useState("");
  const [amount, setAmount] = useState("");
  const [date, setDate] = useState("");

  const [materialQty, setMaterialQty] = useState("");

  const [formError, setFormError] = useState("");
  const expenses = (project.expenses || []).slice().sort((a, b) => (b.date || "").localeCompare(a.date || ""));

    ...e,
    contactName: e.contactId ? (contacts.find((c) => c.id === e.contactId)?.name || "—") : "—",
    paymentLabel: PAYMENT_METHODS[e.paymentMethod] || "نقدی",
