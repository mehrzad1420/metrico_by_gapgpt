function loadJSON(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch (e) { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch (e) { return false; }
}

function sortedFinanceTxs(project) {
  return [...normalizeFinanceTransactions(project)].sort((a, b) => (a.date || "").localeCompare(b.date || "") || (a.id || "").localeCompare(b.id || ""));
}

function accountLedgerTxs(project, accountId) {
  return sortedFinanceTxs(project).filter((t) => t.fromAccountId === accountId || t.toAccountId === accountId);
}

function buildAccountLedgerRows(project, accountId) {
  const acc = (project.bankAccounts || []).find((a) => a.id === accountId);
  let balance = Number(acc?.initialBalance) || 0;
  return accountLedgerTxs(project, accountId).map((t) => {
    const credit = t.toAccountId === accountId ? Number(t.amount) || 0 : 0;
    const debit = t.fromAccountId === accountId ? Number(t.amount) || 0 : 0;
    balance += credit - debit;
    return { ...t, credit, debit, balance };
  });
}

function paidCheckRows(project, contacts) {
  const rows = [];
  (project.expenses || []).filter((e) => e.paymentMethod === "check").forEach((e) => {
    rows.push({
      id: e.id,
      date: e.date || "",
      amount: Number(e.amount) || 0,
      title: e.title,
      accountId: e.bankAccountId,
      contactName: e.contactId ? (contacts || []).find((c) => c.id === e.contactId)?.name : null,
    });
  });
  normalizeFinanceTransactions(project).filter((t) => t.type === "check_clear").forEach((t) => {
    if (rows.some((r) => r.id === t.expenseId)) return;
    rows.push({
      id: t.id,
      date: t.date || "",
      amount: Number(t.amount) || 0,
      title: t.note || "ЩҫШұШҜШ§Ш®ШӘ ЪҶЪ©",
      accountId: t.fromAccountId,
      contactName: null,
    });
  });
  return rows.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
}

function collectedCheckRows(project, contacts) {
  const rows = [];
  normalizeFinanceTransactions(project).filter((t) => t.type === "income").forEach((t) => {
    const unit = (project.units || []).find((u) => u.id === t.unitId);
    rows.push({
      id: t.id,
      date: t.date || "",
      amount: Number(t.amount) || 0,
      title: t.note || "ШҜШұЫҢШ§ЩҒШӘ ЩҒШұЩҲШҙ",
      accountId: t.toAccountId,
      unitLabel: unit ? `ЩҲШ§ШӯШҜ ${unit.unitNumber}` : null,
      buyerName: unit?.buyerName || null,
    });
  });
  (project.units || []).forEach((u) => {
    (u.installments || []).filter((i) => i.paid && Number(i.amount) > 0 && !i.financeTxId).forEach((i) => {
      rows.push({
        id: i.id,
        date: i.date || "",
        amount: Number(i.amount) || 0,
        title: `ЩӮШіШ· ЩҲШ§ШӯШҜ ${u.unitNumber}`,
        accountId: i.accountId,
        unitLabel: `ЩҲШ§ШӯШҜ ${u.unitNumber}`,
        buyerName: u.buyerName || null,
      });
    });
  });
  return rows.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
}

function projectCardTheme(projectId) {
  let h = 0;
  const s = projectId || "";
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h) + s.charCodeAt(i);
  return PROJECT_CARD_PALETTE[Math.abs(h) % PROJECT_CARD_PALETTE.length];
}

function normalizeProjectActivities(project) {
  if (Array.isArray(project?.activities) && project.activities.length) {
    return [...project.activities].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
  }
  return defaultProjectActivities();
}

function projectProgressPercent(project) {
  const phaseIdx = PROJECT_PHASES.indexOf(project?.phase || "");
  let phasePct = phaseIdx >= 0 ? ((phaseIdx + 1) / PROJECT_PHASES.length) * 100 : 0;
  const total = project?.units?.length || 0;
  let soldPct = 0;
  if (total > 0) {
    soldPct = (project.units.filter((u) => u.status === "sold").length / total) * 100;
  }
  if (!phasePct && soldPct) return Math.round(soldPct);
  if (phasePct && !soldPct) return Math.round(phasePct);
  return Math.round(phasePct * 0.55 + soldPct * 0.45);
}

function projectPhaseLabel(project) {
  if (project?.phase) return project.phase;
  const idx = PROJECT_PHASES.indexOf(project?.phase || "");
  if (idx >= 0) return PROJECT_PHASES[idx];
  const pct = projectProgressPercent(project);
  if (pct <= 0) return "Щ…ШҙШ®Шө ЩҶШҙШҜЩҮ";
  const step = Math.min(PROJECT_PHASES.length - 1, Math.floor((pct / 100) * PROJECT_PHASES.length));
  return PROJECT_PHASES[step] || "Щ…ШҙШ®Шө ЩҶШҙШҜЩҮ";
}

function normalizeBankAccounts(project) {
  return Array.isArray(project?.bankAccounts) ? project.bankAccounts : [];
}

function normalizeInvestors(project) {
  return Array.isArray(project?.investors) ? project.investors : [];
}

function normalizeFinanceTransactions(project) {
  return Array.isArray(project?.financeTransactions) ? project.financeTransactions : [];
}

function computeAccountBalance(project, accountId) {
  if (!accountId) return 0;
  const acc = (project.bankAccounts || []).find((a) => a.id === accountId);
  let bal = Number(acc?.initialBalance) || 0;
  (project.financeTransactions || []).forEach((t) => {
    const amt = Number(t.amount) || 0;
    if (t.toAccountId === accountId) bal += amt;
    if (t.fromAccountId === accountId) bal -= amt;
  });
  return bal;
}

function accountLabel(project, accountId, contacts) {
  const acc = (project.bankAccounts || []).find((a) => a.id === accountId);
  if (!acc) return "вҖ”";
  if (acc.ownerType === "investor" && acc.investorContactId) {
    const inv = (contacts || []).find((c) => c.id === acc.investorContactId);
    return `${acc.name}${inv ? ` (${inv.name})` : ""}`;
  }
  return acc.name;
}

function investorProfitSummary(project, contacts) {
  const profit = profitOf(project);
  return normalizeInvestors(project).map((inv) => {
    const contact = (contacts || []).find((c) => c.id === inv.contactId);
    const share = Number(inv.sharePercent) || 0;
    const allocated = share > 0 ? (profit * share) / 100 : 0;
    const capitalIn = (project.financeTransactions || [])
      .filter((t) => t.type === "capital_in" && t.investorContactId === inv.contactId)
      .reduce((s, t) => s + (Number(t.amount) || 0), 0);
    const capitalOut = (project.financeTransactions || [])
      .filter((t) => t.type === "capital_out" && t.investorContactId === inv.contactId)
      .reduce((s, t) => s + (Number(t.amount) || 0), 0);
    return {
      ...inv,
      name: contact?.name || "ШіШұЩ…Ш§ЫҢЩҮвҖҢЪҜШ°Ш§Шұ",
      sharePercent: share,
      profitShare: allocated,
      netCapital: capitalIn - capitalOut,
      totalReturn: allocated + (capitalOut - capitalIn),
    };
  });
}

function projectContactBalanceInProject(project, contactId) {
  let bal = 0;
  (project.expenses || []).forEach((e) => {
    if (e.contactId !== contactId) return;
    if (e.paymentMethod === "credit") bal += Number(e.amount) || 0;
    else bal -= Number(e.amount) || 0;
  });
  return bal;
}

function projectReceivablesList(project, contacts) {
  const items = [];
  (project.units || []).forEach((u) => {
    if (u.status !== "sold" && u.status !== "reserved") return;
    const rem = remainingOf(u);
    if (rem <= 0) return;
    items.push({
      id: "unit-" + u.id,
      name: u.buyerName || `ЩҲШ§ШӯШҜ ${u.unitNumber}`,
      subtitle: `ЩҲШ§ШӯШҜ ${u.unitNumber} вҖ” Ш·ШЁЩӮЩҮ ${u.floor}`,
      amount: rem,
      phone: u.buyerPhone || "",
    });
  });
  (contacts || []).forEach((c) => {
    const bal = projectContactBalanceInProject(project, c.id);
    if (bal < 0) {
      items.push({
        id: c.id,
        name: c.name,
        subtitle: CONTACT_ROLES[c.role || "other"] || "Щ…Ш®Ш§Ш·ШЁ",
        amount: Math.abs(bal),
        phone: c.phone || "",
      });
    }
  });
  return items.sort((a, b) => b.amount - a.amount);
}

function projectPayablesList(project, contacts) {
  const items = [];
  (contacts || []).forEach((c) => {
    const bal = projectContactBalanceInProject(project, c.id);
    if (bal > 0) {
      items.push({
        id: c.id,
        name: c.name,
        subtitle: CONTACT_ROLES[c.role || "other"] || "Щ…Ш®Ш§Ш·ШЁ",
        amount: bal,
        phone: c.phone || "",
      });
    }
  });
  return items.sort((a, b) => b.amount - a.amount);
}

const uid = () => Math.random().toString(36).slice(2, 10);
const fmt = (n) => (Number(n) || 0).toLocaleString("en-US");

function emptyUnit(floor, unitNumber) {
  return {
    id: uid(), floor, unitNumber, area: "", status: "vacant", direction: "none",
    buyerName: "", buyerPhone: "", postalCode: "",
    pricePerMeter: "", downPayment: "",
    installments: [], contractDocs: [], checkDocs: [], notes: "",
  };
}
function totalPriceOf(u) { return (Number(u.area) || 0) * (Number(u.pricePerMeter) || 0); }
function paidOf(u) {
  const inst = (u.installments || []).reduce((s, i) => s + (i.paid ? Number(i.amount) || 0 : 0), 0);
  return inst + (Number(u.downPayment) || 0);
}
function remainingOf(u) { return totalPriceOf(u) - paidOf(u); }

function revenueOf(project) {
  return project.units.filter((u) => u.status === "sold").reduce((s, u) => s + totalPriceOf(u), 0);
}
function expensesTotalOf(project) {
  return (project.expenses || []).reduce((s, e) => s + (Number(e.amount) || 0), 0);
}
function profitOf(project) {
  return revenueOf(project) - expensesTotalOf(project);
}

function DonutChart({ data, size = 84, centerLabel, centerValue, dark = false }) {
  const containerRef = useRef(null);
  const chartRef = useRef(null);
  const [uid] = useState(() => "apx-" + Math.random().toString(36).slice(2, 8));
  const [ready, setReady] = useState(!!window.ApexCharts);

  const values = data.map((d) => Math.max(0, d.value));
  const colors = data.map((d) => d.color);
  const total = values.reduce((a, b) => a + b, 0);

  useEffect(() => {
    if (window.ApexCharts) { setReady(true); return; }
    // ApexCharts script may still be loading (e.g. right after page load) вҖ” retry briefly.
    let tries = 0;
    const t = setInterval(() => {
      tries++;
      if (window.ApexCharts) { setReady(true); clearInterval(t); }
      else if (tries > 20) clearInterval(t);
    }, 250);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if (!containerRef.current || !ready || !window.ApexCharts) return;
    const textColor = dark ? "#F4F6F5" : "#14213D";
    const subColor = dark ? "#B7C0D8" : "#6B7280";
    const options = {
      chart: {
        type: "donut",
        width: size,
        height: size,
        animations: { enabled: true, easing: "easeout", speed: 650, animateGradually: { enabled: true, delay: 80 }, dynamicAnimation: { enabled: true, speed: 350 } },
        sparkline: { enabled: size < 90 },
        foreColor: textColor,
        background: "transparent",
        dropShadow: { enabled: true, top: 3, left: 0, blur: 5, color: "#000", opacity: dark ? 0.45 : 0.25 },
      },
      series: total > 0 ? values : [1],
      labels: data.map((d) => d.label || ""),
      colors: total > 0 ? colors : ["#E5E7EB"],
      stroke: { show: true, width: 2, colors: [dark ? "#14213D" : "#ffffff"] },
      dataLabels: { enabled: false },
      legend: { show: false },
      tooltip: { enabled: total > 0 },
      states: { hover: { filter: { type: "lighten", value: 0.06 } } },
      fill: {
        type: total > 0 ? "gradient" : "solid",
        gradient: { shade: "dark", type: "diagonal1", shadeIntensity: 0.65, gradientToColors: colors.map((c) => c), inverseColors: true, opacityFrom: 1, opacityTo: 0.82, stops: [0, 100] },
      },
      plotOptions: {
        pie: {
          expandOnClick: false,
          donut: {
            size: "66%",
            labels: {
              show: size >= 90,
              name: { show: true, color: subColor, fontSize: "10px", offsetY: 18 },
              value: { show: true, color: textColor, fontSize: "13px", fontWeight: 800, offsetY: -4, formatter: () => centerValue || "" },
              total: {
                show: true, showAlways: true, label: centerLabel || "",

                formatter: () => centerValue || fmt(total),
              },
            },
          },
        },
      },
    };
    const chart = new window.ApexCharts(containerRef.current, options);
    chart.render();
    chartRef.current = chart;
    return () => { chart.destroy(); chartRef.current = null; };
    // eslint-disable-next-line
  }, [JSON.stringify(values), JSON.stringify(colors), centerValue, size, dark, ready]);

  if (!ready) {
    return (
      <div className="rounded-full flex items-center justify-center text-center"

function withTimeout(promise, ms) {
  return new Promise((resolve, reject) => {
    const t = setTimeout(() => reject(new Error("timeout")), ms);
    promise.then((v) => { clearTimeout(t); resolve(v); }, (e) => { clearTimeout(t); reject(e); });
  });
}

function resizeImageLegacy(file, maxW, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function LeafletMap({ markers, onMapClick, center, zoom, fitAll, height = 220 }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef([]);
  const clickHandlerRef = useRef(onMapClick);
  clickHandlerRef.current = onMapClick;

  useEffect(() => {
    if (!containerRef.current || mapRef.current || !window.L) return;
    const map = window.L.map(containerRef.current, { zoomControl: true }).setView(center || [35.7, 51.4], zoom || 5);
    window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors",
      maxZoom: 19,
    }).addTo(map);
    map.on("click", (e) => { if (clickHandlerRef.current) clickHandlerRef.current(e.latlng.lat, e.latlng.lng); });
    mapRef.current = map;
    setTimeout(() => map.invalidateSize(), 200);
    return () => { map.remove(); mapRef.current = null; };
    // eslint-disable-next-line
  }, []);

  useEffect(() => {
    const map = mapRef.current;
    if (!map || !window.L) return;
    markersRef.current.forEach((m) => map.removeLayer(m));
    markersRef.current = [];
    const icon = window.L.divIcon({
      html: '<div style="font-size:26px;line-height:1;transform:translateY(-4px);">рҹ“Қ</div>',
      className: "", iconSize: [26, 26], iconAnchor: [13, 26],
    });
    (markers || []).forEach((mk) => {
      const marker = window.L.marker([mk.lat, mk.lng], { icon }).addTo(map);
      if (mk.label) marker.bindPopup(mk.label);
      if (mk.onClick) marker.on("click", mk.onClick);
      markersRef.current.push(marker);
    });
    if (fitAll && markers && markers.length > 1) {
      const bounds = window.L.latLngBounds(markers.map((m) => [m.lat, m.lng]));
      map.fitBounds(bounds, { padding: [30, 30], maxZoom: 15 });
    } else if (markers && markers.length === 1) {
      map.setView([markers[0].lat, markers[0].lng], Math.max(map.getZoom(), 14));
    }
    // eslint-disable-next-line
  }, [markers, fitAll]);

  useEffect(() => {
    const map = mapRef.current;
    if (map && center && !fitAll) map.setView(center, map.getZoom());
    // eslint-disable-next-line
  }, [center && center[0], center && center[1]]);

  return <div ref={containerRef} style={{ height, width: "100%", borderRadius: 12 }} />;
}

async function resizeImage(file, maxW = 1000, quality = 0.7) {
  // Modern, memory-efficient path: decodes directly at reduced size instead of
  // loading the full-resolution photo into memory first (important on phones,
  // where a camera photo can be 10-20MB before it's ever resized).
  if (window.createImageBitmap) {
    try {
      const bitmap = await withTimeout(createImageBitmap(file, { resizeWidth: maxW, resizeQuality: "medium" }), 8000);
      const canvas = document.createElement("canvas");
      canvas.width = bitmap.width;
      canvas.height = bitmap.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(bitmap, 0, 0);
      if (bitmap.close) bitmap.close();
      return canvas.toDataURL("image/jpeg", quality);
    } catch (e) {
      // fall through to the legacy method below
    }
  }
  return withTimeout(resizeImageLegacy(file, maxW, quality), 8000);
}

function readRawFile(file, maxBytes = 8 * 1024 * 1024) {
  const inner = new Promise((resolve, reject) => {
    if (file.size > maxBytes) { reject(new Error("ЩҒШ§ЫҢЩ„ Ш®ЫҢЩ„ЫҢ ШЁШІШұЪҜ Ш§ШіШӘ (ШЁЫҢШҙШӘШұ Ш§ШІ Ыё Щ…ЪҜШ§ШЁШ§ЫҢШӘ).")); return; }
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("Ш®ЩҲШ§ЩҶШҜЩҶ ЩҒШ§ЫҢЩ„ ШЁШ§ Ш®Ш·Ш§ Щ…ЩҲШ§Ш¬ЩҮ ШҙШҜ."));
    try {
      reader.readAsDataURL(file);
    } catch (e) {
      reject(e);
    }
  });
  return withTimeout(inner, 10000);
}

    const sorted = [...floors].sort((a, b) => a.number - b.number);

    sorted.forEach((f) => {
      for (let i = 1; i <= f.count; i++) {
        units.push(emptyUnit(f.number, String(seq)));
        seq++;
      }
    });
    const dataPayload = {
      floors, units, expenses: [], documents: [],
      activities: defaultProjectActivities(),
      bankAccounts: [], investors: [], financeTransactions: [],

      .insert({ user_id: user.id, name, data: dataPayload }).select().single();

  function addFloor(projectId, count) {
    updateProject(projectId, (p) => {
      const nextNum = p.floors.length ? Math.max(...p.floors.map((f) => f.number)) + 1 : 1;
      const maxSeq = p.units.length ? Math.max(...p.units.map((u) => Number(u.unitNumber) || 0)) : 0;
      const newUnits = [];
      for (let i = 1; i <= count; i++) newUnits.push(emptyUnit(nextNum, String(maxSeq + i)));
      return { ...p, floors: [...p.floors, { number: nextNum, count }], units: [...p.units, ...newUnits] };
    });
  }

  function addExpense(projectId, expense) {
    if (!guardWrite()) return;
    updateProject(projectId, (p) => {
      const exp = { id: uid(), ...expense };
      let financeTransactions = [...(p.financeTransactions || [])];
      if (exp.bankAccountId && Number(exp.amount) > 0) {
        financeTransactions.push({
          id: uid(),
          date: exp.date || new Date().toISOString().slice(0, 10),
          type: exp.paymentMethod === "check" ? "check_clear" : "expense",
          amount: Number(exp.amount),
          fromAccountId: exp.bankAccountId,
          toAccountId: null,
          note: exp.title,
          expenseId: exp.id,
        });
      }
      return { ...p, expenses: [...(p.expenses || []), exp], financeTransactions };
    });
    if (expense.materialId && Number(expense.materialQty) > 0) {
      const next = inventory.map((item) => {
        if (item.id !== expense.materialId) return item;
        return { ...item, quantity: (Number(item.quantity) || 0) + Number(expense.materialQty) };
      });
      setInventory(next);
      window.sb.auth.updateUser({ data: { inventory: next } }).then(({ data: udata }) => {
        if (udata?.user) setUser(udata.user);
      });
    }

  function removeExpense(projectId, expenseId) {
    if (!guardWrite()) return;
    updateProject(projectId, (p) => ({
      ...p,
      expenses: (p.expenses || []).filter((e) => e.id !== expenseId),
      financeTransactions: (p.financeTransactions || []).filter((t) => t.expenseId !== expenseId),

    updateProject(projectId, (p) => ({

      financeTransactions: [...(p.financeTransactions || []), { id: uid(), ...tx }],

    if (!guardWrite() || !accountId || !(Number(amount) > 0)) return null;

      ...p,

  function buildBuildingGraphicHTML(project) {
    const esc = (v) => (v == null ? "" : String(v)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const byFloor = {};
    project.units.forEach((u) => { byFloor[u.floor] = byFloor[u.floor] || []; byFloor[u.floor].push(u); });
    const floorNums = Object.keys(byFloor).map(Number).sort((a, b) => b - a);
    const rowsHtml = floorNums.map((floor) => {
      const units = byFloor[floor].slice().sort((a, b) => Number(a.unitNumber) - Number(b.unitNumber));
      const cells = units.map((u) => {
        const s = STATUS[u.status];
        const label = u.status === "sold" ? esc(u.buyerName || "ШЁШҜЩҲЩҶ ЩҶШ§Щ…") : s.label;
        const sub = u.area ? `${esc(u.area)} mВІ` : "";
        return `<div style="background:${s.bg};border:1px solid ${s.color}55;border-radius:8px;padding:5px 3px;text-align:center;">
          <div style="font-weight:700;font-size:9px;color:${s.text};">${esc(u.unitNumber)}</div>
          <div style="font-size:7.5px;color:${s.text};margin-top:1px;">${label}</div>
          ${sub ? `<div style="font-size:7px;color:${s.text};opacity:.8;">${sub}</div>` : ""}
        </div>`;
      }).join("");
      return `<div style="display:flex;gap:5px;align-items:stretch;margin-bottom:5px;">
        <div style="width:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;color:#9CA3AF;">${floor}</div>
        <div style="flex:1;display:grid;grid-template-columns:repeat(${units.length},1fr);gap:5px;">${cells}</div>
      </div>`;
    }).join("");

  function deleteFloor(projectId, floorNumber) {
    updateProject(projectId, (p) => {
      const remainingFloors = p.floors.filter((f) => f.number !== floorNumber);
      const sorted = [...remainingFloors].sort((a, b) => a.number - b.number);
      const remainingUnitsByFloor = {};
      p.units.filter((u) => u.floor !== floorNumber).forEach((u) => {
        remainingUnitsByFloor[u.floor] = remainingUnitsByFloor[u.floor] || [];
        remainingUnitsByFloor[u.floor].push(u);
      });
      let seq = 1;
      const renumbered = [];
      sorted.forEach((f) => {
        const list = (remainingUnitsByFloor[f.number] || []).sort((a, b) => Number(a.unitNumber) - Number(b.unitNumber));
        list.forEach((u) => { renumbered.push({ ...u, unitNumber: String(seq) }); seq++; });
      });
      return { ...p, floors: sorted, units: renumbered };
    });
  }

  function adjustInventoryStock(itemId, delta) {
    if (!guardWrite()) return;
    const next = inventory.map((item) => {
      if (item.id !== itemId) return item;
      return { ...item, quantity: Math.max(0, (Number(item.quantity) || 0) + (Number(delta) || 0)) };
    });
    saveInventory(next);
  }
  function setInventoryQuantity(itemId, qty) {
    if (!guardWrite()) return;
    saveInventory(inventory.map((item) => (
      item.id === itemId ? { ...item, quantity: Math.max(0, Number(qty) || 0) } : item
    )));
  }
  function addInventoryItem(item) {
    if (!guardWrite()) return;
    saveInventory([...inventory, { id: uid(), quantity: 0, allocations: [], takeoffKey: null, itemType: "", itemVariant: "", ...item }]);
  }
  function removeInventoryItem(itemId) {
    if (!guardWrite()) return;
    saveInventory(inventory.filter((i) => i.id !== itemId));
  }
  function allocateInventory(itemId, { activity, quantity }) {
    if (!guardWrite()) return;
    const qty = Number(quantity) || 0;
    if (!activity?.trim() || qty <= 0) return;
    let blocked = false;
    const next = inventory.map((item) => {
      if (item.id !== itemId) return item;
      const avail = inventoryAvailable(item);
      if (qty > avail) { blocked = true; return item; }
      return {
        ...item,
        allocations: [...(item.allocations || []), { id: uid(), activity: activity.trim(), quantity: qty, at: new Date().toISOString() }],
      };
    });
    if (blocked) { setError("Щ…ЩҲШ¬ЩҲШҜЫҢ ШўШІШ§ШҜ Ъ©Ш§ЩҒЫҢ ЩҶЫҢШіШӘ."); return; }
    saveInventory(next);
  }
  function removeAllocation(itemId, allocationId) {
    if (!guardWrite()) return;
    saveInventory(inventory.map((item) => (
      item.id === itemId ? { ...item, allocations: (item.allocations || []).filter((a) => a.id !== allocationId) } : item
    )));
  }
  function patchInventoryItem(itemId, patch) {
    if (!guardWrite()) return;
    saveInventory(inventory.map((item) => (item.id === itemId ? { ...item, ...patch } : item)));
  }

  function contactBalance(contactId) {
    let owe = 0; // ЪҶЫҢШІЫҢ Ъ©ЩҮ Щ…Ш§ ШЁЩҮ Ш§ЫҢЩҶ ШҙШ®Шө ШЁШҜЩҮЪ©Ш§ШұЫҢЩ… (ЩҶШіЫҢЩҮвҖҢЩҮШ§ЫҢ ШӘШіЩҲЫҢЩҮвҖҢЩҶШҙШҜЩҮ)
    projects.forEach((p) => {
      (p.expenses || []).forEach((e) => {
        if (e.contactId !== contactId) return;
        if (e.paymentMethod === "credit") owe += Number(e.amount) || 0;
        else owe -= Number(e.amount) || 0;
      });
    });
    return owe;
  }

  function findMentionedProject(query, list) {
    const q = query.toLowerCase();
    return list.find((p) => q.includes(p.name.toLowerCase()));
  }
  function findMentionedContact(query, list) {
    const q = query.toLowerCase();
    return list.find((c) => q.includes(c.name.toLowerCase()));
  }

  function answerLocalQuestion(query) {
    const q = query.trim().toLowerCase();
    if (!q) return "ШіШӨШ§Щ„ШӘ ШұЩҲ ШЁЩҶЩҲЫҢШі ШӘШ§ Ъ©Щ…Ъ© Ъ©ЩҶЩ….";
    const proj = findMentionedProject(q, projects);
    const contact = findMentionedContact(q, contacts);

    if (contact && (q.includes("ШЁШҜЩҮЪ©Ш§Шұ") || q.includes("Ш·Щ„ШЁ") || q.includes("Щ…Ш§ЩҶШҜЩҮ") || q.includes("ШӯШіШ§ШЁ"))) {
      const bal = contactBalance(contact.id);
      if (bal === 0) return `ШӯШіШ§ШЁ ${contact.name} ШӘШіЩҲЫҢЩҮвҖҢШіШӘ.`;
      return bal > 0 ? `Щ…Ш§ ${fmt(bal)} ШӘЩҲЩ…Ш§ЩҶ ШЁЩҮ ${contact.name} ШЁШҜЩҮЪ©Ш§ШұЫҢЩ….` : `${contact.name} ${fmt(Math.abs(bal))} ШӘЩҲЩ…Ш§ЩҶ ШЁЩҮ Щ…Ш§ ШЁШҜЩҮЪ©Ш§ШұЩҮ.`;
    }

    const targets = proj ? [proj] : projects;
    if (targets.length === 0) return "ЩҮЩҶЩҲШІ ЩҫШұЩҲЪҳЩҮвҖҢШ§ЫҢ Ш«ШЁШӘ ЩҶШҙШҜЩҮ.";

    if (q.includes("ЪҶЩҶШҜ ЩҫШұЩҲЪҳЩҮ") || q.includes("ШӘШ№ШҜШ§ШҜ ЩҫШұЩҲЪҳЩҮ")) {
      return `${projects.length} ЩҫШұЩҲЪҳЩҮ ЩҒШ№Ш§Щ„ ШҜШ§ШұЫҢ.`;
    }
    if (q.includes("Ш®Ш§Щ„ЫҢ")) {
      const n = targets.reduce((s, p) => s + p.units.filter((u) => u.status === "vacant").length, 0);
      return proj ? `${proj.name} Ш§Щ„Ш§ЩҶ ${n} ЩҲШ§ШӯШҜ Ш®Ш§Щ„ЫҢ ШҜШ§ШұЩҮ.` : `Щ…Ш¬Щ…ЩҲШ№ ЩҲШ§ШӯШҜЩҮШ§ЫҢ Ш®Ш§Щ„ЫҢ ЩҮЩ…ЩҮ ЩҫШұЩҲЪҳЩҮвҖҢЩҮШ§: ${n}`;
    }
    if (q.includes("ЩҒШұЩҲШ®ШӘЩҮ") || q.includes("ЩҒШұЩҲШҙ ШұЩҒШӘЩҮ")) {
      const n = targets.reduce((s, p) => s + p.units.filter((u) => u.status === "sold").length, 0);
      return proj ? `${proj.name} ШӘШ§ Ш§Щ„Ш§ЩҶ ${n} ЩҲШ§ШӯШҜ ЩҒШұЩҲШ®ШӘЩҮ.` : `Щ…Ш¬Щ…ЩҲШ№ ЩҲШ§ШӯШҜЩҮШ§ЫҢ ЩҒШұЩҲШ®ШӘЩҮвҖҢШҙШҜЩҮ ЩҮЩ…ЩҮ ЩҫШұЩҲЪҳЩҮвҖҢЩҮШ§: ${n}`;
    }
    if (q.includes("ШұШІШұЩҲ")) {
      const n = targets.reduce((s, p) => s + p.units.filter((u) => u.status === "reserved").length, 0);
      return proj ? `${proj.name} Ш§Щ„Ш§ЩҶ ${n} ЩҲШ§ШӯШҜ ШұШІШұЩҲ ШҜШ§ШұЩҮ.` : `Щ…Ш¬Щ…ЩҲШ№ ЩҲШ§ШӯШҜЩҮШ§ЫҢ ШұШІШұЩҲ ЩҮЩ…ЩҮ ЩҫШұЩҲЪҳЩҮвҖҢЩҮШ§: ${n}`;
    }
    if (q.includes("ЪҶЩҶШҜ ЩҲШ§ШӯШҜ") || q.includes("ШӘШ№ШҜШ§ШҜ ЩҲШ§ШӯШҜ")) {
      const n = targets.reduce((s, p) => s + p.units.length, 0);
      return proj ? `${proj.name} Щ…Ш¬Щ…ЩҲШ№Ш§ЩӢ ${n} ЩҲШ§ШӯШҜ ШҜШ§ШұЩҮ.` : `Щ…Ш¬Щ…ЩҲШ№ ЩҲШ§ШӯШҜЩҮШ§ЫҢ ЩҮЩ…ЩҮ ЩҫШұЩҲЪҳЩҮвҖҢЩҮШ§: ${n}`;
    }
    if (q.includes("ШіЩҲШҜ") || q.includes("ШІЫҢШ§ЩҶ")) {
      const revenue = targets.reduce((s, p) => s + revenueOf(p), 0);
      const expenses = targets.reduce((s, p) => s + expensesTotalOf(p), 0);
      const profit = revenue - expenses;
      const label = profit >= 0 ? "ШіЩҲШҜ" : "ШІЫҢШ§ЩҶ";
      return proj ? `${label} ${proj.name} ШӘШ§ Ш§ЫҢЩҶ Щ„ШӯШёЩҮ: ${fmt(Math.abs(profit))} ШӘЩҲЩ…Ш§ЩҶ.` : `${label} Ъ©Щ„ ЩҫШұЩҲЪҳЩҮвҖҢЩҮШ§ ШӘШ§ Ш§ЫҢЩҶ Щ„ШӯШёЩҮ: ${fmt(Math.abs(profit))} ШӘЩҲЩ…Ш§ЩҶ.`;
    }
    if (q.includes("ЩҮШІЫҢЩҶЩҮ")) {
      const n = targets.reduce((s, p) => s + expensesTotalOf(p), 0);
      return proj ? `Щ…Ш¬Щ…ЩҲШ№ ЩҮШІЫҢЩҶЩҮвҖҢЩҮШ§ЫҢ ${proj.name}: ${fmt(n)} ШӘЩҲЩ…Ш§ЩҶ.` : `Щ…Ш¬Щ…ЩҲШ№ ЩҮШІЫҢЩҶЩҮвҖҢЩҮШ§ЫҢ ЩҮЩ…ЩҮ ЩҫШұЩҲЪҳЩҮвҖҢЩҮШ§: ${fmt(n)} ШӘЩҲЩ…Ш§ЩҶ.`;
    }
    if (q.includes("ШҜШұШўЩ…ШҜ") || q.includes("ЩҒШұЩҲШҙ Ъ©Щ„")) {
      const n = targets.reduce((s, p) => s + revenueOf(p), 0);
      return proj ? `Щ…Ш¬Щ…ЩҲШ№ ШҜШұШўЩ…ШҜ ${proj.name}: ${fmt(n)} ШӘЩҲЩ…Ш§ЩҶ.` : `Щ…Ш¬Щ…ЩҲШ№ ШҜШұШўЩ…ШҜ ЩҮЩ…ЩҮ ЩҫШұЩҲЪҳЩҮвҖҢЩҮШ§: ${fmt(n)} ШӘЩҲЩ…Ш§ЩҶ.`;
    }
    if (q.includes("Щ…ШұШӯЩ„ЩҮ")) {
      if (proj) return proj.phase ? `${proj.name} Ш§Щ„Ш§ЩҶ ШӘЩҲЫҢ Щ…ШұШӯЩ„ЩҮ В«${proj.phase}В»ЩҮ.` : `Щ…ШұШӯЩ„ЩҮ ${proj.name} ЩҮЩҶЩҲШІ Щ…ШҙШ®Шө ЩҶШҙШҜЩҮ.`;
      const lines = projects.map((p) => `${p.name}: ${p.phase || "ЩҶШ§Щ…ШҙШ®Шө"}`).join(" / ");
      return lines || "ЩҫШұЩҲЪҳЩҮвҖҢШ§ЫҢ ЩҶЫҢШіШӘ.";
    }
    if (q.includes("ШўШҜШұШі")) {
      if (proj) return proj.address ? `ШўШҜШұШі ${proj.name}: ${proj.address}` : `ШўШҜШұШіЫҢ ШЁШұШ§ЫҢ ${proj.name} Ш«ШЁШӘ ЩҶШҙШҜЩҮ.`;
    }

    return "Щ…ШӘЩҲШ¬ЩҮ ЩҶШҙШҜЩ…. Щ…ЫҢвҖҢШӘЩҲЩҶЫҢ Ш§ЫҢЩҶвҖҢШ¬ЩҲШұЫҢ ШЁЩҫШұШіЫҢ: В«ШіЩҲШҜ ЩҫШұЩҲЪҳЩҮ ШіЩҫЩҮШұ Ыҙ ЪҶЩӮШҜШұЩҮШҹВ»ШҢ В«ЪҶЩҶШҜ ЩҲШ§ШӯШҜ Ш®Ш§Щ„ЫҢ ШҜШ§ШұЫҢЩ…ШҹВ»ШҢ В«ШўЩӮШ§ЫҢ Щ…ШӯЩ…ШҜЫҢ ЪҶЩӮШҜШұ ШЁШҜЩҮЪ©Ш§ШұЩҮШҹВ»";
  }

  // Check every 20s (while the app is open) for reminders whose time has arrived
  useEffect(() => {
    const t = setInterval(() => {
      const now = Date.now();
      const due = reminders.find((r) => !r.notified && r.datetime && new Date(r.datetime).getTime() <= now);
      if (due) {
        setDueReminder(due);
        saveReminders(reminders.map((r) => (r.id === due.id ? { ...r, notified: true } : r)));
        if (window.Notification && Notification.permission === "granted") {
          try { new Notification(APP_NAME, { body: due.text }); } catch (e) {}
        }
      }
    }, 20000);
    return () => clearInterval(t);
  }, [reminders]);

  function exportBackup() {
    try {
      const payload = { version: 2, exportedAt: new Date().toISOString(), company, projects };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `backup-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    } catch (e) {
      setError("ШіШ§Ш®ШӘ ЩҒШ§ЫҢЩ„ ЩҫШҙШӘЫҢШЁШ§ЩҶ ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ.");
    }
  }

  function restoreBackup(file, onDone) {
    if (!guardWrite("ШӯШіШ§ШЁ ШҜЩ…ЩҲ ЩҒЩӮШ· ШЁШұШ§ЫҢ Щ…ШҙШ§ЩҮШҜЩҮ Ш§ШіШӘ вҖ” ШЁШ§ШІЫҢШ§ШЁЫҢ ЩҫШҙШӘЫҢШЁШ§ЩҶ ШәЫҢШұЩҒШ№Ш§Щ„ Ш§ШіШӘ.")) {
      onDone(false, "ШӯШіШ§ШЁ ШҜЩ…ЩҲ ЩҒЩӮШ· ШЁШұШ§ЫҢ Щ…ШҙШ§ЩҮШҜЩҮ Ш§ШіШӘ.");
      return;
    }
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.projects)) throw new Error("invalid");

        await window.sb.from("projects").delete().eq("user_id", user.id);

        let list = [];
        if (data.projects.length) {
          const rows = data.projects.map((p) => {
            const { id: _id, name, ...rest } = p;
            return { user_id: user.id, name, data: rest };
          });
          const { data: inserted, error: err } = await window.sb.from("projects").insert(rows).select();
          if (err) throw err;
          list = inserted.map((row) => ({ id: row.id, name: row.name, ...(row.data || {}) }));
        }

        if (data.company) {
          const { data: udata, error: uerr } = await window.sb.auth.updateUser({ data: { company: data.company } });
          if (!uerr && udata?.user) { setUser(udata.user); setCompany(data.company); }
        } else {
          setCompany(null);
        }

        setProjects(list);
        setActiveTab(list.length ? list[0].id : null);
        onDone(true, null);
      } catch (e) {
        onDone(false, "ЩҒШ§ЫҢЩ„ ЩҫШҙШӘЫҢШЁШ§ЩҶ Щ…Ш№ШӘШЁШұ ЩҶЫҢШіШӘ ЫҢШ§ ШЁШ§ШІЫҢШ§ШЁЫҢ ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ.");
      }
    };
    reader.onerror = () => onDone(false, "Ш®ЩҲШ§ЩҶШҜЩҶ ЩҒШ§ЫҢЩ„ ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ.");
    reader.readAsText(file);
  }

  if (authLoading) return <SplashScreen />;
  if (!user) {
    return <LoginScreen onSuccess={() => setScreen("dashboard")} />;
  }
  if (activated === null) return <SplashScreen />;
  if (!activated) {
    return (
      <ActivationGate
        onActivated={() => setActivated(true)}
        onLogout={() => window.sb.auth.signOut()}
      />
    );
  }
  if (!loaded) return <SplashScreen />;
  if (!company) {
    if (isDemoUser(user)) return <SplashScreen />;
    return <CompanySetup onSave={saveCompany} />;
  }

  return (
    <div dir="rtl" className="min-h-screen bg-[#F4F6F5] text-[#14213D] flex flex-col relative">
      <Watermark />
      {error && (
        <div className="fixed top-3 left-1/2 -translate-x-1/2 z-[70] bg-red-600 text-white text-sm px-4 py-2 rounded-lg shadow-lg">
          {error}<button className="mr-3 underline" onClick={() => setError("")}>ШЁШіШӘЩҶ</button>
        </div>
      )}
      {uploadCrashWarning && (
        <div className="fixed inset-x-3 top-3 z-[70] bg-amber-50 border border-amber-300 text-amber-900 text-xs px-4 py-3 rounded-xl shadow-lg leading-6">
          <b>ШҜЩҒШ№ЩҮ ЩӮШЁЩ„ШҢ ЩҲШіШ· Ш§ЩҶШӘШ®Ш§ШЁ Ш№Ъ©ШіШҢ Ш§Щҫ ШЁШіШӘЩҮ/ШұЫҢвҖҢШ§ШіШӘШ§ШұШӘ ШҙШҜ.</b><br />
          Ш§ЫҢЩҶ Щ…Ш№Щ…ЩҲЩ„Ш§ЩӢ ШЁЩҮвҖҢШ®Ш§Ш·Шұ ШӘЩҶШёЫҢЩ…Ш§ШӘ Щ…ШҜЫҢШұЫҢШӘ ШЁШ§ШӘШұЫҢ ЪҜЩҲШҙЫҢЩҮШҢ ЩҶЩҮ Ш®ЩҲШҜ Ш§Щҫ. ШЁШұШ§ЫҢ ШұЩҒШ№: ШӘЩҶШёЫҢЩ…Ш§ШӘ ЪҜЩҲШҙЫҢ вҶҗ Apps вҶҗ Chrome вҶҗ Battery вҶҗ ЪҜШІЫҢЩҶЩҮ В«No restrictionsВ» ШұЩҲ Ш§ЩҶШӘШ®Ш§ШЁ Ъ©ЩҶШҢ ЩҲ Ш§ЪҜЩҮ ЪҜШІЫҢЩҶЩҮ В«AutostartВ» ЩҮЩ… ШЁЩҲШҜШҢ ЩҒШ№Ш§Щ„Шҙ Ъ©ЩҶ.
          <button className="block mt-1 underline font-semibold" onClick={() => setUploadCrashWarning(false)}>Щ…ШӘЩҲШ¬ЩҮ ШҙШҜЩ…</button>
        </div>
      )}
      {dueReminder && (
        <div className="fixed inset-x-3 top-3 z-[80] bg-[#14213D] text-white text-sm px-4 py-3 rounded-xl shadow-lg flex items-start gap-2">
          <Bell size={16} className="mt-0.5 flex-shrink-0 text-[#C9A227]" />
          <div className="flex-1">
            <div className="font-semibold mb-0.5">ЫҢШ§ШҜШўЩҲШұЫҢ</div>
            <div className="text-xs text-white/80">{dueReminder.text}</div>
          </div>
          <button onClick={() => setDueReminder(null)} className="text-white/70"><X size={16} /></button>
        </div>
      )}

      {isReadOnly && (
        <div className="bg-[#128C7E]/10 border-b border-[#128C7E]/25 text-[#0F6B5F] text-xs text-center py-2 px-4 font-medium">
          ШӯШіШ§ШЁ ШҜЩ…ЩҲ вҖ” ЩҒЩӮШ· Щ…ШҙШ§ЩҮШҜЩҮ. ШЁШұШ§ЫҢ ЩҲЫҢШұШ§ЫҢШҙШҢ ШӯШіШ§ШЁ Ш®ЩҲШҜ ШұШ§ ШЁШіШ§ШІЫҢШҜ ЫҢШ§ Ш§ШІ ШұШ§ЩҮЩҶЩ…Ш§ Ш®Ш§ШұШ¬ ШҙЩҲЫҢШҜ.
        </div>
      )}

      {!showChat && (
        <button onClick={() => setShowChat(true)}
          className="fixed bottom-6 left-4 z-[57] w-14 h-14 rounded-full bg-[#128C7E] text-white shadow-xl flex items-center justify-center">
          <ChatIcon size={24} />
        </button>
      )}

      {showChat && (
        <div className="fixed inset-0 z-[90] flex items-end sm:items-center sm:justify-center bg-black/30" onClick={() => setShowChat(false)}>
          <div className="bg-white w-full sm:max-w-sm sm:rounded-2xl rounded-t-2xl h-[75vh] sm:h-[560px] flex flex-col" onClick={(e) => e.stopPropagation()}>
            <div className="bg-[#128C7E] text-white px-4 py-3 flex items-center gap-2 sm:rounded-t-2xl rounded-t-2xl">
              <ChatIcon size={18} />
              <div className="flex-1">
                <div className="font-bold text-sm">ЩҫЫҢШ§Щ…вҖҢЩҮШ§</div>
                <div className="text-[10px] text-white/70">ШҜШіШӘЫҢШ§Шұ Щ…ШӯЩ„ЫҢ вҖ” ШЁШҜЩҲЩҶ Ш§ЫҢЩҶШӘШұЩҶШӘШҢ ЩҒЩӮШ· Ш§ШІ ШҜШ§ШҜЩҮвҖҢЩҮШ§ЫҢ Ш®ЩҲШҜШӘ</div>
              </div>
              <button onClick={() => setShowChat(false)} className="text-white/70"><X size={18} /></button>
            </div>
            <div className="flex-1 overflow-y-auto px-3 py-3 flex flex-col gap-2">
              {chatLog.map((m, i) => (
                <div key={i} className={`max-w-[85%] text-xs rounded-2xl px-3 py-2 ${m.role === "bot" ? "bg-[#F4F6F5] text-[#14213D] self-start" : "bg-[#14213D] text-white self-end"}`}>
                  {m.text}
                </div>
              ))}
            </div>
            <div className="p-3 border-t border-black/10 flex items-center gap-2">
              <input
                value={chatInput}
                onChange={(e) => setChatInput(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter" && chatInput.trim()) sendChatMessage(); }}
                placeholder="ШіШӨШ§Щ„ШӘ ШұЩҲ ШЁЩҶЩҲЫҢШі..."
                className="flex-1 bg-[#F4F6F5] rounded-xl px-3 py-2.5 text-sm outline-none"
              />
              <button onClick={sendChatMessage} disabled={!chatInput.trim()} className="w-10 h-10 rounded-xl bg-[#14213D] text-white flex items-center justify-center disabled:opacity-40">
                <SendIcon size={15} />
              </button>
            </div>
          </div>
        </div>
      )}

      <div className="relative">
        <div className="bg-[#14213D] text-white px-4 pt-6 pb-4 flex items-center gap-3 relative overflow-hidden">
          <div className="absolute inset-0 opacity-[0.07]" style={{
            backgroundImage: "linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)",
            backgroundSize: "20px 20px",
          }} />
          <button onClick={() => setShowMenu(true)} className="relative p-2 -ml-1 text-white/90"><Menu size={22} /></button>

          {showSearch ? (
            <div className="relative flex-1 flex items-center gap-2">
              <input
                autoFocus
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                placeholder="Ш¬ШіШӘШ¬ЩҲЫҢ ЩҫШұЩҲЪҳЩҮШҢ ЩҲШ§ШӯШҜШҢ Щ…Ш®Ш§Ш·ШЁ..."
                className="flex-1 bg-white/10 text-white placeholder-white/50 rounded-xl px-3 py-2 text-sm outline-none"
              />
              <button onClick={() => { setShowSearch(false); setSearchQuery(""); }} className="p-1 text-white/80"><X size={18} /></button>
            </div>
          ) : (
            <>
              <button onClick={() => setShowCompanySettings(true)} className="relative flex items-center gap-2 flex-1 text-right">
                {company.logo ? (
                  <img src={company.logo} alt="" className="w-10 h-10 rounded-xl object-cover border border-white/20" />
                ) : (
                  <div className="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center"><Building2 size={20} /></div>
                )}
                <div>
                  <div className="font-extrabold text-base leading-tight">{company.name}</div>
                  <div className="text-[10px] text-[#C9A227] font-medium">Metrico вҖ” Щ…ШҜЫҢШұЫҢШӘ ЩҫШұЩҲЪҳЩҮвҖҢЩҮШ§ЫҢ ШіШ§Ш®ШӘЩ…Ш§ЩҶЫҢ</div>
                </div>
              </button>
              <button onClick={() => setShowSearch(true)} className="relative p-2 text-white/90"><Search size={19} /></button>
            </>
          )}
        </div>

        {showSearch && searchQuery.trim() && ReactDOM.createPortal(
          <div className="fixed left-0 right-0 top-[84px] mx-3 bg-white shadow-2xl rounded-2xl overflow-y-auto z-[95] max-h-80 border border-black/10">
            {searchResults.length === 0 ? (
              <div className="text-center text-xs text-[#9CA3AF] py-4">ЩҶШӘЫҢШ¬ЩҮвҖҢШ§ЫҢ ЩҫЫҢШҜШ§ ЩҶШҙШҜ</div>
            ) : (
              searchResults.map((r) => (
                <button key={r.type + r.id} onClick={() => openSearchResult(r)} className="w-full text-right px-4 py-3 border-b border-black/5 flex items-center gap-2 hover:bg-[#F4F6F5]">
                  {r.type === "project" && <Layers size={15} className="text-[#14213D] flex-shrink-0" />}
                  {r.type === "unit" && <Building2 size={15} className="text-[#14213D] flex-shrink-0" />}
                  {r.type === "contact" && <Users size={15} className="text-[#14213D] flex-shrink-0" />}
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium text-[#14213D] truncate">{r.title}</div>
                    <div className="text-[11px] text-[#9CA3AF] truncate">{r.subtitle}</div>
                  </div>
                </button>
              ))
            )}
          </div>,
          document.body
        )}
      </div>

      <div className="flex-1 overflow-y-auto pb-6">
        {screen === "about" && <AboutScreen onBack={() => setScreen("dashboard")} />}
        {screen === "privacy" && <PrivacyScreen onBack={() => setScreen("dashboard")} />}
        {screen === "guide" && (
          <GuideScreen
            onBack={() => setScreen("dashboard")}
            onDemoLogin={loginAsDemo}
          />
        )}
        {screen === "contacts" && (
          <ContactsScreen
            onBack={() => setScreen("dashboard")}
            contacts={contacts}
            contactBalance={contactBalance}
            onAdd={addContact}
            onUpdate={updateContact}
            onRemove={removeContact}
          />
        )}
        {screen === "notes" && (
          <NotesScreen
            onBack={() => setScreen("dashboard")}
            projects={projects}
            onAddNote={addProjectNote}
            onRemoveNote={removeProjectNote}
          />
        )}
        {screen === "reminders" && (
          <RemindersScreen
            onBack={() => setScreen("dashboard")}
            projects={projects}
            reminders={reminders}
            onAdd={addReminder}
            onRemove={removeReminder}
          />
        )}
        {screen === "map" && (
          <LocationScreen
            onBack={() => setScreen("dashboard")}
            projects={projects}
            onOpenProject={(id) => { setActiveTab(id); setScreen("app"); }}
          />
        )}
        {screen === "takeoff" && (
          <TakeoffScreen
            onBack={() => setScreen("dashboard")}
            projects={projects}
            onSave={(projectId, takeoff) => updateProjectMeta(projectId, { takeoff })}
            onError={(msg) => setError(msg)}
            inventory={inventory}
            isReadOnly={isReadOnly}
          />
        )}
        {screen === "inventory" && (
          <InventoryScreen
            onBack={() => setScreen("dashboard")}
            inventory={inventory}
            isReadOnly={isReadOnly}
            onAddItem={addInventoryItem}
            onRemoveItem={removeInventoryItem}
            onSetQuantity={setInventoryQuantity}
            onPatchItem={patchInventoryItem}
            onAllocate={allocateInventory}
            onRemoveAllocation={removeAllocation}
          />
        )}
        {screen === "backup" && (
          <BackupScreen
            onBack={() => setScreen("dashboard")}
            onExport={exportBackup}
            onRestore={restoreBackup}
            projectCount={projects.length}
          />
        )}
        {screen === "dashboard" && (
          <DashboardScreen
            projects={projects}
            contacts={contacts}
            onOpenProject={(id) => { setActiveTab(id); setScreen("app"); }}
            onNewProject={() => setShowNewProject(true)}
            onQuickExpense={() => {
              const target = activeProject || projects[0];
              if (!target) { setShowNewProject(true); return; }
              setActiveTab(target.id);
              setScreen("app");
              setShowExpenses(true);
            }}
            onOpenContacts={() => setScreen("contacts")}
            onOpenReports={(view) => {
              if (!projects.length) { setShowNewProject(true); return; }
              const target = activeProject || projects[0];
              setActiveTab(target.id);
              setReportsView(view);
              setScreen("reports");
            }}
          />
        )}
        {screen === "reports" && (activeProject || projects[0]) && (
          <ReportsScreen
            project={activeProject || projects[0]}
            projects={projects}
            contacts={contacts}
            initialView={reportsView}
            onBack={() => setScreen("dashboard")}
            onSelectProject={(id) => setActiveTab(id)}
          />
        )}
        {screen === "finance" && activeProject && (
          <FinanceScreen
            project={activeProject}
            contacts={contacts}
            isReadOnly={isReadOnly}
            onBack={() => setScreen("app")}
            onAddTransaction={(tx) => addFinanceTransaction(activeProject.id, tx)}
          />
        )}
        {screen === "app" && (
          activeProject ? (
            <ProjectPanel
              project={activeProject}
              onOpenUnit={(id) => setOpenUnitId(id)}
              onOpenSettings={() => setShowProjectSettings(true)}
              onOpenExpenses={() => setShowExpenses(true)}
              onOpenFinance={() => setScreen("finance")}
              onPrint={() => openReport("project")}
              onFinancialReport={() => openFinancialReport(activeProject)}
              onBackToDashboard={() => setScreen("dashboard")}
              onRemoveNote={(noteId) => removeProjectNote(activeProject.id, noteId)}
            />
          ) : (
            <div className="text-center text-[#6B7280] mt-20 text-sm px-8">
              ЩҮЩҶЩҲШІ ЩҫШұЩҲЪҳЩҮвҖҢШ§ЫҢ Ш§Ш¶Ш§ЩҒЩҮ ЩҶШҙШҜЩҮ. Ш§ШІ Щ…ЩҶЩҲЫҢ вҳ° ШЁШ§Щ„Ш§ЫҢ ШөЩҒШӯЩҮШҢ В«ЩҫШұЩҲЪҳЩҮ Ш¬ШҜЫҢШҜВ» ШұШ§ ШЁШіШ§ШІ.
            </div>
          )
        )}
      </div>

      {showMenu && (
        <SideMenu
          company={company}
          projects={projects}
          activeTab={activeTab}
          currentScreen={screen}
          isReadOnly={isReadOnly}
          onOpenDashboard={() => { setScreen("dashboard"); setShowMenu(false); }}
          onSelectProject={(id) => { setActiveTab(id); setScreen("app"); setShowMenu(false); }}
          onNewProject={() => { setShowNewProject(true); setShowMenu(false); }}
          onClose={() => setShowMenu(false)}
          onOpenBackup={() => { setScreen("backup"); setShowMenu(false); }}
          onOpenAbout={() => { setScreen("about"); setShowMenu(false); }}
          onOpenGuide={() => { setScreen("guide"); setShowMenu(false); }}
          onOpenPrivacy={() => { setScreen("privacy"); setShowMenu(false); }}
          onOpenContacts={() => { setScreen("contacts"); setShowMenu(false); }}
          onOpenNotes={() => { setScreen("notes"); setShowMenu(false); }}
          onOpenReminders={() => { setScreen("reminders"); setShowMenu(false); }}
          onOpenMap={() => { setScreen("map"); setShowMenu(false); }}
          onOpenTakeoff={() => { setScreen("takeoff"); setShowMenu(false); }}
          onOpenInventory={() => { setScreen("inventory"); setShowMenu(false); }}
          onExportAll={() => { openReport("all"); setShowMenu(false); }}
          onLogout={logout}
        />
      )}

      {showExpenses && activeProject && (
        <ExpensesSheet
          project={activeProject}
          onClose={() => setShowExpenses(false)}
          onAdd={(expense) => addExpense(activeProject.id, expense)}
          onRemove={(id) => removeExpense(activeProject.id, id)}
          contacts={contacts}
          onAddContact={addContact}
          contactBalance={contactBalance}
          inventory={inventory}
          isReadOnly={isReadOnly}
        />
      )}

      {showCompanySettings && (
        <CompanySetup
          initial={company}
          onSave={saveCompany}
          onClose={() => setShowCompanySettings(false)}
          user={user}
          onError={(msg) => setError(msg)}
        />
      )}

      {showNewProject && <NewProjectSheet onCancel={() => setShowNewProject(false)} onCreate={createProject} />}

      {showProjectSettings && activeProject && (
        <ProjectSettingsSheet
          project={activeProject}
          contacts={contacts}
          isReadOnly={isReadOnly}
          onClose={() => setShowProjectSettings(false)}
          onRename={(name) => renameProject(activeProject.id, name)}
          onUpdateMeta={(meta) => updateProjectMeta(activeProject.id, meta)}
          onUpdateActivities={(activities) => updateProjectMeta(activeProject.id, { activities })}
          onUpdateBankAccounts={(bankAccounts) => updateProjectMeta(activeProject.id, { bankAccounts })}
          onUpdateInvestors={(investors) => updateProjectMeta(activeProject.id, { investors })}
          onAddFloor={(count) => addFloor(activeProject.id, count)}
          onDeleteFloor={(floorNumber) => deleteFloor(activeProject.id, floorNumber)}
          onDelete={() => deleteProject(activeProject.id)}
          onAddDoc={(name, dataUrl) => addProjectDoc(activeProject.id, name, dataUrl)}
          onRemoveDoc={(docId) => removeProjectDoc(activeProject.id, docId)}
          onError={(msg) => setError(msg)}
        />
      )}

      {openUnit && activeProject && (
        <UnitModal
          unit={openUnit}
          project={activeProject}
          onClose={() => setOpenUnitId(null)}
          onChange={(updater) => updateUnit(activeProject.id, openUnit.id, updater)}
          onRecordIncome={(payload) => recordUnitIncome(activeProject.id, openUnit.id, payload)}
          onReport={() => openUnitReport(activeProject, openUnit)}
          onError={(msg) => setError(msg)}
          contacts={contacts}
          onAddContact={addContact}
          isReadOnly={isReadOnly}
        />
      )}
    </div>
  );
}

function SideMenu({ company, projects, activeTab, currentScreen, isReadOnly, onOpenDashboard, onSelectProject, onNewProject, onClose, onOpenBackup, onOpenAbout, onOpenGuide, onOpenPrivacy, onOpenContacts, onOpenNotes, onOpenReminders, onOpenMap, onOpenTakeoff, onOpenInventory, onExportAll, onLogout }) {
  const [confirmLogout, setConfirmLogout] = useState(false);
  return (
    <div className="fixed inset-0 z-[75] flex" dir="rtl">
      <div className="w-[82%] max-w-xs bg-white h-full flex flex-col shadow-2xl">
        <div className="bg-[#14213D] text-white px-5 pt-6 pb-4 flex items-center gap-3">
          {company?.logo ? (
            <img src={company.logo} alt="" className="w-10 h-10 rounded-xl object-cover border border-white/20" />
          ) : (
            <div className="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center"><Building2 size={20} /></div>

function BackupScreen({ onBack, onExport, onRestore, projectCount }) {
  const fileRef = useRef(null);
  const [msg, setMsg] = useState(null);
  const [confirmRestore, setConfirmRestore] = useState(null);

  function pickFile() { fileRef.current.click(); }
  function handleFile(e) {
    const file = e.target.files?.[0];
    e.target.value = "";
    if (!file) return;
    setConfirmRestore(file);
  }
  function doRestore() {
    onRestore(confirmRestore, (ok, err) => {
      setConfirmRestore(null);
      setMsg(ok ? { type: "ok", text: "Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ШЁШ§ Щ…ЩҲЩҒЩӮЫҢШӘ ШЁШ§ШІЫҢШ§ШЁЫҢ ШҙШҜ." } : { type: "err", text: err });
    });
  }

  return (
    <div className="px-5 pt-5 pb-10">
      <div className="flex items-center gap-3 mb-6">
        <button onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>
        <div className="font-bold text-lg">ЩҫШҙШӘЫҢШЁШ§ЩҶвҖҢЪҜЫҢШұЫҢ ЩҲ ШЁШ§ШІЫҢШ§ШЁЫҢ</div>
      </div>

      <div className="bg-white rounded-2xl p-4 border border-black/5 mb-4">
        <div className="font-semibold text-sm mb-1">ШҜШұЫҢШ§ЩҒШӘ ЩҒШ§ЫҢЩ„ ЩҫШҙШӘЫҢШЁШ§ЩҶ</div>
        <div className="text-xs text-[#6B7280] mb-3">
          ЫҢЪ© ЩҒШ§ЫҢЩ„ ШҙШ§Щ…Щ„ ШӘЩ…Ш§Щ… Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ШҙШұЪ©ШӘ ЩҲ {projectCount} ЩҫШұЩҲЪҳЩҮ (ЩҲШ§ШӯШҜЩҮШ§ШҢ Ш®ШұЫҢШҜШ§ШұШ§ЩҶШҢ Ш§ЩӮШіШ§Ш·) ШіШ§Ш®ШӘЩҮ Щ…ЫҢвҖҢШҙЩҲШҜ. Ш§ЫҢЩҶ ЩҒШ§ЫҢЩ„ ШұШ§ Ш¬Ш§ЫҢ Ш§Щ…ЩҶЫҢ (ЪҜЩҲЪҜЩ„вҖҢШҜШұШ§ЫҢЩҲШҢ Ш§ЫҢЩ…ЫҢЩ„ ЩҲ...) ЩҶЪҜЩҮ ШҜШ§Шұ.
        </div>
        <button onClick={onExport} className="w-full flex items-center justify-center gap-2 bg-[#14213D] text-white rounded-xl py-2.5 text-sm font-semibold">
          <Download size={15} /> ШҜШ§ЩҶЩ„ЩҲШҜ ЩҒШ§ЫҢЩ„ ЩҫШҙШӘЫҢШЁШ§ЩҶ
        </button>
      </div>

      <div className="bg-white rounded-2xl p-4 border border-black/5">
        <div className="font-semibold text-sm mb-1">ШЁШ§ШІЫҢШ§ШЁЫҢ Ш§ШІ ЩҒШ§ЫҢЩ„ ЩҫШҙШӘЫҢШЁШ§ЩҶ</div>
        <div className="text-xs text-[#B91C1C] mb-3">
          вҡ пёҸ ШӘЩҲШ¬ЩҮ: ШЁШ§ШІЫҢШ§ШЁЫҢШҢ ШӘЩ…Ш§Щ… Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ЩҒШ№Щ„ЫҢ Ш§ЫҢЩҶ ЪҜЩҲШҙЫҢ ШұШ§ ШЁШ§ Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ЩҒШ§ЫҢЩ„ ЩҫШҙШӘЫҢШЁШ§ЩҶ Ш¬Ш§ЫҢЪҜШІЫҢЩҶ Щ…ЫҢвҖҢЪ©ЩҶШҜ.
        </div>
        <button onClick={pickFile} className="w-full flex items-center justify-center gap-2 border border-[#14213D]/20 text-[#14213D] rounded-xl py-2.5 text-sm font-semibold">
          <Upload size={15} /> Ш§ЩҶШӘШ®Ш§ШЁ ЩҒШ§ЫҢЩ„ ЩҫШҙШӘЫҢШЁШ§ЩҶ
        </button>
        <input ref={fileRef} type="file" accept="application/json,.json" className="hidden" onChange={handleFile} />
      </div>

      {msg && (
        <div className={`mt-4 text-sm rounded-xl p-3 ${msg.type === "ok" ? "bg-green-50 text-[#166534]" : "bg-red-50 text-[#B91C1C]"}`}>
          {msg.text}
        </div>
      )}

      {confirmRestore && (
        <div className="fixed inset-0 bg-black/40 flex items-end z-[80]">
          <div className="bg-white w-full rounded-t-2xl p-5">
            <div className="font-bold mb-1">ШЁШ§ШІЫҢШ§ШЁЫҢ Ш§Ш·Щ„Ш§Ш№Ш§ШӘШҹ</div>
            <div className="text-sm text-[#6B7280] mb-4">ШӘЩ…Ш§Щ… Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ЩҒШ№Щ„ЫҢ ШЁШ§ Щ…ШӯШӘЩҲШ§ЫҢ ЩҒШ§ЫҢЩ„ В«{confirmRestore.name}В» Ш¬Ш§ЫҢЪҜШІЫҢЩҶ Щ…ЫҢвҖҢШҙЩҲШҜ. Ш§ЫҢЩҶ Ъ©Ш§Шұ ЩӮШ§ШЁЩ„ ШЁШ§ШІЪҜШҙШӘ ЩҶЫҢШіШӘ.</div>
            <div className="flex gap-2">
              <button onClick={() => setConfirmRestore(null)} className="flex-1 border border-black/10 rounded-xl py-2.5 text-sm font-medium">Щ„ШәЩҲ</button>
              <button onClick={doRestore} className="flex-1 bg-[#B91C1C] text-white rounded-xl py-2.5 text-sm font-medium">ШЁШ§ШІЫҢШ§ШЁЫҢ</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function buildKML(projectList) {
  const esc = (v) => (v == null ? "" : String(v)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const placemarks = projectList.filter((p) => p.lat && p.lng).map((p) => `
    <Placemark>
      <name>${esc(p.name)}</name>
      <description>${esc(p.address || "")}</description>
      <Point><coordinates>${p.lng},${p.lat},0</coordinates></Point>
    </Placemark>`).join("");
  return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>${esc(APP_NAME)} - Щ…ЩҲЩӮШ№ЫҢШӘ ЩҫШұЩҲЪҳЩҮвҖҢЩҮШ§</name>
    ${placemarks}
  </Document>
</kml>`;
}

function downloadKML(projectList, filename) {
  const kml = buildKML(projectList);
  const blob = new Blob([kml], { type: "application/vnd.google-earth.kml+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function defaultCoefficients() {
  const c = { wallRatio: 0.6 };
  MATERIAL_CONFIG.forEach((cat) => cat.items.forEach((it) => { c[it.key] = it.def; }));
  return c;
}

function computeTakeoff(inputs) {
  const area = Number(inputs.area) || 0;
  const units = Number(inputs.units) || 0;
  const fixtures = ((Number(inputs.bathroomsPerUnit) || 0) + (Number(inputs.kitchensPerUnit) || 0)) * units;
  const c = inputs.coefficients;
  const wallArea = area * (Number(c.wallRatio) || 0);
  const results = {};
  MATERIAL_CONFIG.forEach((cat) => {
    cat.items.forEach((it) => {
      const coef = Number(c[it.key]) || 0;
      let basisValue = 0;
      if (it.basis === "area") basisValue = area;
      else if (it.basis === "wall") basisValue = wallArea;
      else if (it.basis === "units") basisValue = units;
      else if (it.basis === "fixtures") basisValue = fixtures;
      else if (it.basis === "plaster") basisValue = results.plaster || 0;
      results[it.key] = Math.round(basisValue * coef * 100) / 100;
    });
  });
  return results;
}

function buildDefaultInventory() {

  MATERIAL_CONFIG.forEach((cat) => {
    cat.items.forEach((it) => {
      items.push({
        id: uid(), name: it.label, unit: it.unit, category: cat.category.replace(/^\d+\.\s*/, ""),
        takeoffKey: it.key, quantity: 0, allocations: [],
      });
    });
  });
  INVENTORY_EXTRA.forEach((ex) => {
    items.push({ id: uid(), name: ex.name, unit: ex.unit, category: ex.category, takeoffKey: null, quantity: 0, allocations: [] });
  });
  return items;
}

function inventoryAllocated(item) {
  return (item.allocations || []).reduce((s, a) => s + (Number(a.quantity) || 0), 0);
}
function inventoryAvailable(item) {
  return Math.max(0, (Number(item.quantity) || 0) - inventoryAllocated(item));
}

function compareTakeoffToInventory(takeoffResults, inventory) {
  if (!takeoffResults) return [];
  const rows = [];
  MATERIAL_CONFIG.forEach((cat) => {
    cat.items.forEach((it) => {
      const required = Number(takeoffResults[it.key]) || 0;
      const stockItem = inventory.find((i) => i.takeoffKey === it.key);
      const onHand = stockItem ? inventoryAvailable(stockItem) : 0;
      rows.push({
        key: it.key, label: it.label, unit: it.unit, category: cat.category,
        required, onHand, delta: onHand - required, materialId: stockItem?.id || null,
      });
    });
  });
  return rows;
}

  const [wallType, setWallType] = useState(saved.wallType || "brick");

    setKitchensPerUnit(s.kitchensPerUnit ?? 1);

    setCoefficients(s.coefficients || defaultCoefficients());

  }, [projectId]);

  function calculate() {
    const inputs = { area, units: project?.units.length || 0, bathroomsPerUnit, kitchensPerUnit, coefficients };
    setResults(computeTakeoff(inputs));
  }

    if (isReadOnly) return;

          <div className="font-bold text-lg">Щ…ШӘШұЩҮ ЩҲ ШЁШұШўЩҲШұШҜ</div>
        </div>
        <div className="text-center text-[#9CA3AF] text-sm mt-16">Ш§ЩҲЩ„ ЫҢЩҮ ЩҫШұЩҲЪҳЩҮ ШЁШіШ§ШІ ШӘШ§ ШЁШӘЩҲЩҶЫҢ ШЁШұШ§ЩҲШұШҜШҙ Ъ©ЩҶЫҢ.</div>
      </div>
    );
  }

  return (
    <div className="px-5 pt-5 pb-10">
      <div className="flex items-center gap-3 mb-5">
        <button onClick={onBack} className="p-1"><ChevronLeft size={20} /></button>
        <div className="font-bold text-lg flex-1">Щ…ШӘШұЩҮ ЩҲ ШЁШұШўЩҲШұШҜ Щ…ШөШ§Щ„Шӯ</div>
      </div>

      <select value={projectId} onChange={(e) => setProjectId(e.target.value)}
        className="w-full mb-4 bg-white border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none">
        {projects.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
      </select>

      <div className="bg-white rounded-2xl border border-black/5 p-4 mb-4">
        <div className="font-bold text-sm text-[#14213D] mb-3">Ш§Ш·Щ„Ш§Ш№Ш§ШӘ ЩҲШұЩҲШҜЫҢ ЩҫШұЩҲЪҳЩҮ</div>

        <label className="text-xs text-[#6B7280] font-medium">Щ…ШӘШұШ§Ъҳ ШІЫҢШұШЁЩҶШ§ЫҢ Ъ©Щ„ (Щ…ШӘШұ Щ…ШұШЁШ№)</label>
        <input type="number" value={area} onChange={(e) => setArea(e.target.value)}
          className="w-full mt-1 mb-3 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />

        <div className="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label className="text-xs text-[#6B7280] font-medium">ШіШұЩҲЫҢШі ШЁЩҮШҜШ§ШҙШӘЫҢ ЩҮШұ ЩҲШ§ШӯШҜ</label>
            <input type="number" value={bathroomsPerUnit} onChange={(e) => setBathroomsPerUnit(e.target.value)}

            <input type="number" value={kitchensPerUnit} onChange={(e) => setKitchensPerUnit(e.target.value)}

        <div className="grid grid-cols-2 gap-3 mb-3">
          <div>

            <select value={structureType} onChange={(e) => setStructureType(e.target.value)}

              {Object.entries(STRUCTURE_TYPES).map(([k, l]) => <option key={k} value={k}>{l}</option>)}

          </div>
          <div>
            <label className="text-xs text-[#6B7280] font-medium">ЩҶЩҲШ№ ШҜЫҢЩҲШ§Шұ</label>
            <select value={wallType} onChange={(e) => setWallType(e.target.value)}
              className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none">
              {Object.entries(WALL_TYPES).map(([k, l]) => <option key={k} value={k}>{l}</option>)}
            </select>
          </div>
        </div>

        <label className="text-xs text-[#6B7280] font-medium">ЩҶШіШЁШӘ ШіШ·Шӯ ШҜЫҢЩҲШ§Шұ ШЁЩҮ ШІЫҢШұШЁЩҶШ§</label>
        <input type="number" step="0.05" value={coefficients.wallRatio} onChange={(e) => setCoef("wallRatio", e.target.value)}
          className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none" />
      </div>

      <button onClick={() => setShowCoefs((v) => !v)} className="w-full flex items-center justify-between bg-white rounded-2xl border border-black/5 p-4 mb-4">
        <span className="font-bold text-sm text-[#14213D]">Ш¶ШұШ§ЫҢШЁ Щ…ШӯШ§ШіШЁЩҮ ШЁЩҮ ШӘЩҒЪ©ЫҢЪ© Щ…ШөШ§Щ„Шӯ (ЩӮШ§ШЁЩ„ ЩҲЫҢШұШ§ЫҢШҙ)</span>
        <ChevronLeft size={15} className={showCoefs ? "rotate-90" : "rotate-180"} />
      </button>

      {showCoefs && (
        <div className="flex flex-col gap-4 mb-4">
          <div className="text-[10px] text-[#9CA3AF] bg-amber-50 rounded-xl p-2.5">Ш§ЫҢЩҶ Ш¶ШұШ§ЫҢШЁ Щ…ЫҢШ§ЩҶЪҜЫҢЩҶвҖҢЩҮШ§ЫҢ ШұШ§ЫҢШ¬ ШөЩҶШ№ШӘ ШіШ§Ш®ШӘЩ…Ш§ЩҶЩҶШҜ ЩҲ ШЁШіШӘЩҮ ШЁЩҮ Щ…ЩҶШ·ЩӮЩҮ ЩҲ Ш·ШұШ§ШӯЫҢ Щ…ШӘЩҒШ§ЩҲШӘЩҶШҜШӣ ШЁШұШ§ЫҢ ШҜЩӮШӘ ШЁЫҢШҙШӘШұ ШЁШ§ Щ…ЩҮЩҶШҜШі Щ…ШӯШ§ШіШЁ ЩҫШұЩҲЪҳЩҮ ШӘЩҶШёЫҢЩ…ШҙЩҲЩҶ Ъ©ЩҶ.</div>
          {MATERIAL_CONFIG.map((cat) => (
            <div key={cat.category} className="bg-white rounded-2xl border border-black/5 p-4">
              <div className="font-semibold text-xs text-[#14213D] mb-3">{cat.category}</div>
              <div className="grid grid-cols-2 gap-3">
                {cat.items.map((it) => (
                  <CoefField key={it.key} label={`${it.label} (${it.unit}) вҖ” ${it.coefLabel}`}

                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      <button onClick={calculate} className="w-full bg-[#14213D] text-white rounded-xl py-3 text-sm font-semibold mb-4">Щ…ШӯШ§ШіШЁЩҮ ШЁШұШўЩҲШұШҜ Ъ©Ш§Щ…Щ„</button>

      {results && (
        <div className="flex flex-col gap-3 mb-4">
          {MATERIAL_CONFIG.map((cat) => (
            <div key={cat.category} className="bg-white rounded-2xl border border-black/5 p-4">
              <div className="font-bold text-xs text-[#14213D] mb-3">{cat.category}</div>
              <div className="grid grid-cols-2 gap-2">
                {cat.items.map((it) => (
                  <ResultRow key={it.key} label={it.label} value={`${fmt(results[it.key])} ${it.unit}`} />
                ))}
              </div>
            </div>
          ))}
          {inventoryCompare.length > 0 && (
            <div className="bg-white rounded-2xl border border-black/5 p-4">
              <div className="font-bold text-xs text-[#14213D] mb-3">Щ…ЩӮШ§ЫҢШіЩҮ ШЁШұШўЩҲШұШҜ ШЁШ§ Щ…ЩҲШ¬ЩҲШҜЫҢ Ш§ЩҶШЁШ§Шұ</div>
              <div className="overflow-x-auto">
                <table className="w-full text-[11px] min-w-[420px]">
                  <thead>
                    <tr className="bg-[#F4F6F5] text-[#6B7280]">
                      <th className="text-right px-2 py-2 font-medium">Щ…ШөШ§Щ„Шӯ</th>
                      <th className="text-center px-2 py-2 font-medium">ЩҶЫҢШ§ШІ</th>
                      <th className="text-center px-2 py-2 font-medium">Щ…ЩҲШ¬ЩҲШҜ</th>
                      <th className="text-center px-2 py-2 font-medium">Ш§Ш®ШӘЩ„Ш§ЩҒ</th>
                    </tr>
                  </thead>
                  <tbody>
                    {inventoryCompare.map((row) => (
                      <tr key={row.key} className="border-t border-black/5">
                        <td className="px-2 py-2">
                          <div className="font-medium text-[#14213D]">{row.label}</div>
                          <div className="text-[9px] text-[#9CA3AF]">{row.unit}</div>
                        </td>
                        <td className="text-center px-2 py-2">{fmt(row.required)}</td>
                        <td className="text-center px-2 py-2">{fmt(row.onHand)}</td>
                        <td className={`text-center px-2 py-2 font-semibold ${row.delta >= 0 ? "text-[#166534]" : "text-[#B91C1C]"}`}>
                          {row.delta >= 0 ? "+" : ""}{fmt(row.delta)}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
          <button onClick={saveEstimate} disabled={isReadOnly}
            className="w-full border border-[#14213D]/20 text-[#14213D] rounded-xl py-2.5 text-sm font-semibold disabled:opacity-40">
            {isReadOnly ? "ШӯШіШ§ШЁ ШҜЩ…ЩҲ вҖ” Ш°Ш®ЫҢШұЩҮ ШәЫҢШұЩҒШ№Ш§Щ„" : "Ш°Ш®ЫҢШұЩҮ Ш§ЫҢЩҶ ШЁШұШўЩҲШұШҜ ШЁШұШ§ЫҢ ЩҫШұЩҲЪҳЩҮ"}
          </button>
          {saveMsg && <div className="text-xs text-[#166534] text-center">{saveMsg}</div>}
        </div>
      )}

      <TakeoffDigitizer project={project} onError={onError} onUseArea={(sqm) => setArea((prev) => (Number(prev) || 0) + sqm)} />
    </div>
  );
}

function CoefField({ label, value, onChange, step = "1" }) {
  return (
    <div>
      <label className="text-[10px] text-[#9CA3AF]">{label}</label>
      <input type="number" step={step} value={value} onChange={(e) => onChange(e.target.value)}
        className="w-full mt-1 bg-[#F4F6F5] border border-black/10 rounded-lg px-2.5 py-2 text-xs outline-none" />
    </div>
  );
}
function ResultRow({ label, value }) {
  return (
    <div className="bg-[#F4F6F5] rounded-lg p-2.5">
      <div className="text-[10px] text-[#9CA3AF]">{label}</div>
      <div className="font-bold text-[#14213D] mt-0.5">{value}</div>
    </div>
  );
}

function TakeoffDigitizer({ project, onError, onUseArea }) {
  const [image, setImage] = useState(null);
  const [mode, setMode] = useState(null); // null | 'calibrate' | 'measure'
  const [calibPoints, setCalibPoints] = useState([]);
  const [pixelsPerMeter, setPixelsPerMeter] = useState(null);
  const [askDistance, setAskDistance] = useState(false);
  const [distanceInput, setDistanceInput] = useState("");
  const [polygon, setPolygon] = useState([]);
  const [measurements, setMeasurements] = useState([]);
  const [askName, setAskName] = useState(false);
  const [pendingAreaPx, setPendingAreaPx] = useState(0);
  const [nameInput, setNameInput] = useState("");
  const canvasRef = useRef(null);
  const imgRef = useRef(null);
  const fileRef = useRef(null);

  async function handleUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const dataUrl = await resizeImage(file, 1400, 0.8);
      setImage(dataUrl);
      setCalibPoints([]); setPolygon([]); setPixelsPerMeter(null); setMeasurements([]);
    } catch (err) {
      if (onError) onError("ШЁШ§ШұЪҜШ°Ш§ШұЫҢ ЩҶЩӮШҙЩҮ ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ: " + uploadErrorMessage(err));
    }
    e.target.value = "";
  }

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || !image) return;
    const ctx = canvas.getContext("2d");
    const img = new Image();
    img.onload = () => {
      imgRef.current = img;
      canvas.width = img.width;
      canvas.height = img.height;
      redraw();
    };
    img.src = image;
    // eslint-disable-next-line
  }, [image]);

  function redraw() {
    const canvas = canvasRef.current;
    const img = imgRef.current;
    if (!canvas || !img) return;
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);

    if (calibPoints.length) {
      ctx.strokeStyle = "#C9A227"; ctx.lineWidth = 3; ctx.fillStyle = "#C9A227";
      calibPoints.forEach((p) => { ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 7); ctx.fill(); });
      if (calibPoints.length === 2) {
        ctx.beginPath(); ctx.moveTo(calibPoints[0].x, calibPoints[0].y); ctx.lineTo(calibPoints[1].x, calibPoints[1].y); ctx.stroke();
      }
    }
    if (polygon.length) {
      ctx.strokeStyle = "#15803D"; ctx.fillStyle = "rgba(21,128,61,0.25)"; ctx.lineWidth = 3;
      ctx.beginPath();
      polygon.forEach((p, i) => (i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y)));
      if (polygon.length > 2) ctx.closePath();
      ctx.fill(); ctx.stroke();
      polygon.forEach((p) => { ctx.beginPath(); ctx.fillStyle = "#15803D"; ctx.arc(p.x, p.y, 5, 0, 7); ctx.fill(); });
    }
  }

  useEffect(redraw, [calibPoints, polygon]);

  function handleCanvasClick(e) {
    const canvas = canvasRef.current;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    if (mode === "calibrate") {
      if (calibPoints.length >= 2) return;
      const next = [...calibPoints, { x, y }];
      setCalibPoints(next);
      if (next.length === 2) setAskDistance(true);
    } else if (mode === "measure") {
      setPolygon((prev) => [...prev, { x, y }]);
    }
  }

  function confirmDistance() {
    const d = Number(distanceInput);
    if (!d || calibPoints.length < 2) return;
    const dx = calibPoints[1].x - calibPoints[0].x;
    const dy = calibPoints[1].y - calibPoints[0].y;
    const pixelDist = Math.sqrt(dx * dx + dy * dy);
    setPixelsPerMeter(pixelDist / d);
    setAskDistance(false);
    setDistanceInput("");
    setMode(null);
  }

  function polygonAreaPx(pts) {
    let area = 0;
    for (let i = 0; i < pts.length; i++) {
      const j = (i + 1) % pts.length;
      area += pts[i].x * pts[j].y - pts[j].x * pts[i].y;
    }
    return Math.abs(area / 2);
  }

  function finishPolygon() {
    if (polygon.length < 3 || !pixelsPerMeter) return;
    const areaPx = polygonAreaPx(polygon);
    const areaSqm = areaPx / (pixelsPerMeter * pixelsPerMeter);
    setPendingAreaPx(areaSqm);
    setAskName(true);
    setMode(null);
  }

  function confirmName() {
    const areaSqm = Math.round(pendingAreaPx * 100) / 100;
    setMeasurements((prev) => [...prev, { id: uid(), name: nameInput.trim() || `ЩҒШ¶Ш§ ${prev.length + 1}`, areaSqm }]);
    setPolygon([]);
    setAskName(false);
    setNameInput("");
  }

  const totalMeasured = measurements.reduce((s, m) => s + m.areaSqm, 0);

  return (
    <div className="bg-white rounded-2xl border border-black/5 p-4">
      <div className="font-bold text-sm text-[#14213D] mb-1">Ш§ЩҶШҜШ§ШІЩҮвҖҢЪҜЫҢШұЫҢ Ш§ШІ ШұЩҲЫҢ ЩҶЩӮШҙЩҮ (Ш§Ш®ШӘЫҢШ§ШұЫҢ)</div>
      <div className="text-[10px] text-[#9CA3AF] mb-3">
        ЩҒШ№Щ„Ш§ЩӢ Ш®ЩҲЩҶШҜЩҶ Ш®ЩҲШҜЪ©Ш§Шұ Ш§ШЁШ№Ш§ШҜ Ш§ШІ ЩҶЩӮШҙЩҮ CAD/PDF Щ…Щ…Ъ©ЩҶ ЩҶЫҢШіШӘШӣ ШҜШұ Ш№ЩҲШ¶ ЩҶЩӮШҙЩҮ ШұЩҲ ШўЩҫЩ„ЩҲШҜ Ъ©ЩҶШҢ Щ…ЩӮЫҢШ§ШіШҙ ШұЩҲ ШЁШ§ ЫҢЩҮ Ш®Ш· Щ…ШұШ¬Ш№ Ъ©Ш§Щ„ЫҢШЁШұЩҮ Ъ©ЩҶШҢ ШЁШ№ШҜ ШұЩҲЫҢ ЪҜЩҲШҙЩҮвҖҢЩҮШ§ЫҢ ЩҮШұ ЩҒШ¶Ш§ Ъ©Щ„ЫҢЪ© Ъ©ЩҶ ШӘШ§ Щ…ШӘШұШ§ЪҳШҙ ШҜЩӮЫҢЩӮ Щ…ШӯШ§ШіШЁЩҮ ШЁШҙЩҮ. Ш§ЫҢЩҶ ЩӮШҜЩ… Ш§ЩҲЩ„ Ш§ШЁШІШ§Шұ ЩҮЩҲШҙЩ…ЩҶШҜЩҮ ЩҲ ШЁШ№ШҜШ§ЩӢ Ъ©Ш§Щ…Щ„вҖҢШӘШұ Щ…ЫҢвҖҢШҙЩҮ.
      </div>

      {!image ? (
        <button onClick={() => fileRef.current.click()} className="w-full border border-dashed border-black/20 rounded-xl py-6 text-xs text-[#6B7280] flex flex-col items-center gap-1">
          <Upload size={18} /> ШЁШ§ШұЪҜШ°Ш§ШұЫҢ ЩҶЩӮШҙЩҮ (Ш№Ъ©Ші ЫҢШ§ PDF)
        </button>
      ) : (
        <>
          <div className="flex gap-2 mb-2 flex-wrap">
            <button onClick={() => { setMode("calibrate"); setCalibPoints([]); }}
              className={`text-xs rounded-lg px-3 py-2 font-semibold ${mode === "calibrate" ? "bg-[#C9A227] text-white" : "bg-[#F4F6F5] text-[#14213D]"}`}>
              Ыұ. Ъ©Ш§Щ„ЫҢШЁШұШ§ШіЫҢЩҲЩҶ Щ…ЩӮЫҢШ§Ші
            </button>
            <button onClick={() => { if (pixelsPerMeter) { setMode("measure"); setPolygon([]); } }} disabled={!pixelsPerMeter}
              className={`text-xs rounded-lg px-3 py-2 font-semibold disabled:opacity-40 ${mode === "measure" ? "bg-[#15803D] text-white" : "bg-[#F4F6F5] text-[#14213D]"}`}>
              ЫІ. Ш§ЩҶШҜШ§ШІЩҮвҖҢЪҜЫҢШұЫҢ ЩҒШ¶Ш§
            </button>
            {mode === "measure" && polygon.length >= 3 && (
              <button onClick={finishPolygon} className="text-xs rounded-lg px-3 py-2 font-semibold bg-[#14213D] text-white">ЩҫШ§ЫҢШ§ЩҶ ЩҲ Ш«ШЁШӘ Щ…ШӘШұШ§Ъҳ</button>
            )}
            <button onClick={() => fileRef.current.click()} className="text-xs rounded-lg px-3 py-2 font-semibold border border-black/10 text-[#6B7280]">ЩҶЩӮШҙЩҮ ШҜЫҢЪҜШұ</button>
          </div>
          {!pixelsPerMeter && <div className="text-[10px] text-amber-700 bg-amber-50 rounded-lg p-2 mb-2">Ш§ЩҲЩ„ ШЁШ§ЫҢШҜ Щ…ЩӮЫҢШ§Ші ШұЩҲ Ъ©Ш§Щ„ЫҢШЁШұЩҮ Ъ©ЩҶЫҢ: ЫҢЩҮ Ш®Ш· ШЁШ§ Ш·ЩҲЩ„ Щ…ШҙШ®Шө ШұЩҲЫҢ ЩҶЩӮШҙЩҮ ЩҫЫҢШҜШ§ Ъ©ЩҶ (Щ…Ш«Щ„Ш§ЩӢ ШҜЫҢЩҲШ§Шұ Ыө Щ…ШӘШұЫҢ)ШҢ ШҜЪ©Щ…ЩҮ В«Ъ©Ш§Щ„ЫҢШЁШұШ§ШіЫҢЩҲЩҶ Щ…ЩӮЫҢШ§ШіВ» ШұЩҲ ШЁШІЩҶ ЩҲ ШҜЩҲ ШіШұ ЩҮЩ…ЩҲЩҶ Ш®Ш· ШұЩҲ Щ„Щ…Ші Ъ©ЩҶ.</div>}

          <div className="overflow-auto rounded-xl border border-black/10 mb-2" style={{ maxHeight: 320 }}>

              {measurements.map((m) => (
                <div key={m.id} className="flex items-center justify-between bg-[#F4F6F5] rounded-lg px-3 py-2 text-xs">
                  <span>{m.name}</span>

              <div className="flex items-center justify-between px-3 py-2 text-xs font-bold text-[#14213D] border-t border-black/10 mt-1 pt-2">
                <span>Ш¬Щ…Ш№ Ъ©Щ„</span>
                <span>{Math.round(totalMeasured * 100) / 100} mВІ</span>

                Ш§ЩҒШІЩҲШҜЩҶ Ш§ЫҢЩҶ Щ…ШӘШұШ§Ъҳ ШЁЩҮ ЩҒШұЩ… ШЁШұШўЩҲШұШҜ
              </button>

          )}

      {askDistance && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[80] px-6">

            <div className="font-bold text-sm mb-2">ЩҒШ§ШөЩ„ЩҮ ЩҲШ§ЩӮШ№ЫҢ Ш§ЫҢЩҶ Ш®Ш· ЪҶЩҶШҜ Щ…ШӘШұЩҮШҹ</div>
            <input type="number" autoFocus value={distanceInput} onChange={(e) => setDistanceInput(e.target.value)} placeholder="Щ…Ш«Щ„Ш§ЩӢ 5"
              className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none mb-3" />
            <div className="flex gap-2">
              <button onClick={() => { setAskDistance(false); setCalibPoints([]); }} className="flex-1 border border-black/10 rounded-xl py-2 text-sm">Щ„ШәЩҲ</button>
              <button onClick={confirmDistance} disabled={!distanceInput} className="flex-1 bg-[#14213D] text-white rounded-xl py-2 text-sm disabled:opacity-40">ШӘШЈЫҢЫҢШҜ</button>
            </div>
          </div>
        </div>
      )}
      {askName && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-[80] px-6">
          <div className="bg-white rounded-2xl p-5 w-full max-w-xs">
            <div className="font-bold text-sm mb-1">Ш§ЫҢЩҶ ЩҒШ¶Ш§ ЪҶЩҮ Ш§ШіЩ…ЫҢЩҮШҹ</div>
            <div className="text-xs text-[#6B7280] mb-2">Щ…ШӘШұШ§Ъҳ Щ…ШӯШ§ШіШЁЩҮвҖҢШҙШҜЩҮ: {Math.round(pendingAreaPx * 100) / 100} Щ…ШӘШұ Щ…ШұШЁШ№</div>
            <input autoFocus value={nameInput} onChange={(e) => setNameInput(e.target.value)} placeholder="Щ…Ш«Щ„Ш§ЩӢ Ш§ШӘШ§ЩӮ Ш®ЩҲШ§ШЁ Ыұ"
              className="w-full bg-[#F4F6F5] border border-black/10 rounded-xl px-3 py-2.5 text-sm outline-none mb-3" />

              <button onClick={confirmName} className="flex-1 bg-[#14213D] text-white rounded-xl py-2 text-sm">Ш«ШЁШӘ</button>
