/* ---------- local storage helpers (data stays on this device only) ---------- */
function loadJSON(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch (e) { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch (e) { return false; }
}

function sortedFinanceTxs(project) {
  return [...normalizeFinanceTransactions(project)].sort((a, b) => (a.date || "").localeCompare(b.date || "") || (a.id || "").localeCompare(b.id || ""));
}

function accountLedgerTxs(project, accountId) {
  return sortedFinanceTxs(project).filter((t) => t.fromAccountId === accountId || t.toAccountId === accountId);
}

function buildAccountLedgerRows(project, accountId) {
  const acc = (project.bankAccounts || []).find((a) => a.id === accountId);
  let balance = Number(acc?.initialBalance) || 0;
  return accountLedgerTxs(project, accountId).map((t) => {
    const credit = t.toAccountId === accountId ? Number(t.amount) || 0 : 0;
    const debit = t.fromAccountId === accountId ? Number(t.amount) || 0 : 0;
    balance += credit - debit;
    return { ...t, credit, debit, balance };
  });
}

function paidCheckRows(project, contacts) {
  const rows = [];
  (project.expenses || []).filter((e) => e.paymentMethod === "check").forEach((e) => {
    rows.push({
      id: e.id,
      date: e.date || "",
      amount: Number(e.amount) || 0,
      title: e.title,
      accountId: e.bankAccountId,
      contactName: e.contactId ? (contacts || []).find((c) => c.id === e.contactId)?.name : null,
    });
  });
  normalizeFinanceTransactions(project).filter((t) => t.type === "check_clear").forEach((t) => {
    if (rows.some((r) => r.id === t.expenseId)) return;
    rows.push({
      id: t.id,
      date: t.date || "",
      amount: Number(t.amount) || 0,
      title: t.note || "پرداخت چک",
      accountId: t.fromAccountId,
      contactName: null,
    });
  });
  return rows.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
}

function collectedCheckRows(project, contacts) {
  const rows = [];
  normalizeFinanceTransactions(project).filter((t) => t.type === "income").forEach((t) => {
    const unit = (project.units || []).find((u) => u.id === t.unitId);
    rows.push({
      id: t.id,
      date: t.date || "",
      amount: Number(t.amount) || 0,
      title: t.note || "دریافت فروش",
      accountId: t.toAccountId,
      unitLabel: unit ? `واحد ${unit.unitNumber}` : null,
      buyerName: unit?.buyerName || null,
    });
  });
  (project.units || []).forEach((u) => {
    (u.installments || []).filter((i) => i.paid && Number(i.amount) > 0 && !i.financeTxId).forEach((i) => {
      rows.push({
        id: i.id,
        date: i.date || "",
        amount: Number(i.amount) || 0,
        title: `قسط واحد ${u.unitNumber}`,
        accountId: i.accountId,
        unitLabel: `واحد ${u.unitNumber}`,
        buyerName: u.buyerName || null,
      });
    });
  });
  return rows.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
}

function projectCardTheme(projectId) {
  let h = 0;
  const s = projectId || "";
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h) + s.charCodeAt(i);
  return PROJECT_CARD_PALETTE[Math.abs(h) % PROJECT_CARD_PALETTE.length];
}

function defaultProjectActivities() {
  return DEFAULT_CONSTRUCTION_ACTIVITIES.map((name, order) => ({ id: uid(), name, order }));
}

function normalizeProjectActivities(project) {
  if (Array.isArray(project?.activities) && project.activities.length) {
    return [...project.activities].sort((a, b) => (a.order ?? 0) - (b.order ?? 0));
  }
  return defaultProjectActivities();
}

function projectProgressPercent(project) {
  const phaseIdx = PROJECT_PHASES.indexOf(project?.phase || "");
  let phasePct = phaseIdx >= 0 ? ((phaseIdx + 1) / PROJECT_PHASES.length) * 100 : 0;
  const total = project?.units?.length || 0;
  let soldPct = 0;
  if (total > 0) {
    soldPct = (project.units.filter((u) => u.status === "sold").length / total) * 100;
  }
  if (!phasePct && soldPct) return Math.round(soldPct);
  if (phasePct && !soldPct) return Math.round(phasePct);
  return Math.round(phasePct * 0.55 + soldPct * 0.45);
}

function projectPhaseLabel(project) {
  if (project?.phase) return project.phase;
  const idx = PROJECT_PHASES.indexOf(project?.phase || "");
  if (idx >= 0) return PROJECT_PHASES[idx];
  const pct = projectProgressPercent(project);
  if (pct <= 0) return "مشخص نشده";
  const step = Math.min(PROJECT_PHASES.length - 1, Math.floor((pct / 100) * PROJECT_PHASES.length));
  return PROJECT_PHASES[step] || "مشخص نشده";
}

function normalizeChatQuery(text) {
  return (text || "")
    .replace(/[؟?،,.!؛;]/g, " ")
    .replace(/[\u200c\u00a0]/g, " ")
    .replace(/ي/g, "ی")
    .replace(/ك/g, "ک")
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();
}

function matchProjectInQuery(query, projectList) {
  const q = normalizeChatQuery(query);
  if (!q || !projectList.length) return null;
  let best = null;
  let bestScore = 0;
  projectList.forEach((p) => {
    const name = normalizeChatQuery(p.name);
    if (!name) return;
    if (q.includes(name)) {
      const score = name.length + 200;
      if (score > bestScore) { best = p; bestScore = score; }
      return;
    }
    const tokens = name.split(" ").filter((t) => t.length > 1);
    if (!tokens.length) return;
    const hits = tokens.filter((t) => q.includes(t));
    if (hits.length >= Math.min(2, tokens.length) || (tokens.length === 1 && hits.length === 1)) {
      const score = hits.length * 15 + name.length;
      if (score > bestScore) { best = p; bestScore = score; }
    }
  });
  return best;
}

function matchContactInQuery(query, contactList) {
  const q = normalizeChatQuery(query);
  if (!q) return null;
  let best = null;
  let bestScore = 0;
  contactList.forEach((c) => {
    const name = normalizeChatQuery(c.name);
    if (!name) return;
    if (q.includes(name)) {
      const score = name.length + 100;
      if (score > bestScore) { best = c; bestScore = score; }
      return;
    }
    const parts = name.split(" ").filter((t) => t.length > 1);
    parts.forEach((part) => {
      if (q.includes(part) && part.length >= 2) {
        const score = part.length;
        if (score > bestScore) { best = c; bestScore = score; }
      }
    });
  });
  return best;
}

function queryHasAny(q, words) {
  return words.some((w) => q.includes(w));
}

function buildChatAnswer(rawQuery, projectList, contactList, contactBalanceFn) {
  const q = normalizeChatQuery(rawQuery);
  if (!q) return "سؤالت را بنویس یا با دکمه میکروفون بپرس.";

  if (queryHasAny(q, ["سلام", "درود", "hello", "hi", "صبح بخیر", "عصر بخیر"])) {
    return "سلام! من دستیار متریکو هستم. درباره پروژه‌ها، فروش، هزینه، سود، مخاطبین، عرصه، زیربنا و انرژی از من بپرس — لازم نیست جمله‌ات دقیق باشد.";
  }
  if (queryHasAny(q, ["کمک", "راهنما", "چی بپرسم", "چه سوال", "چطور", "نمونه سوال", "قابلیت"])) {
    return "چند نمونه سوال:\n• سود پروژه سپهر\n• چند واحد خالی داریم\n• میانگین قیمت فروش\n• محمدی چقدر بدهکاره\n• زیربنا و عرصه برج X\n• مرحله ساخت پروژه\n• مصرف برق پروژه";
  }

  const proj = matchProjectInQuery(rawQuery, projectList);
  const contact = matchContactInQuery(rawQuery, contactList);
  const targets = proj ? [proj] : projectList;

  if (contact && queryHasAny(q, ["بدهکار", "طلب", "مانده", "حساب", "بدهی", "طلبکار", "بستانکار", "پول", "تسویه"])) {
    const bal = contactBalanceFn(contact.id);
    if (bal === 0) return `حساب ${contact.name} تسویه است.`;
    return bal > 0
      ? `ما ${fmt(bal)} تومان به ${contact.name} بدهکاریم.`
      : `${contact.name} ${fmt(Math.abs(bal))} تومان به ما بدهکار است.`;
  }

  if (projectList.length === 0) return "هنوز پروژه‌ای ثبت نشده. از منو «پروژه جدید» را بزن.";

  if (queryHasAny(q, ["چند پروژه", "تعداد پروژه", "پروژه داری", "پروژه ها"])) {
    return `${projectList.length} پروژه فعال داری${proj ? `. منظورت ${proj.name} بود؟` : "."}`;
  }
  if (queryHasAny(q, ["چند مخاطب", "تعداد مخاطب", "مخاطب داری"])) {
    return `${contactList.length} مخاطب ثبت شده.`;
  }

  if (queryHasAny(q, ["خالی", "فروش نرفته", "بلاقطعه"])) {
    const n = targets.reduce((s, p) => s + p.units.filter((u) => u.status === "vacant").length, 0);
    return proj ? `در ${proj.name}، ${n} واحد خالی است.` : `مجموع واحدهای خالی: ${n}`;
  }
  if (queryHasAny(q, ["فروخته", "فروش رفته", "فروخته شده", "معامله شده"])) {
    const n = targets.reduce((s, p) => s + p.units.filter((u) => u.status === "sold").length, 0);
    return proj ? `در ${proj.name}، ${n} واحد فروخته شده.` : `مجموع واحدهای فروخته‌شده: ${n}`;
  }
  if (queryHasAny(q, ["رزرو", "رزرو شده"])) {
    const n = targets.reduce((s, p) => s + p.units.filter((u) => u.status === "reserved").length, 0);
    return proj ? `در ${proj.name}، ${n} واحد رزرو است.` : `مجموع واحدهای رزرو: ${n}`;
  }
  if (queryHasAny(q, ["چند واحد", "تعداد واحد", "کل واحد", "واحد داری"])) {
    const n = targets.reduce((s, p) => s + p.units.length, 0);
    return proj ? `${proj.name} مجموعاً ${n} واحد دارد.` : `مجموع واحدهای همه پروژه‌ها: ${n}`;
  }

  if (queryHasAny(q, ["میانگین قیمت", "متوسط قیمت", "قیمت متوسط", "قیمت هر متر", "متر مربع"])) {
    if (proj) {
      const avg = avgSalePricePerSqm(proj);
      return avg > 0 ? `میانگین قیمت فروش ${proj.name}: ${fmt(Math.round(avg))} تومان به ازای هر متر مربع.` : `در ${proj.name} هنوز واحد فروخته‌شده‌ای برای محاسبه قیمت نیست.`;
    }
    const lines = projectList.map((p) => {
      const avg = avgSalePricePerSqm(p);
      return avg > 0 ? `${p.name}: ${fmt(Math.round(avg))} تومان/م²` : `${p.name}: —`;
    });
    return "میانگین قیمت فروش:\n" + lines.join("\n");
  }

  if (queryHasAny(q, ["مطالبات", "طلب پروژه", "بدهکار به ما"])) {
    if (proj) {
      const sum = projectReceivablesList(proj, contactList).reduce((s, i) => s + i.amount, 0);
      return `مطالبات ${proj.name}: ${fmt(sum)} تومان.`;
    }
    const sum = projectList.reduce((s, p) => s + projectReceivablesList(p, contactList).reduce((a, i) => a + i.amount, 0), 0);
    return `مجموع مطالبات همه پروژه‌ها: ${fmt(sum)} تومان.`;
  }
  if (queryHasAny(q, ["بدهی پروژه", "بدهی ها", "بدهکاری پروژه"])) {
    if (proj) {
      const sum = projectPayablesList(proj, contactList).reduce((s, i) => s + i.amount, 0);
      return `بدهی‌های ${proj.name}: ${fmt(sum)} تومان.`;
    }
    const sum = projectList.reduce((s, p) => s + projectPayablesList(p, contactList).reduce((a, i) => a + i.amount, 0), 0);
    return `مجموع بدهی‌های همه پروژه‌ها: ${fmt(sum)} تومان.`;
  }

  if (queryHasAny(q, ["سود", "زیان", "سودده", "ضرر"])) {
    const revenue = targets.reduce((s, p) => s + revenueOf(p), 0);
    const expenses = targets.reduce((s, p) => s + expensesTotalOf(p), 0);
    const profit = revenue - expenses;
    const label = profit >= 0 ? "سود" : "زیان";
    return proj
      ? `${label} ${proj.name}: ${fmt(Math.abs(profit))} تومان (درآمد ${fmt(revenue)} − هزینه ${fmt(expenses)}).`
      : `${label} کل پروژه‌ها: ${fmt(Math.abs(profit))} تومان.`;
  }
  if (queryHasAny(q, ["هزینه", "هزینه ها", "خرج", "پرداخت شده"])) {
    const n = targets.reduce((s, p) => s + expensesTotalOf(p), 0);
    return proj ? `مجموع هزینه‌های ${proj.name}: ${fmt(n)} تومان.` : `مجموع هزینه‌های همه پروژه‌ها: ${fmt(n)} تومان.`;
  }
  if (queryHasAny(q, ["درآمد", "فروش کل", "درامد", "فروش"])) {
    const n = targets.reduce((s, p) => s + revenueOf(p), 0);
    return proj ? `درآمد فروش ${proj.name}: ${fmt(n)} تومان.` : `درآمد کل همه پروژه‌ها: ${fmt(n)} تومان.`;
  }

  if (queryHasAny(q, ["زیربنا", "زیر بنا", "متراژ بنا"])) {
    if (proj) {
      const b = projectBuiltArea(proj);
      return b > 0 ? `زیربنای ${proj.name}: ${fmt(b)} متر مربع.` : `زیربنای ${proj.name} در تنظیمات ثبت نشده.`;
    }
    return projectList.map((p) => `${p.name}: ${projectBuiltArea(p) > 0 ? fmt(projectBuiltArea(p)) + " m²" : "—"}`).join(" / ");
  }
  if (queryHasAny(q, ["عرصه", "زمین", "مساحت زمین"])) {
    if (proj) {
      const l = projectLandArea(proj);
      return l > 0 ? `عرصه ${proj.name}: ${fmt(l)} متر مربع.` : `عرصه ${proj.name} ثبت نشده.`;
    }
    return projectList.map((p) => `${p.name}: ${projectLandArea(p) > 0 ? fmt(projectLandArea(p)) + " m²" : "—"}`).join(" / ");
  }

  if (queryHasAny(q, ["مرحله", "پیشرفت", "فاز", "وضعیت ساخت"])) {
    if (proj) {
      const phase = projectPhaseLabel(proj);
      const pct = projectProgressPercent(proj);
      return `${proj.name}: مرحله «${phase}» — پیشرفت ${pct}٪.`;
    }
    return projectList.map((p) => `${p.name}: ${projectPhaseLabel(p)} (${projectProgressPercent(p)}٪)`).join("\n");
  }
  if (queryHasAny(q, ["آدرس", "کجاست", "موقعیت"])) {
    if (proj) {
      const loc = proj.lat && proj.lng ? "موقعیت روی نقشه ثبت شده." : "موقعیت نقشه ثبت نشده.";
      return proj.address ? `آدرس ${proj.name}: ${proj.address}. ${loc}` : `آدرس ${proj.name} ثبت نشده. ${loc}`;
    }
  }

  if (queryHasAny(q, ["برق", "آب", "گاز", "انرژی", "مصرف"])) {
    if (proj) {
      const est = computeProjectEnergyEstimate(proj);
      if (!est.valid) return est.note;
      return `برآورد انرژی ${proj.name} (زیربنا ${fmt(est.builtArea)} m²):\nبرق ${fmt(est.annualElectricityKwh)} kWh/سال\nآب ${fmt(est.annualWaterM3)} m³/سال\nگاز ${fmt(est.annualGasM3)} m³/سال`;
    }
  }

  if (proj && !queryHasAny(q, ["پروژه"])) {
    const rev = revenueOf(proj);
    const exp = expensesTotalOf(proj);
    const sold = proj.units.filter((u) => u.status === "sold").length;
    return `خلاصه ${proj.name}: ${proj.units.length} واحد، ${sold} فروخته، درآمد ${fmt(rev)}، هزینه ${fmt(exp)}، ${exp <= rev ? "سود" : "زیان"} ${fmt(Math.abs(rev - exp))} تومان.`;
  }

  return "دقیق متوجه نشدم، ولی می‌توانی آزاد بپرسی. مثلاً: «سود سپهر»، «واحدهای خالی»، «میانگین قیمت»، یا اسم یک مخاطب + «چقدر بدهکاره».";
}

function normalizeBankAccounts(project) {
  return Array.isArray(project?.bankAccounts) ? project.bankAccounts : [];
}

function normalizeInvestors(project) {
  return Array.isArray(project?.investors) ? project.investors : [];
}

function normalizeFinanceTransactions(project) {
  return Array.isArray(project?.financeTransactions) ? project.financeTransactions : [];
}

function computeAccountBalance(project, accountId) {
  if (!accountId) return 0;
  const acc = (project.bankAccounts || []).find((a) => a.id === accountId);
  let bal = Number(acc?.initialBalance) || 0;
  (project.financeTransactions || []).forEach((t) => {
    const amt = Number(t.amount) || 0;
    if (t.toAccountId === accountId) bal += amt;
    if (t.fromAccountId === accountId) bal -= amt;
  });
  return bal;
}

function accountLabel(project, accountId, contacts) {
  const acc = (project.bankAccounts || []).find((a) => a.id === accountId);
  if (!acc) return "—";
  if (acc.ownerType === "investor" && acc.investorContactId) {
    const inv = (contacts || []).find((c) => c.id === acc.investorContactId);
    return `${acc.name}${inv ? ` (${inv.name})` : ""}`;
  }
  return acc.name;
}

function investorProfitSummary(project, contacts) {
  const profit = profitOf(project);
  return normalizeInvestors(project).map((inv) => {
    const contact = (contacts || []).find((c) => c.id === inv.contactId);
    const share = Number(inv.sharePercent) || 0;
    const allocated = share > 0 ? (profit * share) / 100 : 0;
    const capitalIn = (project.financeTransactions || [])
      .filter((t) => t.type === "capital_in" && t.investorContactId === inv.contactId)
      .reduce((s, t) => s + (Number(t.amount) || 0), 0);
    const capitalOut = (project.financeTransactions || [])
      .filter((t) => t.type === "capital_out" && t.investorContactId === inv.contactId)
      .reduce((s, t) => s + (Number(t.amount) || 0), 0);
    return {
      ...inv,
      name: contact?.name || "سرمایه‌گذار",
      sharePercent: share,
      profitShare: allocated,
      netCapital: capitalIn - capitalOut,
      totalReturn: allocated + (capitalOut - capitalIn),
    };
  });
}

function projectContactBalanceInProject(project, contactId) {
  let bal = 0;
  (project.expenses || []).forEach((e) => {
    if (e.contactId !== contactId) return;
    if (e.paymentMethod === "credit") bal += Number(e.amount) || 0;
    else bal -= Number(e.amount) || 0;
  });
  return bal;
}

function projectReceivablesList(project, contacts) {
  const items = [];
  (project.units || []).forEach((u) => {
    if (u.status !== "sold" && u.status !== "reserved") return;
    const rem = remainingOf(u);
    if (rem <= 0) return;
    items.push({
      id: "unit-" + u.id,
      name: u.buyerName || `واحد ${u.unitNumber}`,
      subtitle: `واحد ${u.unitNumber} — طبقه ${u.floor}`,
      amount: rem,
      phone: u.buyerPhone || "",
    });
  });
  (contacts || []).forEach((c) => {
    const bal = projectContactBalanceInProject(project, c.id);
    if (bal < 0) {
      items.push({
        id: c.id,
        name: c.name,
        subtitle: CONTACT_ROLES[c.role || "other"] || "مخاطب",
        amount: Math.abs(bal),
        phone: c.phone || "",
      });
    }
  });
  return items.sort((a, b) => b.amount - a.amount);
}

function projectPayablesList(project, contacts) {
  const items = [];
  (contacts || []).forEach((c) => {
    const bal = projectContactBalanceInProject(project, c.id);
    if (bal > 0) {
      items.push({
        id: c.id,
        name: c.name,
        subtitle: CONTACT_ROLES[c.role || "other"] || "مخاطب",
        amount: bal,
        phone: c.phone || "",
      });
    }
  });
  return items.sort((a, b) => b.amount - a.amount);
}

function escReportHtml(v) {
  return (v == null ? "" : String(v)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function buildTableReportHTML(companyInfo, title, subtitle, columns, rows) {

    <div class="report-body">
    <div style="display:flex;align-items:center;gap:10px;border-bottom:2px solid #14213D;padding-bottom:12px;margin-bottom:16px;">

  </body></html>`;
}

function openTableReport(companyInfo, title, subtitle, columns, rows) {
  try {
    const html = buildTableReportHTML(companyInfo, title, subtitle, columns, rows);
    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    window.open(url, "_blank");
  } catch (e) {
    console.error(e);
  }
}

function emptyUnit(floor, unitNumber) {
  return {
    id: uid(), floor, unitNumber, area: "", status: "vacant", direction: "none",
    buyerName: "", buyerPhone: "", postalCode: "",
    pricePerMeter: "", downPayment: "",
    installments: [], contractDocs: [], checkDocs: [], notes: "",
  };
}
function totalPriceOf(u) { return (Number(u.area) || 0) * (Number(u.pricePerMeter) || 0); }
function paidOf(u) {
  const inst = (u.installments || []).reduce((s, i) => s + (i.paid ? Number(i.amount) || 0 : 0), 0);
  return inst + (Number(u.downPayment) || 0);
}
function remainingOf(u) { return totalPriceOf(u) - paidOf(u); }

function revenueOf(project) {
  return project.units.filter((u) => u.status === "sold").reduce((s, u) => s + totalPriceOf(u), 0);
}
function expensesTotalOf(project) {
  return (project.expenses || []).reduce((s, e) => s + (Number(e.amount) || 0), 0);
}
function profitOf(project) {
  return revenueOf(project) - expensesTotalOf(project);
}
function avgSalePricePerSqm(project) {
  const soldUnits = (project.units || []).filter((u) => u.status === "sold");
  const soldArea = soldUnits.reduce((s, u) => s + (Number(u.area) || 0), 0);
  if (soldArea <= 0) return 0;
  return soldUnits.reduce((s, u) => s + totalPriceOf(u), 0) / soldArea;
}

function projectBuiltArea(project) {
  return Math.max(0, Number(project.totalBuiltArea) || 0);
}

function projectLandArea(project) {
  return Math.max(0, Number(project.landArea) || 0);
}

  const built = Number(totalBuiltArea) || 0;

  const builtText = built > 0 ? fmt(built) : "—";
  const accent = theme?.accent || "#14213D";
  const surface = theme?.surface || "#F4F6F5";
  const isPanel = variant === "panel";

  return (

function climateProfileFromLat(lat) {
  const la = Number(lat) || 35.7;
  if (la >= 38) return { label: "سرد", heating: 1.35, cooling: 0.75, water: 1.05 };
  if (la >= 32) return { label: "معتدل", heating: 1.0, cooling: 1.0, water: 1.0 };
  return { label: "گرم و مرطوب", heating: 0.65, cooling: 1.35, water: 1.15 };
}

function computeProjectEnergyEstimate(project) {
  const lat = Number(project.lat);
  const lng = Number(project.lng);
  const hasLocation = !!(lat && lng);
  const builtArea = projectBuiltArea(project);
  if (builtArea <= 0) {
    return {
      valid: false,
      hasLocation,
      units: (project.units || []).length,
      floors: (project.floors || []).length || 1,
      builtArea: 0,
      note: "زیربنای کل پروژه ثبت نشده. از تنظیمات پروژه → بخش عمومی، فیلد «زیربنای کل» را وارد کنید.",
    };
  }
  const climate = climateProfileFromLat(hasLocation ? lat : 35.7);
  const units = (project.units || []).length;
  const floors = (project.floors || []).length || 1;
  const occupants = Math.max(units * 3.2, builtArea / 35);

  const elecKwhPerSqmY = 88 * (0.85 + climate.cooling * 0.12 + climate.heating * 0.08);
  const annualElectricityKwh = Math.round(builtArea * elecKwhPerSqmY);
  const monthlyElectricityKwh = Math.round(annualElectricityKwh / 12);

  const annualWaterM3 = Math.round(occupants * 145 * 365 / 1000 * climate.water);
  const monthlyWaterM3 = Math.max(1, Math.round(annualWaterM3 / 12));

  const gasM3PerSqmY = 11.5 * climate.heating;
  const annualGasM3 = Math.round(builtArea * gasM3PerSqmY);
  const monthlyGasM3 = Math.round(annualGasM3 / 12);

  const co2KgYear = Math.round(annualElectricityKwh * 0.48 + annualGasM3 * 1.96 + annualWaterM3 * 0.35);
  const energyScore = Math.max(35, Math.min(92, Math.round(100 - builtArea / Math.max(units, 1) / 18 - climate.cooling * 8)));

  return {
    valid: true,
    hasLocation,
    lat: hasLocation ? lat : null,
    lng: hasLocation ? lng : null,
    climate: climate.label,
    units,
    floors,
    builtArea: Math.round(builtArea),
    occupants: Math.round(occupants),
    annualElectricityKwh,
    monthlyElectricityKwh,
    annualWaterM3,
    monthlyWaterM3,
    annualGasM3,
    monthlyGasM3,
    co2KgYear,
    energyScore,
    note: hasLocation
      ? `برآورد بر اساس زیربنای کل (${fmt(Math.round(builtArea))} m²)، موقعیت جغرافیایی، تعداد واحد و طبقات.`
      : "موقعیت پروژه ثبت نشده؛ از اقلیم پیش‌فرض (تهران) استفاده شد. محاسبه فقط بر پایه زیربنای کل ثبت‌شده است.",
  };
}

function DonutChart({ data, size = 84, centerLabel, centerValue, dark = false }) {
  const containerRef = useRef(null);
  const chartRef = useRef(null);
  const [uid] = useState(() => "apx-" + Math.random().toString(36).slice(2, 8));
  const [ready, setReady] = useState(!!window.ApexCharts);

  const values = data.map((d) => Math.max(0, d.value));
  const colors = data.map((d) => d.color);
  const total = values.reduce((a, b) => a + b, 0);

  useEffect(() => {
    if (window.ApexCharts) { setReady(true); return; }
    // ApexCharts script may still be loading (e.g. right after page load) — retry briefly.
    let tries = 0;
    const t = setInterval(() => {
      tries++;
      if (window.ApexCharts) { setReady(true); clearInterval(t); }
      else if (tries > 20) clearInterval(t);
    }, 250);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if (!containerRef.current || !ready || !window.ApexCharts) return;
    const textColor = dark ? "#F4F6F5" : "#14213D";
    const subColor = dark ? "#B7C0D8" : "#6B7280";
    const options = {
      chart: {
        type: "donut",
        width: size,
        height: size,
        animations: { enabled: true, easing: "easeout", speed: 650, animateGradually: { enabled: true, delay: 80 }, dynamicAnimation: { enabled: true, speed: 350 } },
        sparkline: { enabled: size < 90 },
        foreColor: textColor,
        background: "transparent",
        dropShadow: { enabled: true, top: 3, left: 0, blur: 5, color: "#000", opacity: dark ? 0.45 : 0.25 },
      },
      series: total > 0 ? values : [1],
      labels: data.map((d) => d.label || ""),
      colors: total > 0 ? colors : ["#E5E7EB"],
      stroke: { show: true, width: 2, colors: [dark ? "#14213D" : "#ffffff"] },
      dataLabels: { enabled: false },
      legend: { show: false },
      tooltip: { enabled: total > 0 },
      states: { hover: { filter: { type: "lighten", value: 0.06 } } },
      fill: {
        type: total > 0 ? "gradient" : "solid",
        gradient: { shade: "dark", type: "diagonal1", shadeIntensity: 0.65, gradientToColors: colors.map((c) => c), inverseColors: true, opacityFrom: 1, opacityTo: 0.82, stops: [0, 100] },
      },
      plotOptions: {
        pie: {
          expandOnClick: false,
          donut: {
            size: "66%",
            labels: {
              show: size >= 90,
              name: { show: true, color: subColor, fontSize: "10px", offsetY: 18 },
              value: { show: true, color: textColor, fontSize: "13px", fontWeight: 800, offsetY: -4, formatter: () => centerValue || "" },
              total: {
                show: true, showAlways: true, label: centerLabel || "",
                color: subColor, fontSize: "10px",
                formatter: () => centerValue || fmt(total),
              },
            },
          },
        },
      },
    };
    const chart = new window.ApexCharts(containerRef.current, options);
    chart.render();
    chartRef.current = chart;
    return () => { chart.destroy(); chartRef.current = null; };
    // eslint-disable-next-line
  }, [JSON.stringify(values), JSON.stringify(colors), centerValue, size, dark, ready]);

  if (!ready) {
    return (
      <div className="rounded-full flex items-center justify-center text-center"
        style={{ width: size, height: size, background: dark ? "rgba(255,255,255,0.08)" : "#F4F6F5", borderRadius: "50%" }}>
        <span style={{ fontSize: 9, color: dark ? "#B7C0D8" : "#9CA3AF" }}>در حال بارگذاری نمودار...</span>
      </div>
    );
  }

  return <div ref={containerRef} id={uid} style={{ width: size, height: size }} />;
}

function polarWedgePath(cx, cy, rInner, rOuter, startDeg, endDeg) {
  const s = (startDeg * Math.PI) / 180;
  const e = (endDeg * Math.PI) / 180;
  const large = endDeg - startDeg > 180 ? 1 : 0;
  const p = (r, a) => ({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
  const a = p(rInner, s);
  const b = p(rOuter, s);
  const c = p(rOuter, e);
  const d = p(rInner, e);
  return `M ${a.x} ${a.y} L ${b.x} ${b.y} A ${rOuter} ${rOuter} 0 ${large} 1 ${c.x} ${c.y} L ${d.x} ${d.y} A ${rInner} ${rInner} 0 ${large} 0 ${a.x} ${a.y} Z`;
}

function PolarProfitChart({ revenue, expenses, profit, size = 118, dark = true }) {
  const cx = size / 2;
  const cy = size / 2;
  const innerR = size * 0.16;
  const baseOuter = size * 0.46;
  const maxVal = Math.max(revenue, expenses, Math.abs(profit), 1);
  const raw = [
    { key: "rev", label: "درآمد", value: revenue, color: "#22C55E", grad: "#86EFAC" },
    { key: "exp", label: "هزینه", value: expenses, color: "#EF4444", grad: "#FCA5A5" },
    profit >= 0
      ? { key: "pro", label: "سود", value: profit, color: "#38BDF8", grad: "#7DD3FC", boost: 1.12 }
      : { key: "los", label: "زیان", value: Math.abs(profit), color: "#F97316", grad: "#FDBA74", boost: 1.15 },
  ].filter((s) => s.value > 0);
  const total = raw.reduce((s, x) => s + x.value, 0) || 1;
  let angle = -90;
  if (!raw.length) {
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="flex-shrink-0">
        <circle cx={cx} cy={cy} r={baseOuter} fill="rgba(255,255,255,0.08)" />
        <circle cx={cx} cy={cy} r={innerR + 2} fill="rgba(255,255,255,0.12)" />
        <text x={cx} y={cy + 4} textAnchor="middle" fill="#94A3B8" fontSize="9">بدون داده</text>
      </svg>
    );
  }
  const slices = raw.map((seg) => {
    const sweep = total > 0 ? (seg.value / total) * 320 : 120;
    const scale = 0.72 + (seg.value / maxVal) * 0.38;
    const outerR = baseOuter * scale * (seg.boost || 1);
    const start = angle;
    const end = angle + sweep;
    angle = end + 8;
    return { ...seg, start, end, outerR };
  });

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="flex-shrink-0" aria-hidden="true">
      <defs>
        {slices.map((s) => (
          <linearGradient key={s.key} id={`pg-${s.key}`} x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor={s.grad} />
            <stop offset="100%" stopColor={s.color} />
          </linearGradient>
        ))}
        <filter id="pw-shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="2" stdDeviation="2" floodOpacity="0.35" />
        </filter>
      </defs>
      {slices.map((s, i) => (
        <path
          key={s.key}
          d={polarWedgePath(cx, cy, innerR, s.outerR, s.start, s.end)}
          fill={`url(#pg-${s.key})`}
          filter="url(#pw-shadow)"
          opacity={0.96 - i * 0.04}
        />
      ))}
      <circle cx={cx} cy={cy} r={innerR + 2} fill={dark ? "rgba(255,255,255,0.12)" : "#fff"} stroke={dark ? "rgba(255,255,255,0.25)" : "#E5E7EB"} strokeWidth="1.5" />
      <text x={cx} y={cy - 5} textAnchor="middle" fill={dark ? "#E2E8F0" : "#64748B"} fontSize="8" fontWeight="600">{profit >= 0 ? "سود خالص" : "زیان خالص"}</text>
      <text x={cx} y={cy + 10} textAnchor="middle" fill={dark ? "#fff" : "#14213D"} fontSize="11" fontWeight="800">{fmt(Math.abs(profit))}</text>
    </svg>
  );
}

function RadialFabMenu({ open, onToggle, onClose, branches }) {
  const [expanded, setExpanded] = useState(null);
  const btn = 56;
  const innerR = btn / 2 + 4;
  const mainOuter = 118;
  const subInner = mainOuter + 10;
  const subOuterBase = 208;
  const mainSpan = 58;
  const bottomPad = "max(1.25rem, env(safe-area-inset-bottom, 0px))";

  useEffect(() => { if (!open) setExpanded(null); }, [open]);

  const activeBranch = branches.find((b) => b.id === expanded);
  const sizeW = expanded ? 460 : 340;
  const sizeH = expanded ? 420 : 320;
  const cx = sizeW / 2;
  const cy = sizeH - btn / 2 - 16;

  function childAngles(parentMid, count, totalSpan) {
    const step = totalSpan / count;
    const start = parentMid - totalSpan / 2 + step / 2;
    return Array.from({ length: count }, (_, i) => start + i * step);
  }

  function labelPos(mid, rInner, rOuter, inward) {
    const rad = (mid * Math.PI) / 180;
    const t = inward != null ? inward : 0.5;
    const r = rInner + (rOuter - rInner) * t;
    return { x: cx + Math.cos(rad) * r, y: cy + Math.sin(rad) * r };
  }

  function splitSubLabel(label) {
    const parts = label.split(/\s+/).filter(Boolean);
    if (parts.length <= 1) return [label];
    if (parts.length === 2) return parts;
    const mid = Math.ceil(parts.length / 2);
    return [parts.slice(0, mid).join(" "), parts.slice(mid).join(" ")];
  }

  function handleMainClick(branch) {
    if (branch.children?.length) {
      setExpanded((prev) => (prev === branch.id ? null : branch.id));
      return;
    }
    branch.onClick?.();
    onClose();
  }

  function handleChildClick(child) {
    child.onClick?.();
    onClose();
  }

  function renderWedge(id, mid, span, iR, oR, fill, label, emoji, onClick, isSub) {
    const start = mid - span / 2;
    const end = mid + span / 2;
    const pos = labelPos(mid, iR, oR, isSub ? 0.38 : 0.5);
    const fs = isSub ? 9.5 : 10;
    const em = isSub ? 16 : 22;
    const lines = isSub ? splitSubLabel(label) : [label];
    const lineH = isSub ? 11 : 12;
    const emojiOff = lines.length > 1 ? 14 : 10;
    const labelY = pos.y + (lines.length > 1 ? 4 : 8);
    return (
      <g key={id} filter="url(#fab-sh)" style={{ cursor: "pointer" }} onClick={onClick}>
        <path d={polarWedgePath(cx, cy, iR, oR, start, end)} fill={fill} />
        <text x={pos.x} y={pos.y - emojiOff} textAnchor="middle" fontSize={em}>{emoji}</text>
        {lines.map((line, i) => (
          <text key={i} x={pos.x} y={labelY + i * lineH} textAnchor="middle" fill="#fff" fontSize={fs} fontWeight="700">{line}</text>
        ))}
      </g>
    );
  }

  const allIds = branches.flatMap((b) => [b.id, ...(b.children || []).map((c) => c.id)]);

  return (
    <>
      {open && <div className="fixed inset-0 bg-black/35 z-[55]" onClick={onClose} aria-hidden="true" />}
      <div
        className="fixed z-[56]"
        style={{
          bottom: bottomPad,
          left: "50%",
          transform: "translateX(-50%)",
          width: open ? sizeW : btn,
          height: open ? sizeH : btn,
          transition: "width 0.3s ease, height 0.3s ease",
          pointerEvents: "none",
        }}
      >
        <div className="relative w-full h-full pointer-events-auto" style={{ overflow: "visible" }}>
          {open && (
            <svg width={sizeW} height={sizeH} className="absolute top-0 left-0 drop-shadow-xl" style={{ overflow: "visible" }}>
              <defs>
                {allIds.map((id) => {
                  const item = branches.find((b) => b.id === id) || branches.flatMap((b) => b.children || []).find((c) => c.id === id);
                  if (!item) return null;
                  return (
                    <linearGradient key={id} id={`fab-${id}`} x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stopColor={item.colorLight || item.color} />
                      <stop offset="100%" stopColor={item.color} />
                    </linearGradient>
                  );
                })}
                <filter id="fab-sh" x="-30%" y="-30%" width="160%" height="160%">
                  <feDropShadow dx="0" dy="3" stdDeviation="4" floodOpacity="0.28" />
                </filter>
              </defs>
              {branches.map((branch) =>
                renderWedge(
                  branch.id, branch.midAngle, mainSpan, innerR, mainOuter,
                  `url(#fab-${branch.id})`, branch.label, branch.emoji,
                  () => handleMainClick(branch), false
                )
              )}
              {activeBranch?.children?.map((child, i) => {
                const n = activeBranch.children.length;
                const span = n === 2 ? 40 : 44;
                const totalSpan = n === 2 ? 76 : 104;
                const mid = childAngles(activeBranch.midAngle, n, totalSpan)[i];
                return renderWedge(
                  child.id, mid, span, subInner, subOuterBase,
                  `url(#fab-${child.id})`, child.label, child.emoji,
                  () => handleChildClick(child), true
                );
              })}
            </svg>
          )}
          <button
            type="button"
            onClick={onToggle}
            className="absolute w-14 h-14 rounded-full bg-[#14213D] text-white shadow-xl flex items-center justify-center z-10"
            style={{
              left: open ? cx - btn / 2 : 0,
              top: open ? cy - btn / 2 : 0,
              transition: "left 0.3s ease, top 0.3s ease, transform 0.25s ease",
              transform: `rotate(${open ? 45 : 0}deg)`,
            }}
            aria-label={open ? "بستن منو" : "منوی عملیات"}
          >
            <Plus size={26} />
          </button>
        </div>
      </div>
    </>
  );
}

function withTimeout(promise, ms) {
  return new Promise((resolve, reject) => {
    const t = setTimeout(() => reject(new Error("timeout")), ms);
    promise.then((v) => { clearTimeout(t); resolve(v); }, (e) => { clearTimeout(t); reject(e); });
  });
}

function uploadErrorMessage(err) {

  }
  return (err && err.message) || "خطای نامشخص";
}

function resizeImageLegacy(file, maxW, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function LeafletMap({ markers, onMapClick, center, zoom, fitAll, height = 220 }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef([]);
  const clickHandlerRef = useRef(onMapClick);
  clickHandlerRef.current = onMapClick;

  useEffect(() => {
    if (!containerRef.current || mapRef.current || !window.L) return;
    const map = window.L.map(containerRef.current, { zoomControl: true }).setView(center || [35.7, 51.4], zoom || 5);
    window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors",
      maxZoom: 19,
    }).addTo(map);
    map.on("click", (e) => { if (clickHandlerRef.current) clickHandlerRef.current(e.latlng.lat, e.latlng.lng); });
    mapRef.current = map;
    setTimeout(() => map.invalidateSize(), 200);
    return () => { map.remove(); mapRef.current = null; };
    // eslint-disable-next-line
  }, []);

  useEffect(() => {
    const map = mapRef.current;
    if (!map || !window.L) return;
    markersRef.current.forEach((m) => map.removeLayer(m));
    markersRef.current = [];
    const icon = window.L.divIcon({
      html: '<div style="font-size:26px;line-height:1;transform:translateY(-4px);">📍</div>',
      className: "", iconSize: [26, 26], iconAnchor: [13, 26],
    });
    (markers || []).forEach((mk) => {
      const marker = window.L.marker([mk.lat, mk.lng], { icon }).addTo(map);
      if (mk.label) marker.bindPopup(mk.label);
      if (mk.onClick) marker.on("click", mk.onClick);
      markersRef.current.push(marker);
    });
    if (fitAll && markers && markers.length > 1) {
      const bounds = window.L.latLngBounds(markers.map((m) => [m.lat, m.lng]));
      map.fitBounds(bounds, { padding: [30, 30], maxZoom: 15 });
    } else if (markers && markers.length === 1) {
      map.setView([markers[0].lat, markers[0].lng], Math.max(map.getZoom(), 14));
    }
    // eslint-disable-next-line
  }, [markers, fitAll]);

  useEffect(() => {
    const map = mapRef.current;
    if (map && center && !fitAll) map.setView(center, map.getZoom());
    // eslint-disable-next-line
  }, [center && center[0], center && center[1]]);

  return <div ref={containerRef} style={{ height, width: "100%", borderRadius: 12 }} />;
}

async function resizeImage(file, maxW = 1000, quality = 0.7) {
  // Modern, memory-efficient path: decodes directly at reduced size instead of
  // loading the full-resolution photo into memory first (important on phones,
  // where a camera photo can be 10-20MB before it's ever resized).
  if (window.createImageBitmap) {
    try {
      const bitmap = await withTimeout(createImageBitmap(file, { resizeWidth: maxW, resizeQuality: "medium" }), 8000);
      const canvas = document.createElement("canvas");
      canvas.width = bitmap.width;
      canvas.height = bitmap.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(bitmap, 0, 0);
      if (bitmap.close) bitmap.close();
      return canvas.toDataURL("image/jpeg", quality);
    } catch (e) {
      // fall through to the legacy method below
    }
  }
  return withTimeout(resizeImageLegacy(file, maxW, quality), 8000);
}

function readRawFile(file, maxBytes = 8 * 1024 * 1024) {
  const inner = new Promise((resolve, reject) => {
    if (file.size > maxBytes) { reject(new Error("فایل خیلی بزرگ است (بیشتر از ۸ مگابایت).")); return; }
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("خواندن فایل با خطا مواجه شد."));
    try {
      reader.readAsDataURL(file);
    } catch (e) {
      reject(e);
    }
  });
  return withTimeout(inner, 10000);
}

async function processDocFile(file) {
  if (!file) return null;
  if (file.type === "application/pdf") return readRawFile(file);
  if (file.type.startsWith("image/")) {
    try { return await resizeImage(file, 1200, 0.7); } catch (e) { return readRawFile(file); }
  }
  return readRawFile(file);
}

function CompactDocUploader({ docs, onChange, disabled, required, label, hint }) {
  const fileRef = useRef(null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  async function handleFiles(e) {
    const files = Array.from(e.target.files || []);
    e.target.value = "";
    if (!files.length || disabled) return;
    setBusy(true); setErr("");
    try {
      const next = [...(docs || [])];
      for (const file of files) {
        const dataUrl = await processDocFile(file);
        next.push({ id: uid(), name: file.name, dataUrl });
      }
      onChange(next);
    } catch (ex) {
      setErr(ex.message || "خطا در بارگذاری فایل");
    } finally {
      setBusy(false);
    }
  }

  return (
    <div>
      {label && (
        <label className="text-xs text-[#6B7280] font-medium block mb-1">
          {label}{required ? " *" : ""}
        </label>
      )}
      {hint && <div className="text-[10px] text-[#9CA3AF] mb-1">{hint}</div>}
      <div className="flex flex-wrap gap-1.5 mb-1.5">
        {(docs || []).map((d) => (
          <div key={d.id} className="flex items-center gap-1 bg-white border border-black/10 rounded-lg px-2 py-1 text-[10px] max-w-full">
            <span className="truncate max-w-[120px]">{d.name}</span>
            {!disabled && (
              <button type="button" onClick={() => onChange((docs || []).filter((x) => x.id !== d.id))} className="text-[#B91C1C]">×</button>
            )}
          </div>
        ))}
      </div>
      {!disabled && (
        <button type="button" onClick={() => fileRef.current?.click()} disabled={busy}
          className="w-full border border-dashed border-[#3B4BD4]/35 rounded-lg py-2 text-[11px] text-[#3B4BD4] font-semibold disabled:opacity-50">
          {busy ? "در حال بارگذاری..." : "+ افزودن پیوست (تصویر / PDF)"}
        </button>
      )}
      {err && <div className="text-[10px] text-[#B91C1C] mt-1">{err}</div>}
      <input ref={fileRef} type="file" accept="image/*,application/pdf" multiple className="hidden" onChange={handleFiles} />
    </div>
  );
}

        setShowMenu(false);
        setShowFab(false);
      }, idleMs);
    };
    const events = ["pointerdown", "keydown", "touchstart", "scroll", "click"];
    events.forEach((ev) => window.addEventListener(ev, reset, { passive: true }));
    reset();
    return () => {
      clearTimeout(timer);
      events.forEach((ev) => window.removeEventListener(ev, reset));

  }, [user, loaded]);

    }
    function clearFlag() {
      try { sessionStorage.removeItem("metrico_pending_upload"); } catch (e) {}
    }
    document.addEventListener("visibilitychange", () => { if (!document.hidden) clearFlag(); });
    window.addEventListener("focus", clearFlag);
    return () => {
      window.removeEventListener("focus", clearFlag);

      setUser(data.session?.user || null);
      setAuthLoading(false);
    });

    setActivated(null);
    if (isDemoUser(user)) {
      setActivated(true);

  function updateProject(id, updater) {
    if (!guardWrite()) return;
    setProjects((prev) => {
      const next = prev.map((p) => (p.id === id ? updater(p) : p));
      const updated = next.find((p) => p.id === id);
      if (updated && user) {
        clearTimeout(updateTimers.current[id]);

          const { id: _id, name, ...rest } = updated;
          window.sb.from("projects").update({ name, data: rest }).eq("id", id)
            .then(({ error: err }) => { if (err) setError("ذخیره‌سازی ناموفق بود: " + err.message); });

      }
      return next;
    });

  async function createProject(name, floors, meta = {}) {
    if (!guardWrite()) return;
    if (projects.length >= planLimits.maxProjects) {
      setError(`در پلن ${planLabel(effectivePlan)} حداکثر ${planLimits.maxProjects} پروژه مجاز است. برای پروژه بیشتر، پلن را ارتقا دهید.`);
      setScreen("plan");
      return;
    }
    const sorted = [...floors].sort((a, b) => a.number - b.number);
    const units = [];
    let seq = 1;
    sorted.forEach((f) => {
      for (let i = 1; i <= f.count; i++) {
        units.push(emptyUnit(f.number, String(seq)));
        seq++;
      }
    });
    const dataPayload = {
      floors, units, expenses: [], documents: [],
      activities: defaultProjectActivities(),
      bankAccounts: [], investors: [], financeTransactions: [],
      address: meta.address || "", landArea: meta.landArea || "", totalBuiltArea: meta.totalBuiltArea || "",
    };
    const { data, error: err } = await window.sb.from("projects")
      .insert({ user_id: user.id, name, data: dataPayload }).select().single();
    if (err) { setError("ساخت پروژه ناموفق بود: " + err.message); return; }
    const project = { id: data.id, name: data.name, ...(data.data || {}) };
    setProjects((prev) => [...prev, project]);
    setActiveTab(project.id);
    setScreen("app");
    setShowNewProject(false);
  }

  function addFloor(projectId, count) {
    updateProject(projectId, (p) => {
      const nextNum = p.floors.length ? Math.max(...p.floors.map((f) => f.number)) + 1 : 1;
      const maxSeq = p.units.length ? Math.max(...p.units.map((u) => Number(u.unitNumber) || 0)) : 0;
      const newUnits = [];
      for (let i = 1; i <= count; i++) newUnits.push(emptyUnit(nextNum, String(maxSeq + i)));
      return { ...p, floors: [...p.floors, { number: nextNum, count }], units: [...p.units, ...newUnits] };
    });
  }
  function renameProject(projectId, name) { updateProject(projectId, (p) => ({ ...p, name })); }
  function updateProjectMeta(projectId, meta) { updateProject(projectId, (p) => ({ ...p, ...meta })); }

  function addExpense(projectId, expense) {
    if (!guardWrite()) return;
    updateProject(projectId, (p) => {
      const exp = { id: uid(), ...expense };
      let financeTransactions = [...(p.financeTransactions || [])];
      if (exp.bankAccountId && Number(exp.amount) > 0) {
        financeTransactions.push({
          id: uid(),
          date: exp.date || new Date().toISOString().slice(0, 10),
          type: exp.paymentMethod === "check" ? "check_clear" : "expense",
          amount: Number(exp.amount),
          fromAccountId: exp.bankAccountId,
          toAccountId: null,
          note: exp.note || exp.title,
          expenseId: exp.id,
          docs: exp.docs || [],
        });
      }
      return { ...p, expenses: [...(p.expenses || []), exp], financeTransactions };
    });
    if (expense.materialId && Number(expense.materialQty) > 0) {
      const next = inventory.map((item) => {
        if (item.id !== expense.materialId) return item;
        return { ...item, quantity: (Number(item.quantity) || 0) + Number(expense.materialQty) };
      });
      setInventory(next);
      window.sb.auth.updateUser({ data: { inventory: next } }).then(({ data: udata }) => {
        if (udata?.user) setUser(udata.user);
      });
    }
  }
  function removeExpense(projectId, expenseId) {

    updateProject(projectId, (p) => ({
      ...p,
      expenses: (p.expenses || []).filter((e) => e.id !== expenseId),

  function recordUnitIncome(projectId, unitId, { amount, accountId, installmentId, note, docs }) {
    if (!guardWrite() || !accountId || !(Number(amount) > 0)) return null;
    const txId = uid();
    updateProject(projectId, (p) => ({
      ...p,
      financeTransactions: [...(p.financeTransactions || []), {
        id: txId,
        date: new Date().toISOString().slice(0, 10),
        type: "income",
        amount: Number(amount),
        fromAccountId: null,
        toAccountId: accountId,
        unitId,
        installmentId: installmentId || null,
        note: note || "دریافت فروش واحد",
        docs: docs || [],
      }],
      units: p.units.map((u) => {
        if (u.id !== unitId) return u;
        if (installmentId) {
          return {
            ...u,
            installments: (u.installments || []).map((i) => (
              i.id === installmentId ? { ...i, paid: true, financeTxId: txId, accountId: accountId || i.accountId } : i

        return { ...u, depositAccountId: accountId };

    return txId;

  function deleteFloor(projectId, floorNumber) {
    updateProject(projectId, (p) => {
      const remainingFloors = p.floors.filter((f) => f.number !== floorNumber);
      const sorted = [...remainingFloors].sort((a, b) => a.number - b.number);
      const remainingUnitsByFloor = {};
      p.units.filter((u) => u.floor !== floorNumber).forEach((u) => {
        remainingUnitsByFloor[u.floor] = remainingUnitsByFloor[u.floor] || [];
        remainingUnitsByFloor[u.floor].push(u);
      });
      let seq = 1;
      const renumbered = [];
      sorted.forEach((f) => {
        const list = (remainingUnitsByFloor[f.number] || []).sort((a, b) => Number(a.unitNumber) - Number(b.unitNumber));
        list.forEach((u) => { renumbered.push({ ...u, unitNumber: String(seq) }); seq++; });
      });
      return { ...p, floors: sorted, units: renumbered };
    });
  }

  async function saveInventory(list) {
    if (!guardWrite()) return;
    setInventory(list);
    const { data, error: err } = await window.sb.auth.updateUser({ data: { inventory: list } });
    if (err) setError("ذخیره موجودی انبار ناموفق بود: " + err.message);
    else if (data?.user) setUser(data.user);
  }
  function adjustInventoryStock(itemId, delta) {
    if (!guardWrite()) return;
    const next = inventory.map((item) => {
      if (item.id !== itemId) return item;
      return { ...item, quantity: Math.max(0, (Number(item.quantity) || 0) + (Number(delta) || 0)) };
    });
    saveInventory(next);
  }
  function setInventoryQuantity(itemId, qty) {
    if (!guardWrite()) return;
    saveInventory(inventory.map((item) => (
      item.id === itemId ? { ...item, quantity: Math.max(0, Number(qty) || 0) } : item
    )));
  }
  function addInventoryItem(item) {
    if (!guardWrite()) return;
    saveInventory([...inventory, { id: uid(), quantity: 0, allocations: [], takeoffKey: null, itemType: "", itemVariant: "", ...item }]);
  }
  function removeInventoryItem(itemId) {
    if (!guardWrite()) return;
    saveInventory(inventory.filter((i) => i.id !== itemId));
  }
  function allocateInventory(itemId, { activity, quantity }) {
    if (!guardWrite()) return;
    const qty = Number(quantity) || 0;
    if (!activity?.trim() || qty <= 0) return;
    let blocked = false;
    const next = inventory.map((item) => {
      if (item.id !== itemId) return item;
      const avail = inventoryAvailable(item);
      if (qty > avail) { blocked = true; return item; }
      return {
        ...item,
        allocations: [...(item.allocations || []), { id: uid(), activity: activity.trim(), quantity: qty, at: new Date().toISOString() }],
      };
    });
    if (blocked) { setError("موجودی آزاد کافی نیست."); return; }
    saveInventory(next);
  }
  function removeAllocation(itemId, allocationId) {
    if (!guardWrite()) return;
    saveInventory(inventory.map((item) => (
      item.id === itemId ? { ...item, allocations: (item.allocations || []).filter((a) => a.id !== allocationId) } : item
    )));
  }
  function patchInventoryItem(itemId, patch) {
    if (!guardWrite()) return;
    saveInventory(inventory.map((item) => (item.id === itemId ? { ...item, ...patch } : item)));
  }

  function contactBalance(contactId) {
    let owe = 0; // چیزی که ما به این شخص بدهکاریم (نسیه‌های تسویه‌نشده)
    projects.forEach((p) => {
      (p.expenses || []).forEach((e) => {
        if (e.contactId !== contactId) return;
        if (e.paymentMethod === "credit") owe += Number(e.amount) || 0;
        else owe -= Number(e.amount) || 0;
      });
    });
    return owe;
  }

  function sendChatMessage(optionalText) {

    setChatLog((prev) => [...prev, { role: "user", text }, { role: "bot", text: answer }]);

  function toggleChatVoice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setChatLog((prev) => [...prev, { role: "bot", text: "مرورگر شما ورودی صوتی را پشتیبانی نمی‌کند. Chrome یا Edge را امتحان کنید." }]);
      return;
    }
    if (chatListening && chatSpeechRef.current) {
      chatSpeechRef.current.stop();
      return;
    }
    const rec = new SR();
    rec.lang = "fa-IR";
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onstart = () => setChatListening(true);
    rec.onend = () => setChatListening(false);
    rec.onerror = () => setChatListening(false);
    rec.onresult = (ev) => {
      const transcript = ev.results?.[0]?.[0]?.transcript?.trim();
      if (transcript) sendChatMessage(transcript);
    };
    chatSpeechRef.current = rec;
    try { rec.start(); } catch (e) { setChatListening(false); }
  }

  function exportBackup() {
    try {
      const payload = { version: 2, exportedAt: new Date().toISOString(), company, projects };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `backup-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);

      setError("ساخت فایل پشتیبان ناموفق بود.");
    }
  }

  function restoreBackup(file, onDone) {
    if (!guardWrite("حساب دمو فقط برای مشاهده است — بازیابی پشتیبان غیرفعال است.")) {
      onDone(false, "حساب دمو فقط برای مشاهده است.");
      return;
    }
    if (!hasPlanFeature(effectivePlan, "backup_restore", planExpiresAt)) {
      onDone(false, `بازیابی در پلن ${planRequiredLabel("backup_restore")} است.`);
      setScreen("plan");
      return;
    }
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.projects)) throw new Error("invalid");

        await window.sb.from("projects").delete().eq("user_id", user.id);

        let list = [];
        if (data.projects.length) {
          const rows = data.projects.map((p) => {
            const { id: _id, name, ...rest } = p;
            return { user_id: user.id, name, data: rest };
          });
          const { data: inserted, error: err } = await window.sb.from("projects").insert(rows).select();
          if (err) throw err;
          list = inserted.map((row) => ({ id: row.id, name: row.name, ...(row.data || {}) }));
        }

        if (data.company) {
          const { data: udata, error: uerr } = await window.sb.auth.updateUser({ data: { company: data.company } });
          if (!uerr && udata?.user) { setUser(udata.user); setCompany(data.company); }
        } else {
          setCompany(null);
        }

        setProjects(list);
        setActiveTab(list.length ? list[0].id : null);
        onDone(true, null);
      } catch (e) {
        onDone(false, "فایل پشتیبان معتبر نیست یا بازیابی ناموفق بود.");
      }
    };
    reader.onerror = () => onDone(false, "خواندن فایل ناموفق بود.");
    reader.readAsText(file);
  }

      id: "finance", label: "امور مالی", emoji: "💼", color: "#2563EB", colorLight: "#93C5FD", midAngle: -150,
      children: [
